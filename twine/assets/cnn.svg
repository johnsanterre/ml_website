  <!-- Dot product symbol -->
  <text x="134" y="73" text-anchor="middle" font-size="16" fill="#5C3D1E">·</text>

  <!-- Arrow from input to feature map -->
  <line x1="148" y1="68" x2="172" y2="68" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Feature map 3x3 at x=176, y=50, cell size 18 -->
  <rect x="176" y="50" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="194" y="50" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="212" y="50" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="176" y="68" width="18" height="18" fill="#E9DEC5" stroke="#7C2530" stroke-width="1"/>
  <rect x="194" y="68" width="18" height="18" fill="#C4A87A" fill-opacity="0.5" stroke="#7C2530" stroke-width="1.5"/>
  <rect x="212" y="68" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="176" y="86" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="194" y="86" width="18" height="18" fill="#E9DEC5" stroke="#7C2530" stroke-width="1"/>
  <rect x="212" y="86" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>

  <!-- Feature map label -->
  <text x="203" y="115" text-anchor="middle" font-size="8.5" fill="#6B5D4F">feature map</text>

  <!-- Kernel label -->
  <text x="47" y="27" text-anchor="middle" font-size="8" fill="#7C2530" font-weight="bold">3×3 kernel</text>

  <!-- === BOTTOM STRUCTURE: shifted kernel (stride) === -->

  <!-- Input grid 5x5 at x=20, y=158 -->
  <!-- Row 0 -->
  <rect x="20" y="158" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="158" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="158" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="158" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="158" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 1 -->
  <rect x="20" y="176" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="176" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="176" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="176" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="176" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 2 -->
  <rect x="20" y="194" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="194" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="194" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="194" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="194" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 3 -->
  <rect x="20" y="212" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="212" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="212" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="212" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="212" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 4 -->
  <rect x="20" y="230" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="230" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="230" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="230" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="230" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>

  <!-- Kernel shifted one step right -->
  <rect x="38" y="158" width="54" height="54" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="2"/>

  <!-- Dashed arrow indicating stride movement -->
  <line x1="47" y1="152" x2="65" y2="152" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-red)"/>
  <text x="56" y="148" text-anchor="middle" font-size="8" fill="#7C2530">stride →</text>

  <!-- Arrow from shifted input to feature map -->
  <line x1="148" y1="194" x2="172" y2="194" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Feature map 3x3 for second structure -->
  <rect x="176" y="176" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="194" y="176" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="212" y="176" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="176" y="194" width="18" height="18" fill="#E9DEC5" stroke="#7C2530" stroke-width="1"/>
  <rect x="194" y="194" width="18" height="18" fill="#C4A87A" fill-opacity="0.5" stroke="#7C2530" stroke-width="1.5"/>
  <rect x="212" y="194" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="176" y="212" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>
  <rect x="194" y="212" width="18" height="18" fill="#E9DEC5" stroke="#7C2530" stroke-width="1"/>
  <rect x="212" y="212" width="18" height="18" fill="#DCCFA8" stroke="#7C2530" stroke-width="1"/>

  <!-- Dot product symbol bottom -->
  <text x="134" y="199" text-anchor="middle" font-size="16" fill="#5C3D1E">·</text>

  <!-- ══ PANEL 2: DEEP FEATURES ══ -->
  <text x="443" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">DEEP FEATURES</text>

  <!-- Layer stack: 4 progressively narrower/taller rects -->
  <!-- conv1: widest, lightest -->
  <rect x="308" y="55" width="46" height="140" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.2" rx="2"/>
  <text x="331" y="208" text-anchor="middle" font-size="7.5" fill="#5C3D1E">conv1</text>
  <text x="331" y="219" text-anchor="middle" font-size="7" fill="#6B5D4F">(edges)</text>

  <!-- Arrow -->
  <line x1="354" y1="125" x2="366" y2="125" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-tan)"/>
  <!-- pooling label -->
  <text x="360" y="120" text-anchor="middle" font-size="7" fill="#2D5A8E">pool↓</text>

  <!-- conv2 -->
  <rect x="368" y="68" width="38" height="114" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1.2" rx="2"/>
  <text x="387" y="195" text-anchor="middle" font-size="7.5" fill="#5C3D1E">conv2</text>
  <text x="387" y="206" text-anchor="middle" font-size="7" fill="#6B5D4F">(textures)</text>

  <!-- Arrow -->
  <line x1="406" y1="125" x2="418" y2="125" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-tan)"/>

  <!-- conv3 -->
  <rect x="420" y="82" width="30" height="86" fill="#DCCFA8" stroke="#C4A87A" stroke-width="1.2" rx="2"/>
  <text x="435" y="180" text-anchor="middle" font-size="7.5" fill="#5C3D1E">conv3</text>
  <text x="435" y="191" text-anchor="middle" font-size="7" fill="#6B5D4F">(shapes)</text>

  <!-- Arrow -->
  <line x1="450" y1="125" x2="462" y2="125" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-tan)"/>

  <!-- FC layer -->
  <rect x="464" y="98" width="22" height="54" fill="#A0845A" fill-opacity="0.6" stroke="#7C2530" stroke-width="1.2" rx="2"/>
  <text x="475" y="165" text-anchor="middle" font-size="7.5" fill="#5C3D1E">FC</text>
  <text x="475" y="176" text-anchor="middle" font-size="7" fill="#6B5D4F">(class)</text>

  <!-- Arrow to class circles -->
  <line x1="486" y1="125" x2="500" y2="125" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-tan)"/>

  <!-- Class output circles -->
  <!-- cat - highlighted red (top) -->
  <circle cx="520" cy="105" r="13" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.8"/>
  <text x="520" y="109" text-anchor="middle" font-size="8.5" fill="#7C2530" font-weight="bold">cat</text>

  <!-- dog -->
  <circle cx="520" cy="133" r="13" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="520" y="137" text-anchor="middle" font-size="8.5" fill="#6B5D4F">dog</text>

  <!-- bird -->
  <circle cx="520" cy="161" r="13" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="520" y="165" text-anchor="middle" font-size="8.5" fill="#6B5D4F">bird</text>

  <!-- Lines from FC to class circles -->
  <line x1="500" y1="112" x2="507" y2="108" stroke="#7C2530" stroke-width="0.9" opacity="0.6"/>
  <line x1="500" y1="125" x2="507" y2="133" stroke="#6B5D4F" stroke-width="0.9" opacity="0.5"/>
  <line x1="500" y1="130" x2="507" y2="158" stroke="#6B5D4F" stroke-width="0.9" opacity="0.5"/>

  <!-- Bottom caption -->
  <text x="300" y="302" text-anchor="middle" font-size="9" fill="#6B5D4F">
    Convolution slides a kernel over an input, computing dot products to produce feature maps
  </text>
</svg>
