  <!-- ══ PANEL 1: CONVOLUTION ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">CONVOLUTION</text>

  <!-- === TOP STRUCTURE: input grid + kernel + feature map === -->

  <!-- Input grid 5x5 at x=20, y=30, cell size 18 -->
  <!-- Row 0 -->
  <rect x="20" y="32" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="32" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="32" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="32" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="32" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 1 -->
  <rect x="20" y="50" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="50" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="50" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="50" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="50" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 2 -->
  <rect x="20" y="68" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="68" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="56" y="68" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="68" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="68" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
