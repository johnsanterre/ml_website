  <rect x="56" y="86" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="74" y="86" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="92" y="86" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <!-- Row 4 -->
  <rect x="20" y="104" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="38" y="104" width="18" height="18" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
