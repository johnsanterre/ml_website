<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" letter-spacing="0.5">DIFFUSION MODELS: FORWARD &amp; REVERSE</text>

  <!-- Forward process label -->
  <text x="400" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#7C2530" font-variant="small-caps">FORWARD PROCESS  q(xₜ | xₜ₋₁)  — ADD NOISE</text>

  <!-- Images: clean → noisy -->
  <!-- Step 0: clean image -->
  <rect x="30" y="75" width="90" height="90" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <rect x="45" y="90" width="30" height="40" fill="#2D5A8E" fill-opacity="0.5" rx="2"/>
  <ellipse cx="75" cy="100" rx="12" ry="12" fill="#7C2530" fill-opacity="0.5"/>
  <text x="75" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">x₀ (clean)</text>

  <!-- Arrow 1 -->
  <line x1="125" y1="120" x2="165" y2="120" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="145" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">+ε</text>

  <!-- Step t/4 -->
  <rect x="170" y="75" width="90" height="90" fill="#D4C5A9" fill-opacity="0.3" stroke="#C4A87A" stroke-width="1.5" rx="3"/>
  <!-- slight noise dots -->
  <circle cx="190" cy="95" r="3" fill="#5C3D1E" fill-opacity="0.3"/>
  <circle cx="215" cy="110" r="2" fill="#7C2530" fill-opacity="0.4"/>
  <circle cx="240" cy="130" r="3" fill="#2D5A8E" fill-opacity="0.3"/>
  <circle cx="200" cy="145" r="2" fill="#5C3D1E" fill-opacity="0.3"/>
  <text x="215" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">x_{T/4}</text>

  <!-- Arrow 2 -->
  <line x1="265" y1="120" x2="305" y2="120" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="285" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">+ε</text>

  <!-- Step t/2 -->
  <rect x="310" y="75" width="90" height="90" fill="#D4C5A9" fill-opacity="0.5" stroke="#C4A87A" stroke-width="1.5" rx="3"/>
  <circle cx="325" cy="88" r="4" fill="#5C3D1E" fill-opacity="0.4"/>
  <circle cx="355" cy="105" r="3" fill="#7C2530" fill-opacity="0.5"/>
  <circle cx="340" cy="125" r="5" fill="#2D5A8E" fill-opacity="0.4"/>
  <circle cx="375" cy="140" r="3" fill="#5C3D1E" fill-opacity="0.5"/>
  <circle cx="330" cy="150" r="4" fill="#C4A87A" fill-opacity="0.6"/>
  <text x="355" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">x_{T/2}</text>

  <!-- Arrow 3 -->
  <line x1="405" y1="120" x2="445" y2="120" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="425" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">+ε</text>

  <!-- Step T: pure noise -->
  <rect x="450" y="75" width="90" height="90" fill="#6B5D4F" fill-opacity="0.15" stroke="#6B5D4F" stroke-width="1.5" rx="3"/>
  <!-- dense noise fill -->
  <circle cx="462" cy="84" r="3" fill="#5C3D1E" fill-opacity="0.45"/>
  <circle cx="480" cy="92" r="2" fill="#7C2530" fill-opacity="0.5"/>
  <circle cx="498" cy="80" r="3" fill="#2D5A8E" fill-opacity="0.4"/>
  <circle cx="470" cy="104" r="4" fill="#C4A87A" fill-opacity="0.5"/>
  <circle cx="490" cy="115" r="3" fill="#5C3D1E" fill-opacity="0.4"/>
  <circle cx="530" cy="88" r="2" fill="#7C2530" fill-opacity="0.5"/>
  <circle cx="518" cy="108" r="4" fill="#2D5A8E" fill-opacity="0.45"/>
  <circle cx="462" cy="130" r="3" fill="#5C3D1E" fill-opacity="0.4"/>
  <circle cx="505" cy="140" r="2" fill="#C4A87A" fill-opacity="0.6"/>
  <circle cx="530" cy="150" r="3" fill="#7C2530" fill-opacity="0.5"/>
  <circle cx="475" cy="155" r="4" fill="#2D5A8E" fill-opacity="0.4"/>
  <text x="495" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">x_T ~ N(0,I)</text>

  <!-- Reverse process label -->
  <text x="400" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#2D5A8E" font-variant="small-caps">REVERSE PROCESS  p_θ(xₜ₋₁ | xₜ)  — DENOISE</text>

  <!-- Reverse arrow (big) -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>
  <line x1="540" y1="120" x2="580" y2="240" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- Neural network denoiser box -->
  <rect x="595" y="220" width="170" height="80" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5" rx="5"/>
  <text x="680" y="248" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E">U-Net ε_θ(xₜ, t)</text>
  <text x="680" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">predicts noise ε</text>
  <text x="680" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">at each timestep t</text>

  <!-- Output arrow back -->
  <line x1="595" y1="260" x2="100" y2="300" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="350" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">learned denoising path → reconstructs x₀</text>

  <!-- Loss annotation -->
  <rect x="30" y="340" width="740" height="45" fill="#C4A87A" fill-opacity="0.12" stroke="#C4A87A" stroke-width="1" rx="4"/>
  <text x="400" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Training objective: minimize  𝔼[||ε − ε_θ(√ᾱₜ x₀ + √(1−ᾱₜ) ε, t)||²]</text>
  <text x="400" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">Predict the noise added at step t, then subtract it iteratively to recover the image.</text>
</svg>
