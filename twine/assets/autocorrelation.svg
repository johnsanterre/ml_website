<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Panel divider -->
  <line x1="390" y1="20" x2="390" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ LEFT PANEL: Time Series ══ -->
  <text x="195" y="42" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">TIME SERIES  x(t)</text>

  <!-- Axes -->
  <line x1="50" y1="320" x2="360" y2="320" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="50" y1="60" x2="50" y2="320" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Axis arrow tips -->
  <polygon points="360,315 368,320 360,325" fill="#5C3D1E"/>
  <polygon points="45,60 50,52 55,60" fill="#5C3D1E"/>

  <!-- Axis labels -->
  <text x="375" y="325" fill="#5C3D1E" font-size="13">t</text>
  <text x="30" y="58" fill="#5C3D1E" font-size="13">x</text>

  <!-- Zero line -->
  <line x1="50" y1="190" x2="360" y2="190" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="35" y="194" fill="#C4A87A" font-size="10" text-anchor="middle">0</text>

  <!-- Sinusoidal time series with slight noise — period ~62px -->
  <!-- One full cycle ~ 62px, drawn across 310px = ~5 cycles -->
  <path d="
    M 50,190
    C 56,155 68,120 82,115
    C 96,110 104,140 112,170
    C 120,200 128,230 138,235
    C 148,240 156,215 163,185
    C 170,155 176,118 186,113
    C 196,108 204,140 212,172
    C 220,204 227,232 237,237
    C 247,242 255,215 263,182
    C 271,149 277,115 287,110
    C 297,105 306,140 314,172
    C 322,204 330,234 340,238
    C 350,242 356,220 360,205
  " fill="none" stroke="#2C5F8A" stroke-width="2.5"/>

  <!-- Period annotation -->
  <line x1="50" y1="350" x2="112" y2="350" stroke="#4A7C59" stroke-width="1.5" marker-end="none"/>
  <line x1="50" y1="345" x2="50" y2="355" stroke="#4A7C59" stroke-width="1.5"/>
  <line x1="112" y1="345" x2="112" y2="355" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="81" y="370" text-anchor="middle" fill="#4A7C59" font-size="11">period T</text>

  <!-- ══ RIGHT PANEL: ACF ══ -->
  <text x="595" y="42" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">AUTOCORRELATION  ACF(k)</text>

  <!-- Axes -->
  <line x1="420" y1="220" x2="775" y2="220" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="420" y1="60" x2="420" y2="340" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Axis arrow tips -->
  <polygon points="775,215 783,220 775,225" fill="#5C3D1E"/>
  <polygon points="415,60 420,52 425,60" fill="#5C3D1E"/>

  <!-- Axis labels -->
  <text x="788" y="225" fill="#5C3D1E" font-size="13">k</text>
  <text x="408" y="58" fill="#5C3D1E" font-size="11" text-anchor="middle">r</text>

  <!-- +1 / -1 / 0 labels -->
  <text x="408" y="80" text-anchor="middle" fill="#5C3D1E" font-size="10">1</text>
  <line x1="416" y1="76" x2="424" y2="76" stroke="#5C3D1E" stroke-width="1"/>

  <text x="408" y="224" text-anchor="middle" fill="#5C3D1E" font-size="10">0</text>

  <text x="405" y="368" text-anchor="middle" fill="#5C3D1E" font-size="10">−1</text>
  <line x1="416" y1="364" x2="424" y2="364" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Confidence bands (dashed) at ±1.96/√n -->
  <line x1="420" y1="172" x2="775" y2="172" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="420" y1="268" x2="775" y2="268" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="769" y="167" text-anchor="end" fill="#C0392B" font-size="10">+95% CI</text>
  <text x="769" y="282" text-anchor="end" fill="#C0392B" font-size="10">−95% CI</text>

  <!-- Lag tick positions (k=0..9), spacing=35px starting at x=440 -->
  <!-- Scale: 0 → y=220, +1 → y=76, -1 → y=364, so 1 unit = 144px -->
  <!-- ACF values for sinusoidal series: cos(2π k/5)*exp(-0.05k) -->
  <!-- k=0: 1.00  k=1: 0.31  k=2:-0.81  k=3:-0.81  k=4: 0.31  k=5: 1.00  k=6: 0.25  k=7:-0.65  k=8:-0.65  k=9: 0.25 -->

  <!-- k labels on x-axis -->
  <text x="440" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">0</text>
  <text x="475" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">1</text>
  <text x="510" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">2</text>
  <text x="545" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">3</text>
  <text x="580" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">4</text>
  <text x="615" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">5</text>
  <text x="650" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">6</text>
  <text x="685" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">7</text>
  <text x="720" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">8</text>
  <text x="755" y="238" text-anchor="middle" fill="#5C3D1E" font-size="10">9</text>

  <!-- ACF bars (positive = upward from y=220, negative = downward) -->
  <!-- k=0: r=1.00 → height=144, top y=76 -->
  <rect x="432" y="76" width="16" height="144" fill="#2C5F8A" opacity="0.85"/>

  <!-- k=1: r=0.31 → height=44.6, top y=175 -->
  <rect x="467" y="175" width="16" height="45" fill="#2C5F8A" opacity="0.85"/>

  <!-- k=2: r=-0.81 → height=117, bottom rect from y=220 down to y=337 -->
  <rect x="502" y="220" width="16" height="117" fill="#C0392B" opacity="0.80"/>

  <!-- k=3: r=-0.81 -->
  <rect x="537" y="220" width="16" height="117" fill="#C0392B" opacity="0.80"/>

  <!-- k=4: r=0.31 -->
  <rect x="572" y="175" width="16" height="45" fill="#2C5F8A" opacity="0.85"/>

  <!-- k=5: r=0.97 → height=140 -->
  <rect x="607" y="80" width="16" height="140" fill="#2C5F8A" opacity="0.85"/>

  <!-- k=6: r=0.25 → height=36 -->
  <rect x="642" y="184" width="16" height="36" fill="#2C5F8A" opacity="0.85"/>

  <!-- k=7: r=-0.65 → height=94 -->
  <rect x="677" y="220" width="16" height="94" fill="#C0392B" opacity="0.80"/>

  <!-- k=8: r=-0.65 -->
  <rect x="712" y="220" width="16" height="94" fill="#C0392B" opacity="0.80"/>

  <!-- k=9: r=0.25 -->
  <rect x="747" y="184" width="16" height="36" fill="#2C5F8A" opacity="0.85"/>

  <!-- Period annotation on ACF -->
  <line x1="440" y1="355" x2="615" y2="355" stroke="#4A7C59" stroke-width="1.5"/>
  <line x1="440" y1="350" x2="440" y2="360" stroke="#4A7C59" stroke-width="1.5"/>
  <line x1="615" y1="350" x2="615" y2="360" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="527" y="375" text-anchor="middle" fill="#4A7C59" font-size="11">repeats at lag 5 = T</text>

  <!-- Panel titles -->
  <text x="195" y="395" text-anchor="middle" fill="#6B5D4F" font-size="10" font-style="italic">oscillating signal with period T</text>
  <text x="595" y="395" text-anchor="middle" fill="#6B5D4F" font-size="10" font-style="italic">ACF peaks at multiples of T reveal periodicity</text>
</svg>
