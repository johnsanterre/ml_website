<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="bin-ax" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel label -->
  <text x="400" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">BINOMIAL DISTRIBUTION: COUNTING SUCCESSES IN REPEATED TRIALS</text>

  <!-- ══ PANEL 1: Coin flip tree (n=3) ══ -->
  <text x="155" y="45" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">TRIAL TREE (n=3)</text>

  <!-- Root -->
  <circle cx="155" cy="72" r="10" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="155" y="76" text-anchor="middle" font-size="9" fill="#5C3D1E">start</text>

  <!-- Level 1 -->
  <line x1="148" y1="82" x2="105" y2="118" stroke="#6B5D4F" stroke-width="1.2"/>
  <line x1="162" y1="82" x2="205" y2="118" stroke="#6B5D4F" stroke-width="1.2"/>
  <circle cx="105" cy="125" r="9" fill="#7C2530" opacity="0.7"/>
  <text x="105" y="129" text-anchor="middle" font-size="9" fill="#FDFAF4">H</text>
  <circle cx="205" cy="125" r="9" fill="#2D5A8E" opacity="0.7"/>
  <text x="205" y="129" text-anchor="middle" font-size="9" fill="#FDFAF4">T</text>

  <!-- Level 2 from H -->
  <line x1="98" y1="134" x2="72" y2="168" stroke="#6B5D4F" stroke-width="1.2"/>
  <line x1="112" y1="134" x2="138" y2="168" stroke="#6B5D4F" stroke-width="1.2"/>
  <circle cx="72" cy="175" r="9" fill="#7C2530" opacity="0.7"/>
  <text x="72" y="179" text-anchor="middle" font-size="9" fill="#FDFAF4">H</text>
  <circle cx="138" cy="175" r="9" fill="#2D5A8E" opacity="0.7"/>
  <text x="138" y="179" text-anchor="middle" font-size="9" fill="#FDFAF4">T</text>

  <!-- Level 2 from T -->
  <line x1="198" y1="134" x2="172" y2="168" stroke="#6B5D4F" stroke-width="1.2"/>
  <line x1="212" y1="134" x2="238" y2="168" stroke="#6B5D4F" stroke-width="1.2"/>
  <circle cx="172" cy="175" r="9" fill="#7C2530" opacity="0.7"/>
  <text x="172" y="179" text-anchor="middle" font-size="9" fill="#FDFAF4">H</text>
  <circle cx="238" cy="175" r="9" fill="#2D5A8E" opacity="0.7"/>
  <text x="238" y="179" text-anchor="middle" font-size="9" fill="#FDFAF4">T</text>

  <!-- Level 3 labels (outcomes) -->
  <text x="55" y="215" text-anchor="middle" font-size="8.5" fill="#7C2530">HHH</text>
  <text x="55" y="226" text-anchor="middle" font-size="8.5" fill="#7C2530">k=3</text>
  <text x="110" y="215" text-anchor="middle" font-size="8.5" fill="#6B5D4F">HHT</text>
  <text x="110" y="226" text-anchor="middle" font-size="8.5" fill="#6B5D4F">k=2</text>
  <text x="165" y="215" text-anchor="middle" font-size="8.5" fill="#6B5D4F">HTH</text>
  <text x="165" y="226" text-anchor="middle" font-size="8.5" fill="#6B5D4F">k=2</text>
  <text x="220" y="215" text-anchor="middle" font-size="8.5" fill="#2D5A8E">TTT→k=0</text>

  <!-- ══ PANEL 2: Bar chart (n=10, p=0.5) ══ -->
  <text x="510" y="45" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">PMF: n=10, p=0.5</text>

  <!-- Axes -->
  <line x1="310" y1="340" x2="710" y2="340" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#bin-ax)"/>
  <line x1="310" y1="340" x2="310" y2="60" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#bin-ax)"/>
  <text x="510" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">k (number of successes)</text>
  <text x="295" y="200" text-anchor="middle" font-size="10" fill="#6B5D4F" transform="rotate(-90,295,200)" font-style="italic">P(X=k)</text>

  <!-- Bars: n=10, p=0.5, binomial heights proportional to probabilities -->
  <!-- k=0: 0.001 -->
  <rect x="318" y="337" width="26" height="3" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="331" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">0</text>
  <!-- k=1: 0.010 -->
  <rect x="350" y="328" width="26" height="12" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="363" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">1</text>
  <!-- k=2: 0.044 -->
  <rect x="382" y="296" width="26" height="44" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="395" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">2</text>
  <!-- k=3: 0.117 -->
  <rect x="414" y="222" width="26" height="118" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="427" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">3</text>
  <!-- k=4: 0.205 -->
  <rect x="446" y="133" width="26" height="207" fill="#2D5A8E" opacity="0.8" rx="1"/>
  <text x="459" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">4</text>
  <!-- k=5: 0.246 (peak, red) -->
  <rect x="478" y="90" width="26" height="250" fill="#7C2530" opacity="0.82" rx="1"/>
  <text x="491" y="353" text-anchor="middle" font-size="8.5" fill="#7C2530" font-weight="bold">5</text>
  <text x="491" y="82" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">peak</text>
  <!-- k=6: 0.205 -->
  <rect x="510" y="133" width="26" height="207" fill="#2D5A8E" opacity="0.8" rx="1"/>
  <text x="523" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">6</text>
  <!-- k=7: 0.117 -->
  <rect x="542" y="222" width="26" height="118" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="555" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">7</text>
  <!-- k=8: 0.044 -->
  <rect x="574" y="296" width="26" height="44" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="587" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">8</text>
  <!-- k=9: 0.010 -->
  <rect x="606" y="328" width="26" height="12" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="619" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">9</text>
  <!-- k=10: 0.001 -->
  <rect x="638" y="337" width="26" height="3" fill="#2D5A8E" opacity="0.75" rx="1"/>
  <text x="651" y="353" text-anchor="middle" font-size="8.5" fill="#6B5D4F">10</text>

  <!-- Annotations -->
  <rect x="590" y="80" width="175" height="50" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="677" y="99" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">mean = np = 5</text>
  <text x="677" y="116" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">std = √(np(1−p)) ≈ 1.6</text>

  <!-- Symmetry arrow -->
  <line x1="491" y1="72" x2="380" y2="72" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#bin-ax)"/>
  <line x1="491" y1="72" x2="602" y2="72" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#bin-ax)"/>
  <text x="491" y="68" text-anchor="middle" font-size="8.5" fill="#C4A87A">symmetric (p=0.5)</text>

  <!-- Bottom caption -->
  <text x="400" y="390" text-anchor="middle" font-size="9" fill="#6B5D4F">
    Binomial: n independent trials, each with probability p of success
  </text>
</svg>
