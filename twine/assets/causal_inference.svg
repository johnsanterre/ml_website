<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="ci-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="ci-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="ci-blu" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="ci-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D6A4F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Top label -->
  <text x="400" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">CAUSAL INFERENCE: CORRELATION VS CAUSATION</text>

  <!-- ══ PANEL 1: Confounded DAG ══ -->
  <text x="185" y="45" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">CONFOUNDED</text>

  <!-- Confounder node (top center) -->
  <ellipse cx="185" cy="90" rx="52" ry="22" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="185" y="94" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Confounder Z</text>

  <!-- Treatment node (left) -->
  <ellipse cx="95" cy="200" rx="48" ry="22" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="95" y="204" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Treatment X</text>

  <!-- Outcome node (right) -->
  <ellipse cx="280" cy="200" rx="48" ry="22" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="280" y="204" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Outcome Y</text>

  <!-- Z → X -->
  <line x1="147" y1="106" x2="112" y2="182" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#ci-arr)"/>
  <!-- Z → Y -->
  <line x1="223" y1="106" x2="258" y2="182" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#ci-arr)"/>
  <!-- Spurious X → Y (dashed red) -->
  <line x1="143" y1="200" x2="232" y2="200" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#ci-red)"/>
  <text x="188" y="193" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">spurious</text>

  <!-- Legend box -->
  <rect x="50" y="248" width="270" height="42" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <line x1="62" y1="263" x2="90" y2="263" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="95" y="267" font-size="9" fill="#7C2530">spurious correlation</text>
  <line x1="62" y1="280" x2="90" y2="280" stroke="#5C3D1E" stroke-width="1.8"/>
  <polygon points="87,277 94,280 87,283" fill="#5C3D1E"/>
  <text x="95" y="284" font-size="9" fill="#5C3D1E">true causal path</text>

  <!-- ══ PANEL 2: Identified DAG (backdoor blocked) ══ -->
  <text x="530" y="45" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">BACKDOOR BLOCKED</text>

  <!-- Confounder (conditioned — box) -->
  <rect x="478" y="68" width="104" height="44" fill="#F2EAD8" stroke="#5C3D1E" stroke-width="2" rx="4"/>
  <text x="530" y="87" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Confounder Z</text>
  <text x="530" y="102" text-anchor="middle" font-size="8.5" fill="#5C3D1E">[conditioned on]</text>

  <!-- Treatment node (left) -->
  <ellipse cx="440" cy="200" rx="48" ry="22" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="440" y="204" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Treatment X</text>

  <!-- Outcome node (right) -->
  <ellipse cx="625" cy="200" rx="48" ry="22" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="625" y="204" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Outcome Y</text>

  <!-- Z → X (blocked, gray) -->
  <line x1="492" y1="112" x2="458" y2="182" stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Z → Y (blocked, gray) -->
  <line x1="568" y1="112" x2="602" y2="182" stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- True causal X → Y (solid green) -->
  <line x1="488" y1="200" x2="577" y2="200" stroke="#2D6A4F" stroke-width="2.5" marker-end="url(#ci-grn)"/>
  <text x="532" y="193" text-anchor="middle" font-size="9" fill="#2D6A4F" font-style="italic">causal effect</text>

  <!-- Block markers on Z paths -->
  <text x="474" y="152" font-size="14" fill="#7C2530" text-anchor="middle">✗</text>
  <text x="587" y="152" font-size="14" fill="#7C2530" text-anchor="middle">✗</text>

  <!-- ══ PANEL 3: ATE box ══ -->
  <rect x="395" y="248" width="270" height="55" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="530" y="267" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Average Treatment Effect (ATE)</text>
  <text x="530" y="285" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">E[Y(1) − Y(0)]</text>
  <text x="530" y="297" text-anchor="middle" font-size="8.5" fill="#6B5D4F">counterfactual: what if X had been different?</text>

  <!-- Bottom caption -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">
    Causal inference asks: what would happen if we intervened, not merely what correlates?
  </text>
</svg>
