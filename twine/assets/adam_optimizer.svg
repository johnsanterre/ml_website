<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Adam Optimizer</text>
  <!-- Algorithm steps -->
  <rect x="40" y="65" width="440" height="300" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="260" y="92" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Adam Update Rule</text>
  <text x="260" y="122" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">g_t = ∇L(θ_t)  (gradient)</text>
  <text x="260" y="150" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9">m_t = β₁m_{t-1} + (1-β₁)g_t  (1st moment)</text>
  <text x="260" y="178" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22">v_t = β₂v_{t-1} + (1-β₂)g_t²  (2nd moment)</text>
  <text x="260" y="206" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9">m̂_t = m_t / (1-β₁ᵗ)  (bias correction)</text>
  <text x="260" y="234" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22">v̂_t = v_t / (1-β₂ᵗ)  (bias correction)</text>
  <text x="260" y="270" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">θ_t = θ_{t-1} − α · m̂_t / (√v̂_t + ε)</text>
  <text x="260" y="305" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Defaults: α=0.001, β₁=0.9, β₂=0.999, ε=1e-8</text>
  <text x="260" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Momentum + RMSProp combined</text>
  <!-- Comparison -->
  <rect x="510" y="65" width="250" height="300" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Adam vs SGD</text>
  <text x="635" y="122" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9">Adam</text>
  <text x="635" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Adaptive per-param lr</text>
  <text x="635" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Fast convergence</text>
  <text x="635" y="182" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Less tuning needed</text>
  <line x1="520" y1="200" x2="750" y2="200" stroke="#ddd" stroke-width="1"/>
  <text x="635" y="225" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22">SGD+momentum</text>
  <text x="635" y="248" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Often better final</text>
  <text x="635" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">generalization</text>
  <text x="635" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Needs lr schedule</text>
</svg>
