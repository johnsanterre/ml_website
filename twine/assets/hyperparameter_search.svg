<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Grid Search -->
  <text x="130" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Grid Search</text>
  <rect x="30" y="65" width="200" height="200" rx="4" fill="#f8f8f8" stroke="#999" stroke-width="1.5"/>
  <!-- Grid cells -->
  <line x1="80" y1="65" x2="80" y2="265" stroke="#ddd" stroke-width="1"/>
  <line x1="130" y1="65" x2="130" y2="265" stroke="#ddd" stroke-width="1"/>
  <line x1="180" y1="65" x2="180" y2="265" stroke="#ddd" stroke-width="1"/>
  <line x1="30" y1="115" x2="230" y2="115" stroke="#ddd" stroke-width="1"/>
  <line x1="30" y1="165" x2="230" y2="165" stroke="#ddd" stroke-width="1"/>
  <line x1="30" y1="215" x2="230" y2="215" stroke="#ddd" stroke-width="1"/>
  <!-- Dots at each grid point -->
  <circle cx="55" cy="90" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="105" cy="90" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="155" cy="90" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="205" cy="90" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="55" cy="140" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="105" cy="140" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="155" cy="140" r="8" fill="#27ae60"/><circle cx="205" cy="140" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="55" cy="190" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="105" cy="190" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="155" cy="190" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="205" cy="190" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="55" cy="240" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="105" cy="240" r="5" fill="#4a90d9" opacity="0.5"/>
  <circle cx="155" cy="240" r="5" fill="#4a90d9" opacity="0.5"/><circle cx="205" cy="240" r="5" fill="#4a90d9" opacity="0.5"/>
  <text x="130" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Exhaustive, expensive</text>
  <!-- Random Search -->
  <text x="420" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Random Search</text>
  <rect x="320" y="65" width="200" height="200" rx="4" fill="#f8f8f8" stroke="#999" stroke-width="1.5"/>
  <circle cx="370" cy="95" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="450" cy="120" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="395" cy="170" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="490" cy="90" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="345" cy="230" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="480" cy="200" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="360" cy="145" r="8" fill="#27ae60"/>
  <circle cx="510" cy="155" r="5" fill="#e67e22" opacity="0.7"/>
  <text x="420" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Often better per budget</text>
  <!-- Bayesian Opt -->
  <text x="670" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Bayesian Opt.</text>
  <rect x="570" y="65" width="200" height="200" rx="4" fill="#f8f8f8" stroke="#999" stroke-width="1.5"/>
  <!-- Surrogate surface hint -->
  <path d="M575,250 Q610,180 640,140 Q670,90 700,130 Q730,160 765,230" fill="none" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="640" cy="140" r="6" fill="#27ae60"/>
  <circle cx="590" cy="240" r="5" fill="#8e44ad" opacity="0.6"/>
  <circle cx="700" cy="130" r="5" fill="#8e44ad" opacity="0.6"/>
  <circle cx="730" cy="175" r="5" fill="#8e44ad" opacity="0.6"/>
  <text x="670" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Surrogate model guides search</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Green = best found   |   Each method trades off coverage vs. efficiency</text>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Hyperparameter Search Strategies</text>
</svg>
