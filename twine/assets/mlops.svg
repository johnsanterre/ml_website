<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">MLOps: From Notebook to Production</text>

  <!-- Pipeline flow across top -->
  <!-- Step boxes -->
  <rect x="16" y="34" width="100" height="40" fill="#2D5A8E" opacity="0.2" rx="4" stroke="#2D5A8E" stroke-width="1"/>
  <text x="66" y="52" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#2D5A8E">Data</text>
  <text x="66" y="66" text-anchor="middle" font-size="9" fill="#2D5A8E">Versioning</text>

  <line x1="116" y1="54" x2="134" y2="54" stroke="#888" stroke-width="1.5" marker-end="url(#gArr)"/>

  <rect x="134" y="34" width="100" height="40" fill="#2D5A8E" opacity="0.2" rx="4" stroke="#2D5A8E" stroke-width="1"/>
  <text x="184" y="52" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#2D5A8E">Experiment</text>
  <text x="184" y="66" text-anchor="middle" font-size="9" fill="#2D5A8E">Tracking</text>

  <line x1="234" y1="54" x2="252" y2="54" stroke="#888" stroke-width="1.5" marker-end="url(#gArr)"/>

  <rect x="252" y="34" width="100" height="40" fill="#5C3D1E" opacity="0.2" rx="4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="302" y="52" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#5C3D1E">Model</text>
  <text x="302" y="66" text-anchor="middle" font-size="9" fill="#5C3D1E">Registry</text>

  <line x1="352" y1="54" x2="370" y2="54" stroke="#888" stroke-width="1.5" marker-end="url(#gArr)"/>

  <rect x="370" y="34" width="100" height="40" fill="#5C3D1E" opacity="0.2" rx="4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="420" y="52" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#5C3D1E">Serving</text>
  <text x="420" y="66" text-anchor="middle" font-size="9" fill="#5C3D1E">API / Batch</text>

  <line x1="470" y1="54" x2="488" y2="54" stroke="#888" stroke-width="1.5" marker-end="url(#gArr)"/>

  <rect x="488" y="34" width="100" height="40" fill="#7C2530" opacity="0.2" rx="4" stroke="#7C2530" stroke-width="1"/>
  <text x="538" y="52" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#7C2530">Monitoring</text>
  <text x="538" y="66" text-anchor="middle" font-size="9" fill="#7C2530">Drift / Perf</text>

  <!-- Feedback arrow back to start -->
  <path d="M 588,54 Q 700,20 16,54" fill="none" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#redArr2)"/>
  <text x="640" y="18" font-size="8.5" fill="#7C2530">Retrain trigger</text>

  <!-- CI/CD badge -->
  <rect x="620" y="34" width="160" height="40" fill="#C4A87A" opacity="0.25" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="700" y="52" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#5C3D1E">CI/CD for ML</text>
  <text x="700" y="66" text-anchor="middle" font-size="9" fill="#5C3D1E">Test → Build → Deploy</text>

  <!-- ===== Four lower panels ===== -->
  <!-- Panel A: Data & Experiments -->
  <rect x="16" y="92" width="185" height="290" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="108" y="112" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Data &amp; Experiments</text>

  <text x="30" y="132" font-size="9.5" font-weight="bold" fill="#2D5A8E">DVC (Data Version Control)</text>
  <text x="30" y="146" font-size="9" fill="#444">Track dataset versions like</text>
  <text x="30" y="158" font-size="9" fill="#444">Git tracks code. Hash-based</text>
  <text x="30" y="170" font-size="9" fill="#444">content addressing; store in</text>
  <text x="30" y="182" font-size="9" fill="#444">S3/GCS. Reproduce any run.</text>

  <line x1="30" y1="194" x2="186" y2="194" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="30" y="212" font-size="9.5" font-weight="bold" fill="#2D5A8E">MLflow / W&amp;B</text>
  <text x="30" y="226" font-size="9" fill="#444">Log: hyperparams, metrics,</text>
  <text x="30" y="238" font-size="9" fill="#444">artifacts, code version.</text>
  <text x="30" y="250" font-size="9" fill="#444">Compare runs visually.</text>
  <text x="30" y="262" font-size="9" fill="#444">Register best model for</text>
  <text x="30" y="274" font-size="9" fill="#444">promotion to production.</text>

  <line x1="30" y1="286" x2="186" y2="286" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="30" y="302" font-size="9.5" font-weight="bold" fill="#2D5A8E">Feature Store</text>
  <text x="30" y="316" font-size="9" fill="#444">Centralized repo of computed</text>
  <text x="30" y="328" font-size="9" fill="#444">features (Feast, Tecton).</text>
  <text x="30" y="340" font-size="9" fill="#444">Prevents train/serve skew.</text>
  <text x="30" y="352" font-size="9" fill="#444">Reuse across teams.</text>

  <!-- Panel B: Serving -->
  <rect x="214" y="92" width="185" height="290" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="306" y="112" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Model Serving</text>

  <text x="228" y="132" font-size="9.5" font-weight="bold" fill="#5C3D1E">Online (REST API)</text>
  <text x="228" y="146" font-size="9" fill="#444">Low-latency, synchronous.</text>
  <text x="228" y="158" font-size="9" fill="#444">FastAPI / TF Serving.</text>
  <text x="228" y="170" font-size="9" fill="#444">Each request = 1 prediction.</text>
  <text x="228" y="184" font-size="9" fill="#7C2530">Latency target: &lt;100ms</text>

  <line x1="228" y1="196" x2="386" y2="196" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="228" y="214" font-size="9.5" font-weight="bold" fill="#5C3D1E">Batch Inference</text>
  <text x="228" y="228" font-size="9" fill="#444">Score large dataset offline.</text>
  <text x="228" y="240" font-size="9" fill="#444">Spark / Spark ML, nightly</text>
  <text x="228" y="252" font-size="9" fill="#444">jobs. Cheaper, higher</text>
  <text x="228" y="264" font-size="9" fill="#444">throughput.</text>

  <line x1="228" y1="276" x2="386" y2="276" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="228" y="294" font-size="9.5" font-weight="bold" fill="#5C3D1E">Streaming</text>
  <text x="228" y="308" font-size="9" fill="#444">Kafka / Flink pipeline.</text>
  <text x="228" y="320" font-size="9" fill="#444">Score events as they</text>
  <text x="228" y="332" font-size="9" fill="#444">arrive. Best for real-time</text>
  <text x="228" y="344" font-size="9" fill="#444">fraud, recommendation.</text>

  <!-- Panel C: Monitoring -->
  <rect x="412" y="92" width="185" height="290" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="504" y="112" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Monitoring &amp; Drift</text>

  <text x="426" y="132" font-size="9.5" font-weight="bold" fill="#7C2530">Data Drift</text>
  <text x="426" y="146" font-size="9" fill="#444">Input distribution P(X)</text>
  <text x="426" y="158" font-size="9" fill="#444">changes. Feature values</text>
  <text x="426" y="170" font-size="9" fill="#444">shift (e.g. age, income).</text>
  <text x="426" y="182" font-size="9" fill="#7C2530">Detect: KS test, PSI.</text>

  <line x1="426" y1="194" x2="582" y2="194" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="426" y="212" font-size="9.5" font-weight="bold" fill="#7C2530">Concept Drift</text>
  <text x="426" y="226" font-size="9" fill="#444">P(Y|X) changes. Same</text>
  <text x="426" y="238" font-size="9" fill="#444">inputs, different labels.</text>
  <text x="426" y="250" font-size="9" fill="#444">Covid: normal behavior</text>
  <text x="426" y="262" font-size="9" fill="#444">→ anomaly overnight.</text>
  <text x="426" y="274" font-size="9" fill="#7C2530">Harder to detect.</text>

  <line x1="426" y1="286" x2="582" y2="286" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="426" y="304" font-size="9.5" font-weight="bold" fill="#7C2530">Performance Degradation</text>
  <text x="426" y="318" font-size="9" fill="#444">Track accuracy, F1, AUC</text>
  <text x="426" y="330" font-size="9" fill="#444">on labeled windows.</text>
  <text x="426" y="342" font-size="9" fill="#444">Shadow mode: run new</text>
  <text x="426" y="354" font-size="9" fill="#444">model alongside old.</text>
  <text x="426" y="368" font-size="9" fill="#7C2530">Alert → retrain trigger.</text>

  <!-- Panel D: Why models rot -->
  <rect x="610" y="92" width="172" height="290" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="696" y="112" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Why Models Rot</text>

  <rect x="624" y="124" width="144" height="36" fill="#7C2530" opacity="0.1" rx="3"/>
  <text x="696" y="139" text-anchor="middle" font-size="9" fill="#7C2530">World changes, model</text>
  <text x="696" y="153" text-anchor="middle" font-size="9" fill="#7C2530">stays frozen in time.</text>

  <!-- decay curve -->
  <text x="696" y="182" text-anchor="middle" font-size="9" fill="#444">Performance</text>
  <line x1="630" y1="230" x2="770" y2="230" stroke="#888" stroke-width="0.8"/>
  <line x1="630" y1="190" x2="630" y2="230" stroke="#888" stroke-width="0.8"/>
  <path d="M 630,194 C 660,196 690,208 770,228" fill="none" stroke="#7C2530" stroke-width="2"/>
  <line x1="680" y1="186" x2="680" y2="234" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="680" y="244" text-anchor="middle" font-size="8" fill="#C4A87A">deploy</text>
  <text x="696" y="260" text-anchor="middle" font-size="8.5" fill="#6B5D4F">time →</text>

  <text x="624" y="286" font-size="9" fill="#444">Distributional shift is</text>
  <text x="624" y="298" font-size="9" fill="#444">inevitable. Static models</text>
  <text x="624" y="310" font-size="9" fill="#444">need scheduled retraining</text>
  <text x="624" y="322" font-size="9" fill="#444">or triggered retraining.</text>
  <text x="624" y="342" font-size="9.5" font-weight="bold" fill="#5C3D1E">MLOps closes the loop:</text>
  <text x="624" y="356" font-size="9" fill="#444">detect → retrain →</text>
  <text x="624" y="370" font-size="9" fill="#444">deploy → monitor.</text>

  <defs>
    <marker id="gArr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
    <marker id="redArr2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
