<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <defs>
    <marker id="cp-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#5C3D1E">Conjugate Priors: Closed-Form Bayesian Updates</text>

  <!-- Prior box -->
  <rect x="40" y="80" width="190" height="120" rx="12" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="135" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5A8E">Prior</text>
  <text x="135" y="130" text-anchor="middle" font-size="12" fill="#2D5A8E">p(θ)</text>
  <text x="135" y="152" text-anchor="middle" font-size="11" fill="#555">e.g. Beta(α, β)</text>
  <text x="135" y="172" text-anchor="middle" font-size="11" fill="#888">same family as</text>
  <text x="135" y="188" text-anchor="middle" font-size="11" fill="#888">posterior ✓</text>

  <!-- Likelihood box -->
  <rect x="305" y="80" width="190" height="120" rx="12" fill="#F3EDE3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E">Likelihood</text>
  <text x="400" y="130" text-anchor="middle" font-size="12" fill="#5C3D1E">p(x | θ)</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#555">e.g. Binomial(n, θ)</text>
  <text x="400" y="172" text-anchor="middle" font-size="11" fill="#888">new data</text>
  <text x="400" y="188" text-anchor="middle" font-size="11" fill="#888">n heads, k tails</text>

  <!-- Posterior box -->
  <rect x="570" y="80" width="190" height="120" rx="12" fill="#F9F0E8" stroke="#7C2530" stroke-width="2"/>
  <text x="665" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C2530">Posterior</text>
  <text x="665" y="130" text-anchor="middle" font-size="12" fill="#7C2530">p(θ | x)</text>
  <text x="665" y="152" text-anchor="middle" font-size="11" fill="#555">Beta(α+k, β+n−k)</text>
  <text x="665" y="172" text-anchor="middle" font-size="11" fill="#888">same family!</text>
  <text x="665" y="188" text-anchor="middle" font-size="11" fill="#888">just update counts</text>

  <!-- Arrows -->
  <line x1="232" y1="140" x2="302" y2="140" stroke="#5C3D1E" stroke-width="2.5" marker-end="url(#cp-arr)"/>
  <line x1="497" y1="140" x2="567" y2="140" stroke="#5C3D1E" stroke-width="2.5" marker-end="url(#cp-arr)"/>
  <text x="268" y="130" text-anchor="middle" font-size="11" fill="#888">×</text>
  <text x="533" y="130" text-anchor="middle" font-size="11" fill="#5C3D1E">Bayes</text>

  <!-- Conjugate pairs table -->
  <rect x="80" y="248" width="640" height="120" rx="10" fill="#FFFEF8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E">Common Conjugate Pairs</text>
  <!-- Header line -->
  <line x1="100" y1="280" x2="700" y2="280" stroke="#D4C5A9" stroke-width="1"/>
  <!-- Row 1 -->
  <text x="160" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#2D5A8E">Likelihood</text>
  <text x="400" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C2530">Conjugate Prior</text>
  <text x="620" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#5C3D1E">Posterior</text>
  <line x1="100" y1="304" x2="700" y2="304" stroke="#D4C5A9" stroke-width="0.8"/>
  <!-- Rows -->
  <text x="160" y="320" text-anchor="middle" font-size="11" fill="#333">Binomial</text>
  <text x="400" y="320" text-anchor="middle" font-size="11" fill="#333">Beta(α, β)</text>
  <text x="620" y="320" text-anchor="middle" font-size="11" fill="#333">Beta(α+k, β+n−k)</text>
  <text x="160" y="338" text-anchor="middle" font-size="11" fill="#333">Gaussian (known σ)</text>
  <text x="400" y="338" text-anchor="middle" font-size="11" fill="#333">Gaussian(μ₀, σ₀²)</text>
  <text x="620" y="338" text-anchor="middle" font-size="11" fill="#333">Gaussian (updated mean)</text>
  <text x="160" y="355" text-anchor="middle" font-size="11" fill="#333">Poisson</text>
  <text x="400" y="355" text-anchor="middle" font-size="11" fill="#333">Gamma(α, β)</text>
  <text x="620" y="355" text-anchor="middle" font-size="11" fill="#333">Gamma(α+Σx, β+n)</text>
</svg>
