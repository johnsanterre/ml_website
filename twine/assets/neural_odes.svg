<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E" letter-spacing="1">NEURAL ODEs — Continuous-Depth Networks</text>

  <!-- Panel 1: Residual vs Neural ODE -->
  <rect x="18" y="42" width="192" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="114" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Discrete vs Continuous</text>

  <!-- ResNet side -->
  <text x="65" y="80" text-anchor="middle" font-size="9" fill="#5C3D1E">ResNet (discrete)</text>

  <rect x="30" y="88" width="72" height="22" fill="#2D5A8E" opacity="0.7" rx="2"/>
  <text x="66" y="103" text-anchor="middle" font-size="8" fill="#FDFAF4">h₀</text>

  <line x1="66" y1="112" x2="66" y2="128" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="30" y="128" width="72" height="18" fill="#C4A87A" opacity="0.7" rx="2"/>
  <text x="66" y="141" text-anchor="middle" font-size="8" fill="#5C3D1E">f(h₀,θ₁)</text>

  <line x1="66" y1="148" x2="66" y2="160" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="30" y="160" width="72" height="22" fill="#2D5A8E" opacity="0.7" rx="2"/>
  <text x="66" y="175" text-anchor="middle" font-size="8" fill="#FDFAF4">h₁</text>

  <line x1="66" y1="184" x2="66" y2="196" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="30" y="196" width="72" height="18" fill="#C4A87A" opacity="0.7" rx="2"/>
  <text x="66" y="209" text-anchor="middle" font-size="8" fill="#5C3D1E">f(h₁,θ₂)</text>

  <line x1="66" y1="216" x2="66" y2="228" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="30" y="228" width="72" height="22" fill="#2D5A8E" opacity="0.7" rx="2"/>
  <text x="66" y="243" text-anchor="middle" font-size="8" fill="#FDFAF4">h₂</text>

  <text x="66" y="272" text-anchor="middle" font-size="8" fill="#6B5D4F">hₜ₊₁ = hₜ + f(hₜ,θₜ)</text>
  <text x="66" y="286" text-anchor="middle" font-size="8" fill="#7C2530">fixed # of layers</text>

  <!-- Divider -->
  <line x1="115" y1="75" x2="115" y2="345" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Neural ODE side -->
  <text x="160" y="80" text-anchor="middle" font-size="9" fill="#5C3D1E">Neural ODE (cts.)</text>

  <!-- Smooth curve from h(0) to h(T) -->
  <rect x="124" y="88" width="72" height="22" fill="#7C2530" opacity="0.6" rx="2"/>
  <text x="160" y="103" text-anchor="middle" font-size="8" fill="#FDFAF4">h(0)</text>

  <!-- Smooth trajectory curve -->
  <path d="M160,112 C155,135 165,155 158,175 C151,195 163,215 160,240" fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Tick marks on curve for continuous time -->
  <circle cx="158" cy="135" r="3" fill="#C4A87A"/>
  <circle cx="162" cy="160" r="3" fill="#C4A87A"/>
  <circle cx="157" cy="185" r="3" fill="#C4A87A"/>
  <circle cx="161" cy="210" r="3" fill="#C4A87A"/>

  <rect x="124" y="240" width="72" height="22" fill="#7C2530" opacity="0.6" rx="2"/>
  <text x="160" y="255" text-anchor="middle" font-size="8" fill="#FDFAF4">h(T)</text>

  <text x="160" y="286" text-anchor="middle" font-size="8" fill="#6B5D4F">dh/dt = f(h(t),t,θ)</text>
  <text x="160" y="300" text-anchor="middle" font-size="8" fill="#2D5A8E">solved by ODE solver</text>

  <!-- Panel 2: The ODE and adjoint -->
  <rect x="222" y="42" width="185" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="314" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">The Core Equation</text>

  <rect x="230" y="70" width="170" height="42" fill="#EDE8DE" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="315" y="88" text-anchor="middle" font-size="11" fill="#2D5A8E">dh(t)/dt = f(h(t), t, θ)</text>
  <text x="315" y="104" text-anchor="middle" font-size="8" fill="#6B5D4F">dynamics defined by neural net f</text>

  <line x1="230" y1="125" x2="400" y2="125" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="234" y="142" font-size="9" fill="#5C3D1E">h(t) — hidden state at time t</text>
  <text x="234" y="158" font-size="9" fill="#5C3D1E">f — neural net (same weights</text>
  <text x="234" y="172" font-size="9" fill="#5C3D1E">   for all t)</text>
  <text x="234" y="188" font-size="9" fill="#5C3D1E">θ — shared parameters</text>

  <line x1="230" y1="200" x2="400" y2="200" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="314" y="218" text-anchor="middle" font-size="9" fill="#7C2530">Adjoint method:</text>
  <text x="314" y="234" text-anchor="middle" font-size="9" fill="#5C3D1E">backprop via another ODE</text>
  <text x="314" y="250" text-anchor="middle" font-size="9" fill="#5C3D1E">(no stored activations)</text>

  <rect x="230" y="260" width="170" height="38" fill="#EDE8DE" stroke="#7C2530" stroke-width="1" rx="2"/>
  <text x="315" y="278" text-anchor="middle" font-size="9.5" fill="#7C2530">da/dt = −aᵀ ∂f/∂h</text>
  <text x="315" y="293" text-anchor="middle" font-size="8" fill="#6B5D4F">adjoint a = dL/dh(t)</text>

  <text x="314" y="318" text-anchor="middle" font-size="8" fill="#6B5D4F">Memory: O(1) vs O(layers)</text>
  <text x="314" y="333" text-anchor="middle" font-size="8" fill="#2D5A8E">Depth = solver step count</text>

  <!-- Panel 3: ODE solver -->
  <rect x="420" y="42" width="185" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="512" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">ODE Solvers</text>

  <!-- Euler method diagram -->
  <text x="512" y="80" text-anchor="middle" font-size="9" fill="#5C3D1E">Euler (simplest solver):</text>

  <!-- Small grid for Euler steps -->
  <line x1="435" y1="170" x2="435" y2="90" stroke="#C4A87A" stroke-width="0.8"/>
  <line x1="435" y1="170" x2="600" y2="170" stroke="#C4A87A" stroke-width="0.8"/>

  <!-- True curve -->
  <path d="M440,160 Q480,130 520,115 Q560,102 595,96" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Euler steps (straight lines) -->
  <line x1="440" y1="160" x2="468" y2="148" stroke="#7C2530" stroke-width="2"/>
  <line x1="468" y1="148" x2="496" y2="134" stroke="#7C2530" stroke-width="2"/>
  <line x1="496" y1="134" x2="524" y2="122" stroke="#7C2530" stroke-width="2"/>
  <line x1="524" y1="122" x2="552" y2="112" stroke="#7C2530" stroke-width="2"/>
  <line x1="552" y1="112" x2="580" y2="104" stroke="#7C2530" stroke-width="2"/>

  <circle cx="440" cy="160" r="3" fill="#5C3D1E"/>
  <circle cx="468" cy="148" r="3" fill="#7C2530"/>
  <circle cx="496" cy="134" r="3" fill="#7C2530"/>
  <circle cx="524" cy="122" r="3" fill="#7C2530"/>
  <circle cx="552" cy="112" r="3" fill="#7C2530"/>
  <circle cx="580" cy="104" r="3" fill="#7C2530"/>

  <text x="428" y="182" font-size="8" fill="#6B5D4F">t₀</text>
  <text x="590" y="182" font-size="8" fill="#6B5D4F">T</text>
  <text x="512" y="195" text-anchor="middle" font-size="8" fill="#7C2530">— Euler (fixed step)</text>
  <text x="512" y="207" text-anchor="middle" font-size="8" fill="#2D5A8E">-- true trajectory</text>

  <line x1="428" y1="220" x2="598" y2="220" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="512" y="237" text-anchor="middle" font-size="9" fill="#5C3D1E">Adaptive solvers (Runge-Kutta):</text>
  <text x="512" y="253" text-anchor="middle" font-size="9" fill="#5C3D1E">vary step size automatically</text>
  <text x="512" y="269" text-anchor="middle" font-size="9" fill="#2D5A8E">simple regions → few steps</text>
  <text x="512" y="285" text-anchor="middle" font-size="9" fill="#7C2530">complex regions → many steps</text>

  <line x1="428" y1="298" x2="598" y2="298" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="512" y="315" text-anchor="middle" font-size="8" fill="#6B5D4F">Tolerance parameter</text>
  <text x="512" y="329" text-anchor="middle" font-size="8" fill="#5C3D1E">trades speed vs. accuracy</text>
  <text x="512" y="343" text-anchor="middle" font-size="8" fill="#6B5D4F">(like learning rate)</text>

  <!-- Panel 4: Applications -->
  <rect x="618" y="42" width="165" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="700" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Applications</text>

  <text x="700" y="84" text-anchor="middle" font-size="9" fill="#2D5A8E">Latent ODEs:</text>
  <text x="700" y="99" text-anchor="middle" font-size="8" fill="#5C3D1E">model irregular time series</text>
  <text x="700" y="113" text-anchor="middle" font-size="8" fill="#6B5D4F">e.g. clinical vitals</text>

  <line x1="628" y1="126" x2="775" y2="126" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="143" text-anchor="middle" font-size="9" fill="#2D5A8E">Normalizing flows:</text>
  <text x="700" y="158" text-anchor="middle" font-size="8" fill="#5C3D1E">continuous change of</text>
  <text x="700" y="172" text-anchor="middle" font-size="8" fill="#5C3D1E">variables (FFJORD)</text>
  <text x="700" y="186" text-anchor="middle" font-size="8" fill="#6B5D4F">exact log-likelihood</text>

  <line x1="628" y1="200" x2="775" y2="200" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="217" text-anchor="middle" font-size="9" fill="#2D5A8E">Physical simulation:</text>
  <text x="700" y="232" text-anchor="middle" font-size="8" fill="#5C3D1E">learn dynamics from data</text>
  <text x="700" y="246" text-anchor="middle" font-size="8" fill="#6B5D4F">physics-informed NNs</text>

  <line x1="628" y1="260" x2="775" y2="260" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="277" text-anchor="middle" font-size="9" fill="#5C3D1E">Key advantage:</text>
  <text x="700" y="292" text-anchor="middle" font-size="8" fill="#2D5A8E">memory efficient</text>
  <text x="700" y="308" text-anchor="middle" font-size="8" fill="#2D5A8E">continuous-time data</text>
  <text x="700" y="323" text-anchor="middle" font-size="8" fill="#7C2530">Key cost:</text>
  <text x="700" y="338" text-anchor="middle" font-size="8" fill="#7C2530">slow ODE solves</text>

  <!-- Footer -->
  <text x="400" y="388" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="0.5">Neural ODEs — replace discrete layer stacks with a single continuous vector field</text>
</svg>
