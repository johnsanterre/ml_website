<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Primal and Dual Problems</text>
  <!-- Saddle point surface sketch -->
  <text x="220" y="58" text-anchor="middle" font-size="13" fill="#333">Saddle Point of Lagrangian</text>
  <!-- Saddle surface approximation -->
  <path d="M60,200 C100,160 150,140 200,160 C250,180 290,220 330,200 C360,185 370,170 380,180" fill="none" stroke="#2196F3" stroke-width="2"/>
  <path d="M60,220 C100,180 150,160 200,180 C250,200 290,240 330,220 C360,205 370,190 380,200" fill="none" stroke="#2196F3" stroke-width="1.5" opacity="0.5"/>
  <!-- Saddle point -->
  <circle cx="200" cy="160" r="7" fill="#E91E63"/>
  <text x="212" y="156" font-size="12" fill="#E91E63">saddle (x*, λ*)</text>
  <!-- Primal and dual objectives -->
  <line x1="200" y1="100" x2="200" y2="270" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="90" text-anchor="middle" font-size="11" fill="#2196F3">↑ max over λ</text>
  <text x="200" y="285" text-anchor="middle" font-size="11" fill="#E91E63">↓ min over x</text>
  <!-- Right: duality gap -->
  <rect x="420" y="55" width="350" height="310" rx="8" fill="#f9f9f9" stroke="#ddd"/>
  <text x="595" y="85" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Weak vs Strong Duality</text>
  <text x="595" y="115" text-anchor="middle" font-size="13" fill="#E91E63">d* ≤ p*  (always)</text>
  <text x="595" y="138" text-anchor="middle" font-size="12" fill="#888">duality gap = p* − d* ≥ 0</text>
  <line x1="440" y1="155" x2="752" y2="155" stroke="#ddd"/>
  <text x="595" y="180" text-anchor="middle" font-size="13" fill="#2196F3">d* = p*  (strong duality)</text>
  <text x="595" y="203" text-anchor="middle" font-size="11" fill="#555">if Slater's condition holds</text>
  <text x="595" y="223" text-anchor="middle" font-size="11" fill="#555">(feasible interior point exists)</text>
  <line x1="440" y1="240" x2="752" y2="240" stroke="#ddd"/>
  <text x="595" y="268" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">SVM Dual</text>
  <text x="595" y="292" text-anchor="middle" font-size="12" fill="#555">max Σαᵢ − ½ΣΣαᵢαⱼyᵢyⱼK(xᵢ,xⱼ)</text>
  <text x="595" y="315" text-anchor="middle" font-size="12" fill="#555">s.t. αᵢ ≥ 0, Σαᵢyᵢ = 0</text>
  <text x="595" y="342" text-anchor="middle" font-size="11" fill="#888">Enables kernel trick — only need ⟨xᵢ,xⱼ⟩</text>
</svg>
