<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Feature Engineering Pipeline</text>
  <defs>
    <marker id="arrfe" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- Raw data -->
  <rect x="30" y="120" width="120" height="120" rx="8" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="2"/>
  <text x="90" y="148" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">Raw Data</text>
  <text x="90" y="170" text-anchor="middle" fill="#555" font-size="12">date: 2024-03-01</text>
  <text x="90" y="188" text-anchor="middle" fill="#555" font-size="12">price: $52,000</text>
  <text x="90" y="206" text-anchor="middle" fill="#555" font-size="12">zip: 94105</text>
  <text x="90" y="224" text-anchor="middle" fill="#555" font-size="12">category: "A"</text>
  <!-- Transformations -->
  <rect x="220" y="80" width="160" height="200" rx="8" fill="#F0F8F0" stroke="#4A7C59" stroke-width="2"/>
  <text x="300" y="108" text-anchor="middle" fill="#4A7C59" font-size="13" font-weight="bold">Transformations</text>
  <text x="300" y="135" text-anchor="middle" fill="#555" font-size="12">→ month, day_of_week</text>
  <text x="300" y="158" text-anchor="middle" fill="#555" font-size="12">→ log(price)</text>
  <text x="300" y="181" text-anchor="middle" fill="#555" font-size="12">→ zip_income (join)</text>
  <text x="300" y="204" text-anchor="middle" fill="#555" font-size="12">→ one-hot encode</text>
  <text x="300" y="227" text-anchor="middle" fill="#555" font-size="12">→ price² (polynomial)</text>
  <text x="300" y="250" text-anchor="middle" fill="#555" font-size="12">→ z-score normalize</text>
  <!-- Feature matrix -->
  <rect x="460" y="100" width="160" height="160" rx="8" fill="#FEF3EC" stroke="#E07B39" stroke-width="2"/>
  <text x="540" y="128" text-anchor="middle" fill="#E07B39" font-size="13" font-weight="bold">Feature Matrix X</text>
  <text x="540" y="155" text-anchor="middle" fill="#555" font-size="12">month=3, dow=4,</text>
  <text x="540" y="175" text-anchor="middle" fill="#555" font-size="12">log_price=10.86,</text>
  <text x="540" y="195" text-anchor="middle" fill="#555" font-size="12">zip_income=98k,</text>
  <text x="540" y="215" text-anchor="middle" fill="#555" font-size="12">cat_A=1, cat_B=0,</text>
  <text x="540" y="235" text-anchor="middle" fill="#555" font-size="12">price_sq=0.73 …</text>
  <!-- Model -->
  <rect x="690" y="140" width="90" height="80" rx="8" fill="#2C5F8A"/>
  <text x="735" y="178" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Model</text>
  <text x="735" y="198" text-anchor="middle" fill="#cce0f5" font-size="11">↓ prediction</text>
  <!-- Arrows -->
  <line x1="152" y1="180" x2="218" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arrfe)"/>
  <line x1="382" y1="180" x2="458" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arrfe)"/>
  <line x1="622" y1="180" x2="688" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arrfe)"/>
  <text x="400" y="330" text-anchor="middle" fill="#888" font-size="13">Good features → simpler models · faster training · better generalization</text>
</svg>