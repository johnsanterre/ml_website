<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1C1713"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL 1: ATTENTION SCORES ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">ATTENTION SCORES</text>

  <!-- Column headers (key tokens) -->
  <text x="77"  y="33" text-anchor="middle" font-size="9" fill="#6B5D4F">The</text>
  <text x="121" y="33" text-anchor="middle" font-size="9" fill="#6B5D4F">cat</text>
  <text x="165" y="33" text-anchor="middle" font-size="9" fill="#6B5D4F">sat</text>
  <text x="209" y="33" text-anchor="middle" font-size="9" fill="#6B5D4F">mat</text>
  <text x="237" y="25" text-anchor="start"  font-size="8" fill="#6B5D4F" font-style="italic">← keys</text>

  <!-- Row headers (query tokens) -->
  <text x="52" y="61"  text-anchor="end" font-size="9" fill="#6B5D4F">The</text>
  <text x="52" y="105" text-anchor="end" font-size="9" fill="#6B5D4F">cat</text>
  <text x="52" y="149" text-anchor="end" font-size="9" fill="#6B5D4F">sat</text>
  <text x="52" y="193" text-anchor="end" font-size="9" fill="#6B5D4F">mat</text>
  <text x="42" y="125" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic" transform="rotate(-90,42,125)">queries →</text>

  <!-- Row 0 (The): [0.7, 0.1, 0.1, 0.1] -->
  <rect x="55" y="38" width="44" height="44" fill="#7C2530"/>
  <text x="77" y="64" text-anchor="middle" font-size="9" fill="#FDFAF4">0.70</text>
  <rect x="99" y="38" width="44" height="44" fill="#F5EAEA"/>
  <text x="121" y="64" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>
  <rect x="143" y="38" width="44" height="44" fill="#F5EAEA"/>
  <text x="165" y="64" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>
  <rect x="187" y="38" width="44" height="44" fill="#F5EAEA"/>
  <text x="209" y="64" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>

  <!-- Row 1 (cat): [0.1, 0.6, 0.2, 0.1] -->
  <rect x="55" y="82" width="44" height="44" fill="#F5EAEA"/>
  <text x="77" y="108" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>
  <rect x="99" y="82" width="44" height="44" fill="#9A3A45"/>
  <text x="121" y="108" text-anchor="middle" font-size="9" fill="#FDFAF4">0.60</text>
  <rect x="143" y="82" width="44" height="44" fill="#EDD5D8"/>
  <text x="165" y="108" text-anchor="middle" font-size="9" fill="#5C3D1E">0.20</text>
  <rect x="187" y="82" width="44" height="44" fill="#F5EAEA"/>
  <text x="209" y="108" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>

  <!-- Row 2 (sat): [0.05, 0.35, 0.5, 0.1] -->
  <rect x="55" y="126" width="44" height="44" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="77" y="152" text-anchor="middle" font-size="9" fill="#5C3D1E">0.05</text>
  <rect x="99" y="126" width="44" height="44" fill="#D4A0A8"/>
  <text x="121" y="152" text-anchor="middle" font-size="9" fill="#5C3D1E">0.35</text>
  <rect x="143" y="126" width="44" height="44" fill="#B85060"/>
  <text x="165" y="152" text-anchor="middle" font-size="9" fill="#FDFAF4">0.50</text>
  <rect x="187" y="126" width="44" height="44" fill="#F5EAEA"/>
  <text x="209" y="152" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>

  <!-- Row 3 (mat): [0.05, 0.1, 0.35, 0.5] -->
  <rect x="55" y="170" width="44" height="44" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="77" y="196" text-anchor="middle" font-size="9" fill="#5C3D1E">0.05</text>
  <rect x="99" y="170" width="44" height="44" fill="#F5EAEA"/>
  <text x="121" y="196" text-anchor="middle" font-size="9" fill="#5C3D1E">0.10</text>
  <rect x="143" y="170" width="44" height="44" fill="#D4A0A8"/>
  <text x="165" y="196" text-anchor="middle" font-size="9" fill="#5C3D1E">0.35</text>
  <rect x="187" y="170" width="44" height="44" fill="#B85060"/>
  <text x="209" y="196" text-anchor="middle" font-size="9" fill="#FDFAF4">0.50</text>

  <!-- Color scale legend -->
  <text x="55"  y="228" font-size="8" fill="#6B5D4F">low</text>
  <rect x="70" y="220" width="12" height="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.5"/>
  <rect x="82" y="220" width="12" height="8" fill="#F5EAEA"/>
  <rect x="94" y="220" width="12" height="8" fill="#EDD5D8"/>
  <rect x="106" y="220" width="12" height="8" fill="#D4A0A8"/>
  <rect x="118" y="220" width="12" height="8" fill="#B85060"/>
  <rect x="130" y="220" width="12" height="8" fill="#9A3A45"/>
  <rect x="142" y="220" width="12" height="8" fill="#7C2530"/>
  <text x="156" y="228" font-size="8" fill="#6B5D4F">high attention</text>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 2: QUERY · KEY → VALUE ══ -->
  <text x="445" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">QUERY · KEY → VALUE</text>

  <!-- Q box -->
  <rect x="310" y="40" width="68" height="52" rx="4" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="344" y="57" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Q</text>
  <text x="344" y="69" text-anchor="middle" font-size="8"  fill="#5C3D1E">Query</text>
  <text x="344" y="79" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">'what am I</text>
  <text x="344" y="88" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">looking for?'</text>

  <!-- K box -->
  <rect x="406" y="40" width="68" height="52" rx="4" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="440" y="57" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">K</text>
  <text x="440" y="69" text-anchor="middle" font-size="8"  fill="#5C3D1E">Key</text>
  <text x="440" y="79" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">'what do I</text>
  <text x="440" y="88" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">contain?'</text>

  <!-- V box -->
  <rect x="502" y="40" width="68" height="52" rx="4" fill="#EDE5D0" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="536" y="57" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">V</text>
  <text x="536" y="69" text-anchor="middle" font-size="8"  fill="#5C3D1E">Value</text>
  <text x="536" y="79" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">'what do I</text>
  <text x="536" y="88" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">actually say?'</text>

  <!-- Arrow from Q down to dot-product box -->
  <line x1="344" y1="92" x2="380" y2="140" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow from K down to dot-product box -->
  <line x1="440" y1="92" x2="405" y2="140" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Dot-product + softmax box -->
  <rect x="345" y="140" width="112" height="36" rx="4" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="401" y="154" text-anchor="middle" font-size="8.5" fill="#5C3D1E">dot product + softmax</text>
  <text x="401" y="167" text-anchor="middle" font-size="8" fill="#7C2530" font-style="italic">score = Q·Kᵀ / √d</text>

  <!-- Arrow from dot-product box down to output -->
  <line x1="401" y1="176" x2="435" y2="218" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow from V down to output -->
  <line x1="536" y1="92" x2="468" y2="218" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-brown)"/>

  <!-- Output box -->
  <rect x="398" y="218" width="100" height="42" rx="4" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.8"/>
  <text x="448" y="233" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-weight="bold">output</text>
  <text x="448" y="244" text-anchor="middle" font-size="8" fill="#6B5D4F">weighted</text>
  <text x="448" y="254" text-anchor="middle" font-size="8" fill="#6B5D4F">sum of values</text>

  <!-- Label on score arrow -->
  <text x="422" y="204" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">output = score · V</text>

  <!-- Bottom caption -->
  <text x="300" y="302" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    Attention asks: given my query, which keys match? Then retrieve weighted values from those positions
  </text>
</svg>
