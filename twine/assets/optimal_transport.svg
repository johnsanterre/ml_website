<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E" letter-spacing="1">OPTIMAL TRANSPORT — Moving Mass at Minimum Cost</text>

  <!-- Panel 1: The earth mover metaphor -->
  <rect x="18" y="42" width="192" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="114" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Earth Mover's Distance</text>

  <!-- Source piles -->
  <text x="65" y="82" text-anchor="middle" font-size="9" fill="#2D5A8E">Source μ</text>
  <rect x="28" y="88" width="28" height="40" fill="#2D5A8E" opacity="0.7" rx="1"/>
  <rect x="62" y="98" width="28" height="30" fill="#2D5A8E" opacity="0.7" rx="1"/>
  <rect x="96" y="105" width="28" height="23" fill="#2D5A8E" opacity="0.5" rx="1"/>
  <text x="28" y="140" font-size="7" fill="#6B5D4F">pile A</text>
  <text x="62" y="140" font-size="7" fill="#6B5D4F">pile B</text>
  <text x="96" y="140" font-size="7" fill="#6B5D4F">pile C</text>

  <!-- Arrows showing transport -->
  <line x1="42" y1="160" x2="42" y2="200" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr5)"/>
  <line x1="76" y1="160" x2="120" y2="200" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr6)"/>
  <line x1="110" y1="160" x2="76" y2="200" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr7)"/>
  <defs>
    <marker id="arr5" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#C4A87A"/>
    </marker>
    <marker id="arr6" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#C4A87A"/>
    </marker>
    <marker id="arr7" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#C4A87A"/>
    </marker>
  </defs>

  <text x="65" y="190" text-anchor="middle" font-size="8" fill="#7C2530">transport plan γ</text>

  <!-- Target piles -->
  <text x="65" y="220" text-anchor="middle" font-size="9" fill="#7C2530">Target ν</text>
  <rect x="28" y="225" width="28" height="50" fill="#7C2530" opacity="0.7" rx="1"/>
  <rect x="62" y="235" width="28" height="40" fill="#7C2530" opacity="0.7" rx="1"/>
  <rect x="96" y="250" width="28" height="25" fill="#7C2530" opacity="0.5" rx="1"/>
  <text x="28" y="288" font-size="7" fill="#6B5D4F">hole 1</text>
  <text x="62" y="288" font-size="7" fill="#6B5D4F">hole 2</text>
  <text x="96" y="288" font-size="7" fill="#6B5D4F">hole 3</text>

  <text x="114" y="310" text-anchor="middle" font-size="8" fill="#5C3D1E">Cost = mass × distance</text>
  <text x="114" y="325" text-anchor="middle" font-size="8" fill="#7C2530">Minimize total work</text>
  <text x="114" y="340" text-anchor="middle" font-size="8" fill="#6B5D4F">to reshape μ into ν</text>

  <!-- Panel 2: The formulation -->
  <rect x="222" y="42" width="185" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="314" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">The Formulation</text>

  <!-- Wasserstein distance box -->
  <rect x="230" y="70" width="170" height="55" fill="#EDE8DE" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="315" y="90" text-anchor="middle" font-size="9.5" fill="#2D5A8E">Wₚ(μ,ν)ᵖ = </text>
  <text x="315" y="108" text-anchor="middle" font-size="9.5" fill="#2D5A8E">inf_{γ∈Π(μ,ν)} ∫ c(x,y) dγ(x,y)</text>

  <line x1="230" y1="138" x2="398" y2="138" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="234" y="156" font-size="9" fill="#5C3D1E">γ — transport plan (coupling)</text>
  <text x="234" y="172" font-size="9" fill="#5C3D1E">Π(μ,ν) — all couplings</text>
  <text x="234" y="188" font-size="9" fill="#5C3D1E">c(x,y) — cost of moving</text>
  <text x="234" y="203" font-size="9" fill="#5C3D1E">   mass from x to y</text>

  <line x1="230" y1="218" x2="398" y2="218" stroke="#C4A87A" stroke-width="0.8"/>

  <!-- Special cases -->
  <text x="314" y="236" text-anchor="middle" font-size="9" fill="#7C2530">Special cases:</text>
  <text x="234" y="254" font-size="9" fill="#5C3D1E">W₁ (p=1): c = ‖x−y‖</text>
  <text x="234" y="270" font-size="9" fill="#6B5D4F">Earth mover's distance</text>
  <text x="234" y="290" font-size="9" fill="#5C3D1E">W₂ (p=2): c = ‖x−y‖²</text>
  <text x="234" y="306" font-size="9" fill="#6B5D4F">Bures metric (Gaussian)</text>

  <line x1="230" y1="318" x2="398" y2="318" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="314" y="338" text-anchor="middle" font-size="8" fill="#5C3D1E">Unlike KL divergence:</text>
  <text x="314" y="352" text-anchor="middle" font-size="8" fill="#2D5A8E">works on disjoint supports</text>

  <!-- Panel 3: Sinkhorn / computation -->
  <rect x="420" y="42" width="185" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="512" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Sinkhorn Regularization</text>

  <text x="512" y="82" text-anchor="middle" font-size="9" fill="#5C3D1E">Exact OT: O(n³) — too slow</text>

  <rect x="428" y="90" width="170" height="42" fill="#EDE8DE" stroke="#7C2530" stroke-width="1" rx="2"/>
  <text x="513" y="108" text-anchor="middle" font-size="9" fill="#7C2530">Add entropy: −ε H(γ)</text>
  <text x="513" y="124" text-anchor="middle" font-size="8" fill="#6B5D4F">regularized = Sinkhorn OT</text>

  <line x1="428" y1="145" x2="597" y2="145" stroke="#C4A87A" stroke-width="0.8"/>

  <!-- Sinkhorn iteration diagram -->
  <text x="512" y="163" text-anchor="middle" font-size="9" fill="#5C3D1E">Sinkhorn iterations:</text>

  <rect x="435" y="170" width="150" height="22" fill="#2D5A8E" opacity="0.6" rx="2"/>
  <text x="510" y="185" text-anchor="middle" font-size="8" fill="#FDFAF4">K = exp(−C/ε)</text>

  <line x1="510" y1="194" x2="510" y2="208" stroke="#5C3D1E" stroke-width="1.5"/>

  <rect x="435" y="208" width="150" height="22" fill="#C4A87A" opacity="0.6" rx="2"/>
  <text x="510" y="223" text-anchor="middle" font-size="8" fill="#5C3D1E">u ← μ / (K v)</text>

  <line x1="510" y1="232" x2="510" y2="246" stroke="#5C3D1E" stroke-width="1.5"/>

  <rect x="435" y="246" width="150" height="22" fill="#C4A87A" opacity="0.6" rx="2"/>
  <text x="510" y="261" text-anchor="middle" font-size="8" fill="#5C3D1E">v ← ν / (Kᵀ u)</text>

  <line x1="510" y1="270" x2="510" y2="270" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="510" y="285" text-anchor="middle" font-size="8" fill="#6B5D4F">repeat until converge</text>
  <text x="510" y="298" text-anchor="middle" font-size="8" fill="#6B5D4F">γ* = diag(u) K diag(v)</text>

  <line x1="428" y1="310" x2="597" y2="310" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="512" y="328" text-anchor="middle" font-size="9" fill="#2D5A8E">Complexity: O(n²/ε²)</text>
  <text x="512" y="344" text-anchor="middle" font-size="8" fill="#6B5D4F">parallelizes on GPU</text>

  <!-- Panel 4: Applications -->
  <rect x="618" y="42" width="165" height="310" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="700" y="62" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Applications in ML</text>

  <text x="700" y="84" text-anchor="middle" font-size="9" fill="#2D5A8E">Wasserstein GANs:</text>
  <text x="700" y="99" text-anchor="middle" font-size="8" fill="#5C3D1E">stable training by using</text>
  <text x="700" y="113" text-anchor="middle" font-size="8" fill="#5C3D1E">W₁ instead of JS div.</text>
  <text x="700" y="127" text-anchor="middle" font-size="8" fill="#6B5D4F">([[GANs|GAN]])</text>

  <line x1="628" y1="140" x2="775" y2="140" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="157" text-anchor="middle" font-size="9" fill="#2D5A8E">Domain adaptation:</text>
  <text x="700" y="172" text-anchor="middle" font-size="8" fill="#5C3D1E">align source and target</text>
  <text x="700" y="186" text-anchor="middle" font-size="8" fill="#5C3D1E">feature distributions</text>

  <line x1="628" y1="200" x2="775" y2="200" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="217" text-anchor="middle" font-size="9" fill="#2D5A8E">Color transfer:</text>
  <text x="700" y="232" text-anchor="middle" font-size="8" fill="#5C3D1E">remap one image's</text>
  <text x="700" y="246" text-anchor="middle" font-size="8" fill="#5C3D1E">colors onto another</text>

  <line x1="628" y1="260" x2="775" y2="260" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="277" text-anchor="middle" font-size="9" fill="#2D5A8E">Point cloud alignment:</text>
  <text x="700" y="292" text-anchor="middle" font-size="8" fill="#5C3D1E">shape matching in 3D</text>
  <text x="700" y="307" text-anchor="middle" font-size="8" fill="#5C3D1E">(e.g. mesh deformation)</text>

  <line x1="628" y1="322" x2="775" y2="322" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="700" y="340" text-anchor="middle" font-size="8" fill="#6B5D4F">Advantage over KL:</text>
  <text x="700" y="354" text-anchor="middle" font-size="8" fill="#7C2530">meaningful when supports</text>
  <text x="700" y="366" text-anchor="middle" font-size="8" fill="#7C2530">do not overlap</text>

  <!-- Footer -->
  <text x="400" y="388" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="0.5">Optimal Transport — the cheapest way to reshape one probability distribution into another</text>
</svg>
