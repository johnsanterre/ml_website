<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Actor box -->
  <rect x="80" y="140" width="160" height="120" rx="10" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="160" y="193" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#4a90d9">Actor</text>
  <text x="160" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">π(a|s; θ)</text>
  <text x="160" y="233" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Picks actions</text>
  <!-- Critic box -->
  <rect x="560" y="140" width="160" height="120" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2.5"/>
  <text x="640" y="193" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#e67e22">Critic</text>
  <text x="640" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">V(s; w)</text>
  <text x="640" y="233" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Evaluates states</text>
  <!-- Environment -->
  <rect x="300" y="290" width="200" height="70" rx="10" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="322" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#27ae60">Environment</text>
  <text x="400" y="342" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">returns s', r</text>
  <!-- State box -->
  <rect x="320" y="60" width="160" height="50" rx="8" fill="#f0e6ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="400" y="91" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#8e44ad">State s</text>
  <!-- Arrows -->
  <line x1="400" y1="110" x2="200" y2="140" stroke="#8e44ad" stroke-width="2" marker-end="url(#arca)"/>
  <line x1="400" y1="110" x2="600" y2="140" stroke="#8e44ad" stroke-width="2" marker-end="url(#arca)"/>
  <!-- Actor -> Environment (action) -->
  <line x1="160" y1="260" x2="300" y2="305" stroke="#4a90d9" stroke-width="2" marker-end="url(#arca)"/>
  <text x="195" y="295" font-family="Arial" font-size="11" fill="#4a90d9">action a</text>
  <!-- Environment -> Critic (reward) -->
  <line x1="500" y1="305" x2="640" y2="260" stroke="#27ae60" stroke-width="2" marker-end="url(#arca)"/>
  <text x="580" y="295" font-family="Arial" font-size="11" fill="#27ae60">reward r</text>
  <!-- Critic -> Actor (advantage) -->
  <path d="M560,200 Q400,150 240,200" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arca2)"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#e67e22">advantage A(s,a)</text>
  <defs>
    <marker id="arca" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8e44ad"/></marker>
    <marker id="arca2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Actor-Critic Architecture</text>
</svg>
