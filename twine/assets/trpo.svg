<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="410" y1="26" x2="410" y2="375" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 1: POLICY LANDSCAPE + TRUST REGION ══ -->
  <text x="205" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">TRUST REGION CONSTRAINT</text>

  <!-- Reward surface: ellipse contours -->
  <ellipse cx="200" cy="200" rx="155" ry="120" fill="none" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <ellipse cx="200" cy="200" rx="110" ry="85"  fill="none" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="200" cy="200" rx="70"  ry="55"  fill="none" stroke="#C4A87A" stroke-width="0.9" opacity="0.7"/>
  <ellipse cx="200" cy="200" rx="35"  ry="28"  fill="none" stroke="#C4A87A" stroke-width="1.0" opacity="0.8"/>
  <!-- Optimum star -->
  <text x="200" y="205" text-anchor="middle" font-size="14" fill="#C4A87A">★</text>
  <text x="200" y="222" text-anchor="middle" font-size="8" fill="#6B5D4F">optimum</text>

  <!-- Current policy θ_old -->
  <circle cx="110" cy="270" r="7" fill="#7C2530"/>
  <text x="110" y="292" text-anchor="middle" font-size="9" fill="#7C2530">θ_old</text>

  <!-- Trust region circle around θ_old -->
  <circle cx="110" cy="270" r="65" fill="#7C2530" fill-opacity="0.06" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="160" y="225" font-size="8.5" fill="#7C2530">trust</text>
  <text x="160" y="237" font-size="8.5" fill="#7C2530">region</text>
  <text x="160" y="249" font-size="8.5" fill="#7C2530">δ</text>

  <!-- Gradient step (unconstrained) — goes too far -->
  <line x1="110" y1="270" x2="245" y2="155" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="210" y="195" font-size="8.5" fill="#2D5A8E">unconstrained</text>
  <text x="210" y="207" font-size="8.5" fill="#2D5A8E">step (too big)</text>

  <!-- TRPO step (constrained) — stays inside trust region -->
  <circle cx="156" cy="230" r="6" fill="#2D5A8E"/>
  <line x1="110" y1="270" x2="150" y2="234" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="115" y="240" font-size="9" fill="#7C2530">θ_new</text>
  <text x="80" y="345" text-anchor="middle" font-size="8.5" fill="#7C2530" font-style="italic">‖θ_new − θ_old‖ ≤ δ</text>
  <text x="195" y="345" text-anchor="middle" font-size="8.5" fill="#6B5D4F">(or KL divergence ≤ δ)</text>

  <!-- ══ PANEL 2: KL DIVERGENCE CONSTRAINT ══ -->
  <text x="605" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">KL DIVERGENCE BOUND</text>

  <!-- Old policy distribution: bell curve left -->
  <text x="510" y="55" text-anchor="middle" font-size="9" fill="#7C2530">π_old(a|s)</text>
  <path d="M430,290 Q455,80 510,75 Q565,80 590,290" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.8"/>

  <!-- New policy distribution: bell curve slightly shifted right -->
  <text x="620" y="55" text-anchor="middle" font-size="9" fill="#2D5A8E">π_new(a|s)</text>
  <path d="M545,290 Q570,80 625,70 Q680,80 705,290" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.8"/>

  <!-- KL arrow between peaks -->
  <line x1="510" y1="90" x2="620" y2="80" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-brown)"/>
  <text x="565" y="72" text-anchor="middle" font-size="9" fill="#5C3D1E">KL(π_old ‖ π_new) ≤ δ</text>

  <!-- Horizontal axis -->
  <line x1="420" y1="292" x2="720" y2="292" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="570" y="307" text-anchor="middle" font-size="9" fill="#6B5D4F">action a</text>

  <!-- Surrogate objective box -->
  <rect x="425" y="320" width="355" height="48" fill="#EDE5D0" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="602" y="340" text-anchor="middle" font-size="9.5" fill="#5C3D1E">maximize  L(θ) = E[ π_new(a|s) / π_old(a|s) · A(s,a) ]</text>
  <text x="602" y="357" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">subject to  KL(π_old ‖ π_new) ≤ δ</text>

  <!-- Step labels panel 2 -->
  <text x="430" y="155" font-size="8.5" fill="#6B5D4F">1. Estimate advantage A(s,a)</text>
  <text x="430" y="171" font-size="8.5" fill="#6B5D4F">2. Form surrogate L(θ)</text>
  <text x="430" y="187" font-size="8.5" fill="#6B5D4F">3. Optimize via conjugate gradient</text>
  <text x="430" y="203" font-size="8.5" fill="#6B5D4F">4. Line search to enforce KL ≤ δ</text>

  <!-- Bottom caption -->
  <text x="400" y="388" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    TRPO takes the largest safe policy step — maximizing reward while guaranteeing the new policy stays close to the old one.
  </text>
</svg>
