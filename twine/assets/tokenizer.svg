<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Input sentence -->
  <rect x="40" y="60" width="720" height="50" rx="8" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="91" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">"The tokenizer splits text into subword pieces."</text>
  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="150" stroke="#888" stroke-width="2" marker-end="url(#arct)"/>
  <text x="420" y="135" font-family="Arial" font-size="11" fill="#555">BPE / WordPiece</text>
  <!-- Tokens row -->
  <text x="400" y="175" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#555">Subword Tokens</text>
  <rect x="42" y="185" width="70" height="36" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="77" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">The</text>
  <rect x="118" y="185" width="80" height="36" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="158" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">token</text>
  <rect x="204" y="185" width="60" height="36" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="234" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">##izer</text>
  <rect x="270" y="185" width="68" height="36" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5"/>
  <text x="304" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">splits</text>
  <rect x="344" y="185" width="56" height="36" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5"/>
  <text x="372" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">text</text>
  <rect x="406" y="185" width="50" height="36" rx="6" fill="#f0e6ff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="431" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">into</text>
  <rect x="462" y="185" width="60" height="36" rx="6" fill="#fde8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="492" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">sub</text>
  <rect x="528" y="185" width="64" height="36" rx="6" fill="#fde8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="560" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">##word</text>
  <rect x="598" y="185" width="72" height="36" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="634" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">pieces</text>
  <rect x="676" y="185" width="36" height="36" rx="6" fill="#f9f9f9" stroke="#999" stroke-width="1.5"/>
  <text x="694" y="208" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">.</text>
  <!-- Arrow down -->
  <line x1="400" y1="221" x2="400" y2="261" stroke="#888" stroke-width="2" marker-end="url(#arct)"/>
  <!-- IDs row -->
  <text x="400" y="285" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#555">Token IDs (input to model)</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">[ 101, 19204, 17629, 7466, 3793, 2046, 4942, 2773, 6837, 102 ]</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">## prefix = continuation of previous token (WordPiece)   |   Vocabulary size: 30K–100K tokens</text>
  <defs><marker id="arct" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker></defs>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Tokenization</text>
</svg>
