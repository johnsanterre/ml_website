<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="0"/>
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr-dark" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3D2B1A"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#B03030"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-up-red" markerWidth="7" markerHeight="9" refX="3.5" refY="0" orient="auto">
      <polygon points="0 9, 3.5 0, 7 9" fill="#B03030"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════ TITLE ═══════════════════════════════ -->
  <text x="400" y="26" text-anchor="middle" font-size="13.5" font-weight="bold"
        fill="#3D2B1A" letter-spacing="1.2">THE INSPECTION PARADOX</text>
  <text x="400" y="41" text-anchor="middle" font-size="9.5" fill="#6B5D4F" font-style="italic">
    You always seem to arrive in the middle of a long gap
  </text>
  <line x1="50" y1="50" x2="750" y2="50" stroke="#D4C5A9" stroke-width="1"/>

  <!-- ═══════════════════════════════ TIMELINE AXIS ═══════════════════════ -->
  <!-- Horizontal axis representing time -->
  <line x1="48" y1="165" x2="752" y2="165" stroke="#3D2B1A" stroke-width="2"
        marker-end="url(#arr-dark)"/>
  <text x="756" y="169" font-size="11" fill="#3D2B1A">time</text>

  <!-- ═══ BUS ARRIVAL TICKS (7 buses → 6 gaps, varying widths) ═══ -->
  <!-- Gap widths (px): 55, 40, 130, 45, 60, 110 → total 440 px, start x=80 -->
  <!-- Bus positions: 80, 135, 175, 305, 350, 410, 520 -->

  <!-- Gap fills (shaded rectangles above the timeline) -->
  <!-- Gap 1: x=80 to x=135, width=55 — small -->
  <rect x="80" y="130" width="55" height="35" fill="#2D5A8E" fill-opacity="0.12" stroke="none"/>
  <!-- Gap 2: x=135 to x=175, width=40 — tiny -->
  <rect x="135" y="130" width="40" height="35" fill="#2D5A8E" fill-opacity="0.12" stroke="none"/>
  <!-- Gap 3: x=175 to x=305, width=130 — LARGE -->
  <rect x="175" y="110" width="130" height="55" fill="#B03030" fill-opacity="0.13" stroke="none"/>
  <!-- Gap 4: x=305 to x=350, width=45 — small -->
  <rect x="305" y="130" width="45" height="35" fill="#2D5A8E" fill-opacity="0.12" stroke="none"/>
  <!-- Gap 5: x=350 to x=410, width=60 — medium -->
  <rect x="350" y="127" width="60" height="38" fill="#2D5A8E" fill-opacity="0.16" stroke="none"/>
  <!-- Gap 6: x=410 to x=520, width=110 — LARGE -->
  <rect x="410" y="113" width="110" height="52" fill="#B03030" fill-opacity="0.13" stroke="none"/>

  <!-- Gaps after x=520: small -->
  <rect x="520" y="130" width="50" height="35" fill="#2D5A8E" fill-opacity="0.12" stroke="none"/>
  <rect x="570" y="130" width="70" height="35" fill="#2D5A8E" fill-opacity="0.15" stroke="none"/>
  <rect x="640" y="130" width="55" height="35" fill="#2D5A8E" fill-opacity="0.12" stroke="none"/>

  <!-- Bus tick marks -->
  <!-- Bus 1 at x=80 -->
  <line x1="80" y1="155" x2="80" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 2 at x=135 -->
  <line x1="135" y1="155" x2="135" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 3 at x=175 -->
  <line x1="175" y1="155" x2="175" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 4 at x=305 -->
  <line x1="305" y1="155" x2="305" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 5 at x=350 -->
  <line x1="350" y1="155" x2="350" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 6 at x=410 -->
  <line x1="410" y1="155" x2="410" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 7 at x=520 -->
  <line x1="520" y1="155" x2="520" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 8 at x=570 -->
  <line x1="570" y1="155" x2="570" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 9 at x=640 -->
  <line x1="640" y1="155" x2="640" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>
  <!-- Bus 10 at x=695 -->
  <line x1="695" y1="155" x2="695" y2="175" stroke="#3D2B1A" stroke-width="2.5"/>

  <!-- Bus icons (simple rectangles above ticks) -->
  <rect x="67" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="122" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="162" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="292" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="337" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="397" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="507" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="557" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="627" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="682" y="143" width="26" height="12" rx="2" fill="#3D6B9A" stroke="#2D5A8E" stroke-width="1"/>

  <!-- Gap width labels -->
  <text x="107" y="122" text-anchor="middle" font-size="9" fill="#2D5A8E">55</text>
  <text x="155" y="122" text-anchor="middle" font-size="9" fill="#2D5A8E">40</text>
  <text x="240" y="104" text-anchor="middle" font-size="10" fill="#B03030" font-weight="bold">130</text>
  <text x="327" y="122" text-anchor="middle" font-size="9" fill="#2D5A8E">45</text>
  <text x="380" y="119" text-anchor="middle" font-size="9" fill="#2D5A8E">60</text>
  <text x="465" y="107" text-anchor="middle" font-size="10" fill="#B03030" font-weight="bold">110</text>
  <text x="545" y="122" text-anchor="middle" font-size="9" fill="#2D5A8E">50</text>
  <text x="605" y="122" text-anchor="middle" font-size="9" fill="#2D5A8E">70</text>
  <text x="667" y="122" text-anchor="middle" font-size="9" fill="#2D5A8E">55</text>

  <!-- ═══ "YOU ARRIVE" ARROWS ═══ -->
  <!-- Arrow 1: lands in large gap 3 (x=240) -->
  <line x1="240" y1="200" x2="240" y2="170"
        stroke="#B03030" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="240" y="214" text-anchor="middle" font-size="9" fill="#B03030" font-weight="bold">you</text>
  <text x="240" y="225" text-anchor="middle" font-size="9" fill="#B03030" font-weight="bold">arrive</text>

  <!-- Arrow 2: lands in large gap 6 (x=468) -->
  <line x1="468" y1="200" x2="468" y2="170"
        stroke="#B03030" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="468" y="214" text-anchor="middle" font-size="9" fill="#B03030" font-weight="bold">you</text>
  <text x="468" y="225" text-anchor="middle" font-size="9" fill="#B03030" font-weight="bold">arrive</text>

  <!-- Arrow 3: lands in smaller gap 5 (x=375) -->
  <line x1="605" y1="200" x2="605" y2="170"
        stroke="#5C7A3A" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="605" y="214" text-anchor="middle" font-size="8.5" fill="#5C7A3A">rare: small</text>
  <text x="605" y="225" text-anchor="middle" font-size="8.5" fill="#5C7A3A">gap arrival</text>

  <!-- ═══════════════════════════════ BOTTOM PANELS ═══════════════════════ -->

  <!-- Divider -->
  <line x1="50" y1="244" x2="750" y2="244" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel A: Naive view -->
  <rect x="56" y="254" width="210" height="120" rx="6"
        fill="#EAF0F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="161" y="272" text-anchor="middle" font-size="10" fill="#2D5A8E" letter-spacing="0.8" font-weight="bold">
    NAIVE EXPECTATION
  </text>
  <text x="161" y="290" text-anchor="middle" font-size="9" fill="#3A5275">Average gap = 68 units</text>
  <text x="161" y="305" text-anchor="middle" font-size="9" fill="#3A5275">Expected wait = 68 / 2</text>
  <text x="161" y="322" text-anchor="middle" font-size="13" fill="#2D5A8E" font-weight="bold">= 34 units</text>
  <text x="161" y="342" text-anchor="middle" font-size="8.5" fill="#3A5275" font-style="italic">
    (assumes uniform arrival)
  </text>
  <text x="161" y="358" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">
    ✗ You don't arrive uniformly
  </text>

  <!-- Panel B: Reality -->
  <rect x="294" y="254" width="210" height="120" rx="6"
        fill="#F8EAE8" stroke="#B03030" stroke-width="1.5"/>
  <text x="399" y="272" text-anchor="middle" font-size="10" fill="#B03030" letter-spacing="0.8" font-weight="bold">
    ACTUAL EXPERIENCE
  </text>
  <text x="399" y="290" text-anchor="middle" font-size="9" fill="#7C2530">You land in a gap</text>
  <text x="399" y="305" text-anchor="middle" font-size="9" fill="#7C2530">∝ gap length (big gaps</text>
  <text x="399" y="320" text-anchor="middle" font-size="9" fill="#7C2530">catch more arrivals)</text>
  <text x="399" y="338" text-anchor="middle" font-size="13" fill="#B03030" font-weight="bold">E[wait] &gt; 34</text>
  <text x="399" y="357" text-anchor="middle" font-size="8.5" fill="#7C2530" font-style="italic">
    size-biased sampling
  </text>

  <!-- Panel C: Formula -->
  <rect x="532" y="254" width="210" height="120" rx="6"
        fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="637" y="272" text-anchor="middle" font-size="10" fill="#7A5230" letter-spacing="0.8" font-weight="bold">
    THE MATH
  </text>
  <text x="637" y="291" text-anchor="middle" font-size="9" fill="#5C3D1A">
    If gaps ~ Exp(λ),
  </text>
  <text x="637" y="307" text-anchor="middle" font-size="9" fill="#5C3D1A">
    E[wait] = 1/λ   (not 1/2λ)
  </text>
  <line x1="562" y1="317" x2="712" y2="317" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="637" y="334" text-anchor="middle" font-size="9" fill="#5C3D1A">
    For general gaps,
  </text>
  <text x="637" y="350" text-anchor="middle" font-size="9" fill="#5C3D1A">
    E[wait] = μ/2 + σ²/(2μ)
  </text>
  <text x="637" y="366" text-anchor="middle" font-size="8" fill="#7A5230" font-style="italic">
    variance inflates the wait
  </text>

</svg>
