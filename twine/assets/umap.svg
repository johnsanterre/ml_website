<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: High-dim manifold -->
  <rect x="20" y="30" width="210" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="125" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">HIGH-DIM DATA</text>

  <!-- Manifold blob with scattered points -->
  <ellipse cx="125" cy="195" rx="85" ry="120" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="125" y="90" text-anchor="middle" font-size="9" fill="#6B5D4F">Manifold in</text>
  <text x="125" y="103" text-anchor="middle" font-size="9" fill="#6B5D4F">high-dim space</text>

  <!-- clusters of dots -->
  <circle cx="100" cy="145" r="4" fill="#7C2530"/>
  <circle cx="112" cy="135" r="4" fill="#7C2530"/>
  <circle cx="95" cy="158" r="4" fill="#7C2530"/>
  <circle cx="108" cy="152" r="4" fill="#7C2530"/>

  <circle cx="150" cy="165" r="4" fill="#2D5A8E"/>
  <circle cx="162" cy="175" r="4" fill="#2D5A8E"/>
  <circle cx="145" cy="180" r="4" fill="#2D5A8E"/>
  <circle cx="158" cy="160" r="4" fill="#2D5A8E"/>

  <circle cx="105" cy="230" r="4" fill="#5C3D1E"/>
  <circle cx="118" cy="242" r="4" fill="#5C3D1E"/>
  <circle cx="98" cy="248" r="4" fill="#5C3D1E"/>
  <circle cx="125" cy="235" r="4" fill="#5C3D1E"/>

  <circle cx="148" cy="250" r="4" fill="#C4A87A"/>
  <circle cx="160" cy="240" r="4" fill="#C4A87A"/>
  <circle cx="155" cy="258" r="4" fill="#C4A87A"/>
  <circle cx="140" cy="265" r="4" fill="#C4A87A"/>

  <!-- local neighborhood lines -->
  <line x1="100" y1="145" x2="112" y2="135" stroke="#7C2530" stroke-width="0.8" opacity="0.5"/>
  <line x1="100" y1="145" x2="95" y2="158" stroke="#7C2530" stroke-width="0.8" opacity="0.5"/>
  <line x1="112" y1="135" x2="108" y2="152" stroke="#7C2530" stroke-width="0.8" opacity="0.5"/>

  <!-- Panel 2: Fuzzy graph construction -->
  <rect x="248" y="30" width="200" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="348" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">FUZZY GRAPH</text>

  <text x="348" y="72" text-anchor="middle" font-size="9" fill="#6B5D4F">Local neighborhood graph</text>
  <text x="348" y="85" text-anchor="middle" font-size="9" fill="#6B5D4F">with weighted edges</text>

  <!-- nodes with weighted connections -->
  <circle cx="308" cy="130" r="5" fill="#7C2530"/>
  <circle cx="348" cy="115" r="5" fill="#7C2530"/>
  <circle cx="385" cy="135" r="5" fill="#7C2530"/>
  <circle cx="320" cy="175" r="5" fill="#2D5A8E"/>
  <circle cx="365" cy="165" r="5" fill="#2D5A8E"/>
  <circle cx="310" cy="230" r="5" fill="#5C3D1E"/>
  <circle cx="355" cy="245" r="5" fill="#5C3D1E"/>
  <circle cx="390" cy="220" r="5" fill="#C4A87A"/>

  <!-- strong edges (thick) -->
  <line x1="308" y1="130" x2="348" y2="115" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>
  <line x1="348" y1="115" x2="385" y2="135" stroke="#7C2530" stroke-width="2" opacity="0.7"/>
  <line x1="320" y1="175" x2="365" y2="165" stroke="#2D5A8E" stroke-width="2.5" opacity="0.7"/>
  <line x1="310" y1="230" x2="355" y2="245" stroke="#5C3D1E" stroke-width="2.5" opacity="0.7"/>
  <line x1="355" y1="245" x2="390" y2="220" stroke="#5C3D1E" stroke-width="2" opacity="0.6"/>

  <!-- weak cross edges (thin dashed) -->
  <line x1="308" y1="130" x2="320" y2="175" stroke="#6B5D4F" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="365" y1="165" x2="390" y2="220" stroke="#6B5D4F" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <text x="275" y="290" font-size="9" fill="#6B5D4F">Thick edge = strong</text>
  <text x="275" y="305" font-size="9" fill="#6B5D4F">local connection</text>
  <text x="275" y="320" font-size="9" fill="#6B5D4F">Dashed = weak tie</text>

  <!-- Panel 3: Low-dim embedding -->
  <rect x="466" y="30" width="200" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="566" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">2D EMBEDDING</text>

  <!-- Axes -->
  <line x1="485" y1="310" x2="650" y2="310" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="485" y1="310" x2="485" y2="70" stroke="#5C3D1E" stroke-width="1"/>

  <!-- cluster 1 red -->
  <circle cx="520" cy="120" r="5" fill="#7C2530"/>
  <circle cx="535" cy="108" r="5" fill="#7C2530"/>
  <circle cx="510" cy="135" r="5" fill="#7C2530"/>
  <circle cx="528" cy="130" r="5" fill="#7C2530"/>
  <ellipse cx="521" cy="123" rx="22" ry="22" fill="none" stroke="#7C2530" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- cluster 2 blue -->
  <circle cx="618" cy="115" r="5" fill="#2D5A8E"/>
  <circle cx="630" cy="128" r="5" fill="#2D5A8E"/>
  <circle cx="608" cy="132" r="5" fill="#2D5A8E"/>
  <circle cx="625" cy="103" r="5" fill="#2D5A8E"/>
  <ellipse cx="621" cy="120" rx="22" ry="22" fill="none" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- cluster 3 brown -->
  <circle cx="515" cy="265" r="5" fill="#5C3D1E"/>
  <circle cx="530" cy="255" r="5" fill="#5C3D1E"/>
  <circle cx="505" cy="278" r="5" fill="#5C3D1E"/>
  <circle cx="528" cy="272" r="5" fill="#5C3D1E"/>
  <ellipse cx="520" cy="268" rx="22" ry="22" fill="none" stroke="#5C3D1E" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- cluster 4 tan -->
  <circle cx="620" cy="265" r="5" fill="#C4A87A"/>
  <circle cx="633" cy="255" r="5" fill="#C4A87A"/>
  <circle cx="612" cy="278" r="5" fill="#C4A87A"/>
  <circle cx="628" cy="272" r="5" fill="#C4A87A"/>
  <ellipse cx="622" cy="268" rx="22" ry="22" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <text x="490" y="330" font-size="9" fill="#6B5D4F">UMAP dim 1</text>
  <text x="468" y="200" font-size="9" fill="#6B5D4F" transform="rotate(-90,468,200)">UMAP dim 2</text>

  <!-- Panel 4: key idea -->
  <rect x="684" y="30" width="100" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="734" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">KEY</text>
  <text x="734" y="105" text-anchor="middle" font-size="9" fill="#7C2530">Preserve</text>
  <text x="734" y="120" text-anchor="middle" font-size="9" fill="#7C2530">local</text>
  <text x="734" y="135" text-anchor="middle" font-size="9" fill="#7C2530">structure</text>
  <line x1="700" y1="148" x2="768" y2="148" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="734" y="175" text-anchor="middle" font-size="9" fill="#2D5A8E">Allow</text>
  <text x="734" y="190" text-anchor="middle" font-size="9" fill="#2D5A8E">global</text>
  <text x="734" y="205" text-anchor="middle" font-size="9" fill="#2D5A8E">distortion</text>
  <line x1="700" y1="218" x2="768" y2="218" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="734" y="245" text-anchor="middle" font-size="9" fill="#5C3D1E">Faster</text>
  <text x="734" y="260" text-anchor="middle" font-size="9" fill="#5C3D1E">than</text>
  <text x="734" y="275" text-anchor="middle" font-size="9" fill="#5C3D1E">t-SNE</text>

  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="0.5">UMAP — topology-preserving dimensionality reduction</text>
</svg>
