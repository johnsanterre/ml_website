<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">The Distributional Hypothesis: Meaning from Context</text>

  <!-- ══ LEFT PANEL: AMBIGUOUS WORD "bank" ══ -->
  <!-- Panel background -->
  <rect x="20" y="50" width="200" height="290" rx="6" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="120" y="72" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold" letter-spacing="1">AMBIGUOUS WORD</text>

  <!-- Central word box -->
  <rect x="70" y="82" width="100" height="40" rx="5" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="120" y="107" text-anchor="middle" fill="#7C2530" font-size="20" font-weight="bold">"bank"</text>

  <!-- Context sentences -->
  <text x="120" y="148" text-anchor="middle" fill="#5C3D1E" font-size="9.5" font-style="italic">"deposited money at the bank"</text>
  <text x="120" y="165" text-anchor="middle" fill="#5C3D1E" font-size="9.5" font-style="italic">"bank approved the loan"</text>
  <text x="120" y="182" text-anchor="middle" fill="#5C3D1E" font-size="9.5" font-style="italic">"bank account, interest rate"</text>

  <line x1="40" y1="190" x2="200" y2="190" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="120" y="210" text-anchor="middle" fill="#5C3D1E" font-size="9.5" font-style="italic">"fish on the river bank"</text>
  <text x="120" y="227" text-anchor="middle" fill="#5C3D1E" font-size="9.5" font-style="italic">"bank was muddy after rain"</text>
  <text x="120" y="244" text-anchor="middle" fill="#5C3D1E" font-size="9.5" font-style="italic">"sat on the grassy bank"</text>

  <text x="120" y="275" text-anchor="middle" fill="#6B5D4F" font-size="9" font-style="italic">Same spelling —</text>
  <text x="120" y="290" text-anchor="middle" fill="#6B5D4F" font-size="9" font-style="italic">different contexts</text>
  <text x="120" y="305" text-anchor="middle" fill="#6B5D4F" font-size="9" font-style="italic">→ different meanings</text>

  <!-- ══ MIDDLE: ARROWS ══ -->
  <!-- Arrow to financial cluster -->
  <line x1="222" y1="155" x2="310" y2="155" stroke="#2C5F8A" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="308,150 318,155 308,160" fill="#2C5F8A"/>
  <text x="264" y="148" text-anchor="middle" fill="#2C5F8A" font-size="9" font-style="italic">financial</text>
  <text x="264" y="158" text-anchor="middle" fill="#2C5F8A" font-size="9" font-style="italic">context</text>

  <!-- Arrow to geographic cluster -->
  <line x1="222" y1="230" x2="310" y2="270" stroke="#4A7C59" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="308,265 318,270 310,278" fill="#4A7C59"/>
  <text x="264" y="245" text-anchor="middle" fill="#4A7C59" font-size="9" font-style="italic">geographic</text>
  <text x="264" y="255" text-anchor="middle" fill="#4A7C59" font-size="9" font-style="italic">context</text>

  <!-- ══ RIGHT PANEL: VECTOR SPACE ══ -->
  <!-- Panel background -->
  <rect x="320" y="50" width="460" height="290" rx="6" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="550" y="72" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold" letter-spacing="1">DISTRIBUTIONAL VECTOR SPACE</text>

  <!-- Axes -->
  <line x1="360" y1="295" x2="755" y2="295" stroke="#888" stroke-width="1.2"/>
  <line x1="360" y1="295" x2="360" y2="85" stroke="#888" stroke-width="1.2"/>
  <text x="758" y="299" fill="#888" font-size="10">dim 1</text>
  <text x="342" y="88" fill="#888" font-size="10">dim 2</text>
  <polygon points="755,291 763,295 755,299" fill="#888"/>
  <polygon points="356,87 360,79 364,87" fill="#888"/>

  <!-- Financial cluster (blue) -->
  <!-- bank₁ -->
  <circle cx="620" cy="145" r="9" fill="#2C5F8A"/>
  <text x="635" y="141" fill="#2C5F8A" font-size="11" font-weight="bold">bank₁</text>
  <!-- loan -->
  <circle cx="660" cy="170" r="7" fill="#2C5F8A"/>
  <text x="672" y="166" fill="#2C5F8A" font-size="10">loan</text>
  <!-- interest -->
  <circle cx="590" cy="175" r="7" fill="#2C5F8A"/>
  <text x="603" y="171" fill="#2C5F8A" font-size="10">interest</text>
  <!-- deposit -->
  <circle cx="640" cy="200" r="7" fill="#2C5F8A"/>
  <text x="652" y="196" fill="#2C5F8A" font-size="10">deposit</text>
  <!-- Cluster circle -->
  <circle cx="630" cy="175" r="45" fill="none" stroke="#2C5F8A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="710" y="120" fill="#2C5F8A" font-size="10" font-weight="bold">financial</text>

  <!-- Geographic cluster (green) -->
  <!-- bank₂ -->
  <circle cx="450" cy="240" r="9" fill="#4A7C59"/>
  <text x="464" y="236" fill="#4A7C59" font-size="11" font-weight="bold">bank₂</text>
  <!-- river -->
  <circle cx="415" cy="260" r="7" fill="#4A7C59"/>
  <text x="427" y="256" fill="#4A7C59" font-size="10">river</text>
  <!-- muddy -->
  <circle cx="480" cy="265" r="7" fill="#4A7C59"/>
  <text x="492" y="261" fill="#4A7C59" font-size="10">muddy</text>
  <!-- shore -->
  <circle cx="440" cy="280" r="7" fill="#4A7C59"/>
  <text x="452" y="276" fill="#4A7C59" font-size="10">shore</text>
  <!-- Cluster circle -->
  <circle cx="450" cy="262" r="40" fill="none" stroke="#4A7C59" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="375" y="215" fill="#4A7C59" font-size="10" font-weight="bold">geographic</text>

  <!-- Cosine similarity annotation -->
  <line x1="620" y1="145" x2="450" y2="240" stroke="#E07B39" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="540" y="178" text-anchor="middle" fill="#E07B39" font-size="9" font-style="italic">cos θ ≈ 0.12</text>
  <text x="540" y="189" text-anchor="middle" fill="#E07B39" font-size="9" font-style="italic">(dissimilar senses)</text>

  <!-- ══ BOTTOM: DISTRIBUTIONAL HYPOTHESIS CAPTION ══ -->
  <rect x="20" y="352" width="760" height="36" rx="5" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="367" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">Distributional Hypothesis</text>
  <text x="400" y="381" text-anchor="middle" fill="#6B5D4F" font-size="10" font-style="italic">"You shall know a word by the company it keeps." — J.R. Firth (1957) · Words in similar contexts get similar vectors</text>
</svg>
