<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="380" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">The Kernel Trick: Implicit Feature Mapping</text>
  <defs>
    <marker id="arrk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- Input space -->
  <rect x="40" y="60" width="300" height="280" rx="12" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="2"/>
  <text x="190" y="90" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">Input Space (2D)</text>
  <!-- Non-linearly separable points -->
  <circle cx="120" cy="180" r="10" fill="#C0392B"/>
  <circle cx="150" cy="230" r="10" fill="#C0392B"/>
  <circle cx="180" cy="200" r="10" fill="#C0392B"/>
  <circle cx="200" cy="160" r="10" fill="#C0392B"/>
  <circle cx="110" cy="140" r="10" fill="#2C5F8A"/>
  <circle cx="250" cy="140" r="10" fill="#2C5F8A"/>
  <circle cx="260" cy="220" r="10" fill="#2C5F8A"/>
  <circle cx="90" cy="240" r="10" fill="#2C5F8A"/>
  <circle cx="280" cy="170" r="10" fill="#2C5F8A"/>
  <!-- Curved boundary (not linearly separable) -->
  <ellipse cx="177" cy="192" rx="60" ry="55" fill="none" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="190" y="320" text-anchor="middle" fill="#555" font-size="13">Not linearly separable</text>
  <!-- Arrow -->
  <line x1="355" y1="200" x2="445" y2="200" stroke="#555" stroke-width="3" marker-end="url(#arrk)"/>
  <text x="400" y="185" text-anchor="middle" fill="#555" font-size="13">φ(x)</text>
  <text x="400" y="225" text-anchor="middle" fill="#555" font-size="11">k(x,x') = φ(x)·φ(x')</text>
  <!-- Feature space -->
  <rect x="460" y="60" width="300" height="280" rx="12" fill="#F0F8F0" stroke="#4A7C59" stroke-width="2"/>
  <text x="610" y="90" text-anchor="middle" fill="#4A7C59" font-size="14" font-weight="bold">Feature Space (higher-D)</text>
  <!-- Linearly separable points -->
  <circle cx="520" cy="220" r="10" fill="#C0392B"/>
  <circle cx="550" cy="250" r="10" fill="#C0392B"/>
  <circle cx="580" cy="230" r="10" fill="#C0392B"/>
  <circle cx="560" cy="270" r="10" fill="#C0392B"/>
  <circle cx="530" cy="130" r="10" fill="#2C5F8A"/>
  <circle cx="620" cy="120" r="10" fill="#2C5F8A"/>
  <circle cx="680" cy="150" r="10" fill="#2C5F8A"/>
  <circle cx="650" cy="180" r="10" fill="#2C5F8A"/>
  <circle cx="700" cy="130" r="10" fill="#2C5F8A"/>
  <!-- Hyperplane -->
  <line x1="490" y1="185" x2="730" y2="200" stroke="#4A7C59" stroke-width="2.5"/>
  <text x="610" y="320" text-anchor="middle" fill="#555" font-size="13">Linearly separable ✓</text>
</svg>