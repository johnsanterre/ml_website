<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Mutual Information</text>
  <!-- Venn diagram -->
  <circle cx="260" cy="210" r="100" fill="#4a90d9" fill-opacity="0.2" stroke="#4a90d9" stroke-width="2"/>
  <circle cx="360" cy="210" r="100" fill="#e67e22" fill-opacity="0.2" stroke="#e67e22" stroke-width="2"/>
  <text x="200" y="215" text-anchor="middle" font-family="Arial" font-size="13" fill="#4a90d9">H(X)</text>
  <text x="420" y="215" text-anchor="middle" font-family="Arial" font-size="13" fill="#e67e22">H(Y)</text>
  <text x="310" y="205" text-anchor="middle" font-family="Arial" font-size="13" fill="#555">I(X;Y)</text>
  <text x="310" y="222" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">shared</text>
  <text x="260" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">H(X|Y)</text>
  <text x="360" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">H(Y|X)</text>
  <!-- Formula -->
  <rect x="490" y="100" width="280" height="180" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="630" y="128" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Mutual Information</text>
  <text x="630" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">I(X;Y) = H(X) − H(X|Y)</text>
  <text x="630" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#555">= H(Y) − H(Y|X)</text>
  <line x1="500" y1="200" x2="760" y2="200" stroke="#ddd" stroke-width="1"/>
  <text x="630" y="222" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">I(X;Y) = 0 → independent</text>
  <text x="630" y="245" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">I(X;Y) = H(X) → X determines Y</text>
  <text x="630" y="265" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Always ≥ 0</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">How much does knowing X reduce uncertainty about Y?</text>
</svg>
