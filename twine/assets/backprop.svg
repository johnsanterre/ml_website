<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-loss" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL 1: FORWARD PASS ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">FORWARD PASS</text>

  <!-- All connections (dim) -->
  <!-- Input → Hidden (all) -->
  <line x1="50" y1="90"  x2="155" y2="90"  stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="90"  x2="155" y2="155" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="90"  x2="155" y2="220" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="155" x2="155" y2="90"  stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="155" x2="155" y2="220" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="220" x2="155" y2="90"  stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="220" x2="155" y2="155" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="220" x2="155" y2="220" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <!-- Hidden → Output (all) -->
  <line x1="155" y1="90"  x2="260" y2="120" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="90"  x2="260" y2="190" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="155" x2="260" y2="190" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="220" x2="260" y2="120" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="220" x2="260" y2="190" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>

  <!-- Highlighted forward path (red) -->
  <line x1="50" y1="155" x2="155" y2="155" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="155" y1="155" x2="260" y2="120" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Edge weight labels -->
  <text x="95"  y="148" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">w₁</text>
  <text x="207" y="128" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">w₂</text>

  <!-- Input nodes -->
  <circle cx="50" cy="90"  r="13" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="50" cy="155" r="13" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="50" cy="220" r="13" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Hidden nodes -->
  <circle cx="155" cy="90"  r="13" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="155" cy="155" r="13" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="155" cy="220" r="13" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Output nodes -->
  <circle cx="260" cy="120" r="13" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="260" cy="190" r="13" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Node labels -->
  <text x="50"  y="94"  text-anchor="middle" font-size="8" fill="#5C3D1E">x₁</text>
  <text x="50"  y="159" text-anchor="middle" font-size="8" fill="#5C3D1E">x₂</text>
  <text x="50"  y="224" text-anchor="middle" font-size="8" fill="#5C3D1E">x₃</text>
  <text x="155" y="94"  text-anchor="middle" font-size="8" fill="#5C3D1E">h₁</text>
  <text x="155" y="159" text-anchor="middle" font-size="8" fill="#5C3D1E">h₂</text>
  <text x="155" y="224" text-anchor="middle" font-size="8" fill="#5C3D1E">h₃</text>
  <text x="260" y="124" text-anchor="middle" font-size="8" fill="#5C3D1E">ŷ₁</text>
  <text x="260" y="194" text-anchor="middle" font-size="8" fill="#5C3D1E">ŷ₂</text>

  <!-- Bottom label -->
  <text x="145" y="278" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">activations flow →</text>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 2: BACKWARD PASS ══ -->
  <text x="450" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">BACKWARD PASS</text>

  <!-- All connections (blue) -->
  <line x1="360" y1="90"  x2="465" y2="90"  stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="90"  x2="465" y2="155" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="90"  x2="465" y2="220" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="155" x2="465" y2="90"  stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="155" x2="465" y2="220" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="220" x2="465" y2="90"  stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="220" x2="465" y2="155" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="220" x2="465" y2="220" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="465" y1="90"  x2="565" y2="120" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="465" y1="90"  x2="565" y2="190" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="465" y1="155" x2="565" y2="190" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="465" y1="220" x2="565" y2="120" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="465" y1="220" x2="565" y2="190" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>

  <!-- Loss box -->
  <rect x="568" y="108" width="24" height="24" fill="#EDE5D0" stroke="#5C3D1E" stroke-width="1.5" rx="3"/>
  <text x="580" y="124" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">L</text>

  <!-- Arrow from loss into output node 1 -->
  <line x1="566" y1="120" x2="580" y2="120" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-loss)"/>

  <!-- Gradient arrows (backward, red) -->
  <line x1="565" y1="120" x2="465" y2="155" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="465" y1="155" x2="360" y2="155" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Gradient labels -->
  <text x="518" y="127" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">∂L/∂w₂</text>
  <text x="412" y="148" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">∂L/∂w₁</text>

  <!-- Input nodes (right panel) -->
  <circle cx="360" cy="90"  r="13" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <circle cx="360" cy="155" r="13" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="360" cy="220" r="13" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <!-- Hidden nodes (right panel) -->
  <circle cx="465" cy="90"  r="13" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <circle cx="465" cy="155" r="13" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="465" cy="220" r="13" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <!-- Output nodes (right panel) -->
  <circle cx="565" cy="120" r="13" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="565" cy="190" r="13" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- Node labels (right panel) -->
  <text x="360" y="94"  text-anchor="middle" font-size="8" fill="#5C3D1E">x₁</text>
  <text x="360" y="159" text-anchor="middle" font-size="8" fill="#5C3D1E">x₂</text>
  <text x="360" y="224" text-anchor="middle" font-size="8" fill="#5C3D1E">x₃</text>
  <text x="465" y="94"  text-anchor="middle" font-size="8" fill="#5C3D1E">h₁</text>
  <text x="465" y="159" text-anchor="middle" font-size="8" fill="#5C3D1E">h₂</text>
  <text x="465" y="224" text-anchor="middle" font-size="8" fill="#5C3D1E">h₃</text>
  <text x="565" y="124" text-anchor="middle" font-size="8" fill="#5C3D1E">ŷ₁</text>
  <text x="565" y="194" text-anchor="middle" font-size="8" fill="#5C3D1E">ŷ₂</text>

  <!-- Chain rule annotation -->
  <text x="450" y="248" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">∂L/∂w₁ = ∂L/∂h · ∂h/∂w₁</text>

  <!-- Bottom label -->
  <text x="450" y="278" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">← gradients flow</text>

  <!-- Bottom caption -->
  <text x="300" y="302" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    Backprop applies the chain rule layer by layer — gradients flow backward through every weight
  </text>
</svg>
