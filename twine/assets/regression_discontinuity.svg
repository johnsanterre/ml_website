<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <defs>
    <marker id="arr-rdd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E">REGRESSION DISCONTINUITY DESIGN</text>

  <!-- Main RDD plot -->
  <text x="310" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">OUTCOME vs. RUNNING VARIABLE</text>

  <!-- Axes -->
  <line x1="80" y1="310" x2="560" y2="310" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-rdd)"/>
  <line x1="80" y1="310" x2="80" y2="70" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-rdd)"/>
  <text x="565" y="314" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">x (running variable)</text>
  <text x="55" y="68" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" transform="rotate(-90,55,68) translate(-120,0)">Outcome Y</text>

  <!-- Control side regression line (left of cutoff) -->
  <!-- scatter left -->
  <circle cx="100" cy="280" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="118" cy="268" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="135" cy="258" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="152" cy="248" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="170" cy="262" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="188" cy="243" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="205" cy="235" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="222" cy="228" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="240" cy="240" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="257" cy="220" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="274" cy="215" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="292" cy="205" r="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <!-- fit line left -->
  <line x1="92" y1="284" x2="306" y2="200" stroke="#2D5A8E" stroke-width="2.2"/>

  <!-- Cutoff vertical line -->
  <line x1="320" y1="70" x2="320" y2="320" stroke="#7C2530" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="320" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530">cutoff</text>
  <text x="320" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">c = 70</text>

  <!-- Treatment side scatter (higher) -->
  <circle cx="338" cy="148" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="356" cy="155" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="374" cy="145" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="392" cy="138" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="410" cy="152" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="428" cy="128" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="446" cy="122" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="464" cy="135" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="482" cy="115" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="500" cy="110" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="518" cy="120" r="3" fill="#7C2530" fill-opacity="0.8"/>
  <!-- fit line right -->
  <line x1="330" y1="155" x2="540" y2="105" stroke="#7C2530" stroke-width="2.2"/>

  <!-- Discontinuity gap arrow -->
  <line x1="320" y1="200" x2="320" y2="155" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arr-rdd)"/>
  <text x="340" y="195" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#C4A87A">τ</text>
  <text x="355" y="180" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">treatment</text>
  <text x="355" y="194" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">effect</text>

  <!-- Labels: control, treatment -->
  <text x="195" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Control (below cutoff)</text>
  <text x="440" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">Treatment (above cutoff)</text>

  <!-- Right panel: bandwidth & local randomization -->
  <rect x="600" y="55" width="180" height="260" fill="#C4A87A" fill-opacity="0.1" stroke="#C4A87A" stroke-width="1.5" rx="5"/>
  <text x="690" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">KEY CONCEPTS</text>

  <text x="618" y="100" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">Running variable:</text>
  <text x="618" y="115" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">Continuous score x</text>
  <text x="618" y="130" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">that determines treatment</text>

  <text x="618" y="158" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">Bandwidth h:</text>
  <text x="618" y="173" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">window [c−h, c+h]</text>
  <text x="618" y="188" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">around cutoff</text>

  <text x="618" y="216" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">Sharp RDD:</text>
  <text x="618" y="231" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">Treatment flips 0→1</text>
  <text x="618" y="246" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">exactly at cutoff</text>

  <text x="618" y="274" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">Fuzzy RDD:</text>
  <text x="618" y="289" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">Probability of treatment</text>
  <text x="618" y="304" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">jumps at cutoff</text>

  <!-- Bottom bar -->
  <rect x="30" y="335" width="740" height="48" fill="#2D5A8E" fill-opacity="0.07" stroke="#2D5A8E" stroke-width="1" rx="4"/>
  <text x="400" y="354" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Key assumption: units just below and just above the cutoff are nearly identical — the only difference is treatment.</text>
  <text x="400" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Causal effect τ = lim_{x↓c} E[Y|x] − lim_{x↑c} E[Y|x]  (local average treatment effect at the cutoff)</text>
</svg>
