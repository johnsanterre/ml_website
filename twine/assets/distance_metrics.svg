<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ DIVIDERS ══ -->
  <line x1="267" y1="20" x2="267" y2="378" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="534" y1="20" x2="534" y2="378" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ══ PANEL 1: EUCLIDEAN DISTANCE ══ -->
  <text x="133" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">EUCLIDEAN DISTANCE</text>

  <!-- Grid -->
  <line x1="40" y1="340" x2="240" y2="340" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="40" y1="340" x2="40"  y2="80"  stroke="#D4C5A9" stroke-width="1"/>
  <!-- Tick marks -->
  <line x1="40" y1="270" x2="38" y2="270" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="40" y1="200" x2="38" y2="200" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="40" y1="130" x2="38" y2="130" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="110" y1="340" x2="110" y2="342" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="180" y1="340" x2="180" y2="342" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Point A -->
  <circle cx="65" cy="290" r="5" fill="#7C2530"/>
  <text x="52" y="283" font-size="10" fill="#7C2530" font-weight="bold">A</text>
  <text x="50" y="298" font-size="8" fill="#6B5D4F">(1,2)</text>

  <!-- Point B -->
  <circle cx="205" cy="130" r="5" fill="#2D5A8E"/>
  <text x="210" y="128" font-size="10" fill="#2D5A8E" font-weight="bold">B</text>
  <text x="207" y="140" font-size="8" fill="#6B5D4F">(5,7)</text>

  <!-- Straight line A to B (Euclidean) -->
  <line x1="65" y1="290" x2="205" y2="130" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="0"/>

  <!-- Distance label on the line -->
  <text x="128" y="196" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic" transform="rotate(-49,128,196)">d = √41 ≈ 6.40</text>

  <!-- Formula -->
  <rect x="30" y="350" width="214" height="24" rx="3" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1"/>
  <text x="137" y="366" text-anchor="middle" font-size="9" fill="#5C3D1E">d = √( (x₂−x₁)² + (y₂−y₁)² )</text>

  <!-- ══ PANEL 2: MANHATTAN DISTANCE ══ -->
  <text x="400" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">MANHATTAN DISTANCE</text>

  <!-- Grid lines -->
  <line x1="308" y1="340" x2="508" y2="340" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="308" y1="340" x2="308" y2="80"  stroke="#D4C5A9" stroke-width="1"/>
  <!-- Vertical grid -->
  <line x1="378" y1="80" x2="378" y2="340" stroke="#EDE5D0" stroke-width="1"/>
  <line x1="448" y1="80" x2="448" y2="340" stroke="#EDE5D0" stroke-width="1"/>
  <!-- Horizontal grid -->
  <line x1="308" y1="270" x2="508" y2="270" stroke="#EDE5D0" stroke-width="1"/>
  <line x1="308" y1="200" x2="508" y2="200" stroke="#EDE5D0" stroke-width="1"/>
  <line x1="308" y1="130" x2="508" y2="130" stroke="#EDE5D0" stroke-width="1"/>

  <!-- Point A -->
  <circle cx="333" cy="290" r="5" fill="#7C2530"/>
  <text x="320" y="283" font-size="10" fill="#7C2530" font-weight="bold">A</text>
  <text x="318" y="298" font-size="8" fill="#6B5D4F">(1,2)</text>

  <!-- Point B -->
  <circle cx="473" cy="130" r="5" fill="#2D5A8E"/>
  <text x="478" y="128" font-size="10" fill="#2D5A8E" font-weight="bold">B</text>
  <text x="475" y="140" font-size="8" fill="#6B5D4F">(5,7)</text>

  <!-- City-block path: right then up -->
  <polyline points="333,290 473,290 473,130" fill="none" stroke="#5C8A2E" stroke-width="2.5"/>
  <!-- Dashed diagonal for reference -->
  <line x1="333" y1="290" x2="473" y2="130" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Dimension labels -->
  <text x="403" y="308" text-anchor="middle" font-size="8.5" fill="#5C8A2E">Δx = 4</text>
  <text x="488" y="215" text-anchor="middle" font-size="8.5" fill="#5C8A2E">Δy = 5</text>

  <!-- Formula -->
  <rect x="298" y="350" width="214" height="24" rx="3" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1"/>
  <text x="405" y="366" text-anchor="middle" font-size="9" fill="#5C3D1E">d = |x₂−x₁| + |y₂−y₁| = 9</text>

  <!-- ══ PANEL 3: COSINE SIMILARITY ══ -->
  <text x="666" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">COSINE SIMILARITY</text>

  <!-- Origin -->
  <circle cx="565" cy="310" r="3" fill="#5C3D1E"/>
  <text x="555" y="325" font-size="9" fill="#5C3D1E">O</text>

  <!-- Arc for angle theta -->
  <path d="M 609,310 A 44,44 0 0 0 585,270" fill="none" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="600" y="287" font-size="10" fill="#C4A87A" font-style="italic">θ</text>

  <!-- Vector A -->
  <line x1="565" y1="310" x2="710" y2="175" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="720" y="172" font-size="11" fill="#7C2530" font-weight="bold">a</text>
  <text x="710" y="184" font-size="8" fill="#6B5D4F">(4, 3)</text>

  <!-- Vector B -->
  <line x1="565" y1="310" x2="660" y2="115" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="663" y="110" font-size="11" fill="#2D5A8E" font-weight="bold">b</text>
  <text x="658" y="122" font-size="8" fill="#6B5D4F">(1, 4)</text>

  <!-- Projection dashed line from tip of b onto a -->
  <line x1="660" y1="115" x2="680" y2="168" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Magnitude labels -->
  <text x="630" y="258" font-size="8.5" fill="#7C2530" font-style="italic">‖a‖ = 5</text>
  <text x="596" y="200" font-size="8.5" fill="#2D5A8E" font-style="italic">‖b‖ = √17</text>

  <!-- Formula box -->
  <rect x="551" y="336" width="232" height="36" rx="3" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1"/>
  <text x="667" y="351" text-anchor="middle" font-size="9" fill="#5C3D1E">cos(θ) = a·b / (‖a‖‖b‖)</text>
  <text x="667" y="365" text-anchor="middle" font-size="9" fill="#5C3D1E">= 16/( 5·√17 ) ≈ 0.776</text>

  <!-- Bottom caption -->
  <text x="400" y="393" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">
    Euclidean measures straight-line gap; Manhattan counts city blocks; Cosine measures angular alignment regardless of magnitude
  </text>
</svg>
