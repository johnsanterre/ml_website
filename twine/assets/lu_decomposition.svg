<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">LU Decomposition: A = LU</text>
  <!-- A matrix -->
  <text x="130" y="80" text-anchor="middle" font-size="18" fill="#333" font-weight="bold">A</text>
  <rect x="70" y="95" width="120" height="120" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="100" y="130" font-size="14" fill="#333">a b c</text>
  <text x="100" y="155" font-size="14" fill="#333">d e f</text>
  <text x="100" y="180" font-size="14" fill="#333">g h i</text>
  <!-- = sign -->
  <text x="220" y="160" font-size="24" fill="#555">=</text>
  <!-- L matrix -->
  <text x="310" y="80" text-anchor="middle" font-size="18" fill="#4CAF50" font-weight="bold">L</text>
  <rect x="250" y="95" width="120" height="120" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="270" y="130" font-size="14" fill="#333">1  0  0</text>
  <text x="270" y="155" font-size="14" fill="#333">l₁ 1  0</text>
  <text x="270" y="180" font-size="14" fill="#333">l₂ l₃ 1</text>
  <text x="310" y="235" text-anchor="middle" font-size="11" fill="#4CAF50">lower triangular</text>
  <!-- x sign -->
  <text x="400" y="160" font-size="24" fill="#555">×</text>
  <!-- U matrix -->
  <text x="500" y="80" text-anchor="middle" font-size="18" fill="#E91E63" font-weight="bold">U</text>
  <rect x="430" y="95" width="130" height="120" rx="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
  <text x="450" y="130" font-size="14" fill="#333">u₁ u₂ u₃</text>
  <text x="450" y="155" font-size="14" fill="#333">0  u₄ u₅</text>
  <text x="450" y="180" font-size="14" fill="#333">0  0  u₆</text>
  <text x="495" y="235" text-anchor="middle" font-size="11" fill="#E91E63">upper triangular</text>
  <!-- Applications -->
  <rect x="600" y="70" width="175" height="200" rx="8" fill="#f9f9f9" stroke="#ddd"/>
  <text x="688" y="95" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Why LU?</text>
  <text x="688" y="120" text-anchor="middle" font-size="12" fill="#2196F3">Solve Ax=b fast</text>
  <text x="688" y="143" text-anchor="middle" font-size="12" fill="#555">Factor once, solve</text>
  <text x="688" y="160" text-anchor="middle" font-size="12" fill="#555">many right-hand sides</text>
  <text x="688" y="190" text-anchor="middle" font-size="12" fill="#E91E63">det(A) = Π uᵢᵢ</text>
  <text x="688" y="215" text-anchor="middle" font-size="12" fill="#555">O(n²) per solve</text>
  <text x="688" y="238" text-anchor="middle" font-size="11" fill="#888">after O(n³) factor</text>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#555">Gaussian elimination in matrix form — backbone of numerical linear algebra</text>
</svg>
