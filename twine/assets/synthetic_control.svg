<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Synthetic Control Method</text>

  <!-- Plot area background -->
  <rect x="70" y="48" width="680" height="270" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="100" y1="55" x2="100" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- X axis -->
  <line x1="100" y1="290" x2="745" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Axis labels -->
  <text x="60" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#555" transform="rotate(-90,60,175)">Outcome</text>
  <text x="420" y="318" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Time</text>

  <!-- Pre-treatment label -->
  <text x="270" y="308" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Pre-treatment</text>
  <!-- Post-treatment label -->
  <text x="560" y="308" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Post-treatment</text>

  <!-- Treatment line (vertical dashed) -->
  <line x1="420" y1="60" x2="420" y2="290" stroke="#e67e22" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="422" y="73" font-family="Arial" font-size="11" fill="#e67e22" font-weight="bold">Treatment</text>

  <!-- PRE-TREATMENT PERIOD: treated and synthetic track together -->
  <!-- Treated unit line (blue, solid) — pre-treatment -->
  <!-- Points along a gently rising curve, closely tracked -->
  <polyline
    points="110,240 145,228 180,218 215,208 250,200 285,192 320,182 355,174 390,166 420,160"
    fill="none" stroke="#2980b9" stroke-width="2.5"/>

  <!-- Synthetic control line (orange dashed) — pre-treatment, nearly identical -->
  <polyline
    points="110,242 145,230 180,219 215,210 250,202 285,194 320,184 355,177 390,169 420,163"
    fill="none" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- POST-TREATMENT PERIOD: treated rises away, synthetic continues its trend -->
  <!-- Treated unit continues upward more steeply -->
  <polyline
    points="420,160 455,148 490,133 525,118 560,104 595,92 630,82 665,74 700,67"
    fill="none" stroke="#2980b9" stroke-width="2.5"/>

  <!-- Synthetic control continues its pre-trend (counterfactual) -->
  <polyline
    points="420,163 455,158 490,153 525,149 560,145 595,141 630,138 665,135 700,132"
    fill="none" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- Treatment effect gap (shaded region, post-treatment) -->
  <polygon
    points="420,160 455,148 490,133 525,118 560,104 595,92 630,82 665,74 700,67 700,132 665,135 630,138 595,141 560,145 525,149 490,153 455,158 420,163"
    fill="#c0392b" fill-opacity="0.12"/>

  <!-- Treatment effect bracket arrow at right -->
  <line x1="700" y1="67" x2="720" y2="67" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="700" y1="132" x2="720" y2="132" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="718" y1="67" x2="718" y2="132" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>
  <text x="730" y="103" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold">Treatment</text>
  <text x="730" y="117" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold">effect = gap</text>

  <!-- Legend -->
  <rect x="115" y="336" width="570" height="52" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <!-- Treated unit -->
  <line x1="130" y1="358" x2="170" y2="358" stroke="#2980b9" stroke-width="2.5"/>
  <circle cx="150" cy="358" r="3.5" fill="#2980b9"/>
  <text x="176" y="362" font-family="Arial" font-size="11" fill="#333">Treated unit (California)</text>
  <!-- Synthetic control -->
  <line x1="130" y1="378" x2="170" y2="378" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="176" y="382" font-family="Arial" font-size="11" fill="#333">Synthetic control (weighted avg. of donor states)</text>
  <!-- Gap -->
  <rect x="390" y="348" width="16" height="16" fill="#c0392b" fill-opacity="0.25" stroke="#c0392b" stroke-width="1"/>
  <text x="412" y="362" font-family="Arial" font-size="11" fill="#333">Treatment effect (gap)</text>
</svg>
