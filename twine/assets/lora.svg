<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: The core idea -->
  <rect x="18" y="28" width="200" height="344" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="118" y="48" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">The Key Insight</text>
  <!-- Full matrix W0 -->
  <text x="118" y="68" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Pretrained weight W₀</text>
  <rect x="44" y="76" width="148" height="52" fill="#EAF2FA" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="118" y="106" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">d × k  (frozen)</text>
  <!-- Plus sign -->
  <text x="118" y="142" font-family="Georgia, serif" font-size="18" fill="#6B5D4F" text-anchor="middle">+</text>
  <!-- Low rank delta W -->
  <text x="118" y="162" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Update ΔW = B · A</text>
  <rect x="44" y="170" width="148" height="52" fill="#FAEAEA" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <text x="118" y="200" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle">d × k  (rank r &lt;&lt; d,k)</text>
  <!-- Decomposition arrows -->
  <text x="118" y="238" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">ΔW decomposed:</text>
  <rect x="44" y="248" width="56" height="52" fill="#FFF3E0" stroke="#C4A87A" stroke-width="1.5" rx="3"/>
  <text x="72" y="272" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">B</text>
  <text x="72" y="289" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">d × r</text>
  <text x="106" y="279" font-family="Georgia, serif" font-size="14" fill="#6B5D4F" text-anchor="middle">×</text>
  <rect x="118" y="248" width="74" height="26" fill="#FFF3E0" stroke="#C4A87A" stroke-width="1.5" rx="3"/>
  <text x="155" y="265" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">A</text>
  <rect x="118" y="280" width="74" height="20" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="155" y="294" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">r × k</text>
  <text x="118" y="324" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Only A and B trained.</text>
  <text x="118" y="338" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">r is typically 4–64.</text>

  <!-- Panel 2: Parameter savings diagram -->
  <rect x="230" y="28" width="210" height="344" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="335" y="48" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">Parameter Savings</text>
  <!-- Full fine-tune bar -->
  <text x="240" y="70" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Full fine-tune</text>
  <rect x="240" y="78" width="180" height="28" fill="#7C2530" rx="2" opacity="0.8"/>
  <text x="330" y="96" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">d × k parameters  (e.g. 3.6M)</text>
  <!-- LoRA r=4 bar -->
  <text x="240" y="122" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">LoRA  r = 4</text>
  <rect x="240" y="130" width="22" height="28" fill="#2D5A8E" rx="2" opacity="0.9"/>
  <text x="420" y="148" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E">~0.1%</text>
  <!-- LoRA r=16 bar -->
  <text x="240" y="174" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">LoRA  r = 16</text>
  <rect x="240" y="182" width="88" height="28" fill="#2D5A8E" rx="2" opacity="0.7"/>
  <text x="338" y="200" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E">~0.5%</text>
  <!-- LoRA r=64 bar -->
  <text x="240" y="226" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">LoRA  r = 64</text>
  <rect x="240" y="234" width="140" height="28" fill="#2D5A8E" rx="2" opacity="0.55"/>
  <text x="390" y="252" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E">~2%</text>
  <!-- QLoRA note -->
  <rect x="240" y="278" width="190" height="52" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="335" y="296" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">QLoRA</text>
  <text x="335" y="312" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Quantize W₀ to 4-bit NF4.</text>
  <text x="335" y="326" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">LoRA adapters stay fp16.</text>
  <text x="335" y="350" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Fine-tune 65B on a single GPU.</text>

  <!-- Panel 3: Training and inference flow -->
  <rect x="453" y="28" width="327" height="344" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="616" y="48" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">Training &amp; Deployment</text>
  <!-- Training phase -->
  <rect x="463" y="58" width="307" height="90" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="479" y="76" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" font-weight="bold">Training</text>
  <text x="479" y="93" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">• Freeze W₀ — no gradients flow through it</text>
  <text x="479" y="108" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">• Initialize B = 0, A ~ Normal(0, σ)</text>
  <text x="479" y="123" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">• Optimizer only updates A and B matrices</text>
  <text x="479" y="138" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">• Applied to Q, K, V, or all linear layers</text>
  <!-- Inference options -->
  <rect x="463" y="162" width="307" height="105" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <text x="479" y="180" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">Inference (two options)</text>
  <text x="479" y="198" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-weight="bold">Merged (faster):</text>
  <text x="479" y="213" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Compute W = W₀ + BA. Single weight.</text>
  <text x="479" y="228" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-weight="bold">Separate (flexible):</text>
  <text x="479" y="243" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Keep W₀ shared; swap A/B per adapter.</text>
  <text x="479" y="258" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Serve many tasks from one base model.</text>
  <!-- vs full fine-tune comparison -->
  <rect x="463" y="280" width="307" height="80" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="479" y="298" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-weight="bold">LoRA vs Full Fine-Tune</text>
  <text x="479" y="314" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Params trained: ~0.1–2%  vs  100%</text>
  <text x="479" y="329" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">GPU memory: 2–4×  vs  10–20×  base</text>
  <text x="479" y="344" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Task perf: near-equal on most benchmarks</text>
</svg>
