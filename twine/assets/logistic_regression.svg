<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 1: SIGMOID CURVE ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">SIGMOID CURVE</text>

  <!-- Axes -->
  <line x1="30" y1="260" x2="272" y2="260" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <line x1="151" y1="275" x2="151" y2="32" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>

  <!-- Axis labels -->
  <text x="268" y="273" text-anchor="middle" font-size="9" fill="#6B5D4F">w·x + b</text>
  <text x="18" y="152" text-anchor="middle" font-size="10" fill="#6B5D4F" transform="rotate(-90,18,152)" font-style="italic">p̂</text>

  <!-- y=1 asymptote dashed -->
  <line x1="30" y1="55" x2="272" y2="55" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="36" y="52" font-size="8" fill="#6B5D4F" opacity="0.7">1</text>

  <!-- y=0 asymptote dashed -->
  <line x1="30" y1="258" x2="272" y2="258" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="36" y="270" font-size="8" fill="#6B5D4F" opacity="0.7">0</text>

  <!-- y=0.5 dashed line (blue) -->
  <line x1="30" y1="157" x2="272" y2="157" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="33" y="154" font-size="8" fill="#2D5A8E">0.5</text>

  <!-- Sigmoid curve: smooth S from left to right -->
  <!-- σ(z) = 1/(1+e^(-z)), mapped: z in [-5,5] → x in [30,272], y in [55,258] -->
  <path d="M 30,254 C 55,252 70,248 85,242 C 100,236 110,225 121,210 C 130,197 138,183 148,169 C 153,163 157,157 160,152 C 168,139 175,123 185,111 C 195,100 205,78 220,68 C 235,60 250,57 272,56"
        fill="none" stroke="#7C2530" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Decision threshold dot at (151, 157) -->
  <circle cx="151" cy="157" r="4" fill="#7C2530"/>
  <text x="158" y="148" font-size="8" fill="#7C2530">decision</text>
  <text x="158" y="158" font-size="8" fill="#7C2530">threshold</text>

  <!-- x=0 tick mark -->
  <line x1="151" y1="257" x2="151" y2="263" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="151" y="275" text-anchor="middle" font-size="8" fill="#6B5D4F">0</text>

  <!-- ══ PANEL 2: DECISION BOUNDARY ══ -->
  <text x="443" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">DECISION BOUNDARY</text>

  <!-- Axes -->
  <line x1="310" y1="262" x2="578" y2="262" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <line x1="315" y1="272" x2="315" y2="32" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>

  <!-- Axis labels -->
  <text x="580" y="265" font-size="9" fill="#6B5D4F">x₁</text>
  <text x="308" y="30" font-size="9" fill="#6B5D4F">x₂</text>

  <!-- Decision boundary line: diagonal from (320,260) to (560,40) -->
  <line x1="322" y1="262" x2="562" y2="42" stroke="#7C2530" stroke-width="2" stroke-linecap="round"/>
  <text x="548" y="38" font-size="7.5" fill="#7C2530" text-anchor="middle">w·x+b=0</text>

  <!-- Class labels -->
  <text x="530" y="210" font-size="9" fill="#7C2530" font-style="italic">p̂ &gt; 0.5</text>
  <text x="330" y="110" font-size="9" fill="#2D5A8E" font-style="italic">p̂ &lt; 0.5</text>

  <!-- Red circles: class 1 — upper right (above boundary) -->
  <circle cx="490" cy="90"  r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="520" cy="110" r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="540" cy="140" r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="460" cy="80"  r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="555" cy="170" r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="500" cy="60"  r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="475" cy="120" r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="530" cy="85"  r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="560" cy="130" r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="445" cy="95"  r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="505" cy="145" r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="470" cy="55"  r="5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>

  <!-- Blue squares: class 0 — lower left (below boundary) -->
  <rect x="325" y="200" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="345" y="230" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="360" y="205" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="378" y="240" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="325" y="170" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="350" y="180" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="395" y="235" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="370" y="215" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="338" y="250" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="320" y="140" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="410" y="220" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="385" y="195" width="9" height="9" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>

  <!-- Log-odds dashed line from red point (490,90) perpendicular to boundary -->
  <!-- Boundary direction: (562-322, 42-262) = (240,-220), perp: (220,240) normalized -->
  <!-- From (490,90): foot of perpendicular approx at (432,148) -->
  <line x1="490" y1="90" x2="432" y2="148" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="446" y="108" font-size="8" fill="#2D5A8E" transform="rotate(-43,446,108)">log-odds</text>

  <!-- Bottom caption -->
  <text x="300" y="302" text-anchor="middle" font-size="9" fill="#6B5D4F">
    σ(w·x + b) maps any linear score to a probability in (0, 1)
  </text>
</svg>
