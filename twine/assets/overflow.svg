<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#333" font-size="17" font-weight="bold">Floating-Point Overflow: From Finite to ∞ to NaN</text>

  <!-- ===== NUMBER LINE SECTION ===== -->
  <!-- Axis line -->
  <line x1="60" y1="110" x2="620" y2="110" stroke="#555" stroke-width="2"/>
  <!-- Arrow head -->
  <polygon points="620,110 610,105 610,115" fill="#555"/>

  <!-- Representable range band (green) -->
  <rect x="60" y="94" width="420" height="32" rx="4" fill="#4A7C59" opacity="0.18"/>
  <line x1="60" y1="94" x2="60" y2="126" stroke="#4A7C59" stroke-width="2"/>
  <line x1="480" y1="94" x2="480" y2="126" stroke="#4A7C59" stroke-width="2"/>
  <text x="270" y="88" text-anchor="middle" fill="#4A7C59" font-size="12" font-weight="bold">Representable float range</text>
  <text x="60" y="145" text-anchor="middle" fill="#555" font-size="11">−MAX_FLOAT</text>
  <text x="480" y="145" text-anchor="middle" fill="#555" font-size="11">+MAX_FLOAT</text>
  <text x="270" y="145" text-anchor="middle" fill="#4A7C59" font-size="11">≈ ±3.4 × 10³⁸  (float32)</text>

  <!-- Overflow cliff (red) -->
  <rect x="480" y="94" width="80" height="32" rx="0" fill="#C0392B" opacity="0.22"/>
  <text x="520" y="88" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="bold">Overflow cliff</text>
  <text x="520" y="145" text-anchor="middle" fill="#C0392B" font-size="11">x &gt; MAX_FLOAT</text>

  <!-- Inf label -->
  <rect x="560" y="94" width="55" height="32" rx="4" fill="#C0392B" opacity="0.55"/>
  <text x="587" y="115" text-anchor="middle" fill="white" font-size="15" font-weight="bold">+∞</text>

  <!-- Label for axis -->
  <text x="632" y="114" fill="#555" font-size="12">value →</text>

  <!-- Zero tick -->
  <line x1="270" y1="104" x2="270" y2="116" stroke="#888" stroke-width="1.5"/>
  <text x="270" y="160" text-anchor="middle" fill="#888" font-size="11">0</text>

  <!-- ===== NaN PROPAGATION SECTION ===== -->
  <text x="400" y="198" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">NaN Propagation: ∞ / ∞ poisons every downstream value</text>

  <!-- Box: ∞ + ∞ = ∞ -->
  <rect x="55" y="213" width="130" height="44" rx="6" fill="#fff3e0" stroke="#E07B39" stroke-width="1.5"/>
  <text x="120" y="231" text-anchor="middle" fill="#E07B39" font-size="12" font-weight="bold">∞ + ∞  =  ∞</text>
  <text x="120" y="248" text-anchor="middle" fill="#888" font-size="11">still Inf</text>

  <!-- Arrow -->
  <line x1="185" y1="235" x2="215" y2="235" stroke="#555" stroke-width="1.5"/>
  <polygon points="215,235 207,230 207,240" fill="#555"/>

  <!-- Box: ∞ / ∞ = NaN -->
  <rect x="215" y="213" width="130" height="44" rx="6" fill="#fdecea" stroke="#C0392B" stroke-width="2"/>
  <text x="280" y="231" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="bold">∞ / ∞  =  NaN</text>
  <text x="280" y="248" text-anchor="middle" fill="#888" font-size="11">indeterminate form</text>

  <!-- Arrow -->
  <line x1="345" y1="235" x2="375" y2="235" stroke="#555" stroke-width="1.5"/>
  <polygon points="375,235 367,230 367,240" fill="#555"/>

  <!-- Box: NaN + anything = NaN -->
  <rect x="375" y="213" width="175" height="44" rx="6" fill="#fdecea" stroke="#C0392B" stroke-width="2"/>
  <text x="462" y="231" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="bold">NaN + x  =  NaN</text>
  <text x="462" y="248" text-anchor="middle" fill="#888" font-size="11">propagates forever</text>

  <!-- Arrow -->
  <line x1="550" y1="235" x2="580" y2="235" stroke="#555" stroke-width="1.5"/>
  <polygon points="580,235 572,230 572,240" fill="#555"/>

  <!-- Box: loss = NaN -->
  <rect x="580" y="213" width="150" height="44" rx="6" fill="#C0392B" opacity="0.8"/>
  <text x="655" y="231" text-anchor="middle" fill="white" font-size="12" font-weight="bold">loss = NaN</text>
  <text x="655" y="248" text-anchor="middle" fill="#fdecea" font-size="11">training collapses</text>

  <!-- ===== EXPLODING GRADIENTS SECTION ===== -->
  <text x="400" y="298" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Exploding Gradients in Deep Learning</text>

  <!-- Layer boxes with growing gradient arrows -->
  <rect x="55" y="314" width="80" height="44" rx="5" fill="#e8f4f8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="95" y="332" text-anchor="middle" fill="#2C5F8A" font-size="11" font-weight="bold">Layer 1</text>
  <text x="95" y="349" text-anchor="middle" fill="#555" font-size="10">∇W = 0.8</text>

  <line x1="135" y1="336" x2="165" y2="336" stroke="#E07B39" stroke-width="2"/>
  <polygon points="165,336 157,331 157,341" fill="#E07B39"/>

  <rect x="165" y="314" width="80" height="44" rx="5" fill="#e8f4f8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="205" y="332" text-anchor="middle" fill="#2C5F8A" font-size="11" font-weight="bold">Layer 2</text>
  <text x="205" y="349" text-anchor="middle" fill="#555" font-size="10">∇W = 12</text>

  <line x1="245" y1="336" x2="275" y2="336" stroke="#E07B39" stroke-width="3"/>
  <polygon points="275,336 267,331 267,341" fill="#E07B39"/>

  <rect x="275" y="314" width="80" height="44" rx="5" fill="#e8f4f8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="315" y="332" text-anchor="middle" fill="#2C5F8A" font-size="11" font-weight="bold">Layer 3</text>
  <text x="315" y="349" text-anchor="middle" fill="#555" font-size="10">∇W = 950</text>

  <line x1="355" y1="336" x2="385" y2="336" stroke="#C0392B" stroke-width="4"/>
  <polygon points="385,336 377,331 377,341" fill="#C0392B"/>

  <rect x="385" y="314" width="80" height="44" rx="5" fill="#fdecea" stroke="#C0392B" stroke-width="2"/>
  <text x="425" y="332" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="bold">Layer 4</text>
  <text x="425" y="349" text-anchor="middle" fill="#C0392B" font-size="10">∇W = 8×10⁷</text>

  <line x1="465" y1="336" x2="495" y2="336" stroke="#C0392B" stroke-width="5"/>
  <polygon points="495,336 487,331 487,341" fill="#C0392B"/>

  <rect x="495" y="314" width="100" height="44" rx="5" fill="#C0392B" opacity="0.8"/>
  <text x="545" y="332" text-anchor="middle" fill="white" font-size="11" font-weight="bold">W ← ∞</text>
  <text x="545" y="349" text-anchor="middle" fill="#fdecea" font-size="10">overflow</text>

  <!-- Gradient clip annotation -->
  <rect x="620" y="310" width="155" height="52" rx="6" fill="#f0f9f0" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="697" y="328" text-anchor="middle" fill="#4A7C59" font-size="11" font-weight="bold">Fix: gradient clipping</text>
  <text x="697" y="343" text-anchor="middle" fill="#555" font-size="10">‖g‖ &gt; threshold?</text>
  <text x="697" y="356" text-anchor="middle" fill="#555" font-size="10">scale g down to threshold</text>

  <!-- Legend -->
  <line x1="55" y1="388" x2="85" y2="388" stroke="#4A7C59" stroke-width="3"/>
  <text x="90" y="392" fill="#4A7C59" font-size="11">Safe (finite)</text>
  <line x1="175" y1="388" x2="205" y2="388" stroke="#E07B39" stroke-width="3"/>
  <text x="210" y="392" fill="#E07B39" font-size="11">Growing</text>
  <line x1="285" y1="388" x2="315" y2="388" stroke="#C0392B" stroke-width="3"/>
  <text x="320" y="392" fill="#C0392B" font-size="11">Overflow / NaN</text>
  <rect x="430" y="381" width="14" height="14" rx="2" fill="#2C5F8A" opacity="0.5"/>
  <text x="450" y="392" fill="#2C5F8A" font-size="11">Network layer</text>
</svg>
