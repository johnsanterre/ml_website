<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="28" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e" text-anchor="middle">The Monty Hall Problem</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT PANEL: 3 Doors                                     -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="195" y="52" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">Game show setup</text>

  <!-- Door 1 -->
  <rect x="40" y="60" width="90" height="130" rx="6" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="55" y="75" width="25" height="35" rx="2" fill="#ffffff" opacity="0.25"/>
  <rect x="90" y="75" width="25" height="35" rx="2" fill="#ffffff" opacity="0.25"/>
  <circle cx="88" cy="132" r="5" fill="#ffd166"/>
  <text x="85" y="208" font-family="sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">Door 1</text>
  <text x="85" y="222" font-family="sans-serif" font-size="10" fill="#4a7fb5" text-anchor="middle">your pick</text>

  <!-- Door 2 (goat revealed) -->
  <rect x="150" y="60" width="90" height="130" rx="6" fill="#e8e8e8" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Goat icon (simple) -->
  <ellipse cx="195" cy="140" rx="18" ry="12" fill="#888"/>
  <ellipse cx="207" cy="128" rx="10" ry="8" fill="#888"/>
  <line x1="186" y1="152" x2="183" y2="168" stroke="#888" stroke-width="2"/>
  <line x1="192" y1="152" x2="190" y2="168" stroke="#888" stroke-width="2"/>
  <line x1="198" y1="152" x2="200" y2="168" stroke="#888" stroke-width="2"/>
  <line x1="204" y1="152" x2="206" y2="168" stroke="#888" stroke-width="2"/>
  <!-- Horns -->
  <line x1="201" y1="122" x2="198" y2="113" stroke="#888" stroke-width="2"/>
  <line x1="212" y1="122" x2="216" y2="113" stroke="#888" stroke-width="2"/>
  <text x="195" y="208" font-family="sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">Door 2</text>
  <text x="195" y="222" font-family="sans-serif" font-size="10" fill="#e05c5c" text-anchor="middle">host opens (goat)</text>

  <!-- Door 3 -->
  <rect x="260" y="60" width="90" height="130" rx="6" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="275" y="75" width="25" height="35" rx="2" fill="#ffffff" opacity="0.25"/>
  <rect x="310" y="75" width="25" height="35" rx="2" fill="#ffffff" opacity="0.25"/>
  <circle cx="308" cy="132" r="5" fill="#ffd166"/>
  <text x="305" y="208" font-family="sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">Door 3</text>
  <text x="305" y="222" font-family="sans-serif" font-size="10" fill="#4a7fb5" text-anchor="middle">switch target</text>

  <!-- Question: stay or switch? -->
  <rect x="40" y="232" width="310" height="36" rx="6" fill="#f5f0ff" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="195" y="250" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e" text-anchor="middle">Stay with Door 1, or switch to Door 3?</text>
  <text x="195" y="263" font-family="sans-serif" font-size="11" fill="#555" text-anchor="middle">One door hides the car · Two doors hide goats</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Probability Tree                           -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="590" y="52" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">Probability tree (car behind each door)</text>

  <!-- Root node -->
  <circle cx="420" cy="85" r="18" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="420" y="90" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">start</text>

  <!-- Branch labels above branches -->
  <!-- Three branches from root: car behind 1, 2, or 3 -->
  <!-- Car behind Door 1 (left) -->
  <line x1="413" y1="102" x2="490" y2="155" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="438" y="127" font-family="sans-serif" font-size="10" fill="#1a1a2e" text-anchor="middle">1/3</text>
  <circle cx="497" cy="163" r="16" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="497" y="168" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">car=1</text>

  <!-- Car behind Door 2 (middle) -->
  <line x1="420" y1="103" x2="590" y2="155" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="510" y="122" font-family="sans-serif" font-size="10" fill="#1a1a2e" text-anchor="middle">1/3</text>
  <circle cx="597" cy="163" r="16" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="597" y="168" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">car=2</text>

  <!-- Car behind Door 3 (right) -->
  <line x1="427" y1="102" x2="688" y2="155" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="575" y="120" font-family="sans-serif" font-size="10" fill="#1a1a2e" text-anchor="middle">1/3</text>
  <circle cx="695" cy="163" r="16" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="695" y="168" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">car=3</text>

  <!-- From car=1: stay wins -->
  <line x1="497" y1="179" x2="497" y2="228" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="450" y="228" width="94" height="36" rx="5" fill="#4caf50" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="497" y="244" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">STAY wins</text>
  <text x="497" y="257" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">P = 1/3</text>

  <!-- From car=2: host opens 2, switch to 3 wins -->
  <line x1="590" y1="179" x2="570" y2="228" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="604" y1="179" x2="624" y2="228" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- host opens 2 is impossible (car is behind 2) — actually host can't open car door
       car=2: host must open door 3 (only goat door left) → switch to 3 = lose, stay = lose
       Wait — you picked door 1. Car is behind 2. Host opens 3 (goat). Switch to 2 = win. -->
  <rect x="527" y="228" width="86" height="36" rx="5" fill="#e05c5c" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="570" y="244" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">STAY loses</text>
  <text x="570" y="257" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">P = 1/3</text>
  <rect x="581" y="228" width="94" height="36" rx="5" fill="#4caf50" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="628" y="244" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">SWITCH wins</text>
  <text x="628" y="257" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">P = 1/3</text>

  <!-- From car=3: switch wins -->
  <line x1="695" y1="179" x2="748" y2="228" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="701" y="228" width="94" height="36" rx="5" fill="#4caf50" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="748" y="244" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">SWITCH wins</text>
  <text x="748" y="257" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">P = 1/3</text>

  <!-- Summary row -->
  <rect x="420" y="290" width="360" height="50" rx="6" fill="#f5f0ff" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="600" y="311" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e" text-anchor="middle">Stay wins:  1/3    |    Switch wins:  2/3</text>
  <text x="600" y="329" font-family="sans-serif" font-size="11" fill="#555" text-anchor="middle">Switching collects both "car behind 2" and "car behind 3" branches</text>

  <!-- Divider -->
  <line x1="390" y1="45" x2="390" y2="355" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
