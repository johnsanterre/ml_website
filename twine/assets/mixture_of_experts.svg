<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Input Token -->
  <text x="110" y="28" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">INPUT TOKEN</text>
  <rect x="60" y="38" width="100" height="36" rx="5" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="110" y="61" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-style="italic">"the bank"</text>

  <!-- Arrow down to Router -->
  <line x1="110" y1="74" x2="110" y2="105" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Router box -->
  <text x="110" y="98" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">ROUTER (GATING NETWORK)</text>
  <rect x="40" y="108" width="140" height="38" rx="5" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="110" y="123" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle">Softmax Gate</text>
  <text x="110" y="138" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">Top-2 Selection</text>

  <!-- Arrows to experts -->
  <line x1="80" y1="146" x2="200" y2="188" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="110" y1="146" x2="400" y2="188" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="130" y1="146" x2="600" y2="188" stroke="#B0A090" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="138" y1="146" x2="750" y2="220" stroke="#B0A090" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Panel 2: Expert FFN blocks -->
  <text x="260" y="172" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">EXPERT FFN LAYERS</text>

  <!-- Expert 1 (active) -->
  <rect x="155" y="192" width="92" height="52" rx="5" fill="#2D5A8E" opacity="0.18" stroke="#2D5A8E" stroke-width="2"/>
  <text x="201" y="214" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Expert 1</text>
  <text x="201" y="230" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Finance</text>
  <text x="201" y="244" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">w = 0.72 ✓</text>

  <!-- Expert 2 (active) -->
  <rect x="355" y="192" width="92" height="52" rx="5" fill="#2D5A8E" opacity="0.18" stroke="#2D5A8E" stroke-width="2"/>
  <text x="401" y="214" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Expert 2</text>
  <text x="401" y="230" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Geography</text>
  <text x="401" y="244" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">w = 0.21 ✓</text>

  <!-- Expert 3 (inactive) -->
  <rect x="555" y="192" width="92" height="52" rx="5" fill="#C4A87A" opacity="0.12" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="601" y="214" font-family="Georgia,serif" font-size="12" fill="#C4A87A" text-anchor="middle">Expert 3</text>
  <text x="601" y="230" font-family="Georgia,serif" font-size="10" fill="#C4A87A" text-anchor="middle">Code</text>
  <text x="601" y="244" font-family="Georgia,serif" font-size="9" fill="#C4A87A" text-anchor="middle">w = 0.05 ✗</text>

  <!-- Expert 4 (inactive) -->
  <rect x="688" y="208" width="92" height="36" rx="5" fill="#C4A87A" opacity="0.08" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="734" y="226" font-family="Georgia,serif" font-size="12" fill="#C4A87A" text-anchor="middle" opacity="0.6">Expert N</text>
  <text x="734" y="240" font-family="Georgia,serif" font-size="9" fill="#C4A87A" text-anchor="middle" opacity="0.5">skipped</text>

  <!-- Arrows from active experts to weighted sum -->
  <line x1="201" y1="244" x2="300" y2="298" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="401" y1="244" x2="350" y2="298" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Weighted sum box -->
  <text x="325" y="293" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">WEIGHTED SUM</text>
  <rect x="255" y="300" width="140" height="38" rx="5" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="325" y="315" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">∑ gᵢ · FFNᵢ(x)</text>
  <text x="325" y="330" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">only top-k experts fire</text>

  <!-- Arrow to output -->
  <line x1="325" y1="338" x2="325" y2="368" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="255" y="368" width="140" height="24" rx="4" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="325" y="384" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Output</text>

  <!-- Panel 3: Load Balance annotation -->
  <text x="650" y="308" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">LOAD BALANCE LOSS</text>
  <rect x="575" y="315" width="150" height="54" rx="5" fill="#7C2530" opacity="0.08" stroke="#7C2530" stroke-width="1.5"/>
  <text x="650" y="333" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">Prevents all tokens</text>
  <text x="650" y="348" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">routing to same</text>
  <text x="650" y="363" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">expert (collapse)</text>

  <!-- defs for arrowheads -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B5D4F"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>
