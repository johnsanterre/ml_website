<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" font-family="Georgia,serif">
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- LEFT PANEL -->
  <text x="145" y="18" font-size="10" fill="#6B5D4F" letter-spacing="1" text-anchor="middle" font-family="Georgia,serif">OVERFITTING vs REGULARIZED</text>

  <!-- Axes -->
  <line x1="35" y1="260" x2="268" y2="260" stroke="#1C1713" stroke-width="1"/>
  <line x1="35" y1="260" x2="35" y2="35" stroke="#1C1713" stroke-width="1"/>
  <!-- Axis arrows -->
  <polygon points="268,257 274,260 268,263" fill="#1C1713"/>
  <polygon points="32,35 35,29 38,35" fill="#1C1713"/>

  <!-- Data points -->
  <circle cx="50" cy="200" r="4" fill="#5C3D1E"/>
  <circle cx="70" cy="165" r="4" fill="#5C3D1E"/>
  <circle cx="90" cy="140" r="4" fill="#5C3D1E"/>
  <circle cx="110" cy="125" r="4" fill="#5C3D1E"/>
  <circle cx="130" cy="118" r="4" fill="#5C3D1E"/>
  <circle cx="150" cy="120" r="4" fill="#5C3D1E"/>
  <circle cx="170" cy="130" r="4" fill="#5C3D1E"/>
  <circle cx="190" cy="148" r="4" fill="#5C3D1E"/>
  <circle cx="210" cy="172" r="4" fill="#5C3D1E"/>
  <circle cx="230" cy="200" r="4" fill="#5C3D1E"/>
  <circle cx="250" cy="225" r="4" fill="#5C3D1E"/>
  <circle cx="260" cy="235" r="4" fill="#5C3D1E"/>

  <!-- Regularized curve: smooth parabola -->
  <path d="M35,238 Q90,170 150,112 Q210,165 268,242" fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Overfit curve: wiggly polynomial -->
  <path d="M35,238 C45,225 55,205 65,172 C72,148 80,148 90,140 C100,132 105,128 115,122 C122,118 128,120 133,116 C138,112 140,115 148,118 C156,121 160,128 168,132 C176,136 182,145 192,148 C200,151 205,165 218,170 C228,174 238,198 250,225 C255,232 260,237 268,240"
        fill="none" stroke="#C47B35" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Curve labels -->
  <text x="192" y="97" font-size="8.5" fill="#C47B35" font-family="Georgia,serif">overfit (λ=0)</text>
  <text x="186" y="112" font-size="8.5" fill="#7C2530" font-family="Georgia,serif">regularized (λ&gt;0)</text>

  <!-- RIGHT PANEL -->
  <text x="446" y="18" font-size="10" fill="#6B5D4F" letter-spacing="1" text-anchor="middle" font-family="Georgia,serif">L2 WEIGHT PENALTY</text>

  <!-- Contour ellipses: loss surface centered ~(430,155) -->
  <ellipse cx="430" cy="155" rx="90" ry="55" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1"/>
  <ellipse cx="430" cy="155" rx="70" ry="42" fill="#EDE5D0" stroke="#D4C5A9" stroke-width="1"/>
  <ellipse cx="430" cy="155" rx="48" ry="28" fill="#DDD0B0" stroke="#D4C5A9" stroke-width="1"/>
  <ellipse cx="430" cy="155" rx="25" ry="14" fill="#CFBA88" stroke="#C4A87A" stroke-width="1"/>

  <!-- Unregularized minimum -->
  <circle cx="320" cy="85" r="5" fill="#C47B35"/>
  <text x="325" y="80" font-size="8" fill="#C47B35" font-family="Georgia,serif">w* (no reg)</text>

  <!-- L2 ball constraint circle centered at (446,155) r=55 -->
  <circle cx="446" cy="155" r="55" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="487" y="212" font-size="8" fill="#2D5A8E" font-family="Georgia,serif">L2 ball</text>

  <!-- Dashed line from unregularized to L2 min -->
  <line x1="320" y1="85" x2="405" y2="107" stroke="#6B5D4F" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- L2 regularized minimum: where ellipse ~touches L2 ball -->
  <circle cx="405" cy="107" r="5" fill="#7C2530"/>
  <text x="408" y="103" font-size="8" fill="#7C2530" font-family="Georgia,serif">w* (L2)</text>

  <!-- Bottom caption -->
  <text x="300" y="302" font-size="9.5" fill="#6B5D4F" text-anchor="middle" font-family="Georgia,serif">Regularisation shrinks weights toward zero — trading a little bias for a large reduction in variance</text>
</svg>
