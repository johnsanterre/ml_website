<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Timeline setup -->
  <text x="140" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">BEFORE vs AFTER</text>

  <!-- Axes -->
  <line x1="40" y1="330" x2="260" y2="330" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="40" y1="330" x2="40" y2="60" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="150" y="355" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Time</text>
  <text x="18" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,18,200)">Outcome</text>

  <!-- Intervention line -->
  <line x1="150" y1="60" x2="150" y2="330" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="150" y="50" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">Policy</text>

  <!-- Treatment group line -->
  <line x1="50" y1="240" x2="150" y2="200" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="150" y1="200" x2="248" y2="130" stroke="#7C2530" stroke-width="2.5"/>
  <!-- Counterfactual dashed -->
  <line x1="150" y1="200" x2="248" y2="175" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Control group line -->
  <line x1="50" y1="285" x2="150" y2="250" stroke="#2D5A8E" stroke-width="2.5"/>
  <line x1="150" y1="250" x2="248" y2="218" stroke="#2D5A8E" stroke-width="2.5"/>

  <!-- DiD bracket -->
  <line x1="252" y1="130" x2="252" y2="175" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="248" y1="130" x2="256" y2="130" stroke="#7C2530" stroke-width="1"/>
  <line x1="248" y1="175" x2="256" y2="175" stroke="#7C2530" stroke-width="1"/>
  <text x="270" y="155" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-style="italic">DiD</text>

  <!-- Legend -->
  <line x1="48" y1="370" x2="72" y2="370" stroke="#7C2530" stroke-width="2.5"/>
  <text x="76" y="374" font-family="Georgia, serif" font-size="10" fill="#7C2530">Treatment</text>
  <line x1="148" y1="370" x2="172" y2="370" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="176" y="374" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Control</text>
  <line x1="218" y1="370" x2="242" y2="370" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="246" y="374" font-family="Georgia, serif" font-size="10" fill="#7C2530">Counterfactual</text>

  <!-- Divider -->
  <line x1="310" y1="30" x2="310" y2="380" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 2: Parallel Trends -->
  <text x="490" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">PARALLEL TRENDS ASSUMPTION</text>

  <line x1="330" y1="330" x2="560" y2="330" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="330" y1="330" x2="330" y2="60" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Parallel pre-treatment trends -->
  <line x1="340" y1="200" x2="440" y2="160" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="340" y1="260" x2="440" y2="220" stroke="#2D5A8E" stroke-width="2.5"/>

  <!-- Policy line -->
  <line x1="440" y1="60" x2="440" y2="330" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="440" y="50" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">Policy</text>

  <!-- Post: diverge -->
  <line x1="440" y1="160" x2="548" y2="95" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="440" y1="220" x2="548" y2="200" stroke="#2D5A8E" stroke-width="2.5"/>

  <!-- Parallel arrows -->
  <text x="390" y="175" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">same slope</text>
  <text x="390" y="248" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">same slope</text>

  <!-- Divider -->
  <line x1="600" y1="30" x2="600" y2="380" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 3: The Four Numbers -->
  <text x="700" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">THE ESTIMATOR</text>

  <rect x="618" y="55" width="164" height="120" fill="#FDF6E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="700" y="75" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">Group</text>
  <text x="660" y="75" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">Before</text>
  <text x="740" y="75" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">After</text>
  <line x1="618" y1="82" x2="782" y2="82" stroke="#C4A87A" stroke-width="1"/>
  <line x1="700" y1="55" x2="700" y2="175" stroke="#C4A87A" stroke-width="1"/>

  <text x="660" y="108" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">A</text>
  <text x="740" y="108" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">B</text>
  <text x="622" y="108" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="start">Treat.</text>

  <text x="660" y="148" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">C</text>
  <text x="740" y="148" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">D</text>
  <text x="622" y="148" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="start">Control</text>

  <text x="700" y="205" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">DiD = (B − A) − (D − C)</text>
  <text x="700" y="228" font-family="Georgia, serif" font-size="11" fill="#6B5D4F" text-anchor="middle">Treatment effect, net of</text>
  <text x="700" y="244" font-family="Georgia, serif" font-size="11" fill="#6B5D4F" text-anchor="middle">time trend</text>

  <!-- Calendar icon below -->
  <rect x="648" y="270" width="104" height="80" fill="none" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <line x1="648" y1="285" x2="752" y2="285" stroke="#C4A87A" stroke-width="1"/>
  <text x="700" y="300" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">Key assumption:</text>
  <text x="700" y="316" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">parallel counterfactual</text>
  <text x="700" y="332" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">trends</text>
</svg>
