<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E">Weight Decay (L2 Regularization)</text>

  <!-- Left panel: Overfitting illustration -->
  <rect x="30" y="55" width="220" height="315" rx="8" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="140" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530">Without vs. With</text>

  <!-- Axes for without -->
  <text x="140" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">No weight decay:</text>
  <line x1="50" y1="160" x2="210" y2="160" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="50" y1="100" x2="50" y2="165" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Data points -->
  <circle cx="70" cy="145" r="3" fill="#5C3D1E"/>
  <circle cx="95" cy="125" r="3" fill="#5C3D1E"/>
  <circle cx="120" cy="135" r="3" fill="#5C3D1E"/>
  <circle cx="148" cy="120" r="3" fill="#5C3D1E"/>
  <circle cx="170" cy="128" r="3" fill="#5C3D1E"/>
  <circle cx="195" cy="110" r="3" fill="#5C3D1E"/>

  <!-- Overfit curve (wiggly) -->
  <path d="M55,148 Q68,145 70,145 Q82,130 95,125 Q107,140 120,135 Q134,118 148,120 Q159,132 170,128 Q183,112 195,110 Q205,108 215,106" fill="none" stroke="#7C2530" stroke-width="2"/>

  <!-- With weight decay -->
  <text x="140" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">With weight decay:</text>
  <line x1="50" y1="290" x2="210" y2="290" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="50" y1="220" x2="50" y2="295" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Same data points shifted down -->
  <circle cx="70" cy="275" r="3" fill="#5C3D1E"/>
  <circle cx="95" cy="255" r="3" fill="#5C3D1E"/>
  <circle cx="120" cy="265" r="3" fill="#5C3D1E"/>
  <circle cx="148" cy="250" r="3" fill="#5C3D1E"/>
  <circle cx="170" cy="258" r="3" fill="#5C3D1E"/>
  <circle cx="195" cy="240" r="3" fill="#5C3D1E"/>

  <!-- Smooth regularized curve -->
  <path d="M55,278 Q100,265 140,253 Q175,245 215,237" fill="none" stroke="#2D5A8E" stroke-width="2"/>

  <text x="140" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">large weights → complex</text>
  <text x="140" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">small weights → smooth</text>

  <!-- Center panel: Weight distribution -->
  <rect x="268" y="55" width="265" height="315" rx="8" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530">Effect on Weight Distribution</text>

  <!-- Histogram bars: no decay (spread out) -->
  <text x="340" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">no decay</text>
  <rect x="290" y="155" width="20" height="25" fill="#7C2530" opacity="0.6"/>
  <rect x="312" y="130" width="20" height="50" fill="#7C2530" opacity="0.6"/>
  <rect x="334" y="110" width="20" height="70" fill="#7C2530" opacity="0.6"/>
  <rect x="356" y="130" width="20" height="50" fill="#7C2530" opacity="0.6"/>
  <rect x="378" y="155" width="20" height="25" fill="#7C2530" opacity="0.6"/>

  <!-- axis -->
  <line x1="285" y1="180" x2="405" y2="180" stroke="#5C3D1E" stroke-width="1"/>
  <text x="290" y="192" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">−large</text>
  <text x="378" y="192" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">+large</text>

  <!-- Histogram bars: with decay (peaked at 0) -->
  <text x="400" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">with decay (λ=0.01)</text>
  <rect x="310" y="285" width="15" height="18" fill="#2D5A8E" opacity="0.5"/>
  <rect x="327" y="260" width="15" height="43" fill="#2D5A8E" opacity="0.5"/>
  <rect x="344" y="235" width="15" height="68" fill="#2D5A8E" opacity="0.7"/>
  <rect x="361" y="258" width="15" height="45" fill="#2D5A8E" opacity="0.5"/>
  <rect x="378" y="282" width="15" height="21" fill="#2D5A8E" opacity="0.5"/>

  <line x1="305" y1="303" x2="400" y2="303" stroke="#5C3D1E" stroke-width="1"/>
  <text x="345" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">weights squeezed toward 0</text>

  <!-- Formula box -->
  <rect x="415" y="95" width="110" height="75" rx="5" fill="#EDE4D3" stroke="#C4A87A" stroke-width="1"/>
  <text x="470" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">L_total =</text>
  <text x="470" y="132" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">L_task</text>
  <text x="470" y="149" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">+ λ·‖w‖²</text>
  <text x="470" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">penalty term</text>

  <!-- Right panel -->
  <rect x="550" y="55" width="220" height="315" rx="8" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="660" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530">Practical Guide</text>

  <text x="565" y="103" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-weight="bold">Typical values of λ:</text>
  <text x="565" y="118" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1e-4 (light, common)</text>
  <text x="565" y="132" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1e-2 (strong)</text>
  <text x="565" y="146" font-family="Georgia, serif" font-size="10" fill="#7C2530">0 = no regularization</text>

  <line x1="558" y1="158" x2="762" y2="158" stroke="#D4C5A9" stroke-width="1"/>

  <text x="565" y="177" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-weight="bold">Adam vs. SGD:</text>
  <text x="565" y="192" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">AdamW decouples wd</text>
  <text x="565" y="206" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">from gradient update.</text>
  <text x="565" y="220" font-family="Georgia, serif" font-size="10" fill="#7C2530">Adam + L2 ≠ AdamW!</text>

  <line x1="558" y1="232" x2="762" y2="232" stroke="#D4C5A9" stroke-width="1"/>

  <text x="565" y="251" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-weight="bold">What NOT to decay:</text>
  <text x="565" y="266" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">bias terms</text>
  <text x="565" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">LayerNorm scale/shift</text>
  <text x="565" y="294" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Embedding tables</text>

  <line x1="558" y1="306" x2="762" y2="306" stroke="#D4C5A9" stroke-width="1"/>

  <text x="565" y="325" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Effect on update:</text>
  <text x="565" y="340" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">w ← w(1−α·λ) − α·∇L</text>
  <text x="565" y="355" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">shrinks w each step</text>
</svg>
