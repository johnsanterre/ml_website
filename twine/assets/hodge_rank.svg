<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3A6B3A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL 1: PAIRWISE COMPARISON GRAPH ══ -->
  <text x="133" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">PAIRWISE COMPARISONS</text>

  <!-- Node A -->
  <circle cx="80"  cy="100" r="22" fill="#EDE5D0" stroke="#7C2530" stroke-width="2"/>
  <text x="80"  y="105" text-anchor="middle" font-size="13" fill="#7C2530" font-weight="bold">A</text>

  <!-- Node B -->
  <circle cx="200" cy="60"  r="22" fill="#EDE5D0" stroke="#7C2530" stroke-width="2"/>
  <text x="200" y="65"  text-anchor="middle" font-size="13" fill="#7C2530" font-weight="bold">B</text>

  <!-- Node C -->
  <circle cx="200" cy="160" r="22" fill="#EDE5D0" stroke="#7C2530" stroke-width="2"/>
  <text x="200" y="165" text-anchor="middle" font-size="13" fill="#7C2530" font-weight="bold">C</text>

  <!-- Node D -->
  <circle cx="80"  cy="220" r="22" fill="#EDE5D0" stroke="#7C2530" stroke-width="2"/>
  <text x="80"  y="225" text-anchor="middle" font-size="13" fill="#7C2530" font-weight="bold">D</text>

  <!-- Edges with weights: A→B (w=2), B→C (w=1), C→A (w=1 — cycle!), A→D (w=3), B→D (w=2), C→D (w=1) -->
  <!-- A→B -->
  <line x1="101" y1="88"  x2="178" y2="68"  stroke="#7C2530" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="135" y="68"  text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">2</text>
  <!-- B→C -->
  <line x1="200" y1="82"  x2="200" y2="138" stroke="#7C2530" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="213" y="115" text-anchor="start"  font-size="9" fill="#7C2530" font-weight="bold">1</text>
  <!-- C→A  (the cyclic edge: red dashed) -->
  <line x1="180" y1="152" x2="99"  y2="122" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-brown)"/>
  <text x="133" y="148" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">1</text>
  <!-- A→D -->
  <line x1="80"  y1="122" x2="80"  y2="198" stroke="#7C2530" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="64"  y="165" text-anchor="end"    font-size="9" fill="#7C2530" font-weight="bold">3</text>
  <!-- B→D -->
  <line x1="182" y1="75"  x2="99"  y2="208" stroke="#7C2530" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="152" y="158" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">2</text>
  <!-- C→D -->
  <line x1="182" y1="168" x2="100" y2="215" stroke="#7C2530" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="152" y="200" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">1</text>

  <!-- Cycle annotation -->
  <text x="155" y="125" text-anchor="middle" font-size="8" fill="#5C3D1E" font-style="italic">A&gt;B&gt;C&gt;A</text>
  <text x="155" y="136" text-anchor="middle" font-size="8" fill="#5C3D1E" font-style="italic">cyclic!</text>

  <!-- Panel divider -->
  <line x1="270" y1="28" x2="270" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 2: HODGE DECOMPOSITION ══ -->
  <text x="535" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">HODGE DECOMPOSITION</text>

  <!-- Sub-panel headers -->
  <text x="360" y="42" text-anchor="middle" font-size="9" fill="#3A6B3A" letter-spacing="0.5">GRADIENT FLOW</text>
  <text x="360" y="53" text-anchor="middle" font-size="8" fill="#3A6B3A" font-style="italic">(consistent ranking)</text>

  <!-- Consistent ranking sub-graph -->
  <!-- Nodes -->
  <circle cx="310" cy="100" r="16" fill="#E8F0E8" stroke="#3A6B3A" stroke-width="1.8"/>
  <text x="310" cy="100" text-anchor="middle" font-size="11" fill="#3A6B3A" font-weight="bold">
    <tspan x="310" y="105">A</tspan>
  </text>
  <circle cx="390" cy="70"  r="16" fill="#E8F0E8" stroke="#3A6B3A" stroke-width="1.8"/>
  <text x="390" y="75"  text-anchor="middle" font-size="11" fill="#3A6B3A" font-weight="bold">B</text>
  <circle cx="390" cy="135" r="16" fill="#E8F0E8" stroke="#3A6B3A" stroke-width="1.8"/>
  <text x="390" y="140" text-anchor="middle" font-size="11" fill="#3A6B3A" font-weight="bold">C</text>
  <circle cx="310" cy="185" r="16" fill="#E8F0E8" stroke="#3A6B3A" stroke-width="1.8"/>
  <text x="310" y="190" text-anchor="middle" font-size="11" fill="#3A6B3A" font-weight="bold">D</text>

  <!-- Gradient flow edges (no cycle — pure ranking) -->
  <line x1="325" y1="91"  x2="374" y2="75"  stroke="#3A6B3A" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <line x1="390" y1="86"  x2="390" y2="119" stroke="#3A6B3A" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <line x1="310" y1="116" x2="310" y2="169" stroke="#3A6B3A" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <line x1="376" y1="78"  x2="323" y2="177" stroke="#3A6B3A" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <line x1="376" y1="140" x2="323" y2="180" stroke="#3A6B3A" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- Ranking scores -->
  <text x="295" y="102" text-anchor="end" font-size="8" fill="#3A6B3A">s=1.8</text>
  <text x="408" y="72"  text-anchor="start" font-size="8" fill="#3A6B3A">s=1.2</text>
  <text x="408" y="137" text-anchor="start" font-size="8" fill="#3A6B3A">s=0.5</text>
  <text x="295" y="188" text-anchor="end" font-size="8" fill="#3A6B3A">s=0.0</text>

  <!-- Vertical divider in right panel -->
  <line x1="432" y1="28" x2="432" y2="370" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Cyclic residual sub-panel -->
  <text x="540" y="42" text-anchor="middle" font-size="9" fill="#5C3D1E" letter-spacing="0.5">CYCLIC RESIDUAL</text>
  <text x="540" y="53" text-anchor="middle" font-size="8" fill="#5C3D1E" font-style="italic">(harmonic component)</text>

  <!-- Cyclic triangle A-B-C -->
  <circle cx="510" cy="105" r="16" fill="#F5EAD0" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="510" y="110" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">A</text>
  <circle cx="590" cy="70"  r="16" fill="#F5EAD0" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="590" y="75"  text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">B</text>
  <circle cx="590" cy="140" r="16" fill="#F5EAD0" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="590" y="145" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">C</text>
  <!-- Cycle: A→B→C→A -->
  <line x1="526" y1="96"  x2="574" y2="76"  stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-brown)"/>
  <line x1="590" y1="86"  x2="590" y2="124" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-brown)"/>
  <line x1="576" y1="133" x2="524" y2="115" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-brown)"/>
  <!-- D node (isolated from cycle) -->
  <circle cx="510" cy="185" r="16" fill="#F5EAD0" stroke="#D4C5A9" stroke-width="1.4"/>
  <text x="510" y="190" text-anchor="middle" font-size="11" fill="#9B8C7A">D</text>
  <text x="550" y="192" text-anchor="start" font-size="8" fill="#9B8C7A" font-style="italic">no cycle</text>

  <!-- Cycle label -->
  <text x="550" y="108" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">A→B→C→A</text>
  <text x="550" y="119" text-anchor="middle" font-size="8.5" fill="#5C3D1E">cyclic noise</text>

  <!-- Vertical divider -->
  <line x1="650" y1="28" x2="650" y2="370" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- HodgeRank solution panel -->
  <text x="725" y="42" text-anchor="middle" font-size="9" fill="#2D5A8E" letter-spacing="0.5">HODGERANK</text>
  <text x="725" y="53" text-anchor="middle" font-size="8" fill="#2D5A8E" font-style="italic">global ranking</text>

  <!-- Ranked list -->
  <rect x="668" y="62" width="114" height="140" rx="4" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="1.4"/>
  <text x="725" y="82"  text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">#1  A</text>
  <line x1="675" y1="90" x2="775" y2="90" stroke="#2D5A8E" stroke-width="0.7" opacity="0.4"/>
  <text x="725" y="108" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">#2  B</text>
  <line x1="675" y1="116" x2="775" y2="116" stroke="#2D5A8E" stroke-width="0.7" opacity="0.4"/>
  <text x="725" y="134" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">#3  C</text>
  <line x1="675" y1="142" x2="775" y2="142" stroke="#2D5A8E" stroke-width="0.7" opacity="0.4"/>
  <text x="725" y="160" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">#4  D</text>
  <line x1="675" y1="168" x2="775" y2="168" stroke="#2D5A8E" stroke-width="0.7" opacity="0.4"/>
  <text x="725" y="185" text-anchor="middle" font-size="8" fill="#2D5A8E" font-style="italic">least-squares</text>
  <text x="725" y="196" text-anchor="middle" font-size="8" fill="#2D5A8E" font-style="italic">scores s*</text>

  <!-- Decomposition equation -->
  <text x="400" y="240" text-anchor="middle" font-size="10" fill="#6B5D4F" font-weight="bold">f  =  grad(s)  +  curl(γ)  +  harm(h)</text>
  <text x="310" y="256" text-anchor="middle" font-size="8.5" fill="#3A6B3A">↑ consistent ranking</text>
  <text x="540" y="256" text-anchor="middle" font-size="8.5" fill="#5C3D1E">↑ cyclic noise</text>
  <text x="680" y="256" text-anchor="middle" font-size="8.5" fill="#2D5A8E">↑ harmonic</text>

  <!-- Legend -->
  <line x1="290" y1="290" x2="320" y2="290" stroke="#3A6B3A" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <text x="325" y="294" font-size="8.5" fill="#3A6B3A">gradient (consistent ranking)</text>
  <line x1="290" y1="308" x2="320" y2="308" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="4,2" marker-end="url(#arr-brown)"/>
  <text x="325" y="312" font-size="8.5" fill="#5C3D1E">cyclic inconsistency (A&gt;B&gt;C&gt;A)</text>
  <line x1="508" y1="290" x2="538" y2="290" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <text x="543" y="294" font-size="8.5" fill="#2D5A8E">HodgeRank solution</text>

  <!-- Bottom caption -->
  <text x="400" y="348" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    HodgeRank decomposes pairwise comparisons into a consistent global ranking plus irreducible cyclic noise
  </text>
</svg>
