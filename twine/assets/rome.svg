<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Top label -->
  <text x="400" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">ROME — RANK-ONE MODEL EDITING</text>

  <!-- Left panel: FFN as key-value store -->
  <text x="185" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">FFN AS ASSOCIATIVE MEMORY</text>

  <rect x="30" y="60" width="310" height="280" rx="4" fill="#F7F2E8" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Input -->
  <rect x="50" y="80" width="100" height="36" rx="3" fill="#2D5A8E" opacity="0.8"/>
  <text x="100" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="white">subject k</text>
  <text x="100" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">"Eiffel Tower"</text>

  <!-- W1: keys -->
  <rect x="175" y="80" width="90" height="36" rx="3" fill="#C4A87A" opacity="0.85"/>
  <text x="220" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">W₁</text>
  <text x="220" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">key matrix</text>

  <!-- Arrow k -> W1 -->
  <defs>
    <marker id="ar2" markerWidth="7" markerHeight="7" refX="3" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5C3D1E"/>
    </marker>
  </defs>
  <line x1="150" y1="98" x2="172" y2="98" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- W1 -> activation -->
  <line x1="265" y1="98" x2="285" y2="98" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="292" y="103" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">σ</text>

  <!-- W2: values -->
  <rect x="175" y="168" width="90" height="36" rx="3" fill="#7C2530" opacity="0.85"/>
  <text x="220" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="white">W₂</text>
  <text x="220" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">value matrix</text>

  <!-- Arrow down to W2 -->
  <line x1="300" y1="118" x2="300" y2="162" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="300" y1="168" x2="265" y2="186" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- output -->
  <rect x="50" y="175" width="100" height="36" rx="3" fill="#2D5A8E" opacity="0.8"/>
  <text x="100" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="white">output v</text>
  <text x="100" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">"Paris"</text>

  <line x1="175" y1="186" x2="153" y2="193" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- Rank-one update box -->
  <rect x="50" y="260" width="265" height="60" rx="3" fill="white" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="182" y="281" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530">ROME inserts: W₂* = W₂ + Δ·kᵀ</text>
  <text x="182" y="299" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B5D4F">rank-one outer product update</text>
  <text x="182" y="313" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B5D4F">preserves all other memories</text>

  <!-- Divider -->
  <line x1="360" y1="40" x2="360" y2="370" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Right panel: causal tracing -->
  <text x="580" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">CAUSAL TRACING</text>

  <rect x="375" y="60" width="405" height="280" rx="4" fill="#F7F2E8" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Heatmap-style grid: rows=layers, cols=tokens -->
  <!-- Column headers -->
  <text x="450" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">Eiffel</text>
  <text x="510" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">Tower</text>
  <text x="570" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">is in</text>
  <text x="630" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">the</text>
  <text x="690" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">city of</text>
  <text x="755" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">___</text>

  <!-- Row labels -->
  <text x="395" y="108" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">L8</text>
  <text x="395" y="138" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">L16</text>
  <text x="395" y="168" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">L24</text>
  <text x="395" y="198" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">L32</text>

  <!-- Heatmap cells: low activation = tan, high = red -->
  <!-- Row L8 -->
  <rect x="425" y="91" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.3"/>
  <rect x="480" y="91" width="50" height="25" rx="2" fill="#7C2530" opacity="0.85"/>
  <rect x="535" y="91" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.2"/>
  <rect x="590" y="91" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.15"/>
  <rect x="645" y="91" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <rect x="700" y="91" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <!-- Row L16 -->
  <rect x="425" y="121" width="50" height="25" rx="2" fill="#7C2530" opacity="0.6"/>
  <rect x="480" y="121" width="50" height="25" rx="2" fill="#7C2530" opacity="0.95"/>
  <rect x="535" y="121" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.25"/>
  <rect x="590" y="121" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.15"/>
  <rect x="645" y="121" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <rect x="700" y="121" width="50" height="25" rx="2" fill="#2D5A8E" opacity="0.5"/>
  <!-- Row L24 -->
  <rect x="425" y="151" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.2"/>
  <rect x="480" y="151" width="50" height="25" rx="2" fill="#7C2530" opacity="0.45"/>
  <rect x="535" y="151" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.15"/>
  <rect x="590" y="151" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.12"/>
  <rect x="645" y="151" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <rect x="700" y="151" width="50" height="25" rx="2" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row L32 -->
  <rect x="425" y="181" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.15"/>
  <rect x="480" y="181" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.2"/>
  <rect x="535" y="181" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <rect x="590" y="181" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <rect x="645" y="181" width="50" height="25" rx="2" fill="#C4A87A" opacity="0.1"/>
  <rect x="700" y="181" width="50" height="25" rx="2" fill="#2D5A8E" opacity="0.9"/>

  <!-- Legend -->
  <text x="580" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">High causal effect</text>
  <rect x="500" y="246" width="18" height="12" rx="2" fill="#7C2530" opacity="0.9"/>
  <text x="580" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Propagated effect</text>
  <rect x="500" y="276" width="18" height="12" rx="2" fill="#2D5A8E" opacity="0.8"/>

  <text x="580" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-style="italic">Mid-layer FFNs on subject tokens</text>
  <text x="580" y="333" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-style="italic">causally store factual associations</text>
</svg>
