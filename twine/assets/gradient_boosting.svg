<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Sequential tree ensemble -->
  <text x="170" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">SEQUENTIAL ENSEMBLE</text>

  <!-- Tree 1 -->
  <rect x="20" y="50" width="80" height="50" fill="#FDF0F0" stroke="#7C2530" stroke-width="1.5" rx="4"/>
  <text x="60" y="72" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Tree 1</text>
  <text x="60" y="88" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">fits data</text>

  <!-- Residual box -->
  <rect x="20" y="125" width="80" height="40" fill="#FEF9EE" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="60" y="142" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">residuals</text>
  <text x="60" y="156" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">r₁ = y − ŷ₁</text>

  <!-- Arrow down -->
  <line x1="60" y1="100" x2="60" y2="124" stroke="#7C2530" stroke-width="1.5"/>
  <polygon points="56,120 60,128 64,120" fill="#7C2530"/>

  <!-- Tree 2 -->
  <rect x="20" y="188" width="80" height="50" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="1.5" rx="4"/>
  <text x="60" y="210" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Tree 2</text>
  <text x="60" y="226" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">fits r₁</text>

  <line x1="60" y1="165" x2="60" y2="187" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="56,183 60,191 64,183" fill="#C4A87A"/>

  <!-- Residual 2 -->
  <rect x="20" y="260" width="80" height="40" fill="#FEF9EE" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="60" y="278" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">residuals</text>
  <text x="60" y="292" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">r₂ = r₁ − ŷ₂</text>
  <line x1="60" y1="238" x2="60" y2="259" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="56,255 60,263 64,255" fill="#2D5A8E"/>

  <!-- Dots -->
  <text x="60" y="330" font-family="Georgia, serif" font-size="18" fill="#6B5D4F" text-anchor="middle">⋮</text>

  <!-- Tree M -->
  <rect x="20" y="345" width="80" height="40" fill="#F5F0E8" stroke="#5C3D1E" stroke-width="1.5" rx="4"/>
  <text x="60" y="362" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Tree M</text>
  <text x="60" y="377" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">fits rₘ₋₁</text>

  <!-- Divider -->
  <line x1="120" y1="30" x2="120" y2="395" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 2: Gradient descent in function space -->
  <text x="300" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">GRADIENT IN FUNCTION SPACE</text>

  <!-- Loss surface -->
  <path d="M 140 350 Q 200 120 300 95 Q 380 78 440 350" fill="#F8F4EE" stroke="#D4C5A9" stroke-width="1.5"/>
  <!-- Steps down gradient -->
  <circle cx="210" cy="220" r="5" fill="#7C2530"/>
  <circle cx="255" cy="145" r="5" fill="#7C2530"/>
  <circle cx="290" cy="112" r="5" fill="#7C2530"/>
  <circle cx="312" cy="101" r="5" fill="#7C2530"/>
  <line x1="210" y1="220" x2="255" y2="145" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="255" y1="145" x2="290" y2="112" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="290" y1="112" x2="312" y2="101" stroke="#7C2530" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="200" y="242" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">F₀</text>
  <text x="246" y="168" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">F₁</text>
  <text x="282" y="135" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">F₂</text>
  <text x="318" y="125" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">F₃</text>

  <text x="300" y="370" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Loss L(F)</text>
  <text x="160" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,160,200)">F(x)</text>

  <!-- Divider -->
  <line x1="470" y1="30" x2="470" y2="395" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 3: Final prediction sum -->
  <text x="636" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">ADDITIVE MODEL</text>

  <rect x="490" y="55" width="290" height="310" fill="#F8F4EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>

  <text x="635" y="90" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">F_M(x) = F₀(x)</text>
  <text x="635" y="115" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-style="italic">+ η · h₁(x)</text>
  <text x="635" y="140" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-style="italic">+ η · h₂(x)</text>
  <text x="635" y="165" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">+ ···</text>
  <text x="635" y="190" font-family="Georgia, serif" font-size="13" fill="#C4A87A" text-anchor="middle" font-style="italic">+ η · h_M(x)</text>

  <line x1="510" y1="205" x2="760" y2="205" stroke="#D4C5A9" stroke-width="1"/>

  <text x="635" y="228" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">η = learning rate (shrinkage)</text>
  <text x="635" y="248" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">hₘ = weak learner (shallow tree)</text>
  <text x="635" y="268" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">Each hₘ fits the negative gradient</text>
  <text x="635" y="288" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">of the loss with respect to F</text>

  <line x1="510" y1="300" x2="760" y2="300" stroke="#D4C5A9" stroke-width="1"/>
  <text x="635" y="322" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">Key parameters:</text>
  <text x="635" y="340" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">n_estimators · max_depth · η</text>
  <text x="635" y="356" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">More trees + small η = best</text>
</svg>
