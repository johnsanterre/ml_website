  <text x="520" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" font-style="italic">italic = predicted entries</text>

  <!-- ===== RIGHT PANEL: Low-rank decomposition sketch ===== -->
  <rect x="600" y="110" width="170" height="190" rx="8" fill="#FDF6EC" stroke="#E07B39" stroke-width="1.5"/>
  <text x="685" y="132" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E07B39">Low-rank structure</text>
  <text x="685" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">M  ≈  U · Vᵀ</text>
  <!-- U block -->
  <rect x="616" y="164" width="28" height="80" rx="4" fill="#E07B39" fill-opacity="0.2" stroke="#E07B39" stroke-width="1.2"/>
  <text x="630" y="208" text-anchor="middle" font-family="Arial" font-size="11" fill="#E07B39">U</text>
