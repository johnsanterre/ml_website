<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6B5D4F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" letter-spacing="0.5">Taxonomy of Common Deep Learning Errors</text>

  <!-- Root node -->
  <rect x="310" y="55" width="180" height="38" rx="8" fill="#2C5F8A"/>
  <text x="400" y="79" text-anchor="middle" font-size="13" fill="white" font-weight="bold">DL Error Types</text>

  <!-- Branch lines from root -->
  <!-- Left branch: Training Dynamics -->
  <line x1="310" y1="74" x2="195" y2="74" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Right branch: Data Problems -->
  <line x1="490" y1="74" x2="605" y2="74" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── LEFT SUBTREE: Training Dynamics ── -->
  <rect x="100" y="55" width="170" height="38" rx="8" fill="#5C3D1E"/>
  <text x="185" y="79" text-anchor="middle" font-size="12" fill="white">Training Dynamics</text>

  <!-- Vanishing gradient -->
  <line x1="185" y1="93" x2="100" y2="155" stroke="#6B5D4F" stroke-width="1.3"/>
  <rect x="20" y="148" width="160" height="52" rx="6" fill="#FDFAF4" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="100" y="169" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2C5F8A">Vanishing Gradient</text>
  <text x="100" y="185" text-anchor="middle" font-size="9.5" fill="#6B5D4F">gradients → 0; early layers</text>
  <text x="100" y="197" text-anchor="middle" font-size="9.5" fill="#6B5D4F">stop learning</text>

  <!-- Exploding gradient -->
  <line x1="185" y1="93" x2="270" y2="155" stroke="#6B5D4F" stroke-width="1.3"/>
  <rect x="190" y="148" width="160" height="52" rx="6" fill="#FDFAF4" stroke="#C0392B" stroke-width="1.8"/>
  <text x="270" y="169" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#C0392B">Exploding Gradient</text>
  <text x="270" y="185" text-anchor="middle" font-size="9.5" fill="#6B5D4F">gradients → ∞; weights</text>
  <text x="270" y="197" text-anchor="middle" font-size="9.5" fill="#6B5D4F">become NaN</text>

  <!-- ── RIGHT SUBTREE: Data Problems ── -->
  <rect x="530" y="55" width="170" height="38" rx="8" fill="#5C3D1E"/>
  <text x="615" y="79" text-anchor="middle" font-size="12" fill="white">Data Problems</text>

  <!-- Data leakage -->
  <line x1="615" y1="93" x2="530" y2="155" stroke="#6B5D4F" stroke-width="1.3"/>
  <rect x="450" y="148" width="160" height="52" rx="6" fill="#FDFAF4" stroke="#C0392B" stroke-width="1.8"/>
  <text x="530" y="169" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#C0392B">Data Leakage</text>
  <text x="530" y="185" text-anchor="middle" font-size="9.5" fill="#6B5D4F">test info contaminates</text>
  <text x="530" y="197" text-anchor="middle" font-size="9.5" fill="#6B5D4F">training; fake accuracy</text>

  <!-- Covariate shift -->
  <line x1="615" y1="93" x2="700" y2="155" stroke="#6B5D4F" stroke-width="1.3"/>
  <rect x="620" y="148" width="160" height="52" rx="6" fill="#FDFAF4" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="700" y="169" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2C5F8A">Covariate Shift</text>
  <text x="700" y="185" text-anchor="middle" font-size="9.5" fill="#6B5D4F">input distribution</text>
  <text x="700" y="197" text-anchor="middle" font-size="9.5" fill="#6B5D4F">changes at deploy time</text>

  <!-- ── BOTTOM CENTER: Model Fit ── -->
  <!-- Line from root down to center -->
  <line x1="400" y1="93" x2="400" y2="148" stroke="#6B5D4F" stroke-width="1.5"/>
  <rect x="320" y="55" width="0" height="0"/><!-- placeholder for path clarity -->

  <!-- Model Fit group header -->
  <rect x="315" y="148" width="170" height="38" rx="8" fill="#5C3D1E"/>
  <text x="400" y="172" text-anchor="middle" font-size="12" fill="white">Model Fit</text>

  <!-- Underfitting -->
  <line x1="370" y1="186" x2="310" y2="240" stroke="#6B5D4F" stroke-width="1.3"/>
  <rect x="225" y="235" width="160" height="52" rx="6" fill="#FDFAF4" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="305" y="256" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2C5F8A">Underfitting</text>
  <text x="305" y="272" text-anchor="middle" font-size="9.5" fill="#6B5D4F">model too simple; high</text>
  <text x="305" y="284" text-anchor="middle" font-size="9.5" fill="#6B5D4F">training error</text>

  <!-- Overfitting -->
  <line x1="430" y1="186" x2="490" y2="240" stroke="#6B5D4F" stroke-width="1.3"/>
  <rect x="415" y="235" width="160" height="52" rx="6" fill="#FDFAF4" stroke="#C0392B" stroke-width="1.8"/>
  <text x="495" y="256" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#C0392B">Overfitting</text>
  <text x="495" y="272" text-anchor="middle" font-size="9.5" fill="#6B5D4F">model memorizes train set;</text>
  <text x="495" y="284" text-anchor="middle" font-size="9.5" fill="#6B5D4F">fails on new data</text>

  <!-- ── LEGEND ── -->
  <rect x="20" y="345" width="14" height="14" rx="3" fill="none" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="40" y="357" font-size="10" fill="#6B5D4F">Training/capacity issue</text>
  <rect x="175" y="345" width="14" height="14" rx="3" fill="none" stroke="#C0392B" stroke-width="1.8"/>
  <text x="195" y="357" font-size="10" fill="#6B5D4F">Data/distribution issue</text>
  <rect x="330" y="345" width="14" height="14" rx="3" fill="#5C3D1E"/>
  <text x="350" y="357" font-size="10" fill="#6B5D4F">Category node</text>
  <rect x="455" y="345" width="14" height="14" rx="3" fill="#2C5F8A"/>
  <text x="475" y="357" font-size="10" fill="#6B5D4F">Root</text>

  <!-- Bottom caption -->
  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#9B8877">Five errors account for the majority of failed or misleading deep learning deployments</text>
</svg>
