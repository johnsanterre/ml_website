<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#2D5A8E">Data Augmentation: Expanding Training Data</text>

  <!-- Panel 1: Image augmentations -->
  <rect x="15" y="50" width="210" height="325" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="120" y="70" text-anchor="middle" font-size="10" font-variant="small-caps" letter-spacing="1" fill="#6B5D4F">IMAGE AUGMENTATIONS</text>

  <!-- Original image placeholder -->
  <rect x="55" y="80" width="130" height="70" fill="#D8E5F0" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="120" y="108" text-anchor="middle" font-size="10" fill="#2D5A8E">Original</text>
  <!-- Simple cat-like shape -->
  <ellipse cx="120" cy="120" rx="28" ry="20" fill="#2D5A8E" fill-opacity="0.25"/>
  <text x="120" y="140" text-anchor="middle" font-size="18" fill="#2D5A8E">🐱</text>

  <!-- Augmented versions -->
  <!-- Flipped -->
  <rect x="25" y="165" width="80" height="55" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="65" y="180" text-anchor="middle" font-size="16" fill="#5C3D1E" transform="scale(-1,1) translate(-130,0)">🐱</text>
  <text x="65" y="212" text-anchor="middle" font-size="8.5" fill="#5C3D1E">H-Flip</text>

  <!-- Cropped -->
  <rect x="120" y="165" width="80" height="55" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="160" y="195" text-anchor="middle" font-size="12" fill="#5C3D1E">🐱</text>
  <text x="160" y="212" text-anchor="middle" font-size="8.5" fill="#5C3D1E">Random Crop</text>

  <!-- Color jitter -->
  <rect x="25" y="232" width="80" height="55" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="65" y="262" text-anchor="middle" font-size="16" fill="#7C2530">🐱</text>
  <text x="65" y="279" text-anchor="middle" font-size="8.5" fill="#5C3D1E">Color Jitter</text>

  <!-- Rotation -->
  <rect x="120" y="232" width="80" height="55" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="160" y="262" text-anchor="middle" font-size="16" fill="#5C3D1E" transform="rotate(-15,160,262)">🐱</text>
  <text x="160" y="279" text-anchor="middle" font-size="8.5" fill="#5C3D1E">Rotation</text>

  <text x="120" y="310" text-anchor="middle" font-size="9" fill="#5C3D1E">Label stays the same</text>
  <text x="120" y="325" text-anchor="middle" font-size="9" fill="#5C3D1E">→ free training data</text>
  <text x="120" y="355" text-anchor="middle" font-size="8.5" fill="#5C3D1E">AutoAugment learns the</text>
  <text x="120" y="368" text-anchor="middle" font-size="8.5" fill="#5C3D1E">best policy per dataset</text>

  <!-- Panel 2: Mixup / CutMix -->
  <rect x="238" y="50" width="245" height="325" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="360" y="70" text-anchor="middle" font-size="10" font-variant="small-caps" letter-spacing="1" fill="#6B5D4F">ADVANCED TECHNIQUES</text>

  <!-- Mixup diagram -->
  <rect x="248" y="80" width="225" height="110" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="360" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#5C3D1E">Mixup</text>

  <rect x="258" y="105" width="55" height="55" fill="#2D5A8E" fill-opacity="0.4" rx="3"/>
  <text x="285" y="138" text-anchor="middle" font-size="20" fill="#2D5A8E">🐱</text>
  <text x="285" y="155" text-anchor="middle" font-size="8" fill="#5C3D1E">Cat (λ=0.7)</text>

  <text x="325" y="138" text-anchor="middle" font-size="14" fill="#5C3D1E">+</text>

  <rect x="338" y="105" width="55" height="55" fill="#7C2530" fill-opacity="0.4" rx="3"/>
  <text x="365" y="138" text-anchor="middle" font-size="20" fill="#7C2530">🐶</text>
  <text x="365" y="155" text-anchor="middle" font-size="8" fill="#5C3D1E">Dog (1−λ)</text>

  <text x="405" y="138" text-anchor="middle" font-size="14" fill="#5C3D1E">=</text>

  <rect x="417" y="105" width="50" height="55" fill="#5C3D1E" fill-opacity="0.25" rx="3"/>
  <text x="442" y="130" text-anchor="middle" font-size="10" fill="#5C3D1E">Blend</text>
  <text x="442" y="148" text-anchor="middle" font-size="8" fill="#5C3D1E">ỹ=0.7/0.3</text>

  <text x="360" y="182" text-anchor="middle" font-size="9" fill="#5C3D1E">x̃ = λx_i + (1−λ)x_j,  ỹ = λy_i + (1−λ)y_j</text>

  <!-- CutMix -->
  <rect x="248" y="200" width="225" height="90" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="360" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#5C3D1E">CutMix</text>
  <rect x="262" y="226" width="90" height="55" fill="#2D5A8E" fill-opacity="0.25" rx="2"/>
  <rect x="300" y="238" width="40" height="31" fill="#7C2530" fill-opacity="0.5" rx="1"/>
  <text x="307" y="256" font-size="14" fill="#7C2530">🐶</text>
  <text x="360" y="260" text-anchor="middle" font-size="9" fill="#5C3D1E">paste a crop from image B</text>
  <text x="360" y="275" text-anchor="middle" font-size="9" fill="#5C3D1E">label ∝ area fraction</text>
  <text x="360" y="280" text-anchor="middle" font-size="8" fill="#5C3D1E"> </text>

  <!-- Text augmentation -->
  <rect x="248" y="300" width="225" height="65" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="360" y="318" text-anchor="middle" font-size="10" font-weight="bold" fill="#5C3D1E">Text Augmentation</text>
  <text x="258" y="334" font-size="9" fill="#2D2D2D">• Synonym replacement</text>
  <text x="258" y="349" font-size="9" fill="#2D2D2D">• Back-translation (EN→FR→EN)</text>
  <text x="258" y="364" font-size="9" fill="#2D2D2D">• Random insertion / deletion</text>

  <!-- Panel 3: Why it works + TTA -->
  <rect x="496" y="50" width="288" height="325" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="640" y="70" text-anchor="middle" font-size="10" font-variant="small-caps" letter-spacing="1" fill="#6B5D4F">WHY IT WORKS &amp; TTA</text>

  <!-- Regularization explanation -->
  <rect x="506" y="80" width="268" height="110" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="640" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#5C3D1E">Augmentation as Regularization</text>
  <text x="514" y="116" font-size="9.5" fill="#2D2D2D">Injects task-specific invariances:</text>
  <text x="514" y="132" font-size="9" fill="#5C3D1E">  "a cat flipped ≡ still a cat"</text>
  <text x="514" y="148" font-size="9.5" fill="#2D2D2D">Effective dataset size grows;</text>
  <text x="514" y="164" font-size="9.5" fill="#2D2D2D">model can't memorize exact inputs.</text>
  <text x="514" y="180" font-size="9" fill="#5C3D1E">Reduces overfitting without adding labels</text>

  <!-- TTA diagram -->
  <rect x="506" y="200" width="268" height="105" fill="#EDE5D8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="640" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#5C3D1E">Test-Time Augmentation (TTA)</text>
  <text x="514" y="236" font-size="9.5" fill="#2D2D2D">At inference, augment the test image</text>
  <text x="514" y="252" font-size="9.5" fill="#2D2D2D">N times, average the predictions.</text>
  <!-- Mini diagram -->
  <rect x="514" y="260" width="36" height="28" fill="#2D5A8E" fill-opacity="0.2" rx="2"/>
  <text x="532" y="278" text-anchor="middle" font-size="8" fill="#2D5A8E">orig</text>
  <rect x="556" y="260" width="36" height="28" fill="#2D5A8E" fill-opacity="0.2" rx="2"/>
  <text x="574" y="278" text-anchor="middle" font-size="8" fill="#2D5A8E">flip</text>
  <rect x="598" y="260" width="36" height="28" fill="#2D5A8E" fill-opacity="0.2" rx="2"/>
  <text x="616" y="278" text-anchor="middle" font-size="8" fill="#2D5A8E">crop</text>
  <text x="644" y="278" text-anchor="middle" font-size="12" fill="#5C3D1E">→ avg</text>
  <rect x="670" y="260" width="36" height="28" fill="#7C2530" fill-opacity="0.3" rx="2"/>
  <text x="688" y="278" text-anchor="middle" font-size="8" fill="#7C2530">pred</text>
  <text x="640" y="297" text-anchor="middle" font-size="9" fill="#5C3D1E">Boosts accuracy 1–3% at test time</text>

  <!-- Design note -->
  <rect x="506" y="315" width="268" height="52" fill="#F5E8E8" stroke="#7C2530" stroke-width="1" rx="3"/>
  <text x="640" y="333" text-anchor="middle" font-size="10" font-weight="bold" fill="#7C2530">Domain-Specific Design</text>
  <text x="514" y="349" font-size="9" fill="#2D2D2D">Medical: careful — rotation may change label</text>
  <text x="514" y="363" font-size="9" fill="#2D2D2D">Audio: pitch shift, time stretch, add noise</text>
</svg>
