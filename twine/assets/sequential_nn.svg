<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#3B2A1A" font-size="17" font-weight="bold" letter-spacing="0.5">Sequential Neural Network — Layer Stack</text>

  <!-- ── Layer boxes (left-to-right, centered vertically at y=200) ── -->

  <!-- INPUT -->
  <rect x="40" y="155" width="110" height="90" rx="10" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="95" y="194" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Input</text>
  <text x="95" y="213" text-anchor="middle" fill="#7C2530" font-size="11">Layer</text>
  <text x="95" y="232" text-anchor="middle" fill="#9B5C5C" font-size="10">(features x)</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="200" x2="186" y2="200" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DENSE 1 -->
  <rect x="188" y="140" width="110" height="120" rx="10" fill="#4A7C59" stroke="#2d5a3d" stroke-width="2.5"/>
  <text x="243" y="185" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Dense</text>
  <text x="243" y="204" text-anchor="middle" fill="#d4edda" font-size="11">Layer 1</text>
  <text x="243" y="222" text-anchor="middle" fill="#d4edda" font-size="10">z = Wx + b</text>
  <text x="243" y="240" text-anchor="middle" fill="#d4edda" font-size="10">(weights + bias)</text>

  <!-- Arrow 2 -->
  <line x1="298" y1="200" x2="334" y2="200" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ACTIVATION 1 -->
  <rect x="336" y="155" width="110" height="90" rx="10" fill="#2C5F8A" stroke="#1a3f60" stroke-width="2.5"/>
  <text x="391" y="194" text-anchor="middle" fill="white" font-size="13" font-weight="bold">ReLU</text>
  <text x="391" y="213" text-anchor="middle" fill="#b8d4f0" font-size="11">Activation</text>
  <text x="391" y="232" text-anchor="middle" fill="#b8d4f0" font-size="10">a = max(0, z)</text>

  <!-- Arrow 3 -->
  <line x1="446" y1="200" x2="482" y2="200" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DENSE 2 -->
  <rect x="484" y="140" width="110" height="120" rx="10" fill="#4A7C59" stroke="#2d5a3d" stroke-width="2.5"/>
  <text x="539" y="185" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Dense</text>
  <text x="539" y="204" text-anchor="middle" fill="#d4edda" font-size="11">Layer 2</text>
  <text x="539" y="222" text-anchor="middle" fill="#d4edda" font-size="10">z = Wa + b</text>
  <text x="539" y="240" text-anchor="middle" fill="#d4edda" font-size="10">(weights + bias)</text>

  <!-- Arrow 4 -->
  <line x1="594" y1="200" x2="630" y2="200" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- OUTPUT -->
  <rect x="632" y="155" width="120" height="90" rx="10" fill="#E07B39" stroke="#a04e1a" stroke-width="2.5"/>
  <text x="692" y="194" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Output</text>
  <text x="692" y="213" text-anchor="middle" fill="#fde8d8" font-size="11">Layer</text>
  <text x="692" y="232" text-anchor="middle" fill="#fde8d8" font-size="10">ŷ = softmax(z)</text>

  <!-- ── Data-flow label above arrows ── -->
  <text x="400" y="128" text-anchor="middle" fill="#6B5D4F" font-size="11" font-style="italic">data flows left → right, one layer at a time</text>

  <!-- ── Step numbers below boxes ── -->
  <text x="95"  y="264" text-anchor="middle" fill="#888" font-size="10">① receive</text>
  <text x="243" y="278" text-anchor="middle" fill="#888" font-size="10">② transform</text>
  <text x="391" y="264" text-anchor="middle" fill="#888" font-size="10">③ activate</text>
  <text x="539" y="278" text-anchor="middle" fill="#888" font-size="10">④ transform</text>
  <text x="692" y="264" text-anchor="middle" fill="#888" font-size="10">⑤ predict</text>

  <!-- ── Legend ── -->
  <rect x="188" y="308" width="16" height="16" rx="3" fill="#4A7C59" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="210" y="321" fill="#3B2A1A" font-size="12">Dense (linear transform)</text>

  <rect x="390" y="308" width="16" height="16" rx="3" fill="#2C5F8A" stroke="#1a3f60" stroke-width="1.5"/>
  <text x="412" y="321" fill="#3B2A1A" font-size="12">Activation (nonlinearity)</text>

  <rect x="590" y="308" width="16" height="16" rx="3" fill="#E07B39" stroke="#a04e1a" stroke-width="1.5"/>
  <text x="612" y="321" fill="#3B2A1A" font-size="12">Output (prediction)</text>

  <!-- Bottom caption -->
  <text x="400" y="368" text-anchor="middle" fill="#6B5D4F" font-size="11">Each layer processes the output of the previous one — no shortcuts, no loops.</text>
</svg>
