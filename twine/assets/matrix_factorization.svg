<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- R matrix (ratings) -->
  <rect x="30" y="100" width="160" height="200" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="110" y="85" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4a90d9">R</text>
  <text x="110" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">users × items</text>
  <!-- Grid hint -->
  <line x1="30" y1="135" x2="190" y2="135" stroke="#c0d8ee" stroke-width="1"/>
  <line x1="30" y1="170" x2="190" y2="170" stroke="#c0d8ee" stroke-width="1"/>
  <line x1="30" y1="205" x2="190" y2="205" stroke="#c0d8ee" stroke-width="1"/>
  <line x1="30" y1="240" x2="190" y2="240" stroke="#c0d8ee" stroke-width="1"/>
  <line x1="70" y1="100" x2="70" y2="300" stroke="#c0d8ee" stroke-width="1"/>
  <line x1="110" y1="100" x2="110" y2="300" stroke="#c0d8ee" stroke-width="1"/>
  <line x1="150" y1="100" x2="150" y2="300" stroke="#c0d8ee" stroke-width="1"/>
  <!-- Some ratings, some missing -->
  <text x="50" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">5</text>
  <text x="90" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="#aaa">?</text>
  <text x="130" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">3</text>
  <text x="170" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="#aaa">?</text>
  <text x="50" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#aaa">?</text>
  <text x="90" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">4</text>
  <text x="130" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#aaa">?</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">2</text>
  <!-- ≈ sign -->
  <text x="218" y="208" text-anchor="middle" font-family="Arial" font-size="28" fill="#333">≈</text>
  <!-- U matrix -->
  <rect x="250" y="100" width="80" height="200" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="290" y="85" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e67e22">U</text>
  <text x="290" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">users × k</text>
  <!-- × sign -->
  <text x="358" y="208" text-anchor="middle" font-family="Arial" font-size="22" fill="#333">×</text>
  <!-- V^T matrix -->
  <rect x="378" y="155" width="200" height="90" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="478" y="142" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#27ae60">Vᵀ</text>
  <text x="478" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">k × items</text>
  <!-- k label -->
  <text x="610" y="208" text-anchor="middle" font-family="Arial" font-size="13" fill="#8e44ad">k = latent</text>
  <text x="610" y="225" text-anchor="middle" font-family="Arial" font-size="13" fill="#8e44ad">factors</text>
  <!-- Intuition -->
  <rect x="630" y="100" width="150" height="160" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="705" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Latent Factors</text>
  <text x="705" y="148" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Action movies</text>
  <text x="705" y="166" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Comedies</text>
  <text x="705" y="184" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Sci-fi</text>
  <text x="705" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">(learned, not labeled)</text>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Matrix Factorization</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Decompose sparse ratings matrix into dense user and item embeddings</text>
</svg>
