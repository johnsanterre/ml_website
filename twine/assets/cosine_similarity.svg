<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Vector space diagram -->
  <line x1="200" y1="320" x2="200" y2="80" stroke="#ccc" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="380" y2="240" stroke="#ccc" stroke-width="1.5"/>
  <!-- Vector A -->
  <line x1="200" y1="240" x2="330" y2="120" stroke="#4a90d9" stroke-width="3" marker-end="url(#arccos)"/>
  <text x="345" y="115" font-family="Arial" font-size="14" fill="#4a90d9" font-weight="bold">A</text>
  <!-- Vector B -->
  <line x1="200" y1="240" x2="350" y2="200" stroke="#e67e22" stroke-width="3" marker-end="url(#arccos2)"/>
  <text x="360" y="200" font-family="Arial" font-size="14" fill="#e67e22" font-weight="bold">B</text>
  <!-- Angle arc -->
  <path d="M240,216 Q250,200 253,225" fill="none" stroke="#27ae60" stroke-width="2"/>
  <text x="262" y="216" font-family="Arial" font-size="13" fill="#27ae60">θ</text>
  <!-- Formula box -->
  <rect x="440" y="100" width="320" height="180" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="600" y="130" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Cosine Similarity</text>
  <text x="600" y="165" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">cos(θ) = A·B / (‖A‖‖B‖)</text>
  <line x1="450" y1="178" x2="750" y2="178" stroke="#ddd" stroke-width="1"/>
  <text x="600" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">+1 = identical direction</text>
  <text x="600" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">  0 = orthogonal (unrelated)</text>
  <text x="600" y="240" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">−1 = opposite direction</text>
  <text x="600" y="263" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Ignores magnitude — measures angle only</text>
  <!-- Examples -->
  <text x="200" y="365" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">"king" and "queen": cos ≈ 0.87   |   "king" and "car": cos ≈ 0.12</text>
  <defs>
    <marker id="arccos" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="arccos2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Cosine Similarity</text>
</svg>
