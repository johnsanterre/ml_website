<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Causal DAG -->
  <text x="240" y="38" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Causal Graph (DAG)</text>
  <!-- Nodes -->
  <circle cx="160" cy="120" r="38" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="160" y="116" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Age</text>
  <text x="160" y="133" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">(Z)</text>
  <circle cx="320" cy="200" r="38" fill="#fff3e0" stroke="#e67e22" stroke-width="2.5"/>
  <text x="320" y="196" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Drug</text>
  <text x="320" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">(T)</text>
  <circle cx="160" cy="280" r="38" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="160" y="276" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Severity</text>
  <text x="160" y="293" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">(X)</text>
  <circle cx="480" cy="200" r="38" fill="#e8f8e8" stroke="#27ae60" stroke-width="2.5"/>
  <text x="480" y="196" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Recovery</text>
  <text x="480" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">(Y)</text>
  <!-- Edges -->
  <line x1="185" y1="143" x2="295" y2="178" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrc)"/>
  <line x1="185" y1="255" x2="295" y2="220" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrc)"/>
  <line x1="160" y1="158" x2="160" y2="242" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrc)"/>
  <line x1="358" y1="200" x2="442" y2="200" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrc2)"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22" font-weight="bold">causal effect</text>
  <!-- Correlation vs causation box -->
  <rect x="560" y="100" width="220" height="200" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="670" y="128" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e67e22">Correlation ≠ Causation</text>
  <line x1="570" y1="140" x2="770" y2="140" stroke="#f39c12" stroke-width="1"/>
  <text x="670" y="165" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">P(Y | do(T=1))</text>
  <text x="670" y="185" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">vs.</text>
  <text x="670" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">P(Y | T=1)</text>
  <line x1="570" y1="220" x2="770" y2="220" stroke="#f39c12" stroke-width="1"/>
  <text x="670" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Intervention vs observation</text>
  <text x="670" y="263" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">do-calculus (Pearl)</text>
  <defs>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="arrc2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
  </defs>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Confounders (Z, X) bias observational estimates — causal models control for them</text>
</svg>
