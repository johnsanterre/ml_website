<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Cross-Entropy Loss</text>
  <!-- Prediction bar charts -->
  <text x="160" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Prediction (ŷ)</text>
  <rect x="90" y="100" width="40" height="150" fill="#4a90d9" opacity="0.7"/>
  <rect x="140" y="190" width="40" height="60" fill="#4a90d9" opacity="0.4"/>
  <rect x="190" y="220" width="40" height="30" fill="#4a90d9" opacity="0.4"/>
  <text x="110" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Cat</text>
  <text x="160" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Dog</text>
  <text x="210" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Bird</text>
  <text x="110" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">0.7</text>
  <text x="160" y="182" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">0.2</text>
  <text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">0.1</text>
  <!-- True label -->
  <text x="400" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">True Label (y)</text>
  <rect x="330" y="100" width="40" height="150" fill="#27ae60" opacity="0.8"/>
  <rect x="380" y="248" width="40" height="2" fill="#27ae60" opacity="0.3"/>
  <rect x="430" y="248" width="40" height="2" fill="#27ae60" opacity="0.3"/>
  <text x="350" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Cat</text>
  <text x="400" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Dog</text>
  <text x="450" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Bird</text>
  <text x="350" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">1.0</text>
  <!-- Formula -->
  <rect x="540" y="90" width="230" height="130" rx="8" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="655" y="118" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Formula</text>
  <text x="655" y="148" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">H(y, ŷ) = −Σ yᵢ log(ŷᵢ)</text>
  <text x="655" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">= −log(0.7) ≈ 0.36</text>
  <text x="655" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">(only correct class matters)</text>
  <!-- Loss curve -->
  <line x1="80" y1="350" x2="480" y2="350" stroke="#ccc" stroke-width="1"/>
  <path d="M85,345 Q120,300 160,270 Q220,240 300,330 Q360,348 480,349" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="280" y="390" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Predicted probability for correct class →   (low prob = high loss)</text>
</svg>
