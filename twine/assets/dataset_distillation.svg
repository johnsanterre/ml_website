  <circle cx="65"  cy="181" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="90"  cy="193" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="115" cy="177" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="140" cy="190" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="165" cy="180" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="190" cy="195" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="215" cy="183" r="6" fill="#4a90d9" opacity="0.75"/>

  <circle cx="65"  cy="216" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="90"  cy="224" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="115" cy="210" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="140" cy="225" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="165" cy="213" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="190" cy="228" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="215" cy="218" r="6" fill="#e67e22" opacity="0.75"/>

  <circle cx="65"  cy="250" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="90"  cy="258" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="115" cy="245" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="140" cy="260" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="165" cy="248" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="190" cy="262" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="215" cy="253" r="6" fill="#4a90d9" opacity="0.75"/>

  <circle cx="65"  cy="285" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="90"  cy="293" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="115" cy="280" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="140" cy="296" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="165" cy="284" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="190" cy="298" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="215" cy="288" r="6" fill="#e67e22" opacity="0.75"/>

  <!-- Count label -->
  <text x="140" y="330" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">~60,000 samples</text>
  <text x="140" y="348" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">(e.g., full MNIST)</text>

  <!-- ===== ARROW + DISTILLATION FUNNEL ===== -->
  <!-- Funnel shape -->
  <polygon points="290,100 370,100 430,200 290,200" fill="none" stroke="none"/>
  <!-- Arrow shaft -->
  <line x1="290" y1="200" x2="510" y2="200" stroke="#27ae60" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Funnel lines suggesting compression -->
  <line x1="290" y1="130" x2="390" y2="185" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="290" y1="160" x2="390" y2="190" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="290" y1="190" x2="390" y2="196" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="290" y1="240" x2="390" y2="215" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="290" y1="270" x2="390" y2="220" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Label on arrow -->
  <text x="400" y="178" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#27ae60">Distillation</text>
  <text x="400" y="194" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">(bilevel optimization)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- ===== RIGHT: Distilled Dataset ===== -->
  <rect x="520" y="60" width="250" height="290" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="645" y="88" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a7a45">Distilled Dataset (tiny)</text>

  <!-- A handful of synthetic, carefully positioned points -->
  <circle cx="590" cy="145" r="11" fill="#4a90d9" stroke="#2c5fa8" stroke-width="2"/>
  <circle cx="645" cy="135" r="11" fill="#4a90d9" stroke="#2c5fa8" stroke-width="2"/>
  <circle cx="700" cy="148" r="11" fill="#4a90d9" stroke="#2c5fa8" stroke-width="2"/>
  <circle cx="590" cy="200" r="11" fill="#e67e22" stroke="#b05a10" stroke-width="2"/>
  <circle cx="645" cy="210" r="11" fill="#e67e22" stroke="#b05a10" stroke-width="2"/>
  <circle cx="700" cy="198" r="11" fill="#e67e22" stroke="#b05a10" stroke-width="2"/>

  <!-- Star/sparkle to indicate "synthetic / optimized" -->
  <text x="590" y="149" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">★</text>
  <text x="645" y="139" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">★</text>
  <text x="700" y="152" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">★</text>
  <text x="590" y="204" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">★</text>
  <text x="645" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">★</text>
  <text x="700" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">★</text>

  <text x="645" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">~10 synthetic samples</text>
  <text x="645" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">(not real images)</text>

  <!-- Performance comparison bar -->
  <text x="645" y="296" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Model accuracy</text>
  <!-- Full dataset bar -->
  <rect x="540" y="305" width="120" height="14" rx="3" fill="#4a90d9" opacity="0.85"/>
  <text x="538" y="316" text-anchor="end" font-family="Arial" font-size="10" fill="#555">Full data</text>
  <text x="665" y="316" font-family="Arial" font-size="10" fill="#2c5fa8">99%</text>
  <!-- Distilled bar -->
  <rect x="540" y="324" width="108" height="14" rx="3" fill="#27ae60" opacity="0.85"/>
  <text x="538" y="335" text-anchor="end" font-family="Arial" font-size="10" fill="#555">Distilled</text>
  <text x="652" y="335" font-family="Arial" font-size="10" fill="#1a7a45">~96%</text>
</svg>
