  <circle cx="65"  cy="115" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="90"  cy="108" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="115" cy="122" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="140" cy="110" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="165" cy="118" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="190" cy="105" r="6" fill="#4a90d9" opacity="0.75"/>
  <circle cx="215" cy="120" r="6" fill="#4a90d9" opacity="0.75"/>

  <circle cx="65"  cy="148" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="90"  cy="155" r="6" fill="#e67e22" opacity="0.75"/>
  <circle cx="115" cy="143" r="6" fill="#e67e22" opacity="0.75"/>
