<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Dataset Distillation: Compress Data, Preserve Performance</text>

  <!-- ===== LEFT: Original Dataset ===== -->
  <rect x="30" y="60" width="220" height="290" rx="10" fill="#e8f0fe" stroke="#4a90d9" stroke-width="2"/>
  <text x="140" y="88" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c5fa8">Original Dataset (large)</text>

