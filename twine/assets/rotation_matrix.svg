<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Blue vector arrow -->
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a90d9"/>
    </marker>
    <!-- Orange rotated-vector arrow -->
    <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
    <!-- Gray axis arrow -->
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
    <!-- Teal box arrow -->
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a9d8f"/>
    </marker>
  </defs>

  <!-- Cream background -->
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- ===== TITLE ===== -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#222">Rotation Matrices</text>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: 2D Rotation -->
  <!-- Origin: cx=185, cy=210 -->
  <!-- ============================================================ -->
  <text x="185" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#333">2D Rotation by angle θ</text>

  <!-- Unit circle -->
  <circle cx="185" cy="210" r="110" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Axes -->
  <line x1="62" y1="210" x2="308" y2="210" stroke="#bbb" stroke-width="1.4" marker-end="url(#arr-gray)"/>
  <line x1="185" y1="335" x2="185" y2="87" stroke="#bbb" stroke-width="1.4" marker-end="url(#arr-gray)"/>
  <text x="312" y="214" font-family="Georgia, serif" font-size="12" fill="#888">x</text>
  <text x="188" y="85" font-family="Georgia, serif" font-size="12" fill="#888">y</text>

  <!-- Original vector v at 20° — length 85px
       cos(20°)=0.9397, sin(20°)=0.342
       endpoint: (185+85*0.9397, 210-85*0.342) = (265, 181) -->
  <line x1="185" y1="210" x2="264" y2="181" stroke="#4a90d9" stroke-width="3" marker-end="url(#arr-blue)"/>
  <text x="270" y="177" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#4a90d9">v</text>

  <!-- Rotated vector v' at 65° — length 85px
       cos(65°)=0.4226, sin(65°)=0.9063
       endpoint: (185+85*0.4226, 210-85*0.9063) = (221, 133) -->
  <line x1="185" y1="210" x2="221" y2="133" stroke="#c0392b" stroke-width="3" marker-end="url(#arr-orange)"/>
  <text x="225" y="128" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#c0392b">v&#x2032;</text>

  <!-- Angle arc from 20° to 65°, radius 48, center (185,210)
       Arc from (185+48*cos20, 210-48*sin20) to (185+48*cos65, 210-48*sin65)
       = (230.1, 193.6) to (205.3, 166.5)  -->
  <path d="M 230,194 A 48,48 0 0,0 205,167" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="238" y="175" font-family="Georgia, serif" font-size="13" fill="#e67e22" font-style="italic">θ</text>

  <!-- Dashed reference line along original direction (unit-circle endpoint) -->
  <line x1="185" y1="210" x2="288" y2="172" stroke="#4a90d9" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Annotation box -->
  <rect x="52" y="330" width="268" height="46" rx="5" fill="#f0f8ff" stroke="#4a90d9" stroke-width="1"/>
  <text x="186" y="349" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">
    R = [[cos θ  −sin θ],  [sin θ   cos θ]]
  </text>
  <text x="186" y="367" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">det = 1  ·  R&#x1D40;= R&#x207B;&#xB9;  ·  &#x2016;v&#x2032;&#x2016; = &#x2016;v&#x2016;</text>

  <!-- ============================================================ -->
  <!-- CENTER divider -->
  <!-- ============================================================ -->
  <line x1="395" y1="50" x2="395" y2="385" stroke="#ddd" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: 3D Rotation Matrices as text boxes -->
  <!-- ============================================================ -->
  <text x="608" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#333">3D Elementary Rotations</text>

  <!-- ---- Rx box ---- -->
  <rect x="415" y="68" width="172" height="86" rx="6" fill="#f0f8ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="501" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#4a90d9">Rx(θ) — about x-axis</text>
  <text x="501" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[ 1      0        0   ]</text>
  <text x="501" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[ 0   cos θ  −sin θ ]</text>
  <text x="501" y="134" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[ 0   sin θ   cos θ ]</text>

  <!-- ---- Ry box ---- -->
  <rect x="415" y="170" width="172" height="86" rx="6" fill="#fef6ee" stroke="#e67e22" stroke-width="1.5"/>
  <text x="501" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#e67e22">Ry(θ) — about y-axis</text>
  <text x="501" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[ cos θ   0   sin θ ]</text>
  <text x="501" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[   0      1     0   ]</text>
  <text x="501" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[−sin θ   0   cos θ ]</text>

  <!-- ---- Rz box ---- -->
  <rect x="415" y="272" width="172" height="86" rx="6" fill="#f0faf8" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="501" y="292" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2a9d8f">Rz(θ) — about z-axis</text>
  <text x="501" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[ cos θ  −sin θ   0 ]</text>
  <text x="501" y="324" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[ sin θ   cos θ   0 ]</text>
  <text x="501" y="338" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">[   0        0      1 ]</text>

  <!-- ---- Right annotation column ---- -->
  <rect x="600" y="68" width="182" height="290" rx="6" fill="#faf8f2" stroke="#c4a87a" stroke-width="1.2"/>
  <text x="691" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5a3e1b">Key Properties</text>

  <text x="615" y="116" font-family="Georgia, serif" font-size="11" fill="#333">&#x2022; det(R) = 1</text>
  <text x="615" y="134" font-family="Georgia, serif" font-size="11" fill="#555">  determinant exactly 1;</text>
  <text x="615" y="150" font-family="Georgia, serif" font-size="11" fill="#555">  orientation preserved</text>

  <text x="615" y="176" font-family="Georgia, serif" font-size="11" fill="#333">&#x2022; R&#x1D40; = R&#x207B;&#xB9;</text>
  <text x="615" y="194" font-family="Georgia, serif" font-size="11" fill="#555">  transpose = inverse;</text>
  <text x="615" y="210" font-family="Georgia, serif" font-size="11" fill="#555">  cheap to invert</text>

  <text x="615" y="236" font-family="Georgia, serif" font-size="11" fill="#333">&#x2022; &#x2016;Rv&#x2016; = &#x2016;v&#x2016;</text>
  <text x="615" y="254" font-family="Georgia, serif" font-size="11" fill="#555">  preserves vector</text>
  <text x="615" y="270" font-family="Georgia, serif" font-size="11" fill="#555">  length and angles</text>

  <text x="615" y="296" font-family="Georgia, serif" font-size="11" fill="#333">&#x2022; R &#x2208; SO(n)</text>
  <text x="615" y="314" font-family="Georgia, serif" font-size="11" fill="#555">  special orthogonal</text>
  <text x="615" y="330" font-family="Georgia, serif" font-size="11" fill="#555">  group; closed under</text>
  <text x="615" y="346" font-family="Georgia, serif" font-size="11" fill="#555">  composition</text>

  <!-- ============================================================ -->
  <!-- Bottom caption -->
  <!-- ============================================================ -->
  <text x="400" y="392" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666">Rotation keeps lengths, angles, and handedness intact — only the orientation changes</text>
</svg>
