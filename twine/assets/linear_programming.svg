<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444" />
    </marker>
    <!-- Clip to plot area -->
    <clipPath id="plotClip">
      <rect x="70" y="20" width="580" height="320" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="8" />

  <!-- Plot area background -->
  <rect x="70" y="20" width="580" height="320" fill="#ffffff" stroke="#ccc" stroke-width="1" />

  <!-- Grid lines -->
  <g stroke="#e8e8e8" stroke-width="1" clip-path="url(#plotClip)">
    <!-- Vertical grid -->
    <line x1="130" y1="20" x2="130" y2="340" />
    <line x1="190" y1="20" x2="190" y2="340" />
    <line x1="250" y1="20" x2="250" y2="340" />
    <line x1="310" y1="20" x2="310" y2="340" />
    <line x1="370" y1="20" x2="370" y2="340" />
    <line x1="430" y1="20" x2="430" y2="340" />
    <line x1="490" y1="20" x2="490" y2="340" />
    <line x1="550" y1="20" x2="550" y2="340" />
    <line x1="610" y1="20" x2="610" y2="340" />
    <!-- Horizontal grid -->
    <line x1="70" y1="280" x2="650" y2="280" />
    <line x1="70" y1="220" x2="650" y2="220" />
    <line x1="70" y1="160" x2="650" y2="160" />
    <line x1="70" y1="100" x2="650" y2="100" />
    <line x1="70" y1="40" x2="650" y2="40" />
  </g>

  <!-- Feasible region polygon (filled)
       Constraints (in pixel space, origin at (70,340), scale 60px per unit):
         x1 >= 0  →  x >= 70
         x2 >= 0  →  y <= 340
         x1 + 2*x2 <= 8   → at x1=0: x2=4 (y=100); at x2=0: x1=8 (x=550)
         3*x1 + 2*x2 <= 12 → at x1=0: x2=6 (y=−20, clipped); at x2=0: x1=4 (x=310)
       Vertices:
         (0,0) → px (70,340)
         (4,0) → px (310,340)
         (2,3) → intersection of x1+2x2=8 and 3x1+2x2=12 → px (190,160)
         (0,4) → px (70,100)
  -->
  <polygon
    points="70,340 310,340 190,160 70,100"
    fill="#4a90d9"
    fill-opacity="0.22"
    stroke="none"
    clip-path="url(#plotClip)"
  />

  <!-- Constraint 1: x1 + 2*x2 = 8
       passes through (0,4)→px(70,100) and (8,0)→px(550,340) -->
  <line x1="70" y1="100" x2="550" y2="340"
        stroke="#2176ae" stroke-width="2.2" stroke-dasharray="6,3"
        clip-path="url(#plotClip)" />

  <!-- Constraint 2: 3*x1 + 2*x2 = 12
       passes through (0,6)→px(70,-20) and (4,0)→px(310,340)
       extend the line upward: at x1=-0.5 → px(40,370); clip handles it -->
  <line x1="70" y1="20" x2="370" y2="340"
        stroke="#e07b39" stroke-width="2.2" stroke-dasharray="6,3"
        clip-path="url(#plotClip)" />

  <!-- Constraint 3: x1 >= 0 (y-axis) -->
  <line x1="70" y1="20" x2="70" y2="340"
        stroke="#555" stroke-width="1.8"
        clip-path="url(#plotClip)" />

  <!-- Constraint 4: x2 >= 0 (x-axis) -->
  <line x1="70" y1="340" x2="650" y2="340"
        stroke="#555" stroke-width="1.8"
        clip-path="url(#plotClip)" />

  <!-- Objective function contour lines: maximize Z = 5x1 + 4x2
       Z = c  → x2 = (c - 5x1)/4
       Draw for Z=4, Z=8, Z=12, Z=16 (Z=16 passes near optimal point (2,3) → Z=5*2+4*3=22; adjust)
       Z=10: x2=(10-5x1)/4; at x1=0: x2=2.5→px(70,190); at x2=0: x1=2→px(190,340)
       Z=14: x2=(14-5x1)/4; at x1=0: x2=3.5→px(70,130); at x2=0: x1=2.8→px(238,340)
       Z=18: x2=(18-5x1)/4; at x1=0: x2=4.5→px(70,70); at x2=0: x1=3.6→px(286,340)
       Z=22 (optimal): x2=(22-5x1)/4; at x1=0: x2=5.5→px(70,10); at x2=0: x1=4.4→px(334,340)
  -->
  <!-- Z=10 -->
  <line x1="70" y1="190" x2="190" y2="340"
        stroke="#27ae60" stroke-width="1.3" opacity="0.55"
        clip-path="url(#plotClip)" />
  <text x="195" y="335" font-family="Georgia, serif" font-size="11" fill="#27ae60" opacity="0.85">Z=10</text>

  <!-- Z=14 -->
  <line x1="70" y1="130" x2="238" y2="340"
        stroke="#27ae60" stroke-width="1.3" opacity="0.7"
        clip-path="url(#plotClip)" />
  <text x="243" y="335" font-family="Georgia, serif" font-size="11" fill="#27ae60" opacity="0.85">Z=14</text>

  <!-- Z=18 -->
  <line x1="70" y1="70" x2="286" y2="340"
        stroke="#27ae60" stroke-width="1.5" opacity="0.85"
        clip-path="url(#plotClip)" />
  <text x="291" y="335" font-family="Georgia, serif" font-size="11" fill="#27ae60" opacity="0.85">Z=18</text>

  <!-- Z=22 (optimal, dashed) -->
  <line x1="70" y1="10" x2="334" y2="340"
        stroke="#27ae60" stroke-width="2" stroke-dasharray="4,4" opacity="1"
        clip-path="url(#plotClip)" />
  <text x="338" y="335" font-family="Georgia, serif" font-size="11.5" fill="#27ae60" font-weight="bold">Z=22 (optimal)</text>

  <!-- Optimal vertex: (x1=2, x2=3) → px(190,160) -->
  <circle cx="190" cy="160" r="8" fill="#e63946" stroke="#fff" stroke-width="2.5" />
  <circle cx="190" cy="160" r="12" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.5" />

  <!-- Optimal point label -->
  <rect x="200" y="128" width="110" height="28" rx="4" fill="#fff" fill-opacity="0.88" stroke="#e63946" stroke-width="1" />
  <text x="255" y="147" font-family="Georgia, serif" font-size="12.5" fill="#e63946" font-weight="bold" text-anchor="middle">Optimal (2, 3)</text>

  <!-- Feasible region label -->
  <text x="120" y="270" font-family="Georgia, serif" font-size="13" fill="#2176ae" font-weight="bold" text-anchor="middle">Feasible</text>
  <text x="120" y="287" font-family="Georgia, serif" font-size="13" fill="#2176ae" font-weight="bold" text-anchor="middle">Region</text>

  <!-- Constraint labels -->
  <!-- Constraint 1 label, near midpoint of line -->
  <rect x="328" y="193" width="138" height="20" rx="3" fill="#fff" fill-opacity="0.82" />
  <text x="397" y="208" font-family="Georgia, serif" font-size="12" fill="#2176ae" font-weight="bold" text-anchor="middle">x₁ + 2x₂ ≤ 8</text>

  <!-- Constraint 2 label -->
  <rect x="278" y="148" width="144" height="20" rx="3" fill="#fff" fill-opacity="0.82" />
  <text x="350" y="163" font-family="Georgia, serif" font-size="12" fill="#e07b39" font-weight="bold" text-anchor="middle">3x₁ + 2x₂ ≤ 12</text>

  <!-- Axes -->
  <line x1="70" y1="340" x2="658" y2="340" stroke="#444" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="70" y1="340" x2="70" y2="14" stroke="#444" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Axis labels -->
  <text x="662" y="345" font-family="Georgia, serif" font-size="14" fill="#444">x₁</text>
  <text x="54" y="10" font-family="Georgia, serif" font-size="14" fill="#444">x₂</text>

  <!-- Tick marks and numbers — x axis -->
  <g font-family="Georgia, serif" font-size="12" fill="#555" text-anchor="middle">
    <line x1="130" y1="337" x2="130" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="130" y="356">1</text>
    <line x1="190" y1="337" x2="190" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="190" y="356">2</text>
    <line x1="250" y1="337" x2="250" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="250" y="356">3</text>
    <line x1="310" y1="337" x2="310" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="310" y="356">4</text>
    <line x1="370" y1="337" x2="370" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="370" y="356">5</text>
    <line x1="430" y1="337" x2="430" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="430" y="356">6</text>
    <line x1="490" y1="337" x2="490" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="490" y="356">7</text>
    <line x1="550" y1="337" x2="550" y2="343" stroke="#555" stroke-width="1.5" />
    <text x="550" y="356">8</text>
  </g>
  <!-- Tick marks and numbers — y axis -->
  <g font-family="Georgia, serif" font-size="12" fill="#555" text-anchor="end">
    <line x1="67" y1="280" x2="73" y2="280" stroke="#555" stroke-width="1.5" />
    <text x="62" y="284">1</text>
    <line x1="67" y1="220" x2="73" y2="220" stroke="#555" stroke-width="1.5" />
    <text x="62" y="224">2</text>
    <line x1="67" y1="160" x2="73" y2="160" stroke="#555" stroke-width="1.5" />
    <text x="62" y="164">3</text>
    <line x1="67" y1="100" x2="73" y2="100" stroke="#555" stroke-width="1.5" />
    <text x="62" y="104">4</text>
    <line x1="67" y1="40" x2="73" y2="40" stroke="#555" stroke-width="1.5" />
    <text x="62" y="44">5</text>
  </g>

  <!-- Origin label -->
  <text x="58" y="356" font-family="Georgia, serif" font-size="12" fill="#555" text-anchor="middle">0</text>

  <!-- Legend -->
  <rect x="660" y="30" width="128" height="130" rx="6" fill="#fff" stroke="#ccc" stroke-width="1" />
  <text x="724" y="48" font-family="Georgia, serif" font-size="12.5" fill="#333" font-weight="bold" text-anchor="middle">Legend</text>

  <rect x="672" y="56" width="18" height="12" fill="#4a90d9" fill-opacity="0.35" stroke="#2176ae" stroke-width="1" />
  <text x="696" y="67" font-family="Georgia, serif" font-size="11.5" fill="#333">Feasible region</text>

  <line x1="672" y1="84" x2="690" y2="84" stroke="#2176ae" stroke-width="2.2" stroke-dasharray="5,2" />
  <text x="696" y="88" font-family="Georgia, serif" font-size="11.5" fill="#333">Constraint 1</text>

  <line x1="672" y1="104" x2="690" y2="104" stroke="#e07b39" stroke-width="2.2" stroke-dasharray="5,2" />
  <text x="696" y="108" font-family="Georgia, serif" font-size="11.5" fill="#333">Constraint 2</text>

  <line x1="672" y1="124" x2="690" y2="124" stroke="#27ae60" stroke-width="1.8" />
  <text x="696" y="128" font-family="Georgia, serif" font-size="11.5" fill="#333">Objective Z</text>

  <circle cx="681" cy="146" r="5" fill="#e63946" stroke="#fff" stroke-width="1.5" />
  <text x="696" y="150" font-family="Georgia, serif" font-size="11.5" fill="#333">Optimal point</text>

  <!-- Title -->
  <text x="400" y="385" font-family="Georgia, serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Maximize Z = 5x₁ + 4x₂ subject to linear constraints</text>
</svg>
