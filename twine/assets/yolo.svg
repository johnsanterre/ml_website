<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Image with grid overlay -->
  <rect x="40" y="60" width="300" height="280" rx="6" fill="#f0f0f0" stroke="#999" stroke-width="2"/>
  <text x="190" y="45" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Input Image + Grid</text>
  <!-- Grid lines (5x5) -->
  <line x1="100" y1="60" x2="100" y2="340" stroke="#ccc" stroke-width="1"/>
  <line x1="160" y1="60" x2="160" y2="340" stroke="#ccc" stroke-width="1"/>
  <line x1="220" y1="60" x2="220" y2="340" stroke="#ccc" stroke-width="1"/>
  <line x1="280" y1="60" x2="280" y2="340" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="116" x2="340" y2="116" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="172" x2="340" y2="172" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="228" x2="340" y2="228" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="284" x2="340" y2="284" stroke="#ccc" stroke-width="1"/>
  <!-- Object: person bounding box -->
  <rect x="85" y="90" width="100" height="180" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <text x="135" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">Person 0.97</text>
  <!-- Object: car bounding box -->
  <rect x="200" y="200" width="120" height="80" fill="none" stroke="#4a90d9" stroke-width="3"/>
  <text x="260" y="196" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">Car 0.89</text>
  <!-- Arrow -->
  <line x1="350" y1="200" x2="410" y2="200" stroke="#888" stroke-width="2.5" marker-end="url(#arryolo)"/>
  <text x="380" y="192" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Single</text>
  <text x="380" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">pass</text>
  <!-- Output breakdown -->
  <rect x="420" y="80" width="340" height="240" rx="10" fill="#f8f8f8" stroke="#27ae60" stroke-width="2"/>
  <text x="590" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#27ae60">Per-cell Prediction</text>
  <text x="590" y="115" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">• B bounding boxes (x, y, w, h, conf)</text>
  <text x="590" y="145" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">• C class probabilities</text>
  <text x="590" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">• Objectness score</text>
  <line x1="430" y1="200" x2="750" y2="200" stroke="#ddd" stroke-width="1"/>
  <text x="590" y="225" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22" font-weight="bold">One forward pass → all detections</text>
  <text x="590" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">NMS removes duplicate boxes</text>
  <text x="590" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">S×S×(B×5 + C) output tensor</text>
  <defs><marker id="arryolo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker></defs>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">YOLO: You Only Look Once</text>
</svg>
