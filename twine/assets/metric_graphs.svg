<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <!-- Arrow for shortest path -->
    <marker id="arr-path" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <!-- Arrow for regular edges -->
    <marker id="arr-edge" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9A8F82"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4"/>

  <!-- ── Panel title ── -->
  <text x="310" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">WEIGHTED GRAPH WITH SHORTEST PATH AND GRAPH METRICS</text>

  <!-- ═══════════════════════════════════════════════
       REGULAR EDGES (grey)
       Nodes: A(120,80), B(300,60), C(80,220), D(280,210), E(480,140), F(460,290)
  ═══════════════════════════════════════════════ -->

  <!-- A – C  weight 3 -->
  <line x1="120" y1="103" x2="88" y2="197" stroke="#B0A898" stroke-width="2"/>
  <rect x="82" y="143" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="93" y="153" text-anchor="middle" font-size="10" fill="#6B5D4F">3</text>

  <!-- A – B  weight 5 -->
  <line x1="143" y1="73" x2="277" y2="63" stroke="#B0A898" stroke-width="2"/>
  <rect x="197" y="57" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="208" y="67" text-anchor="middle" font-size="10" fill="#6B5D4F">5</text>

  <!-- B – E  weight 4 -->
  <line x1="323" y1="67" x2="457" y2="133" stroke="#B0A898" stroke-width="2"/>
  <rect x="377" y="88" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="388" y="98" text-anchor="middle" font-size="10" fill="#6B5D4F">4</text>

  <!-- B – D  weight 6 -->
  <line x1="300" y1="83" x2="288" y2="187" stroke="#B0A898" stroke-width="2"/>
  <rect x="280" y="130" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="291" y="140" text-anchor="middle" font-size="10" fill="#6B5D4F">6</text>

  <!-- C – D  weight 4 -->
  <line x1="103" y1="220" x2="257" y2="213" stroke="#B0A898" stroke-width="2"/>
  <rect x="167" y="207" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="178" y="217" text-anchor="middle" font-size="10" fill="#6B5D4F">4</text>

  <!-- D – E  weight 7 -->
  <line x1="303" y1="200" x2="457" y2="151" stroke="#B0A898" stroke-width="2"/>
  <rect x="368" y="166" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="379" y="176" text-anchor="middle" font-size="10" fill="#6B5D4F">7</text>

  <!-- D – F  weight 5 -->
  <line x1="285" y1="233" x2="437" y2="280" stroke="#B0A898" stroke-width="2"/>
  <rect x="348" y="248" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="359" y="258" text-anchor="middle" font-size="10" fill="#6B5D4F">5</text>

  <!-- E – F  weight 3 -->
  <line x1="470" y1="163" x2="462" y2="267" stroke="#B0A898" stroke-width="2"/>
  <rect x="452" y="210" width="22" height="14" rx="2" fill="#FDFAF4"/>
  <text x="463" y="220" text-anchor="middle" font-size="10" fill="#6B5D4F">3</text>

  <!-- ═══════════════════════════════════════════════
       SHORTEST PATH: C → E  =  C–D–E = 4+7=11
       highlighted in blue
  ═══════════════════════════════════════════════ -->

  <!-- C – D  (shortest path leg 1) -->
  <line x1="103" y1="216" x2="257" y2="209" stroke="#2D5A8E" stroke-width="3.5"/>
  <!-- D – E  (shortest path leg 2) -->
  <line x1="303" y1="196" x2="457" y2="147" stroke="#2D5A8E" stroke-width="3.5"/>

  <!-- shortest path weight labels (override grey) -->
  <rect x="167" y="202" width="22" height="14" rx="2" fill="#D8E6F5"/>
  <text x="178" y="212" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">4</text>
  <rect x="368" y="161" width="22" height="14" rx="2" fill="#D8E6F5"/>
  <text x="379" y="171" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">7</text>

  <!-- ═══════════════════════════════════════════════
       NODES
  ═══════════════════════════════════════════════ -->

  <!-- Node A -->
  <circle cx="120" cy="82" r="22" fill="#EDE5D0" stroke="#C4A87A" stroke-width="2"/>
  <text x="120" y="87" text-anchor="middle" font-size="14" font-weight="bold" fill="#5C3D1E">A</text>

  <!-- Node B -->
  <circle cx="300" cy="63" r="22" fill="#EDE5D0" stroke="#C4A87A" stroke-width="2"/>
  <text x="300" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#5C3D1E">B</text>

  <!-- Node C — source of shortest path -->
  <circle cx="82" cy="218" r="24" fill="#2D5A8E" fill-opacity="0.85" stroke="#1A3A5E" stroke-width="2.5"/>
  <text x="82" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#FDFAF4">C</text>

  <!-- Node D — on shortest path -->
  <circle cx="280" cy="210" r="22" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="280" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D5A8E">D</text>

  <!-- Node E — destination of shortest path -->
  <circle cx="468" cy="143" r="24" fill="#7C2530" fill-opacity="0.85" stroke="#5A1A22" stroke-width="2.5"/>
  <text x="468" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#FDFAF4">E</text>

  <!-- Node F -->
  <circle cx="452" cy="288" r="22" fill="#EDE5D0" stroke="#C4A87A" stroke-width="2"/>
  <text x="452" y="293" text-anchor="middle" font-size="14" font-weight="bold" fill="#5C3D1E">F</text>

  <!-- ═══════════════════════════════════════════════
       SHORTEST PATH LABEL
  ═══════════════════════════════════════════════ -->
  <rect x="140" y="260" width="200" height="32" rx="4" fill="#D8E6F5" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="240" y="273" text-anchor="middle" font-size="10" font-weight="bold" fill="#2D5A8E">Shortest path C → E</text>
  <text x="240" y="286" text-anchor="middle" font-size="10" fill="#2D5A8E">C – D – E   d(C,E) = 4 + 7 = 11</text>

  <!-- ═══════════════════════════════════════════════
       RIGHT PANEL — Graph Metrics
  ═══════════════════════════════════════════════ -->
  <rect x="560" y="36" width="222" height="320" rx="6" fill="#F4EFE6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="671" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#5C3D1E">Graph Metrics</text>
  <line x1="572" y1="64" x2="770" y2="64" stroke="#C4A87A" stroke-width="1"/>

  <!-- Diameter -->
  <text x="572" y="86" font-size="10" font-weight="bold" fill="#2D5A8E">Diameter</text>
  <text x="572" y="100" font-size="9.5" fill="#5C3D1E">max shortest path between</text>
  <text x="572" y="113" font-size="9.5" fill="#5C3D1E">any two nodes</text>
  <text x="572" y="127" font-size="9.5" fill="#7C2530" font-style="italic">diam(G) = 16  (A↔F)</text>

  <line x1="572" y1="136" x2="770" y2="136" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Eccentricity -->
  <text x="572" y="154" font-size="10" font-weight="bold" fill="#2D5A8E">Eccentricity</text>
  <text x="572" y="168" font-size="9.5" fill="#5C3D1E">max distance from one node</text>
  <text x="572" y="181" font-size="9.5" fill="#5C3D1E">to any other</text>
  <text x="572" y="195" font-size="9.5" fill="#7C2530" font-style="italic">ecc(D) = 13   ecc(B) = 12</text>

  <line x1="572" y1="204" x2="770" y2="204" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Radius -->
  <text x="572" y="222" font-size="10" font-weight="bold" fill="#2D5A8E">Radius</text>
  <text x="572" y="236" font-size="9.5" fill="#5C3D1E">min eccentricity over all nodes</text>
  <text x="572" y="250" font-size="9.5" fill="#7C2530" font-style="italic">rad(G) = 11   (center: B or D)</text>

  <line x1="572" y1="259" x2="770" y2="259" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Clustering Coefficient -->
  <text x="572" y="277" font-size="10" font-weight="bold" fill="#2D5A8E">Clustering Coeff.</text>
  <text x="572" y="291" font-size="9.5" fill="#5C3D1E">fraction of neighbor pairs</text>
  <text x="572" y="304" font-size="9.5" fill="#5C3D1E">that are also connected</text>
  <text x="572" y="318" font-size="9.5" fill="#7C2530" font-style="italic">C(D) = 1/3  (1 of 3 pairs linked)</text>

  <!-- ═══════════════════════════════════════════════
       LEGEND  (bottom left)
  ═══════════════════════════════════════════════ -->
  <circle cx="52" cy="345" r="9" fill="#2D5A8E" fill-opacity="0.85" stroke="#1A3A5E" stroke-width="1.5"/>
  <text x="67" y="349" font-size="10" fill="#2D5A8E">Source / destination node</text>

  <circle cx="52" cy="366" r="9" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="67" y="370" font-size="10" fill="#5C3D1E">Other node</text>

  <line x1="36" y1="384" x2="62" y2="384" stroke="#2D5A8E" stroke-width="3.5"/>
  <text x="67" y="388" font-size="10" fill="#2D5A8E">Shortest path  d(C,E) = 11</text>

  <line x1="270" y1="384" x2="296" y2="384" stroke="#B0A898" stroke-width="2"/>
  <text x="301" y="388" font-size="10" fill="#6B5D4F">Other edge (weighted)</text>
</svg>
