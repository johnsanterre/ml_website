<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Lagrangian Duality</text>
  <!-- Primal problem -->
  <rect x="40" y="50" width="320" height="150" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="200" y="80" text-anchor="middle" font-size="14" fill="#2196F3" font-weight="bold">Primal Problem</text>
  <text x="200" y="108" text-anchor="middle" font-size="13" fill="#333">min f(x)</text>
  <text x="200" y="130" text-anchor="middle" font-size="12" fill="#555">s.t. gᵢ(x) ≤ 0</text>
  <text x="200" y="150" text-anchor="middle" font-size="12" fill="#555">     hⱼ(x) = 0</text>
  <text x="200" y="175" text-anchor="middle" font-size="11" fill="#888">optimal value: p*</text>
  <!-- Arrow -->
  <line x1="370" y1="125" x2="430" y2="125" stroke="#555" stroke-width="2" marker-end="url(#a8)"/>
  <defs><marker id="a8" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker></defs>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#555">Lagrangian</text>
  <!-- Dual problem -->
  <rect x="440" y="50" width="320" height="150" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="600" y="80" text-anchor="middle" font-size="14" fill="#E91E63" font-weight="bold">Dual Problem</text>
  <text x="600" y="108" text-anchor="middle" font-size="13" fill="#333">max g(λ, ν)</text>
  <text x="600" y="130" text-anchor="middle" font-size="12" fill="#555">s.t. λ ≥ 0</text>
  <text x="600" y="150" text-anchor="middle" font-size="12" fill="#555">g(λ,ν) = inf_x L(x,λ,ν)</text>
  <text x="600" y="175" text-anchor="middle" font-size="11" fill="#888">optimal value: d*</text>
  <!-- Lagrangian box -->
  <rect x="200" y="230" width="400" height="80" rx="8" fill="#f9f9f9" stroke="#ddd"/>
  <text x="400" y="255" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">L(x,λ,ν) = f(x) + Σλᵢgᵢ(x) + Σνⱼhⱼ(x)</text>
  <text x="400" y="280" text-anchor="middle" font-size="12" fill="#555">Weak duality: d* ≤ p* always</text>
  <text x="400" y="298" text-anchor="middle" font-size="12" fill="#2196F3">Strong duality (Slater's): d* = p*</text>
  <!-- KKT note -->
  <text x="400" y="345" text-anchor="middle" font-size="13" fill="#E91E63">KKT conditions: necessary &amp; sufficient for convex problems</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#888">Used in SVM derivation, constrained optimization, and primal-dual methods</text>
</svg>
