<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="anova-ax" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel label -->
  <text x="400" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">ANOVA: PARTITIONING VARIANCE INTO SIGNAL AND NOISE</text>

  <!-- ══ PANEL 1: Three group distributions ══ -->
  <text x="185" y="45" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">THREE GROUPS</text>

  <!-- X axis panel 1 -->
  <line x1="50" y1="310" x2="320" y2="310" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#anova-ax)"/>
  <text x="185" y="328" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">outcome</text>

  <!-- Group A distribution (red, centered ~100) -->
  <ellipse cx="100" cy="230" rx="28" ry="70" fill="#7C2530" opacity="0.18"/>
  <line x1="100" y1="160" x2="100" y2="310" stroke="#7C2530" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="100" y="150" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">A</text>
  <text x="100" y="322" text-anchor="middle" font-size="9" fill="#7C2530">μ₁</text>

  <!-- Group B distribution (navy, centered ~185) -->
  <ellipse cx="185" cy="230" rx="28" ry="70" fill="#2D5A8E" opacity="0.18"/>
  <line x1="185" y1="160" x2="185" y2="310" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="185" y="150" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">B</text>
  <text x="185" y="322" text-anchor="middle" font-size="9" fill="#2D5A8E">μ₂</text>

  <!-- Group C distribution (brown, centered ~270) -->
  <ellipse cx="270" cy="230" rx="28" ry="70" fill="#5C3D1E" opacity="0.18"/>
  <line x1="270" y1="160" x2="270" y2="310" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">C</text>
  <text x="270" y="322" text-anchor="middle" font-size="9" fill="#5C3D1E">μ₃</text>

  <!-- Grand mean line -->
  <line x1="55" y1="230" x2="315" y2="230" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="318" y="234" font-size="9" fill="#C4A87A" font-style="italic">μ̄</text>

  <!-- ══ PANEL 2: Variance decomposition bar chart ══ -->
  <text x="530" y="45" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">VARIANCE DECOMPOSITION</text>

  <!-- Total variance bar -->
  <rect x="390" y="80" width="280" height="36" fill="#D4C5A9" rx="3"/>
  <text x="530" y="103" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">SS_Total</text>

  <!-- Arrow down -->
  <line x1="530" y1="116" x2="530" y2="138" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#anova-ax)"/>

  <!-- Between-groups bar (red) -->
  <rect x="390" y="145" width="130" height="36" fill="#7C2530" opacity="0.75" rx="3"/>
  <text x="455" y="168" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">SS_Between</text>

  <!-- Within-groups bar (navy) -->
  <rect x="530" y="145" width="140" height="36" fill="#2D5A8E" opacity="0.75" rx="3"/>
  <text x="600" y="168" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">SS_Within</text>

  <!-- Labels below bars -->
  <text x="455" y="195" text-anchor="middle" font-size="9.5" fill="#7C2530">(signal)</text>
  <text x="600" y="195" text-anchor="middle" font-size="9.5" fill="#2D5A8E">(noise)</text>

  <!-- F-ratio annotation -->
  <rect x="415" y="215" width="230" height="44" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="530" y="233" text-anchor="middle" font-size="11" fill="#5C3D1E" font-style="italic">F = MS_Between / MS_Within</text>
  <text x="530" y="251" text-anchor="middle" font-size="9.5" fill="#6B5D4F">Large F → groups differ more than chance</text>

  <!-- ══ PANEL 3: F-distribution sketch ══ -->
  <text x="530" y="285" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">F-DISTRIBUTION</text>

  <!-- Axes -->
  <line x1="390" y1="368" x2="680" y2="368" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#anova-ax)"/>
  <line x1="390" y1="368" x2="390" y2="295" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#anova-ax)"/>

  <!-- F-distribution curve (approximate) -->
  <path d="M395,367 C400,330 410,300 425,298 C440,296 455,310 465,325 C480,345 490,358 510,363 C530,366 560,367 680,368"
        fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.8"/>

  <!-- Critical region shading -->
  <path d="M610,367 C615,366 620,364 625,360 C630,354 635,345 640,338 C645,344 650,355 655,362 C660,366 665,367 680,368 Z"
        fill="#7C2530" opacity="0.35"/>
  <text x="645" y="358" text-anchor="middle" font-size="8.5" fill="#7C2530">p &lt; α</text>

  <!-- F_obs annotation -->
  <line x1="610" y1="305" x2="610" y2="367" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="610" y="300" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">F_obs</text>

  <text x="390" y="385" font-size="9" fill="#6B5D4F">0</text>
  <text x="680" y="385" font-size="9" fill="#6B5D4F" text-anchor="end">F</text>

  <!-- Bottom caption -->
  <text x="400" y="390" text-anchor="middle" font-size="9" fill="#6B5D4F">
    If F_obs falls in the red tail, at least one group mean differs significantly
  </text>
</svg>
