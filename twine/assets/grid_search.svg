<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══════════════════════════════════════════════════════
       LEFT PANEL — Grid Search (6×5 grid)
  ══════════════════════════════════════════════════════ -->

  <text x="195" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">GRID SEARCH — 30 EVALUATIONS</text>

  <!-- Y-axis label: learning rate -->
  <text x="30" y="210" font-size="9" fill="#6B5D4F" text-anchor="middle" transform="rotate(-90,30,210)">learning rate</text>

  <!-- X-axis label: regularization -->
  <text x="195" y="375" text-anchor="middle" font-size="9" fill="#6B5D4F">regularization strength</text>

  <!-- Y-axis tick labels (learning rate, high→low top→bottom) -->
  <text x="52" y="75"  text-anchor="end" font-size="8" fill="#6B5D4F">0.100</text>
  <text x="52" y="125" text-anchor="end" font-size="8" fill="#6B5D4F">0.050</text>
  <text x="52" y="175" text-anchor="end" font-size="8" fill="#6B5D4F">0.010</text>
  <text x="52" y="225" text-anchor="end" font-size="8" fill="#6B5D4F">0.005</text>
  <text x="52" y="275" text-anchor="end" font-size="8" fill="#6B5D4F">0.001</text>

  <!-- X-axis tick labels (regularization, low→high left→right) -->
  <text x="75"  y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-4</text>
  <text x="125" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-3</text>
  <text x="175" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-2</text>
  <text x="225" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-1</text>
  <text x="275" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e+0</text>
  <text x="325" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e+1</text>

  <!-- Color scale: poor=#EDE5D0, medium=#C4A87A, good=#7C2530, best=#4A1520 -->
  <!-- Row 1 (lr=0.100) — unstable, mostly poor -->
  <rect x="55" y="55" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="105" y="55" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="155" y="55" width="40" height="40" rx="2" fill="#D8C8A0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="205" y="55" width="40" height="40" rx="2" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="255" y="55" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="305" y="55" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>

  <!-- Row 2 (lr=0.050) — better -->
  <rect x="55"  y="105" width="40" height="40" rx="2" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="105" y="105" width="40" height="40" rx="2" fill="#A07848" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="155" y="105" width="40" height="40" rx="2" fill="#7C2530" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="205" y="105" width="40" height="40" rx="2" fill="#7C2530" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="255" y="105" width="40" height="40" rx="2" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="305" y="105" width="40" height="40" rx="2" fill="#D8C8A0" stroke="#C4B99A" stroke-width="0.8"/>

  <!-- Row 3 (lr=0.010) — best region -->
  <rect x="55"  y="155" width="40" height="40" rx="2" fill="#A07848" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="105" y="155" width="40" height="40" rx="2" fill="#7C2530" stroke="#C4B99A" stroke-width="0.8"/>
  <!-- BEST CELL -->
  <rect x="155" y="155" width="40" height="40" rx="2" fill="#4A1520" stroke="#1A0508" stroke-width="2.5"/>
  <rect x="205" y="155" width="40" height="40" rx="2" fill="#7C2530" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="255" y="155" width="40" height="40" rx="2" fill="#A07848" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="305" y="155" width="40" height="40" rx="2" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>

  <!-- Row 4 (lr=0.005) -->
  <rect x="55"  y="205" width="40" height="40" rx="2" fill="#D8C8A0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="105" y="205" width="40" height="40" rx="2" fill="#A07848" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="155" y="205" width="40" height="40" rx="2" fill="#7C2530" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="205" y="205" width="40" height="40" rx="2" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="255" y="205" width="40" height="40" rx="2" fill="#D8C8A0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="305" y="205" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>

  <!-- Row 5 (lr=0.001) — too slow, mostly poor -->
  <rect x="55"  y="255" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="105" y="255" width="40" height="40" rx="2" fill="#D8C8A0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="155" y="255" width="40" height="40" rx="2" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="205" y="255" width="40" height="40" rx="2" fill="#D8C8A0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="255" y="255" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>
  <rect x="305" y="255" width="40" height="40" rx="2" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>

  <!-- Best cell annotation -->
  <text x="175" y="179" text-anchor="middle" font-size="8" fill="#FDFAF4" font-weight="bold">BEST</text>
  <!-- Arrow from label to best cell -->
  <line x1="175" y1="155" x2="175" y2="130" stroke="#4A1520" stroke-width="1.2"/>
  <text x="175" y="126" text-anchor="middle" font-size="8" fill="#4A1520">val acc = 0.923</text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT PANEL — Random Search (same space, fewer points)
  ══════════════════════════════════════════════════════ -->

  <text x="605" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">RANDOM SEARCH — 12 EVALUATIONS</text>

  <!-- Y-axis label -->
  <text x="440" y="210" font-size="9" fill="#6B5D4F" text-anchor="middle" transform="rotate(-90,440,210)">learning rate</text>

  <!-- X-axis label -->
  <text x="605" y="375" text-anchor="middle" font-size="9" fill="#6B5D4F">regularization strength</text>

  <!-- Y-axis ticks (same labels) -->
  <text x="462" y="75"  text-anchor="end" font-size="8" fill="#6B5D4F">0.100</text>
  <text x="462" y="125" text-anchor="end" font-size="8" fill="#6B5D4F">0.050</text>
  <text x="462" y="175" text-anchor="end" font-size="8" fill="#6B5D4F">0.010</text>
  <text x="462" y="225" text-anchor="end" font-size="8" fill="#6B5D4F">0.005</text>
  <text x="462" y="275" text-anchor="end" font-size="8" fill="#6B5D4F">0.001</text>

  <!-- X-axis ticks -->
  <text x="485" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-4</text>
  <text x="535" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-3</text>
  <text x="585" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-2</text>
  <text x="635" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e-1</text>
  <text x="685" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e+0</text>
  <text x="735" y="356" text-anchor="middle" font-size="8" fill="#6B5D4F">1e+1</text>

  <!-- Background grid outline for right panel -->
  <rect x="465" y="55" width="290" height="245" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1" rx="2"/>

  <!-- Grid lines (faint) -->
  <line x1="465" y1="105" x2="755" y2="105" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="465" y1="155" x2="755" y2="155" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="465" y1="205" x2="755" y2="205" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="465" y1="255" x2="755" y2="255" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="515" y1="55"  x2="515" y2="300" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="565" y1="55"  x2="565" y2="300" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="615" y1="55"  x2="615" y2="300" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="665" y1="55"  x2="665" y2="300" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="715" y1="55"  x2="715" y2="300" stroke="#D4C5A9" stroke-width="0.5"/>

  <!-- 12 random sample points (circles), scattered across the space -->
  <!-- Each circle: cx/cy random position, colored by score -->
  <!-- poor score -->
  <circle cx="478" cy="68"  r="10" fill="#EDE5D0" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- medium -->
  <circle cx="542" cy="82"  r="10" fill="#C4A87A" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- poor -->
  <circle cx="498" cy="138" r="10" fill="#D8C8A0" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- good -->
  <circle cx="608" cy="118" r="10" fill="#7C2530" stroke="#8B3040" stroke-width="1.2"/>
  <!-- medium -->
  <circle cx="672" cy="75"  r="10" fill="#C4A87A" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- good — best found -->
  <circle cx="576" cy="163" r="10" fill="#7C2530" stroke="#1A0508" stroke-width="2.2"/>
  <!-- medium -->
  <circle cx="730" cy="148" r="10" fill="#A07848" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- poor -->
  <circle cx="490" cy="228" r="10" fill="#EDE5D0" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- medium -->
  <circle cx="638" cy="215" r="10" fill="#C4A87A" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- poor -->
  <circle cx="706" cy="272" r="10" fill="#D8C8A0" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- poor -->
  <circle cx="558" cy="282" r="10" fill="#EDE5D0" stroke="#C4B99A" stroke-width="1.2"/>
  <!-- medium -->
  <circle cx="748" cy="235" r="10" fill="#C4A87A" stroke="#C4B99A" stroke-width="1.2"/>

  <!-- Best found annotation (right panel) -->
  <line x1="576" y1="153" x2="576" y2="130" stroke="#4A1520" stroke-width="1.2"/>
  <text x="576" y="126" text-anchor="middle" font-size="8" fill="#4A1520">val acc = 0.911</text>

  <!-- Coverage note -->
  <text x="605" y="318" text-anchor="middle" font-size="8.5" fill="#6B5D4F" font-style="italic">samples spread across the full space</text>

  <!-- ══════════════════════════════════════════════════════
       COLOUR LEGEND (bottom centre)
  ══════════════════════════════════════════════════════ -->

  <text x="400" y="380" text-anchor="middle" font-size="8.5" fill="#6B5D4F">validation accuracy:</text>
  <!-- low -->
  <rect x="275" y="386" width="14" height="10" rx="1" fill="#EDE5D0" stroke="#C4B99A" stroke-width="0.8"/>
  <text x="293" y="395" font-size="8" fill="#6B5D4F">low</text>
  <!-- medium-low -->
  <rect x="320" y="386" width="14" height="10" rx="1" fill="#C4A87A" stroke="#C4B99A" stroke-width="0.8"/>
  <text x="338" y="395" font-size="8" fill="#6B5D4F">medium</text>
  <!-- high -->
  <rect x="385" y="386" width="14" height="10" rx="1" fill="#7C2530" stroke="#C4B99A" stroke-width="0.8"/>
  <text x="403" y="395" font-size="8" fill="#6B5D4F">high</text>
  <!-- best -->
  <rect x="430" y="386" width="14" height="10" rx="1" fill="#4A1520" stroke="#1A0508" stroke-width="1.5"/>
  <text x="448" y="395" font-size="8" fill="#6B5D4F">best (grid only)</text>

  <!-- Dividing line between panels -->
  <line x1="410" y1="30" x2="410" y2="360" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

</svg>
