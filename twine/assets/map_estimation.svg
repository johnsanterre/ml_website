<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <defs>
    <marker id="map-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#5C3D1E">Maximum A Posteriori: Prior-Informed Optimization</text>

  <!-- Curve: prior -->
  <path d="M 60,310 C 100,310 110,100 200,95 C 290,90 300,310 340,310" fill="#DAE8F5" stroke="#2D5A8E" stroke-width="2" fill-opacity="0.5"/>
  <text x="200" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D5A8E">Prior p(θ)</text>

  <!-- Curve: likelihood -->
  <path d="M 300,310 C 340,310 350,90 450,80 C 550,70 560,310 600,310" fill="#F9E8E8" stroke="#7C2530" stroke-width="2" fill-opacity="0.5"/>
  <text x="450" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C2530">Likelihood p(x|θ)</text>

  <!-- Curve: posterior (product) -->
  <path d="M 280,310 C 310,310 320,130 390,118 C 460,106 470,310 510,310" fill="#F3EDE3" stroke="#5C3D1E" stroke-width="2.5" fill-opacity="0.7"/>
  <text x="395" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#5C3D1E">Posterior p(θ|x)</text>

  <!-- MLE marker -->
  <line x1="450" y1="80" x2="450" y2="310" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="450" cy="80" r="5" fill="#7C2530"/>
  <text x="460" y="335" font-size="11" fill="#7C2530">θ_MLE</text>

  <!-- MAP marker -->
  <line x1="390" y1="118" x2="390" y2="310" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="390" cy="118" r="6" fill="#5C3D1E"/>
  <text x="358" y="335" font-size="11" fill="#5C3D1E">θ_MAP</text>

  <!-- Gap annotation -->
  <line x1="391" y1="346" x2="449" y2="346" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#map-arr)"/>
  <line x1="449" y1="346" x2="449" y2="346"/>
  <text x="420" y="362" text-anchor="middle" font-size="10" fill="#C4A87A">prior pulls MAP toward center</text>

  <!-- Three-way comparison box -->
  <rect x="590" y="80" width="185" height="185" rx="10" fill="#FFFEF8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="682" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#5C3D1E">Estimator Trio</text>
  <line x1="605" y1="110" x2="760" y2="110" stroke="#D4C5A9" stroke-width="1"/>
  <text x="682" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2D5A8E">MLE</text>
  <text x="682" y="144" text-anchor="middle" font-size="10" fill="#555">max p(x | θ)</text>
  <text x="682" y="158" text-anchor="middle" font-size="10" fill="#888">no prior, can overfit</text>
  <line x1="605" y1="165" x2="760" y2="165" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="682" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#5C3D1E">MAP</text>
  <text x="682" y="198" text-anchor="middle" font-size="10" fill="#555">max p(θ | x)</text>
  <text x="682" y="212" text-anchor="middle" font-size="10" fill="#888">point estimate + prior</text>
  <line x1="605" y1="218" x2="760" y2="218" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="682" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C2530">Full Bayes</text>
  <text x="682" y="251" text-anchor="middle" font-size="10" fill="#555">entire posterior p(θ|x)</text>

  <!-- Axis -->
  <line x1="60" y1="310" x2="570" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#map-arr)"/>
  <text x="310" y="385" text-anchor="middle" font-size="12" fill="#888">θ (parameter space)</text>
</svg>
