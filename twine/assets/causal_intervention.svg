<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="cint-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="cint-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D6A4F"/>
    </marker>
    <marker id="cint-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Top label -->
  <text x="400" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">THE do() OPERATOR: OBSERVING vs INTERVENING</text>

  <!-- ══ LEFT: Observational world (P(Y|X)) ══ -->
  <text x="185" y="44" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">OBSERVE: P(Y | X=x)</text>

  <!-- Confounder -->
  <ellipse cx="185" cy="88" rx="50" ry="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="185" y="92" text-anchor="middle" font-size="10" fill="#5C3D1E">Confounder Z</text>

  <!-- X node -->
  <ellipse cx="100" cy="190" rx="44" ry="20" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="100" y="194" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">X</text>

  <!-- Y node -->
  <ellipse cx="270" cy="190" rx="44" ry="20" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="270" y="194" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Y</text>

  <!-- Z → X -->
  <line x1="148" y1="102" x2="116" y2="173" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#cint-arr)"/>
  <!-- Z → Y -->
  <line x1="222" y1="102" x2="254" y2="173" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#cint-arr)"/>
  <!-- X → Y (causal + confounded) -->
  <line x1="144" y1="190" x2="226" y2="190" stroke="#7C2530" stroke-width="2" marker-end="url(#cint-red)"/>

  <!-- P(Y|X) label -->
  <rect x="60" y="228" width="250" height="28" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="3"/>
  <text x="185" y="247" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">P(Y|X) mixes cause and confounding</text>

  <!-- ══ CENTER divider ══ -->
  <line x1="370" y1="40" x2="370" y2="360" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- do() label -->
  <rect x="340" y="175" width="60" height="30" fill="#7C2530" rx="4"/>
  <text x="370" y="195" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">do()</text>

  <!-- ══ RIGHT: Interventional world (P(Y|do(X))) ══ -->
  <text x="580" y="44" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">INTERVENE: P(Y | do(X=x))</text>

  <!-- Confounder (disconnected from X) -->
  <ellipse cx="580" cy="88" rx="50" ry="20" fill="#C4A87A" stroke="#BBBBBB" stroke-width="1.5" opacity="0.5"/>
  <text x="580" y="92" text-anchor="middle" font-size="10" fill="#BBBBBB">Confounder Z</text>

  <!-- X node — forced by experimenter -->
  <ellipse cx="490" cy="190" rx="44" ry="20" fill="#2D6A4F" stroke="#2D6A4F" stroke-width="2"/>
  <text x="490" y="194" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">X = x</text>
  <!-- Intervention box -->
  <rect x="446" y="220" width="88" height="18" fill="#F2EAD8" stroke="#2D6A4F" stroke-width="1" rx="2"/>
  <text x="490" y="233" text-anchor="middle" font-size="8.5" fill="#2D6A4F">set by experimenter</text>

  <!-- Y node -->
  <ellipse cx="670" cy="190" rx="44" ry="20" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="670" y="194" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Y</text>

  <!-- Z -/-> X (severed) -->
  <line x1="545" y1="102" x2="514" y2="173" stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="528" y="142" text-anchor="middle" font-size="13" fill="#7C2530">✗</text>
  <!-- Z → Y still -->
  <line x1="615" y1="102" x2="648" y2="173" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#cint-arr)" opacity="0.4"/>
  <!-- X → Y (pure causal) -->
  <line x1="534" y1="190" x2="626" y2="190" stroke="#2D6A4F" stroke-width="2.5" marker-end="url(#cint-grn)"/>
  <text x="580" y="183" text-anchor="middle" font-size="9" fill="#2D6A4F" font-style="italic">pure causal effect</text>

  <!-- P(Y|do(X)) label -->
  <rect x="455" y="255" width="250" height="28" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="3"/>
  <text x="580" y="274" text-anchor="middle" font-size="10" fill="#2D6A4F" font-style="italic">P(Y|do(X)) = true causal effect</text>

  <!-- Bottom equation -->
  <rect x="200" y="318" width="400" height="38" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="400" y="334" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Adjustment Formula (backdoor):</text>
  <text x="400" y="350" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">P(Y|do(X)) = Σ_z P(Y|X,Z=z) · P(Z=z)</text>

  <!-- Bottom caption -->
  <text x="400" y="392" text-anchor="middle" font-size="9" fill="#6B5D4F">
    Intervention severs incoming arrows to X, isolating the causal pathway X → Y
  </text>
</svg>
