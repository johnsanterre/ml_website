<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B5D4F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" font-size="13" fill="#3A2E22" font-weight="bold" letter-spacing="0.5">DEEP LEARNING LIBRARY ECOSYSTEM</text>

  <!-- ── LEFT PANEL: Layered Stack ── -->
  <text x="200" y="50" text-anchor="middle" font-size="9.5" fill="#6B5D4F" letter-spacing="1">ABSTRACTION LAYERS</text>

  <!-- Layer 5: Application -->
  <rect x="30" y="58" width="340" height="40" rx="4" fill="#7C2530" stroke="#5C1A22" stroke-width="1.2"/>
  <text x="200" y="74" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">APPLICATION</text>
  <text x="200" y="88" text-anchor="middle" font-size="8.5" fill="#F5D0D3">Computer Vision · NLP · RL · Generative Models</text>

  <!-- Layer 4: High-Level Frameworks -->
  <rect x="30" y="105" width="340" height="40" rx="4" fill="#2D5A8E" stroke="#1E3F63" stroke-width="1.2"/>
  <text x="200" y="121" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">HIGH-LEVEL FRAMEWORKS</text>
  <text x="200" y="135" text-anchor="middle" font-size="8.5" fill="#C8DCF2">HuggingFace · Lightning · Keras · Optax / Flax</text>

  <!-- Layer 3: Core Libraries -->
  <rect x="30" y="152" width="100" height="60" rx="4" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.8"/>
  <text x="80" y="172" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">PyTorch</text>
  <text x="80" y="185" text-anchor="middle" font-size="7.5" fill="#5C3D1E">Dynamic graph</text>
  <text x="80" y="196" text-anchor="middle" font-size="7.5" fill="#5C3D1E">Research std.</text>
  <text x="80" y="207" text-anchor="middle" font-size="7.5" fill="#5C3D1E">torch.compile</text>

  <rect x="150" y="152" width="100" height="60" rx="4" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="200" y="172" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">JAX</text>
  <text x="200" y="185" text-anchor="middle" font-size="7.5" fill="#5C3D1E">Functional</text>
  <text x="200" y="196" text-anchor="middle" font-size="7.5" fill="#5C3D1E">XLA compiled</text>
  <text x="200" y="207" text-anchor="middle" font-size="7.5" fill="#5C3D1E">jit/vmap/grad</text>

  <rect x="270" y="152" width="100" height="60" rx="4" fill="#EDE5D0" stroke="#4A7A3A" stroke-width="1.8"/>
  <text x="320" y="172" text-anchor="middle" font-size="10" fill="#4A7A3A" font-weight="bold">TensorFlow</text>
  <text x="320" y="185" text-anchor="middle" font-size="7.5" fill="#5C3D1E">Production</text>
  <text x="320" y="196" text-anchor="middle" font-size="7.5" fill="#5C3D1E">SavedModel</text>
  <text x="320" y="207" text-anchor="middle" font-size="7.5" fill="#5C3D1E">TFLite / Serving</text>

  <!-- Layer 2: Compiler / Runtime -->
  <rect x="30" y="220" width="340" height="36" rx="4" fill="#C4A87A" stroke="#A0845A" stroke-width="1.2"/>
  <text x="200" y="236" text-anchor="middle" font-size="10" fill="#3A2E22" font-weight="bold">COMPILER / RUNTIME</text>
  <text x="200" y="249" text-anchor="middle" font-size="8.5" fill="#3A2E22">CUDA (NVIDIA) · XLA · Triton · TensorRT · ONNX</text>

  <!-- Layer 1: Hardware -->
  <rect x="30" y="263" width="340" height="36" rx="4" fill="#5C3D1E" stroke="#3A2710" stroke-width="1.2"/>
  <text x="200" y="279" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">HARDWARE</text>
  <text x="200" y="292" text-anchor="middle" font-size="8.5" fill="#D4C5A9">GPU (NVIDIA A100/H100) · TPU · CPU · Apple Silicon</text>

  <!-- Up arrow on right side of stack -->
  <line x1="376" y1="290" x2="376" y2="72" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <text x="390" y="190" text-anchor="start" font-size="8" fill="#6B5D4F" font-style="italic" transform="rotate(90,390,190)">abstraction</text>

  <!-- Caption -->
  <text x="200" y="318" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">Each layer hides hardware complexity from the one above</text>

  <!-- ── DIVIDER ── -->
  <line x1="408" y1="40" x2="408" y2="355" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── RIGHT PANEL: Comparison Table ── -->
  <text x="608" y="50" text-anchor="middle" font-size="9.5" fill="#6B5D4F" letter-spacing="1">FRAMEWORK COMPARISON</text>

  <!-- Table header -->
  <rect x="425" y="57" width="355" height="24" rx="3" fill="#3A2E22"/>
  <text x="507" y="73" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">PyTorch</text>
  <text x="637" y="73" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">JAX</text>
  <text x="737" y="73" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">TensorFlow</text>
  <text x="425" y="73" text-anchor="start" font-size="8" fill="#D4C5A9" font-style="italic">  Dimension</text>

  <!-- Row 1: Graph model -->
  <rect x="425" y="81" width="355" height="28" rx="0" fill="#F5EDE0"/>
  <text x="434" y="99" font-size="8" fill="#5C3D1E">Graph model</text>
  <text x="507" y="99" text-anchor="middle" font-size="8" fill="#7C2530" font-weight="bold">Dynamic / eager</text>
  <text x="637" y="99" text-anchor="middle" font-size="8" fill="#2D5A8E" font-weight="bold">Functional / jit</text>
  <text x="737" y="99" text-anchor="middle" font-size="8" fill="#4A7A3A" font-weight="bold">Eager + static</text>

  <!-- Row 2: Primary use -->
  <rect x="425" y="109" width="355" height="28" rx="0" fill="#FDFAF4"/>
  <text x="434" y="127" font-size="8" fill="#5C3D1E">Primary use</text>
  <text x="507" y="127" text-anchor="middle" font-size="8" fill="#3A2E22">Research / NLP</text>
  <text x="637" y="127" text-anchor="middle" font-size="8" fill="#3A2E22">Research / TPU</text>
  <text x="737" y="127" text-anchor="middle" font-size="8" fill="#3A2E22">Production / mobile</text>

  <!-- Row 3: Autograd -->
  <rect x="425" y="137" width="355" height="28" rx="0" fill="#F5EDE0"/>
  <text x="434" y="155" font-size="8" fill="#5C3D1E">Autograd</text>
  <text x="507" y="155" text-anchor="middle" font-size="8" fill="#3A2E22">torch.autograd</text>
  <text x="637" y="155" text-anchor="middle" font-size="8" fill="#3A2E22">jax.grad / vmap</text>
  <text x="737" y="155" text-anchor="middle" font-size="8" fill="#3A2E22">tf.GradientTape</text>

  <!-- Row 4: Deployment -->
  <rect x="425" y="165" width="355" height="28" rx="0" fill="#FDFAF4"/>
  <text x="434" y="183" font-size="8" fill="#5C3D1E">Deployment</text>
  <text x="507" y="183" text-anchor="middle" font-size="8" fill="#3A2E22">TorchScript/ONNX</text>
  <text x="637" y="183" text-anchor="middle" font-size="8" fill="#3A2E22">ONNX / XLA</text>
  <text x="737" y="183" text-anchor="middle" font-size="8" fill="#3A2E22">SavedModel/TFLite</text>

  <!-- Row 5: Parallelism -->
  <rect x="425" y="193" width="355" height="28" rx="0" fill="#F5EDE0"/>
  <text x="434" y="211" font-size="8" fill="#5C3D1E">Parallelism</text>
  <text x="507" y="211" text-anchor="middle" font-size="8" fill="#3A2E22">DDP / FSDP</text>
  <text x="637" y="211" text-anchor="middle" font-size="8" fill="#3A2E22">pmap / shard_map</text>
  <text x="737" y="211" text-anchor="middle" font-size="8" fill="#3A2E22">tf.distribute</text>

  <!-- Row 6: Debugging -->
  <rect x="425" y="221" width="355" height="28" rx="0" fill="#FDFAF4"/>
  <text x="434" y="239" font-size="8" fill="#5C3D1E">Debugging</text>
  <text x="507" y="239" text-anchor="middle" font-size="8" fill="#3A2E22">Pythonic / pdb</text>
  <text x="637" y="239" text-anchor="middle" font-size="8" fill="#3A2E22">Harder (functional)</text>
  <text x="737" y="239" text-anchor="middle" font-size="8" fill="#3A2E22">Moderate</text>

  <!-- Row 7: Ecosystem -->
  <rect x="425" y="249" width="355" height="28" rx="0" fill="#F5EDE0"/>
  <text x="434" y="267" font-size="8" fill="#5C3D1E">Ecosystem</text>
  <text x="507" y="267" text-anchor="middle" font-size="8" fill="#3A2E22">HF / Lightning</text>
  <text x="637" y="267" text-anchor="middle" font-size="8" fill="#3A2E22">Flax / Optax</text>
  <text x="737" y="267" text-anchor="middle" font-size="8" fill="#3A2E22">Keras / TF Hub</text>

  <!-- Column dividers -->
  <line x1="570" y1="57" x2="570" y2="277" stroke="#D4C5A9" stroke-width="0.8"/>
  <line x1="700" y1="57" x2="700" y2="277" stroke="#D4C5A9" stroke-width="0.8"/>

  <!-- Table border -->
  <rect x="425" y="57" width="355" height="220" rx="3" fill="none" stroke="#D4C5A9" stroke-width="1.2"/>

  <!-- Color key -->
  <rect x="425" y="290" width="10" height="10" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.5" rx="2"/>
  <text x="439" y="300" font-size="8" fill="#6B5D4F">PyTorch  </text>
  <rect x="495" y="290" width="10" height="10" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="1.5" rx="2"/>
  <text x="509" y="300" font-size="8" fill="#6B5D4F">JAX  </text>
  <rect x="540" y="290" width="10" height="10" fill="#EDE5D0" stroke="#4A7A3A" stroke-width="1.5" rx="2"/>
  <text x="554" y="300" font-size="8" fill="#6B5D4F">TensorFlow</text>

  <!-- Bottom caption -->
  <text x="400" y="365" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">
    All three frameworks sit on the same hardware; the choice is about workflow, ecosystem, and deployment target
  </text>
</svg>
