<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FAFAF7"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Heterogeneity of Treatment Effects (HTE)</text>

  <!-- Population box -->
  <rect x="285" y="52" width="230" height="52" rx="8" fill="#e8f0fb" stroke="#4a74c9" stroke-width="2"/>
  <text x="400" y="77" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4a74c9">Population</text>
  <text x="400" y="95" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">n = 1,200 patients</text>

  <!-- Arrows from population to subgroups -->
  <line x1="330" y1="104" x2="155" y2="155" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>
  <line x1="400" y1="104" x2="400" y2="155" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>
  <line x1="470" y1="104" x2="645" y2="155" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>

  <!-- Subgroup 1: Large Benefit -->
  <rect x="30" y="160" width="250" height="110" rx="10" fill="#e6f7ee" stroke="#27ae60" stroke-width="2.2"/>
  <text x="155" y="185" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#27ae60">Subgroup 1 (n=500)</text>
  <text x="155" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Young, no comorbidities</text>
  <!-- Bar for large benefit -->
  <rect x="75" y="218" width="160" height="20" rx="4" fill="#a8e6c0" stroke="#27ae60" stroke-width="1.2"/>
  <rect x="75" y="218" width="160" height="20" rx="4" fill="#27ae60" opacity="0.75"/>
  <text x="155" y="252" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#27ae60">large benefit: +18%</text>

  <!-- Subgroup 2: Neutral -->
  <rect x="275" y="160" width="250" height="110" rx="10" fill="#f5f5f0" stroke="#888" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#666">Subgroup 2 (n=400)</text>
  <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Moderate age, mixed</text>
  <!-- Bar: neutral -->
  <rect x="320" y="218" width="160" height="20" rx="4" fill="#e0e0d8" stroke="#999" stroke-width="1.2"/>
  <rect x="320" y="218" width="28" height="20" rx="3" fill="#aaa" opacity="0.7"/>
  <text x="400" y="252" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#666">neutral: +2%</text>

  <!-- Subgroup 3: Harm -->
  <rect x="520" y="160" width="250" height="110" rx="10" fill="#fde8e8" stroke="#c0392b" stroke-width="2.2"/>
  <text x="645" y="185" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c0392b">Subgroup 3 (n=300)</text>
  <text x="645" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Elderly, high comorbidity</text>
  <!-- Bar: harm -->
  <rect x="565" y="218" width="160" height="20" rx="4" fill="#f7c5c5" stroke="#c0392b" stroke-width="1.2"/>
  <rect x="645" y="218" width="80" height="20" rx="3" fill="#c0392b" opacity="0.75"/>
  <text x="645" y="252" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c0392b">harm: −9%</text>

  <!-- Arrows down to ATE row -->
  <line x1="155" y1="270" x2="340" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="400" y1="270" x2="400" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="645" y1="270" x2="460" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- ATE box -->
  <rect x="270" y="328" width="260" height="52" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2.2"/>
  <text x="400" y="351" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e67e22">Average Treatment Effect</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="13" fill="#c0392b">ATE ≈ +5%   (hides heterogeneity)</text>

  <!-- Annotation lines between subgroups and ATE label -->
  <text x="60" y="298" font-family="Arial" font-size="10" fill="#27ae60" font-style="italic">subgroup 1: large benefit</text>
  <text x="332" y="298" font-family="Arial" font-size="10" fill="#777" font-style="italic">subgroup 2: neutral</text>
  <text x="568" y="298" font-family="Arial" font-size="10" fill="#c0392b" font-style="italic">subgroup 3: harm</text>
</svg>
