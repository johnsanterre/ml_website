<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-tan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C4A87A"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL 1: MULTILAYER PERCEPTRON ══ -->
  <text x="192" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">MULTILAYER PERCEPTRON</text>

  <!-- Layer background bands -->
  <rect x="30" y="30" width="70" height="330" fill="#F5EFE4" rx="4" opacity="0.5"/>
  <rect x="140" y="30" width="70" height="330" fill="#EDE5D0" rx="4" opacity="0.5"/>
  <rect x="250" y="30" width="70" height="330" fill="#F5EFE4" rx="4" opacity="0.5"/>

  <!-- All connections: Input → Hidden (dim) -->
  <line x1="65" y1="100" x2="175" y2="85"  stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="100" x2="175" y2="160" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="100" x2="175" y2="235" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="100" x2="175" y2="310" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="195" x2="175" y2="85"  stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="195" x2="175" y2="160" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="195" x2="175" y2="235" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="195" x2="175" y2="310" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="290" x2="175" y2="85"  stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="290" x2="175" y2="160" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="290" x2="175" y2="235" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="65" y1="290" x2="175" y2="310" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>

  <!-- All connections: Hidden → Output (dim) -->
  <line x1="175" y1="85"  x2="285" y2="155" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="85"  x2="285" y2="240" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="160" x2="285" y2="155" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="160" x2="285" y2="240" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="235" x2="285" y2="155" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="235" x2="285" y2="240" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="310" x2="285" y2="155" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>
  <line x1="175" y1="310" x2="285" y2="240" stroke="#C4A87A" stroke-width="0.8" opacity="0.35"/>

  <!-- Highlighted forward pass path (red, input x₂ → h₂ → y₁) -->
  <line x1="65" y1="195" x2="175" y2="160" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="175" y1="160" x2="285" y2="155" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Weight label on highlighted edges -->
  <text x="118" y="168" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">W</text>
  <text x="232" y="147" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">W</text>

  <!-- Input nodes -->
  <circle cx="65" cy="100" r="16" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="65" cy="195" r="16" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="65" cy="290" r="16" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Hidden nodes -->
  <circle cx="175" cy="85"  r="16" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="175" cy="160" r="16" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="175" cy="235" r="16" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="175" cy="310" r="16" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Output nodes -->
  <circle cx="285" cy="155" r="16" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <circle cx="285" cy="240" r="16" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Sigma label in highlighted hidden node -->
  <text x="175" y="164" text-anchor="middle" font-size="11" fill="#7C2530" font-style="italic">σ</text>

  <!-- Node labels -->
  <text x="65"  y="104" text-anchor="middle" font-size="9" fill="#5C3D1E">x₁</text>
  <text x="65"  y="199" text-anchor="middle" font-size="9" fill="#5C3D1E">x₂</text>
  <text x="65"  y="294" text-anchor="middle" font-size="9" fill="#5C3D1E">x₃</text>
  <text x="175" y="89"  text-anchor="middle" font-size="9" fill="#5C3D1E">h₁</text>
  <text x="175" y="239" text-anchor="middle" font-size="9" fill="#5C3D1E">h₃</text>
  <text x="175" y="314" text-anchor="middle" font-size="9" fill="#5C3D1E">h₄</text>
  <text x="285" y="159" text-anchor="middle" font-size="9" fill="#5C3D1E">y₁</text>
  <text x="285" y="244" text-anchor="middle" font-size="9" fill="#5C3D1E">y₂</text>

  <!-- Layer labels -->
  <text x="65"  y="355" text-anchor="middle" font-size="9.5" fill="#6B5D4F">Input</text>
  <text x="65"  y="368" text-anchor="middle" font-size="9" fill="#6B5D4F">(3 units)</text>
  <text x="175" y="355" text-anchor="middle" font-size="9.5" fill="#6B5D4F">Hidden</text>
  <text x="175" y="368" text-anchor="middle" font-size="9" fill="#6B5D4F">(4 units)</text>
  <text x="285" y="355" text-anchor="middle" font-size="9.5" fill="#6B5D4F">Output</text>
  <text x="285" y="368" text-anchor="middle" font-size="9" fill="#6B5D4F">(2 units)</text>

  <!-- Forward pass annotation -->
  <text x="175" y="390" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">forward pass →</text>

  <!-- "weights W" bracket annotation -->
  <line x1="85" y1="148" x2="165" y2="148" stroke="#7C2530" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="125" y="143" text-anchor="middle" font-size="8.5" fill="#7C2530">weights W</text>

  <!-- Panel divider -->
  <line x1="380" y1="26" x2="380" y2="385" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 2: INSIDE A NEURON ══ -->
  <text x="590" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">SINGLE NEURON COMPUTATION</text>

  <!-- Large neuron circle -->
  <circle cx="590" cy="200" r="55" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>

  <!-- Sum and activation inside neuron -->
  <text x="578" y="192" font-size="20" fill="#7C2530" font-weight="bold">Σ</text>
  <text x="575" y="215" font-size="12" fill="#5C3D1E" font-style="italic">σ(·)</text>

  <!-- Bias label inside (top-right of neuron) -->
  <text x="612" y="160" font-size="9.5" fill="#2D5A8E" font-style="italic">+ b</text>
  <!-- Bias annotation line -->
  <line x1="607" y1="162" x2="600" y2="172" stroke="#2D5A8E" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Input arrows into neuron -->
  <line x1="430" y1="140" x2="536" y2="178" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-tan)"/>
  <line x1="430" y1="200" x2="535" y2="200" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-tan)"/>
  <line x1="430" y1="260" x2="536" y2="222" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-tan)"/>

  <!-- Input labels -->
  <text x="418" y="137" text-anchor="middle" font-size="11" fill="#5C3D1E">x₁</text>
  <text x="418" y="204" text-anchor="middle" font-size="11" fill="#5C3D1E">x₂</text>
  <text x="418" y="264" text-anchor="middle" font-size="11" fill="#5C3D1E">x₃</text>

  <!-- Weight labels on input arrows -->
  <text x="476" y="152" font-size="9" fill="#6B5D4F" font-style="italic">w₁</text>
  <text x="476" y="194" font-size="9" fill="#6B5D4F" font-style="italic">w₂</text>
  <text x="476" y="248" font-size="9" fill="#6B5D4F" font-style="italic">w₃</text>

  <!-- Output arrow from neuron -->
  <line x1="645" y1="200" x2="725" y2="200" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>
  <text x="735" y="196" font-size="9" fill="#5C3D1E">output</text>

  <!-- Activation annotation above output arrow -->
  <text x="685" y="190" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">activation σ</text>
  <line x1="685" y1="192" x2="660" y2="198" stroke="#7C2530" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Formula box below neuron -->
  <rect x="475" y="285" width="230" height="38" fill="#EDE5D0" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="590" y="299" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">z = w₁x₁ + w₂x₂ + w₃x₃ + b</text>
  <text x="590" y="315" text-anchor="middle" font-size="10" fill="#7C2530" font-style="italic">output = σ(z)</text>

  <!-- "bias b" callout -->
  <text x="680" y="156" text-anchor="middle" font-size="8.5" fill="#2D5A8E">bias b</text>

  <!-- Bottom caption -->
  <text x="400" y="394" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    Each neuron computes a weighted sum plus bias, then applies a nonlinear activation — layers compose these to build complex functions
  </text>
</svg>
