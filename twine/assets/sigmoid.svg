<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Sigmoid Function</text>
  <!-- Axes -->
  <line x1="80" y1="320" x2="480" y2="320" stroke="#ccc" stroke-width="1.5"/>
  <line x1="280" y1="350" x2="280" y2="60" stroke="#ccc" stroke-width="1.5"/>
  <!-- Asymptotes -->
  <line x1="80" y1="90" x2="480" y2="90" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="320" x2="480" y2="320" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="490" y="93" font-family="Arial" font-size="11" fill="#e74c3c">y=1</text>
  <text x="490" y="323" font-family="Arial" font-size="11" fill="#e74c3c">y=0</text>
  <!-- Sigmoid curve -->
  <path d="M80,315 Q120,313 160,308 Q200,300 240,280 Q260,260 280,205 Q300,150 320,130 Q360,108 400,95 Q440,91 480,90" fill="none" stroke="#4a90d9" stroke-width="3.5"/>
  <!-- Key points -->
  <circle cx="280" cy="205" r="6" fill="#27ae60"/>
  <text x="295" y="202" font-family="Arial" font-size="12" fill="#27ae60">σ(0)=0.5</text>
  <!-- Labels -->
  <text x="100" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">−5</text>
  <text x="180" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">−3</text>
  <text x="380" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">3</text>
  <text x="460" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">5</text>
  <!-- Formula box -->
  <rect x="530" y="100" width="240" height="180" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="650" y="130" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">σ(x) = 1 / (1+e⁻ˣ)</text>
  <line x1="540" y1="145" x2="760" y2="145" stroke="#ddd" stroke-width="1"/>
  <text x="650" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Output: (0, 1)</text>
  <text x="650" y="192" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">σ'(x) = σ(x)(1−σ(x))</text>
  <text x="650" y="218" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Saturates at extremes</text>
  <text x="650" y="240" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">→ vanishing gradient</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Used in binary classification output, logistic regression, and LSTM gates</text>
</svg>
