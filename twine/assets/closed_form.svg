<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="cf-arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="cf-arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="cf-arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="395" y1="28" x2="395" y2="375" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ LEFT PANEL: ITERATIVE (GRADIENT DESCENT) ══ -->
  <text x="197" y="22" text-anchor="middle" font-size="11" fill="#7C2530" letter-spacing="1.5" font-weight="bold">ITERATIVE</text>

  <!-- Contour ellipses — loss surface -->
  <ellipse cx="197" cy="200" rx="140" ry="120" fill="#F2EAD8" stroke="#E2D5BC" stroke-width="1"/>
  <ellipse cx="197" cy="200" rx="110" ry="94"  fill="#EDE3CE" stroke="#D8C9AD" stroke-width="1"/>
  <ellipse cx="197" cy="200" rx="82"  ry="70"  fill="#E5D6B8" stroke="#CCBA90" stroke-width="1"/>
  <ellipse cx="197" cy="200" rx="55"  ry="47"  fill="#D8C49A" stroke="#BBA472" stroke-width="1"/>
  <ellipse cx="197" cy="200" rx="30"  ry="25"  fill="#C8AD78" stroke="#A88F54" stroke-width="1"/>
  <ellipse cx="197" cy="200" rx="13"  ry="11"  fill="#B09050" stroke="#8A7038" stroke-width="1"/>

  <!-- Minimum marker -->
  <circle cx="197" cy="200" r="5" fill="#7C2530"/>
  <text x="206" y="194" font-size="9" fill="#7C2530" font-style="italic">θ*</text>

  <!-- Spiral descent path (many steps winding inward) -->
  <!-- Start top-left, spiral clockwise inward -->
  <polyline
    points="75,95  148,74  248,88  302,148  286,194  252,210  226,208  210,205  200,202  197,200"
    fill="none" stroke="#7C2530" stroke-width="2" marker-end="url(#cf-arr-red)"/>

  <!-- Step dots -->
  <circle cx="75"  cy="95"  r="5"   fill="#7C2530"/>
  <circle cx="148" cy="74"  r="4"   fill="#7C2530" opacity="0.85"/>
  <circle cx="248" cy="88"  r="3.5" fill="#7C2530" opacity="0.78"/>
  <circle cx="302" cy="148" r="3"   fill="#7C2530" opacity="0.72"/>
  <circle cx="286" cy="194" r="3"   fill="#7C2530" opacity="0.66"/>
  <circle cx="252" cy="210" r="2.5" fill="#7C2530" opacity="0.60"/>
  <circle cx="226" cy="208" r="2.5" fill="#7C2530" opacity="0.55"/>
  <circle cx="210" cy="205" r="2"   fill="#7C2530" opacity="0.50"/>
  <circle cx="200" cy="202" r="2"   fill="#7C2530" opacity="0.45"/>

  <!-- Step labels -->
  <text x="55"  cy="95" x="55" y="88"  font-size="9" fill="#7C2530" font-weight="bold">θ₀</text>
  <text x="152" y="67"  font-size="8"  fill="#7C2530">step 1</text>
  <text x="253" y="82"  font-size="8"  fill="#7C2530">step 2</text>
  <text x="306" y="143" font-size="8"  fill="#7C2530">step 3</text>

  <!-- Caption: update rule -->
  <text x="197" y="355" text-anchor="middle" font-size="9.5" fill="#6B5D4F">θ ← θ − η∇L(θ)   (repeat until convergence)</text>
  <text x="197" y="372" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">many small steps · no guarantee of when you'll arrive</text>

  <!-- Axis labels -->
  <text x="197" y="335" text-anchor="middle" font-size="8.5" fill="#6B5D4F">θ₁ →</text>
  <text x="38"  y="200" text-anchor="middle" font-size="8.5" fill="#6B5D4F" transform="rotate(-90,38,200)">← θ₂</text>

  <!-- ══ RIGHT PANEL: CLOSED FORM ══ -->
  <text x="597" y="22" text-anchor="middle" font-size="11" fill="#2D5A8E" letter-spacing="1.5" font-weight="bold">CLOSED FORM</text>

  <!-- Same loss surface contours (mirrored), faded -->
  <ellipse cx="597" cy="200" rx="140" ry="120" fill="#EEF2F8" stroke="#D4DCE8" stroke-width="1"/>
  <ellipse cx="597" cy="200" rx="110" ry="94"  fill="#E6EDF6" stroke="#C8D4E4" stroke-width="1"/>
  <ellipse cx="597" cy="200" rx="82"  ry="70"  fill="#DAE4F0" stroke="#BBCCE0" stroke-width="1"/>
  <ellipse cx="597" cy="200" rx="55"  ry="47"  fill="#CEDAD8" stroke="#A8C0CC" stroke-width="1.2"/>
  <ellipse cx="597" cy="200" rx="30"  ry="25"  fill="#BACFE4" stroke="#90AECC" stroke-width="1.2"/>
  <ellipse cx="597" cy="200" rx="13"  ry="11"  fill="#8FAED8" stroke="#5C88C0" stroke-width="1.2"/>

  <!-- Minimum marker -->
  <circle cx="597" cy="200" r="7" fill="#2D5A8E"/>
  <text x="607" y="194" font-size="9.5" fill="#2D5A8E" font-style="italic" font-weight="bold">θ*</text>

  <!-- Single direct arrow from start to minimum -->
  <circle cx="472" cy="100" r="5" fill="#2D5A8E"/>
  <text x="450" y="93" font-size="9" fill="#2D5A8E" font-weight="bold">θ₀</text>
  <line x1="472" y1="100" x2="591" y2="195"
        stroke="#2D5A8E" stroke-width="3" marker-end="url(#cf-arr-blue)"/>

  <!-- Formula box -->
  <rect x="460" y="270" width="280" height="52" rx="6" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="600" y="289" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Normal Equations</text>
  <text x="600" y="310" text-anchor="middle" font-size="11" fill="#1A3F6A" font-style="italic">θ = (XᵀX)⁻¹Xᵀy</text>

  <!-- Arrow from formula to minimum -->
  <line x1="600" y1="270" x2="600" y2="214"
        stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#cf-arr-blue)"/>

  <!-- Caption -->
  <text x="597" y="355" text-anchor="middle" font-size="9.5" fill="#6B5D4F">one matrix operation · exact answer in a single step</text>
  <text x="597" y="372" text-anchor="middle" font-size="9" fill="#2D5A8E" font-style="italic">no learning rate · no iterations · guaranteed optimal</text>

  <!-- VS label in center -->
  <circle cx="395" cy="200" r="20" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="395" y="205" text-anchor="middle" font-size="12" fill="#6B5D4F" font-weight="bold">vs</text>
</svg>
