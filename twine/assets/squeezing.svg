<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="sq-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="sq-arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="sq-arr-mid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1C1713"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL 1: BEFORE (unit square) ══ -->
  <text x="185" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">BEFORE  (unit square)</text>

  <!-- Faint axes -->
  <line x1="80" y1="320" x2="310" y2="320" stroke="#EDE5D0" stroke-width="1" marker-end="url(#sq-arr-axis)"/>
  <line x1="80" y1="320" x2="80"  y2="55"  stroke="#EDE5D0" stroke-width="1" marker-end="url(#sq-arr-axis)"/>
  <text x="315" y="323" font-size="9" fill="#C4A87A">x</text>
  <text x="77"  y="50"  font-size="9" fill="#C4A87A" text-anchor="middle">y</text>

  <!-- Tick marks -->
  <line x1="80" y1="200" x2="85" y2="200" stroke="#D4C5A9" stroke-width="1"/>
  <text x="73" y="204" font-size="9" fill="#6B5D4F" text-anchor="end">1</text>
  <line x1="200" y1="320" x2="200" y2="315" stroke="#D4C5A9" stroke-width="1"/>
  <text x="200" y="333" font-size="9" fill="#6B5D4F" text-anchor="middle">1</text>

  <!-- Unit square (filled, warm cream tint, dark red border) -->
  <rect x="80" y="200" width="120" height="120" fill="rgba(124,37,48,0.08)" stroke="#7C2530" stroke-width="2"/>
  <text x="140" y="268" text-anchor="middle" font-size="10" fill="#7C2530">area = 1</text>

  <!-- Hyperbolic curves xy = c in panel 1 (before) -->
  <!-- xy = 0.25: y = 0.25/x, x from 0.08 to 3, mapped: px = 80+120*x, py = 320-120*y -->
  <!-- Let's draw 3 hyperbola arcs for xy = 0.5, xy = 1.0, xy = 1.5 -->
  <!-- Scale: 120px per unit. Origin at (80,320). -->
  <!-- xy = 0.5: points (0.25,2),(0.5,1),(1,0.5),(2,0.25) -->
  <polyline points="110,80 140,200 200,260 260,290" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- xy = 0.25: (0.25,1),(0.5,0.5),(1,0.25) -->
  <polyline points="110,200 140,260 200,290" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- xy = 1.0: (0.5,2),(1,1),(2,0.5) -->
  <polyline points="140,80 200,200 260,260" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Label for hyperbola -->
  <text x="218" y="218" font-size="9" fill="#2D5A8E" font-style="italic">xy = c</text>

  <!-- ══ ARROW IN MIDDLE ══ -->
  <line x1="348" y1="200" x2="448" y2="200" stroke="#1C1713" stroke-width="2" marker-end="url(#sq-arr-mid)"/>
  <!-- Matrix label above arrow -->
  <text x="398" y="172" text-anchor="middle" font-size="11" fill="#1C1713" font-weight="bold">S</text>
  <text x="398" y="187" text-anchor="middle" font-size="9.5" fill="#1C1713">= diag(k, 1/k)</text>
  <!-- det annotation below arrow -->
  <text x="398" y="220" text-anchor="middle" font-size="9.5" fill="#5C3D1E">det = 1</text>

  <!-- ══ PANEL 2: AFTER (squeezed rectangle) ══ -->
  <text x="618" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">AFTER  (k = 2)</text>

  <!-- Faint axes -->
  <line x1="490" y1="320" x2="775" y2="320" stroke="#EDE5D0" stroke-width="1" marker-end="url(#sq-arr-axis)"/>
  <line x1="490" y1="320" x2="490" y2="55"  stroke="#EDE5D0" stroke-width="1" marker-end="url(#sq-arr-axis)"/>
  <text x="780" y="323" font-size="9" fill="#C4A87A">x</text>
  <text x="487" y="50"  font-size="9" fill="#C4A87A" text-anchor="middle">y</text>

  <!-- Tick marks for after panel -->
  <!-- k=2: x stretched by 2 → new width = 240px; y compressed by 1/2 → new height = 60px -->
  <line x1="490" y1="260" x2="495" y2="260" stroke="#D4C5A9" stroke-width="1"/>
  <text x="483" y="264" font-size="9" fill="#6B5D4F" text-anchor="end">½</text>
  <line x1="490" y1="200" x2="495" y2="200" stroke="#D4C5A9" stroke-width="1"/>
  <text x="483" y="204" font-size="9" fill="#6B5D4F" text-anchor="end">1</text>
  <line x1="610" y1="320" x2="610" y2="315" stroke="#D4C5A9" stroke-width="1"/>
  <text x="610" y="333" font-size="9" fill="#6B5D4F" text-anchor="middle">1</text>
  <line x1="730" y1="320" x2="730" y2="315" stroke="#D4C5A9" stroke-width="1"/>
  <text x="730" y="333" font-size="9" fill="#6B5D4F" text-anchor="middle">2</text>

  <!-- Squeezed rectangle: width = k*120 = 240, height = (1/k)*120 = 60 -->
  <!-- Bottom-left corner at (490, 320), top-right at (730, 260) -->
  <rect x="490" y="260" width="240" height="60" fill="rgba(45,90,142,0.10)" stroke="#7C2530" stroke-width="2"/>

  <!-- Dimension annotations -->
  <!-- Width arrow -->
  <line x1="490" y1="346" x2="730" y2="346" stroke="#7C2530" stroke-width="1.2" marker-end="url(#sq-arr)"/>
  <line x1="730" y1="346" x2="490" y2="346" stroke="#7C2530" stroke-width="1.2" marker-end="url(#sq-arr)"/>
  <text x="610" y="361" text-anchor="middle" font-size="9" fill="#7C2530">stretched × k = 2</text>
  <!-- Height arrow -->
  <line x1="464" y1="260" x2="464" y2="320" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#sq-arr)"/>
  <line x1="464" y1="320" x2="464" y2="260" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#sq-arr)"/>
  <text x="455" y="294" text-anchor="middle" font-size="9" fill="#2D5A8E" transform="rotate(-90,455,294)">squeezed × ½</text>

  <!-- Area preserved label inside box -->
  <text x="610" y="293" text-anchor="middle" font-size="10" fill="#7C2530">area = 1</text>
  <text x="610" y="308" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">preserved</text>

  <!-- Hyperbolic curves in panel 2 (after, x stretched ×2, y compressed ×0.5) -->
  <!-- xy = 0.5 → same curve, just remapped: new coords (2x, y/2) -->
  <!-- After: px = 490 + 120*(2x) = 490+240x, py = 320 - 120*(y/2) = 320 - 60y -->
  <!-- xy=0.5: (0.5,1)→(610,260), (1,0.5)→(730,290), (0.25,2)→(550,200) -->
  <polyline points="550,200 610,260 730,290" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- xy=0.25: (0.5,0.5)→(610,290), (0.25,1)→(550,260) -->
  <polyline points="550,260 610,290" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- xy=1.0: (1,1)→(730,260) — only corner shows -->
  <polyline points="610,200 730,260" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <text x="738" y="248" font-size="9" fill="#2D5A8E" font-style="italic">xy = c</text>

  <!-- Panel divider -->
  <line x1="400" y1="28" x2="400" y2="375" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom caption -->
  <text x="400" y="390" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    Squeeze mapping S = diag(k, 1/k): x stretched by k, y compressed by 1/k — area (and det) preserved at 1
  </text>
</svg>
