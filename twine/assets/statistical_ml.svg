<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ TITLE ══ -->
  <text x="400" y="22" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">STATISTICAL LEARNING FRAMEWORK</text>

  <!-- ══ PANEL 1: TRUE DISTRIBUTION & HYPOTHESIS CLASS ══ -->
  <!-- Large outer ellipse — true distribution P(X,Y) -->
  <ellipse cx="200" cy="200" rx="170" ry="148" fill="#F5EDE0" stroke="#C4A87A" stroke-width="2"/>
  <text x="200" y="48" text-anchor="middle" font-size="9.5" fill="#C4A87A" font-style="italic">true distribution P(X,Y)</text>
  <text x="200" y="60" text-anchor="middle" font-size="8.5" fill="#9B8877">(unknown, infinite)</text>

  <!-- Population of data points scattered in ellipse -->
  <circle cx="140" cy="110" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="170" cy="90"  r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="200" cy="100" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="230" cy="85"  r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="255" cy="110" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="120" cy="140" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="150" cy="155" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="185" cy="145" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="220" cy="130" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="260" cy="145" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="280" cy="170" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="130" cy="180" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="165" cy="200" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="240" cy="190" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="270" cy="220" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="140" cy="225" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="175" cy="250" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="210" cy="260" r="2"   fill="#9B8877" opacity="0.5"/>
  <circle cx="245" cy="255" r="2.5" fill="#9B8877" opacity="0.5"/>
  <circle cx="160" cy="295" r="2"   fill="#9B8877" opacity="0.3"/>
  <circle cx="200" cy="310" r="2.5" fill="#9B8877" opacity="0.3"/>
  <circle cx="235" cy="300" r="2"   fill="#9B8877" opacity="0.3"/>

  <!-- Hypothesis class H — inner ellipse (the set of functions we search over) -->
  <ellipse cx="200" cy="185" rx="95" ry="72" fill="none" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="200" y="120" text-anchor="middle" font-size="9.5" fill="#2D5A8E" font-weight="bold">hypothesis class H</text>
  <text x="200" y="132" text-anchor="middle" font-size="8.5" fill="#2D5A8E">(all functions we consider)</text>

  <!-- Bayes optimal h* — small star at center of H -->
  <circle cx="200" cy="185" r="5" fill="#7C2530"/>
  <text x="200" y="175" text-anchor="middle" font-size="8.5" fill="#7C2530" font-weight="bold">h*</text>
  <text x="200" y="205" text-anchor="middle" font-size="8" fill="#7C2530" font-style="italic">best in H</text>

  <!-- ERM solution h_n — dot near center but slightly offset -->
  <circle cx="224" cy="178" r="4.5" fill="#5C3D1E"/>
  <text x="246" y="172" text-anchor="start" font-size="8.5" fill="#5C3D1E" font-weight="bold">ĥ_n</text>
  <text x="246" y="182" text-anchor="start" font-size="8" fill="#5C3D1E" font-style="italic">ERM solution</text>

  <!-- Training sample S_n — small cluster of filled points bottom of ellipse -->
  <circle cx="163" cy="238" r="3.5" fill="#7C2530"/>
  <circle cx="178" cy="248" r="3.5" fill="#7C2530"/>
  <circle cx="192" cy="235" r="3.5" fill="#7C2530"/>
  <circle cx="207" cy="245" r="3.5" fill="#7C2530"/>
  <circle cx="220" cy="232" r="3.5" fill="#7C2530"/>
  <circle cx="234" cy="242" r="3.5" fill="#7C2530"/>
  <text x="199" y="270" text-anchor="middle" font-size="8.5" fill="#7C2530">sample S_n (observed)</text>

  <!-- Panel divider -->
  <line x1="400" y1="30" x2="400" y2="385" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 2: RISK DECOMPOSITION ══ -->
  <text x="600" y="22" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">RISK DECOMPOSITION</text>

  <!-- Axis -->
  <line x1="430" y1="360" x2="775" y2="360" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <line x1="430" y1="360" x2="430" y2="50"  stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <text x="612" y="378" text-anchor="middle" font-size="9" fill="#6B5D4F">model complexity / hypothesis class size</text>
  <text x="420" y="210" text-anchor="middle" font-size="9" fill="#6B5D4F" transform="rotate(-90,420,210)">risk (error)</text>

  <!-- True risk R(h) — U-shaped, solid red -->
  <polyline points="440,340 470,280 510,220 555,175 600,160 645,170 690,200 730,250 765,310"
            fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Empirical risk R̂(h) — monotone decreasing, dashed brown -->
  <polyline points="440,340 480,295 525,250 575,200 620,158 660,128 700,108 740,94 765,85"
            fill="none" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Bayes error floor — flat dashed gray -->
  <line x1="435" y1="148" x2="770" y2="148" stroke="#9B8877" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="767" y="144" text-anchor="end" font-size="8" fill="#9B8877">Bayes error R*</text>
  <text x="767" y="153" text-anchor="end" font-size="8" fill="#9B8877">(irreducible)</text>

  <!-- Optimal h* dot on true risk curve -->
  <circle cx="600" cy="160" r="5" fill="#7C2530"/>
  <text x="602" y="149" text-anchor="start" font-size="8.5" fill="#7C2530" font-weight="bold">h*</text>

  <!-- Generalization gap bracket at a fixed complexity point -->
  <!-- At x=660: true risk y=170, empirical risk y=128 -->
  <line x1="660" y1="128" x2="660" y2="200" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <line x1="660" y1="200" x2="660" y2="128" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <rect x="663" y="152" width="88" height="22" fill="#FDFAF4" stroke="none"/>
  <text x="667" y="163" text-anchor="start" font-size="8.5" fill="#2D5A8E" font-weight="bold">generalization gap</text>
  <text x="667" y="174" text-anchor="start" font-size="8" fill="#2D5A8E">R(ĥ) − R̂(ĥ)</text>

  <!-- Labels on curves -->
  <text x="448" y="332" text-anchor="start" font-size="8.5" fill="#7C2530" font-weight="bold">true risk R(h)</text>
  <text x="448" y="310" text-anchor="start" font-size="8" fill="#7C2530">(population error)</text>
  <text x="555" y="80" text-anchor="start" font-size="8.5" fill="#5C3D1E" font-weight="bold">empirical risk R̂(h)</text>
  <text x="555" y="91" text-anchor="start" font-size="8" fill="#5C3D1E">(training error)</text>

  <!-- ERM solution on empirical risk curve — different complexity from h* -->
  <circle cx="740" cy="94" r="4.5" fill="#5C3D1E"/>
  <text x="742" y="88" text-anchor="start" font-size="8.5" fill="#5C3D1E" font-weight="bold">ĥ_n</text>
  <text x="742" y="100" text-anchor="start" font-size="8" fill="#5C3D1E">(overfits)</text>

  <!-- PAC bound box at bottom -->
  <rect x="430" y="300" width="340" height="48" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="600" y="318" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-weight="bold">PAC bound (finite H, prob ≥ 1−δ):</text>
  <text x="600" y="333" text-anchor="middle" font-size="9" fill="#7C2530">R(ĥ) ≤ R̂(ĥ) + √( ln|H| + ln(1/δ) ) / (2n)</text>
  <text x="600" y="345" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">more data n → gap shrinks; richer H → gap grows</text>
</svg>
