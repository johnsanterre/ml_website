<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#222">Goodhart's Law: When the Measure Becomes the Target</text>

  <!-- Axes -->
  <!-- X axis -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Y axis -->
  <line x1="80" y1="320" x2="80" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Axis labels -->
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#444">Optimization Pressure on Proxy Metric →</text>
  <text x="22" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#444" transform="rotate(-90,22,190)">Performance / Value</text>

  <!-- Tick marks and phase labels -->
  <line x1="300" y1="316" x2="300" y2="324" stroke="#aaa" stroke-width="1"/>
  <text x="300" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Low</text>
  <line x1="500" y1="316" x2="500" y2="324" stroke="#aaa" stroke-width="1"/>
  <text x="500" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Moderate</text>
  <line x1="660" y1="316" x2="660" y2="324" stroke="#aaa" stroke-width="1"/>
  <text x="660" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">High</text>

  <!-- Phase divider: dashed vertical line at divergence point -->
  <line x1="440" y1="80" x2="440" y2="315" stroke="#ccc" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="444" y="76" font-family="Arial, sans-serif" font-size="11" fill="#aaa">divergence begins</text>

  <!-- TRUE GOAL curve: rises then plateaus (blue-green) -->
  <!-- Path: starts lower-left, rises steadily, then plateaus around x=440, stays flat -->
  <path d="M 100,290 C 160,260 240,210 320,170 C 380,142 420,128 440,122 C 480,115 540,112 620,110 C 660,109 690,109 710,109"
        fill="none" stroke="#2a7ab5" stroke-width="2.8" stroke-linecap="round"/>

  <!-- PROXY METRIC curve: rises faster, then diverges upward after threshold -->
  <!-- Initial correlated rise, then overshoots -->
  <path d="M 100,290 C 160,255 240,200 320,162 C 380,136 420,122 440,116 C 470,106 510,90 560,72 C 600,56 650,46 710,40"
        fill="none" stroke="#c0392b" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="9,4"/>

  <!-- Area between curves after divergence (subtle fill) -->
  <path d="M 440,116 C 470,106 510,90 560,72 C 600,56 650,46 710,40 L 710,109 C 660,109 620,110 540,112 C 480,115 440,122 440,122 Z"
        fill="#c0392b" fill-opacity="0.07"/>

  <!-- Legend box -->
  <rect x="96" y="88" width="220" height="68" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>

  <!-- True goal legend -->
  <line x1="112" y1="112" x2="148" y2="112" stroke="#2a7ab5" stroke-width="2.8" stroke-linecap="round"/>
  <text x="156" y="116" font-family="Arial, sans-serif" font-size="13" fill="#2a7ab5" font-weight="bold">True Goal</text>

  <!-- Proxy legend -->
  <line x1="112" y1="138" x2="148" y2="138" stroke="#c0392b" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="9,4"/>
  <text x="156" y="142" font-family="Arial, sans-serif" font-size="13" fill="#c0392b" font-weight="bold">Proxy Metric</text>

  <!-- Annotation: correlated region -->
  <text x="220" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555" font-style="italic">initially</text>
  <text x="220" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555" font-style="italic">correlated</text>

  <!-- Annotation: diverges -->
  <text x="590" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0392b" font-style="italic">proxy overshoots</text>
  <text x="590" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0392b" font-style="italic">(gaming / hacking)</text>

  <!-- Arrow pointing to gap -->
  <line x1="620" y1="74" x2="640" y2="60" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom note -->
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">"When a measure becomes a target, it ceases to be a good measure." — Goodhart</text>
</svg>
