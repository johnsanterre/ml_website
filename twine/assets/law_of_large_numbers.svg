<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">Law of Large Numbers: Sample Mean Converges to Truth</text>

  <!-- Panel 1: Running Average plot -->
  <rect x="15" y="48" width="370" height="310" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="200" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">RUNNING SAMPLE MEAN (fair coin: P(H) = 0.5)</text>

  <!-- Axes -->
  <line x1="55" y1="310" x2="370" y2="310" stroke="#5C3D1E" stroke-width="1.2"/>
  <line x1="55" y1="85" x2="55" y2="310" stroke="#5C3D1E" stroke-width="1.2"/>

  <!-- Y axis labels -->
  <text x="48" y="89" text-anchor="end" font-size="9" fill="#6B5D4F">1.0</text>
  <text x="48" y="160" text-anchor="end" font-size="9" fill="#6B5D4F">0.75</text>
  <text x="48" y="200" text-anchor="end" font-size="9" fill="#7C2530" font-weight="bold">0.5</text>
  <text x="48" y="240" text-anchor="end" font-size="9" fill="#6B5D4F">0.25</text>
  <text x="48" y="310" text-anchor="end" font-size="9" fill="#6B5D4F">0.0</text>

  <!-- True mean line -->
  <line x1="55" y1="200" x2="370" y2="200" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="360" y="195" text-anchor="end" font-size="9" fill="#7C2530">μ = 0.5</text>

  <!-- Gridlines -->
  <line x1="55" y1="160" x2="370" y2="160" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="55" y1="240" x2="370" y2="240" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- X axis labels -->
  <text x="95" y="325" text-anchor="middle" font-size="9" fill="#6B5D4F">10</text>
  <text x="160" y="325" text-anchor="middle" font-size="9" fill="#6B5D4F">50</text>
  <text x="240" y="325" text-anchor="middle" font-size="9" fill="#6B5D4F">200</text>
  <text x="370" y="325" text-anchor="middle" font-size="9" fill="#6B5D4F">n →</text>

  <!-- Noisy running mean line (hand-crafted convergence path) -->
  <polyline fill="none" stroke="#2D5A8E" stroke-width="1.8" opacity="0.85"
    points="55,105 65,260 75,155 85,230 95,175 105,215 115,188 125,210 135,195 145,205 155,198 165,203 175,199 185,202 195,200 205,201 215,200 225,201 235,200 245,200 255,201 265,200 275,200 285,200 295,200 305,200 315,200 325,200 335,200 345,200 355,200 365,200"/>

  <!-- Envelope (shaded region that narrows) -->
  <polygon points="55,105 65,140 95,168 130,180 180,192 240,197 310,199 365,200 365,200 310,201 240,203 180,208 130,220 95,232 65,260 55,295"
    fill="#2D5A8E" opacity="0.08"/>

  <text x="200" y="342" text-anchor="middle" font-size="9" fill="#6B5D4F">sample size n</text>
  <text x="100" y="155" text-anchor="start" font-size="9" fill="#2D5A8E" font-style="italic">high variance,</text>
  <text x="100" y="168" text-anchor="start" font-size="9" fill="#2D5A8E" font-style="italic">small n</text>

  <!-- Panel 2: Chebyshev + Connections -->
  <rect x="400" y="48" width="383" height="310" fill="#F0EBE1" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="591" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">WHY IT WORKS  &amp;  CONNECTIONS</text>

  <!-- Chebyshev box -->
  <rect x="415" y="80" width="355" height="68" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="592" y="100" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Chebyshev's Inequality</text>
  <text x="592" y="120" text-anchor="middle" font-size="11" fill="#5C3D1E">P(|X̄ₙ − μ| ≥ ε) ≤ σ²/(nε²)</text>
  <text x="592" y="140" text-anchor="middle" font-size="9" fill="#6B5D4F">As n → ∞, probability of deviation → 0 for any ε &gt; 0</text>

  <!-- LLN vs CLT comparison -->
  <rect x="415" y="158" width="168" height="140" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="499" y="176" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Weak LLN</text>
  <text x="499" y="193" text-anchor="middle" font-size="9" fill="#5C3D1E">X̄ₙ →ᵖ μ</text>
  <text x="499" y="210" text-anchor="middle" font-size="9" fill="#6B5D4F">(convergence</text>
  <text x="499" y="223" text-anchor="middle" font-size="9" fill="#6B5D4F">in probability)</text>
  <text x="499" y="243" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">needs finite σ²</text>
  <text x="499" y="258" text-anchor="middle" font-size="8" fill="#6B5D4F">Chebyshev proof</text>
  <text x="499" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">sketch works here</text>
  <text x="499" y="284" text-anchor="middle" font-size="8" fill="#6B5D4F">iid required</text>

  <rect x="599" y="158" width="168" height="140" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="683" y="176" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Strong LLN</text>
  <text x="683" y="193" text-anchor="middle" font-size="9" fill="#5C3D1E">X̄ₙ →ᵃ·ˢ· μ</text>
  <text x="683" y="210" text-anchor="middle" font-size="9" fill="#6B5D4F">(almost sure</text>
  <text x="683" y="223" text-anchor="middle" font-size="9" fill="#6B5D4F">convergence)</text>
  <text x="683" y="243" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">stronger guarantee</text>
  <text x="683" y="258" text-anchor="middle" font-size="8" fill="#6B5D4F">every path</text>
  <text x="683" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">converges</text>
  <text x="683" y="284" text-anchor="middle" font-size="8" fill="#6B5D4F">Borel–Cantelli proof</text>

  <!-- CLT connection -->
  <rect x="415" y="308" width="355" height="40" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="592" y="323" text-anchor="middle" font-size="9" fill="#5C3D1E">LLN: X̄ₙ → μ  (what it converges to)  ·  CLT: √n(X̄ₙ−μ) → N(0,σ²)  (how fast it converges)</text>
  <text x="592" y="340" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">LLN justifies Monte Carlo averaging  ·  gambler's fallacy: past outcomes do NOT influence future i.i.d. draws</text>

  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">Independence required  ·  LLN gives convergence  ·  CLT gives the rate  ·  Justifies Monte Carlo simulation</text>
</svg>
