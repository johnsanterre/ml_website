<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Convex function illustration -->
  <text x="200" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">CONVEX FUNCTION</text>
  <path d="M 60,340 Q 200,60 340,340" fill="none" stroke="#2D5A8E" stroke-width="2.5"/>
  <!-- Chord line between two points -->
  <line x1="90" y1="310" x2="310" y2="310" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Two points on curve -->
  <circle cx="90" cy="310" r="5" fill="#7C2530"/>
  <circle cx="310" cy="310" r="5" fill="#7C2530"/>
  <!-- Midpoint on curve -->
  <circle cx="200" cy="110" r="5" fill="#2D5A8E"/>
  <!-- Midpoint of chord -->
  <circle cx="200" cy="310" r="5" fill="#C4A87A"/>
  <!-- Vertical gap arrow -->
  <line x1="200" y1="120" x2="200" y2="295" stroke="#5C3D1E" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="213" y="190" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">f(E[X]) ≤ E[f(X)]</text>
  <text x="80" y="332" font-family="Georgia, serif" font-size="11" fill="#7C2530">f(a)</text>
  <text x="300" y="332" font-family="Georgia, serif" font-size="11" fill="#7C2530">f(b)</text>
  <text x="168" y="105" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">f(E[X])</text>
  <text x="168" y="326" font-family="Georgia, serif" font-size="11" fill="#C4A87A">E[f(X)]</text>

  <!-- Divider -->
  <line x1="390" y1="40" x2="390" y2="375" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 2: Concave vs Convex -->
  <text x="590" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">CONCAVE VS CONVEX</text>

  <!-- Concave -->
  <text x="480" y="58" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">Concave (log, sqrt):</text>
  <path d="M 420,180 Q 490,55 560,180" fill="none" stroke="#2D5A8E" stroke-width="2.5"/>
  <line x1="430" y1="168" x2="550" y2="168" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="490" cy="95" r="4" fill="#2D5A8E"/>
  <circle cx="490" cy="168" r="4" fill="#C4A87A"/>
  <text x="420" y="215" font-family="Georgia, serif" font-size="11" fill="#7C2530">Jensen flips: f(E[X]) ≥ E[f(X)]</text>

  <!-- Convex -->
  <text x="480" y="258" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">Convex (exp, x²):</text>
  <path d="M 420,370 Q 490,245 560,370" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="430" y1="370" x2="550" y2="370" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="490" cy="290" r="4" fill="#7C2530"/>
  <circle cx="490" cy="370" r="4" fill="#C4A87A"/>
  <text x="420" y="395" font-family="Georgia, serif" font-size="11" fill="#7C2530">f(E[X]) ≤ E[f(X)]</text>

  <!-- Panel 3: Applications label -->
  <text x="200" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">CHORD LIES ABOVE CURVE</text>
</svg>
