<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Poisson Distribution</text>
  <!-- PMF bars for different lambda -->
  <line x1="50" y1="300" x2="450" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="50" y1="300" x2="50" y2="80" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">k (number of events)</text>
  <text x="20" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" transform="rotate(-90,20,190)">P(X=k)</text>
  <!-- λ=2 -->
  <rect x="70" y="180" width="25" height="120" fill="#4a90d9" opacity="0.8"/>
  <rect x="100" y="200" width="25" height="100" fill="#4a90d9" opacity="0.8"/>
  <rect x="130" y="220" width="25" height="80" fill="#4a90d9" opacity="0.8"/>
  <rect x="160" y="255" width="25" height="45" fill="#4a90d9" opacity="0.6"/>
  <rect x="190" y="275" width="25" height="25" fill="#4a90d9" opacity="0.4"/>
  <rect x="220" y="288" width="25" height="12" fill="#4a90d9" opacity="0.3"/>
  <text x="150" y="75" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9">λ=2</text>
  <!-- λ=5 -->
  <rect x="260" y="255" width="20" height="45" fill="#e74c3c" opacity="0.6"/>
  <rect x="283" y="230" width="20" height="70" fill="#e74c3c" opacity="0.8"/>
  <rect x="306" y="215" width="20" height="85" fill="#e74c3c" opacity="0.9"/>
  <rect x="329" y="230" width="20" height="70" fill="#e74c3c" opacity="0.8"/>
  <rect x="352" y="255" width="20" height="45" fill="#e74c3c" opacity="0.6"/>
  <rect x="375" y="270" width="20" height="30" fill="#e74c3c" opacity="0.4"/>
  <text x="330" y="75" text-anchor="middle" font-family="Arial" font-size="12" fill="#e74c3c">λ=5</text>
  <!-- Formula box -->
  <rect x="490" y="80" width="280" height="180" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="630" y="108" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Poisson PMF</text>
  <text x="630" y="145" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">P(X=k) = λᵏe⁻λ / k!</text>
  <line x1="500" y1="162" x2="760" y2="162" stroke="#ddd" stroke-width="1"/>
  <text x="630" y="185" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Mean = λ</text>
  <text x="630" y="207" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Variance = λ</text>
  <text x="630" y="242" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Counts events in fixed interval</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Examples: website clicks/hour, typos/page, mutations/gene — rare, independent events</text>
</svg>
