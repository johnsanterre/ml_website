<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Chaos Theory: Sensitive Dependence on Initial Conditions</text>

  <!-- LEFT PANEL: Diverging trajectories (butterfly effect) -->
  <!-- Axes -->
  <line x1="50" y1="340" x2="370" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="50" y1="340" x2="50" y2="55" stroke="#555" stroke-width="1.5"/>
  <text x="210" y="368" text-anchor="middle" font-size="12" fill="#555">Time</text>
  <text x="18" y="200" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,18,200)">State</text>
  <text x="210" y="50" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Butterfly Effect</text>

  <!-- Trajectory 1: blue — starts at y=175 -->
  <path d="M50,200 C90,198 130,195 160,190 C200,183 230,170 260,150 C290,128 315,95 350,65" fill="none" stroke="#2196F3" stroke-width="2.5"/>
  <!-- Trajectory 2: red — starts at y=177 (tiny offset) -->
  <path d="M50,204 C90,204 130,206 160,210 C200,218 230,235 260,258 C290,282 315,310 350,335" fill="none" stroke="#E91E63" stroke-width="2.5"/>

  <!-- Start-point dots -->
  <circle cx="50" cy="200" r="4" fill="#2196F3"/>
  <circle cx="50" cy="204" r="4" fill="#E91E63"/>

  <!-- Divergence brace area shading -->
  <polygon points="50,200 50,204 350,335 350,65" fill="#FF980015" stroke="none"/>

  <!-- Labels -->
  <text x="355" y="62" font-size="11" fill="#2196F3">x₀</text>
  <text x="355" y="338" font-size="11" fill="#E91E63">x₀ + ε</text>
  <text x="52" y="195" font-size="10" fill="#2196F3">start</text>
  <text x="52" y="220" font-size="10" fill="#E91E63">start + tiny ε</text>

  <!-- Exponential separation annotation -->
  <line x1="260" y1="150" x2="260" y2="258" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="265" y="210" font-size="11" fill="#FF9800">|δ| ~ e^λt</text>

  <!-- RIGHT PANEL: Lorenz attractor sketch -->
  <text x="600" y="50" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Lorenz Attractor</text>

  <!-- Wing 1 (right lobe) -->
  <ellipse cx="650" cy="175" rx="95" ry="55" fill="none" stroke="#2196F3" stroke-width="1.8" stroke-dasharray="6,2" opacity="0.7"/>
  <!-- Wing 2 (left lobe) -->
  <ellipse cx="530" cy="235" rx="85" ry="50" fill="none" stroke="#9C27B0" stroke-width="1.8" stroke-dasharray="6,2" opacity="0.7"/>

  <!-- Inner spiral lines right lobe -->
  <ellipse cx="650" cy="175" rx="60" ry="33" fill="none" stroke="#2196F3" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="650" cy="175" rx="30" ry="16" fill="none" stroke="#2196F3" stroke-width="1" opacity="0.4"/>

  <!-- Inner spiral lines left lobe -->
  <ellipse cx="530" cy="235" rx="52" ry="30" fill="none" stroke="#9C27B0" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="530" cy="235" rx="26" ry="14" fill="none" stroke="#9C27B0" stroke-width="1" opacity="0.4"/>

  <!-- Connecting curve between lobes -->
  <path d="M650,120 C640,90 570,80 530,185" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.8"/>
  <path d="M530,285 C540,320 630,325 650,230" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.8"/>

  <!-- Lobe labels -->
  <text x="652" y="175" text-anchor="middle" font-size="12" fill="#2196F3" font-weight="bold">lobe A</text>
  <text x="530" y="235" text-anchor="middle" font-size="12" fill="#9C27B0" font-weight="bold">lobe B</text>

  <!-- Attractor boundary box -->
  <rect x="415" y="60" width="365" height="310" rx="8" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Parameter label -->
  <text x="600" y="352" text-anchor="middle" font-size="11" fill="#888">σ=10, ρ=28, β=8/3  —  never repeats, never escapes</text>

  <!-- Divider -->
  <line x1="400" y1="45" x2="400" y2="385" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Legend -->
  <rect x="50" y="350" width="330" height="38" rx="6" fill="#f9f9f9" stroke="#ddd"/>
  <circle cx="72" cy="369" r="5" fill="#2196F3"/>
  <text x="82" y="373" font-size="11" fill="#2196F3">trajectory 1 (x₀)</text>
  <circle cx="180" cy="369" r="5" fill="#E91E63"/>
  <text x="190" y="373" font-size="11" fill="#E91E63">trajectory 2 (x₀+ε)</text>
  <line x1="62" y1="381" x2="72" y2="381" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="77" y="385" font-size="11" fill="#FF9800">separation ~ e^λt</text>
</svg>
