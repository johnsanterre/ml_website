<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Correlation Matrix Heatmap</text>

  <!-- Color scale legend (right side) -->
  <defs>
    <linearGradient id="colorScale" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#c0392b"/>
      <stop offset="50%"  stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#2471a3"/>
    </linearGradient>
  </defs>
  <rect x="710" y="80" width="22" height="220" fill="url(#colorScale)" stroke="#aaa" stroke-width="1"/>
  <text x="735" y="84"  font-family="Arial" font-size="11" fill="#444">+1.0</text>
  <text x="735" y="194" font-family="Arial" font-size="11" fill="#444"> 0.0</text>
  <text x="735" y="304" font-family="Arial" font-size="11" fill="#444">−1.0</text>
  <text x="721" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">r scale</text>

  <!-- Helper: cell size 80x56, grid starts at x=100, y=60 -->
  <!-- Row/column labels: A B C D E -->
  <!-- Column headers -->
  <text x="140" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">A</text>
  <text x="220" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">B</text>
  <text x="300" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">C</text>
  <text x="380" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">D</text>
  <text x="460" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">E</text>

  <!-- Row labels -->
  <text x="90"  y="113" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#333">A</text>
  <text x="90"  y="169" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#333">B</text>
  <text x="90"  y="225" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#333">C</text>
  <text x="90"  y="281" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#333">D</text>
  <text x="90"  y="337" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#333">E</text>

  <!-- ===== ROW A ===== -->
  <!-- A,A = 1.00  (strong positive: dark blue) -->
  <rect x="100" y="82" width="80" height="52" fill="#2471a3"/>
  <text x="140" y="112" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">1.00</text>

  <!-- A,B = 0.82 -->
  <rect x="180" y="82" width="80" height="52" fill="#3498db"/>
  <text x="220" y="112" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0.82</text>

  <!-- A,C = 0.35 -->
  <rect x="260" y="82" width="80" height="52" fill="#aed6f1"/>
  <text x="300" y="112" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">0.35</text>

  <!-- A,D = -0.15 -->
  <rect x="340" y="82" width="80" height="52" fill="#f5ddd9"/>
  <text x="380" y="112" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">−0.15</text>

  <!-- A,E = -0.61 -->
  <rect x="420" y="82" width="80" height="52" fill="#e74c3c"/>
  <text x="460" y="112" text-anchor="middle" font-family="Arial" font-size="12" fill="white">−0.61</text>

  <!-- ===== ROW B ===== -->
  <!-- B,A = 0.82 -->
  <rect x="100" y="138" width="80" height="52" fill="#3498db"/>
  <text x="140" y="168" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0.82</text>

  <!-- B,B = 1.00 -->
  <rect x="180" y="138" width="80" height="52" fill="#2471a3"/>
  <text x="220" y="168" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">1.00</text>

  <!-- B,C = 0.55 -->
  <rect x="260" y="138" width="80" height="52" fill="#5dade2"/>
  <text x="300" y="168" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0.55</text>

  <!-- B,D = 0.10 -->
  <rect x="340" y="138" width="80" height="52" fill="#eaf4fb"/>
  <text x="380" y="168" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">0.10</text>

  <!-- B,E = -0.44 -->
  <rect x="420" y="138" width="80" height="52" fill="#e77d74"/>
  <text x="460" y="168" text-anchor="middle" font-family="Arial" font-size="12" fill="white">−0.44</text>

  <!-- ===== ROW C ===== -->
  <!-- C,A = 0.35 -->
  <rect x="100" y="194" width="80" height="52" fill="#aed6f1"/>
  <text x="140" y="224" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">0.35</text>

  <!-- C,B = 0.55 -->
  <rect x="180" y="194" width="80" height="52" fill="#5dade2"/>
  <text x="220" y="224" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0.55</text>

  <!-- C,C = 1.00 -->
  <rect x="260" y="194" width="80" height="52" fill="#2471a3"/>
  <text x="300" y="224" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">1.00</text>

  <!-- C,D = -0.28 -->
  <rect x="340" y="194" width="80" height="52" fill="#f0b8b2"/>
  <text x="380" y="224" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">−0.28</text>

  <!-- C,E = -0.50 -->
  <rect x="420" y="194" width="80" height="52" fill="#e05d52"/>
  <text x="460" y="224" text-anchor="middle" font-family="Arial" font-size="12" fill="white">−0.50</text>

  <!-- ===== ROW D ===== -->
  <!-- D,A = -0.15 -->
  <rect x="100" y="250" width="80" height="52" fill="#f5ddd9"/>
  <text x="140" y="280" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">−0.15</text>

  <!-- D,B = 0.10 -->
  <rect x="180" y="250" width="80" height="52" fill="#eaf4fb"/>
  <text x="220" y="280" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">0.10</text>

  <!-- D,C = -0.28 -->
  <rect x="260" y="250" width="80" height="52" fill="#f0b8b2"/>
  <text x="300" y="280" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">−0.28</text>

  <!-- D,D = 1.00 -->
  <rect x="340" y="250" width="80" height="52" fill="#2471a3"/>
  <text x="380" y="280" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">1.00</text>

  <!-- D,E = 0.67 -->
  <rect x="420" y="250" width="80" height="52" fill="#2e86c1"/>
  <text x="460" y="280" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0.67</text>

  <!-- ===== ROW E ===== -->
  <!-- E,A = -0.61 -->
  <rect x="100" y="306" width="80" height="52" fill="#e74c3c"/>
  <text x="140" y="336" text-anchor="middle" font-family="Arial" font-size="12" fill="white">−0.61</text>

  <!-- E,B = -0.44 -->
  <rect x="180" y="306" width="80" height="52" fill="#e77d74"/>
  <text x="220" y="336" text-anchor="middle" font-family="Arial" font-size="12" fill="white">−0.44</text>

  <!-- E,C = -0.50 -->
  <rect x="260" y="306" width="80" height="52" fill="#e05d52"/>
  <text x="300" y="336" text-anchor="middle" font-family="Arial" font-size="12" fill="white">−0.50</text>

  <!-- E,D = 0.67 -->
  <rect x="340" y="306" width="80" height="52" fill="#2e86c1"/>
  <text x="380" y="336" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0.67</text>

  <!-- E,E = 1.00 -->
  <rect x="420" y="306" width="80" height="52" fill="#2471a3"/>
  <text x="460" y="336" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">1.00</text>

  <!-- Grid border overlay -->
  <rect x="100" y="82" width="400" height="276" fill="none" stroke="#666" stroke-width="1.5"/>
  <!-- Vertical grid lines -->
  <line x1="180" y1="82" x2="180" y2="358" stroke="#666" stroke-width="0.8"/>
  <line x1="260" y1="82" x2="260" y2="358" stroke="#666" stroke-width="0.8"/>
  <line x1="340" y1="82" x2="340" y2="358" stroke="#666" stroke-width="0.8"/>
  <line x1="420" y1="82" x2="420" y2="358" stroke="#666" stroke-width="0.8"/>
  <!-- Horizontal grid lines -->
  <line x1="100" y1="138" x2="500" y2="138" stroke="#666" stroke-width="0.8"/>
  <line x1="100" y1="194" x2="500" y2="194" stroke="#666" stroke-width="0.8"/>
  <line x1="100" y1="250" x2="500" y2="250" stroke="#666" stroke-width="0.8"/>
  <line x1="100" y1="306" x2="500" y2="306" stroke="#666" stroke-width="0.8"/>

  <!-- Diagonal emphasis border -->
  <rect x="100" y="82"  width="80" height="52" fill="none" stroke="#1a5276" stroke-width="2.5"/>
  <rect x="180" y="138" width="80" height="52" fill="none" stroke="#1a5276" stroke-width="2.5"/>
  <rect x="260" y="194" width="80" height="52" fill="none" stroke="#1a5276" stroke-width="2.5"/>
  <rect x="340" y="250" width="80" height="52" fill="none" stroke="#1a5276" stroke-width="2.5"/>
  <rect x="420" y="306" width="80" height="52" fill="none" stroke="#1a5276" stroke-width="2.5"/>

  <!-- Legend annotation -->
  <text x="140" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">diagonal = 1.0 always</text>
  <text x="300" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#2471a3">blue = positive</text>
  <text x="420" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#c0392b">red = negative</text>
  <text x="575" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">near-white = ~zero</text>
</svg>
