<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="380" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Precision–Recall Tradeoff</text>
  <!-- Confusion matrix -->
  <rect x="60" y="70" width="260" height="260" rx="8" fill="white" stroke="#555" stroke-width="2"/>
  <line x1="190" y1="70" x2="190" y2="330" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="320" y2="200" stroke="#555" stroke-width="1.5"/>
  <text x="125" y="130" text-anchor="middle" fill="#4A7C59" font-size="18" font-weight="bold">TP</text>
  <text x="255" y="130" text-anchor="middle" fill="#C0392B" font-size="18" font-weight="bold">FP</text>
  <text x="125" y="265" text-anchor="middle" fill="#C0392B" font-size="18" font-weight="bold">FN</text>
  <text x="255" y="265" text-anchor="middle" fill="#888" font-size="18" font-weight="bold">TN</text>
  <text x="125" y="60" text-anchor="middle" fill="#555" font-size="13">Predicted +</text>
  <text x="255" y="60" text-anchor="middle" fill="#555" font-size="13">Predicted −</text>
  <text x="40" y="145" fill="#555" font-size="12" transform="rotate(-90,38,145)">Actual +</text>
  <text x="40" y="270" fill="#555" font-size="12" transform="rotate(-90,38,270)">Actual −</text>
  <!-- Formulas -->
  <text x="420" y="100" fill="#2C5F8A" font-size="15" font-weight="bold">Precision</text>
  <text x="420" y="125" fill="#333" font-size="14">= TP / (TP + FP)</text>
  <text x="420" y="150" fill="#888" font-size="13">Of all predicted positive,</text>
  <text x="420" y="168" fill="#888" font-size="13">how many are correct?</text>
  <text x="420" y="215" fill="#C0392B" font-size="15" font-weight="bold">Recall</text>
  <text x="420" y="240" fill="#333" font-size="14">= TP / (TP + FN)</text>
  <text x="420" y="265" fill="#888" font-size="13">Of all actual positives,</text>
  <text x="420" y="283" fill="#888" font-size="13">how many did we find?</text>
  <text x="420" y="335" fill="#E07B39" font-size="14" font-weight="bold">F1 = 2 × Precision × Recall / (P + R)</text>
  <!-- Arrow showing tradeoff -->
  <text x="190" y="360" text-anchor="middle" fill="#888" font-size="13">Lower threshold → ↑ Recall, ↓ Precision</text>
</svg>