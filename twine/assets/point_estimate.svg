<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <!-- Gradient for CI shading -->
    <linearGradient id="ci-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2D5A8E" stop-opacity="0.0"/>
      <stop offset="30%"  stop-color="#2D5A8E" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#2D5A8E" stop-opacity="0.22"/>
      <stop offset="70%"  stop-color="#2D5A8E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2D5A8E" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" fill="#5C3D1E" font-weight="bold" letter-spacing="0.5">POINT ESTIMATE vs. CONFIDENCE INTERVAL</text>

  <!-- ── Axes ── -->
  <!-- x-axis -->
  <line x1="70" y1="300" x2="730" y2="300" stroke="#C4A87A" stroke-width="1.6" marker-end="url(#arr-axis)"/>
  <!-- y-axis -->
  <line x1="70" y1="304" x2="70"  y2="55"  stroke="#C4A87A" stroke-width="1.6" marker-end="url(#arr-axis)"/>

  <!-- Axis labels -->
  <text x="724" y="318" font-size="11" fill="#6B5D4F">θ</text>
  <text x="30"  y="53"  font-size="10" fill="#6B5D4F">density</text>
  <text x="400" y="338" text-anchor="middle" font-size="11" fill="#6B5D4F">parameter value</text>

  <!-- ── Bell curve (full distribution) ── -->
  <!-- Gaussian centered at x=400 (mean), σ ≈ 95px wide, peak at y=75 -->
  <path d="
    M  70,300
    C 100,300 140,299 175,297
    C 210,295 235,288 260,278
    C 285,267 305,248 325,225
    C 345,202 360,175 375,148
    C 385,128 392,105 400,75
    C 408,105 415,128 425,148
    C 440,175 455,202 475,225
    C 495,248 515,267 540,278
    C 565,288 590,295 625,297
    C 660,299 700,300 730,300"
    fill="#2D5A8E" fill-opacity="0.07"
    stroke="#2D5A8E" stroke-width="2.2"/>

  <!-- ── Confidence Interval shaded region (μ ± 1.5σ: x=257 to x=543) ── -->
  <!-- Clipped bell fill for CI region only -->
  <clipPath id="ci-clip">
    <rect x="257" y="0" width="286" height="400"/>
  </clipPath>
  <path d="
    M  70,300
    C 100,300 140,299 175,297
    C 210,295 235,288 260,278
    C 285,267 305,248 325,225
    C 345,202 360,175 375,148
    C 385,128 392,105 400,75
    C 408,105 415,128 425,148
    C 440,175 455,202 475,225
    C 495,248 515,267 540,278
    C 565,288 590,295 625,297
    C 660,299 700,300 730,300
    Z"
    fill="#2D5A8E" fill-opacity="0.22"
    stroke="none"
    clip-path="url(#ci-clip)"/>

  <!-- CI left boundary dashed line -->
  <line x1="257" y1="300" x2="257" y2="246" stroke="#2D5A8E" stroke-width="1.4" stroke-dasharray="5,3"/>
  <!-- CI right boundary dashed line -->
  <line x1="543" y1="300" x2="543" y2="246" stroke="#2D5A8E" stroke-width="1.4" stroke-dasharray="5,3"/>

  <!-- CI bracket / brace under x-axis -->
  <line x1="257" y1="312" x2="543" y2="312" stroke="#2D5A8E" stroke-width="1.8"/>
  <line x1="257" y1="307" x2="257" y2="317" stroke="#2D5A8E" stroke-width="1.8"/>
  <line x1="543" y1="307" x2="543" y2="317" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="400" y="332" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">confidence interval</text>

  <!-- ── Point estimate: vertical line at mean (x=400) ── -->
  <line x1="400" y1="75" x2="400" y2="300" stroke="#7C2530" stroke-width="2.8"/>

  <!-- Point estimate dot at peak -->
  <circle cx="400" cy="75" r="5" fill="#7C2530"/>

  <!-- Point estimate label -->
  <text x="408" y="68" font-size="11" fill="#7C2530" font-weight="bold">point estimate</text>
  <text x="408" y="82" font-size="10" fill="#7C2530">(θ̂ = mean)</text>

  <!-- ── Tick marks on x-axis ── -->
  <!-- μ - 2σ ≈ x=210 -->
  <line x1="210" y1="297" x2="210" y2="303" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="210" y="315" text-anchor="middle" font-size="9" fill="#8B7355">μ−2σ</text>

  <!-- μ - σ ≈ x=305 -->
  <line x1="305" y1="297" x2="305" y2="303" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="305" y="315" text-anchor="middle" font-size="9" fill="#8B7355">μ−σ</text>

  <!-- μ at x=400 -->
  <line x1="400" y1="297" x2="400" y2="303" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="315" text-anchor="middle" font-size="9" fill="#8B7355">μ</text>

  <!-- μ + σ ≈ x=495 -->
  <line x1="495" y1="297" x2="495" y2="303" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="495" y="315" text-anchor="middle" font-size="9" fill="#8B7355">μ+σ</text>

  <!-- μ + 2σ ≈ x=590 -->
  <line x1="590" y1="297" x2="590" y2="303" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="590" y="315" text-anchor="middle" font-size="9" fill="#8B7355">μ+2σ</text>

  <!-- ── Legend box ── -->
  <rect x="570" y="55" width="210" height="82" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>

  <!-- Legend: bell curve -->
  <line x1="582" y1="77" x2="610" y2="77" stroke="#2D5A8E" stroke-width="2"/>
  <text x="618" y="81" font-size="10" fill="#2D5A8E">posterior distribution</text>

  <!-- Legend: CI shading -->
  <rect x="582" y="89" width="28" height="12" fill="#2D5A8E" fill-opacity="0.22" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="618" y="100" font-size="10" fill="#2D5A8E">95% confidence interval</text>

  <!-- Legend: point estimate -->
  <line x1="582" y1="118" x2="610" y2="118" stroke="#7C2530" stroke-width="2.8"/>
  <circle cx="596" cy="118" r="4" fill="#7C2530"/>
  <text x="618" y="122" font-size="10" fill="#7C2530" font-weight="bold">point estimate (θ̂)</text>

  <!-- ── Caption ── -->
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">
    A point estimate collapses the distribution to a single value; an interval estimate preserves uncertainty.
  </text>
</svg>
