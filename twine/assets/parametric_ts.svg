<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#333" font-size="15" font-weight="bold">Parametric Stationary Time Series Models</text>

  <!-- ══ COLUMN DIVIDERS ══ -->
  <line x1="265" y1="42" x2="265" y2="310" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="532" y1="42" x2="532" y2="310" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════
       LEFT PANEL  —  AR(p)
       ════════════════════════════════ -->
  <text x="133" y="56" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">AR(p)</text>
  <text x="133" y="72" text-anchor="middle" fill="#6B5D4F" font-size="10">past values → current</text>

  <!-- Past value boxes -->
  <rect x="18"  y="90" width="52" height="30" rx="5" fill="#D6E8F5" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="44"  y="110" text-anchor="middle" fill="#2C5F8A" font-size="12" font-weight="bold">y&#x209C;&#x208B;&#x209A;</text>

  <rect x="84"  y="90" width="52" height="30" rx="5" fill="#D6E8F5" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="110" y="110" text-anchor="middle" fill="#2C5F8A" font-size="12" font-weight="bold">y&#x209C;&#x208B;&#x2082;</text>

  <rect x="150" y="90" width="52" height="30" rx="5" fill="#D6E8F5" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="176" y="110" text-anchor="middle" fill="#2C5F8A" font-size="12" font-weight="bold">y&#x209C;&#x208B;&#x2081;</text>

  <!-- Arrows from past values down to current -->
  <line x1="44"  y1="120" x2="105" y2="162" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="110" y1="120" x2="110" y2="162" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="176" y1="120" x2="117" y2="162" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Current value box -->
  <rect x="82"  y="162" width="56" height="32" rx="5" fill="#2C5F8A" stroke="#1A3F60" stroke-width="1.5"/>
  <text x="110" y="183" text-anchor="middle" fill="#FDFAF4" font-size="13" font-weight="bold">y&#x209C;</text>

  <!-- Noise epsilon -->
  <rect x="202" y="162" width="46" height="32" rx="5" fill="#F5EDD6" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="225" y="183" text-anchor="middle" fill="#5C3D1E" font-size="13">&#x03B5;&#x209C;</text>
  <line x1="202" y1="178" x2="140" y2="178" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>

  <!-- Formula -->
  <text x="133" y="224" text-anchor="middle" fill="#333" font-size="11">y&#x209C; = &#x03C6;&#x2081;y&#x209C;&#x208B;&#x2081; + &#x22EF; + &#x03C6;&#x209A;y&#x209C;&#x208B;&#x209A; + &#x03B5;&#x209C;</text>

  <!-- ACF/PACF hints -->
  <rect x="16" y="238" width="232" height="60" rx="5" fill="#EAF2FB" stroke="#2C5F8A" stroke-width="1"/>
  <text x="132" y="254" text-anchor="middle" fill="#2C5F8A" font-size="10" font-weight="bold">ACF / PACF identification</text>
  <text x="132" y="270" text-anchor="middle" fill="#333" font-size="10">ACF: exponential decay or damped sine</text>
  <text x="132" y="285" text-anchor="middle" fill="#333" font-size="10">PACF: cuts off after lag p</text>

  <!-- ════════════════════════════════
       MIDDLE PANEL  —  MA(q)
       ════════════════════════════════ -->
  <text x="399" y="56" text-anchor="middle" fill="#4A7C59" font-size="14" font-weight="bold">MA(q)</text>
  <text x="399" y="72" text-anchor="middle" fill="#6B5D4F" font-size="10">past errors → current</text>

  <!-- Past error boxes -->
  <rect x="284" y="90" width="52" height="30" rx="5" fill="#D9EFE3" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="310" y="110" text-anchor="middle" fill="#4A7C59" font-size="12" font-weight="bold">&#x03B5;&#x209C;&#x208B;&#x209C;</text>

  <rect x="350" y="90" width="52" height="30" rx="5" fill="#D9EFE3" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="376" y="110" text-anchor="middle" fill="#4A7C59" font-size="12" font-weight="bold">&#x03B5;&#x209C;&#x208B;&#x2082;</text>

  <rect x="416" y="90" width="52" height="30" rx="5" fill="#D9EFE3" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="442" y="110" text-anchor="middle" fill="#4A7C59" font-size="12" font-weight="bold">&#x03B5;&#x209C;&#x208B;&#x2081;</text>

  <!-- Arrows from past errors down to current -->
  <line x1="310" y1="120" x2="371" y2="162" stroke="#4A7C59" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="376" y1="120" x2="376" y2="162" stroke="#4A7C59" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="442" y1="120" x2="383" y2="162" stroke="#4A7C59" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Current value box -->
  <rect x="348" y="162" width="56" height="32" rx="5" fill="#4A7C59" stroke="#2D5238" stroke-width="1.5"/>
  <text x="376" y="183" text-anchor="middle" fill="#FDFAF4" font-size="13" font-weight="bold">y&#x209C;</text>

  <!-- Noise epsilon current -->
  <rect x="468" y="162" width="46" height="32" rx="5" fill="#F5EDD6" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="491" y="183" text-anchor="middle" fill="#5C3D1E" font-size="13">&#x03B5;&#x209C;</text>
  <line x1="468" y1="178" x2="406" y2="178" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>

  <!-- Formula -->
  <text x="399" y="224" text-anchor="middle" fill="#333" font-size="11">y&#x209C; = &#x03B5;&#x209C; + &#x03B8;&#x2081;&#x03B5;&#x209C;&#x208B;&#x2081; + &#x22EF; + &#x03B8;&#x209C;&#x03B5;&#x209C;&#x208B;&#x209C;</text>

  <!-- ACF/PACF hints -->
  <rect x="282" y="238" width="232" height="60" rx="5" fill="#E8F5EE" stroke="#4A7C59" stroke-width="1"/>
  <text x="398" y="254" text-anchor="middle" fill="#4A7C59" font-size="10" font-weight="bold">ACF / PACF identification</text>
  <text x="398" y="270" text-anchor="middle" fill="#333" font-size="10">ACF: cuts off after lag q</text>
  <text x="398" y="285" text-anchor="middle" fill="#333" font-size="10">PACF: exponential decay or damped sine</text>

  <!-- ════════════════════════════════
       RIGHT PANEL  —  ARMA(p,q)
       ════════════════════════════════ -->
  <text x="666" y="56" text-anchor="middle" fill="#E07B39" font-size="14" font-weight="bold">ARMA(p,q)</text>
  <text x="666" y="72" text-anchor="middle" fill="#6B5D4F" font-size="10">past values + past errors → current</text>

  <!-- Past value boxes (blue tint) -->
  <rect x="548" y="82" width="46" height="26" rx="4" fill="#D6E8F5" stroke="#2C5F8A" stroke-width="1.2"/>
  <text x="571" y="99" text-anchor="middle" fill="#2C5F8A" font-size="11" font-weight="bold">y&#x209C;&#x208B;&#x209A;</text>
  <rect x="601" y="82" width="46" height="26" rx="4" fill="#D6E8F5" stroke="#2C5F8A" stroke-width="1.2"/>
  <text x="624" y="99" text-anchor="middle" fill="#2C5F8A" font-size="11" font-weight="bold">y&#x209C;&#x208B;&#x2081;</text>

  <!-- Past error boxes (green tint) -->
  <rect x="714" y="82" width="46" height="26" rx="4" fill="#D9EFE3" stroke="#4A7C59" stroke-width="1.2"/>
  <text x="737" y="99" text-anchor="middle" fill="#4A7C59" font-size="11" font-weight="bold">&#x03B5;&#x209C;&#x208B;&#x209C;</text>
  <rect x="760" y="82" width="32" height="26" rx="4" fill="#D9EFE3" stroke="#4A7C59" stroke-width="1.2"/>
  <text x="776" y="99" text-anchor="middle" fill="#4A7C59" font-size="11" font-weight="bold">&#x03B5;&#x209C;&#x208B;&#x2081;</text>

  <!-- Dividing label between AR and MA inputs -->
  <text x="676" y="96" text-anchor="middle" fill="#D4C5A9" font-size="11">+</text>

  <!-- Arrows from past values to current -->
  <line x1="571" y1="108" x2="640" y2="152" stroke="#2C5F8A" stroke-width="1.4" marker-end="url(#arrowBlue)"/>
  <line x1="624" y1="108" x2="650" y2="152" stroke="#2C5F8A" stroke-width="1.4" marker-end="url(#arrowBlue)"/>

  <!-- Arrows from past errors to current -->
  <line x1="737" y1="108" x2="692" y2="152" stroke="#4A7C59" stroke-width="1.4" marker-end="url(#arrowGreen)"/>
  <line x1="776" y1="108" x2="700" y2="152" stroke="#4A7C59" stroke-width="1.4" marker-end="url(#arrowGreen)"/>

  <!-- Current value box -->
  <rect x="643" y="152" width="56" height="32" rx="5" fill="#E07B39" stroke="#A0511C" stroke-width="1.5"/>
  <text x="671" y="173" text-anchor="middle" fill="#FDFAF4" font-size="13" font-weight="bold">y&#x209C;</text>

  <!-- Noise epsilon current -->
  <rect x="548" y="152" width="46" height="32" rx="5" fill="#F5EDD6" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="571" y="173" text-anchor="middle" fill="#5C3D1E" font-size="13">&#x03B5;&#x209C;</text>
  <line x1="594" y1="168" x2="641" y2="168" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>

  <!-- Formula -->
  <text x="666" y="216" text-anchor="middle" fill="#333" font-size="10.5">y&#x209C; = &#x03C6;&#x2081;y&#x209C;&#x208B;&#x2081; + &#x22EF; + &#x03B8;&#x2081;&#x03B5;&#x209C;&#x208B;&#x2081; + &#x22EF; + &#x03B5;&#x209C;</text>

  <!-- ACF/PACF hints -->
  <rect x="548" y="230" width="240" height="68" rx="5" fill="#FEF0E4" stroke="#E07B39" stroke-width="1"/>
  <text x="668" y="247" text-anchor="middle" fill="#E07B39" font-size="10" font-weight="bold">ACF / PACF identification</text>
  <text x="668" y="263" text-anchor="middle" fill="#333" font-size="10">ACF: tails off (mixed decay / oscillation)</text>
  <text x="668" y="278" text-anchor="middle" fill="#333" font-size="10">PACF: tails off (mixed decay / oscillation)</text>
  <text x="668" y="291" text-anchor="middle" fill="#6B5D4F" font-size="9" font-style="italic">Order chosen by AIC / BIC grid search</text>

  <!-- ══ BOTTOM LEGEND / BOX-JENKINS ROW ══ -->
  <line x1="20" y1="315" x2="780" y2="315" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Blue legend -->
  <rect x="30" y="325" width="18" height="12" rx="2" fill="#D6E8F5" stroke="#2C5F8A" stroke-width="1.2"/>
  <text x="55" y="336" fill="#2C5F8A" font-size="11">past y values</text>

  <!-- Green legend -->
  <rect x="158" y="325" width="18" height="12" rx="2" fill="#D9EFE3" stroke="#4A7C59" stroke-width="1.2"/>
  <text x="183" y="336" fill="#4A7C59" font-size="11">past errors &#x03B5;</text>

  <!-- Orange legend -->
  <rect x="286" y="325" width="18" height="12" rx="2" fill="#E07B39"/>
  <text x="311" y="336" fill="#E07B39" font-size="11">ARMA output</text>

  <!-- Box-Jenkins note -->
  <text x="490" y="336" text-anchor="middle" fill="#6B5D4F" font-size="10.5" font-style="italic">Box-Jenkins: identify (ACF/PACF) → estimate (MLE) → diagnose (residuals)</text>

  <!-- ══ ARROWHEAD MARKERS ══ -->
  <defs>
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2C5F8A"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#4A7C59"/>
    </marker>
    <marker id="arrowBrown" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>
