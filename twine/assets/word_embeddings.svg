<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Word space axes -->
  <line x1="80" y1="330" x2="480" y2="330" stroke="#ccc" stroke-width="1.5"/>
  <line x1="80" y1="330" x2="80" y2="70" stroke="#ccc" stroke-width="1.5"/>
  <text x="280" y="370" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Dimension 1 (e.g. gender)</text>
  <text x="30" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#555" transform="rotate(-90,30,200)">Dimension 2 (e.g. royalty)</text>
  <!-- Word points -->
  <circle cx="200" cy="150" r="7" fill="#4a90d9"/>
  <text x="210" y="145" font-family="Arial" font-size="13" fill="#4a90d9">king</text>
  <circle cx="310" cy="150" r="7" fill="#e74c3c"/>
  <text x="320" y="145" font-family="Arial" font-size="13" fill="#e74c3c">queen</text>
  <circle cx="185" cy="250" r="7" fill="#4a90d9"/>
  <text x="195" y="245" font-family="Arial" font-size="13" fill="#4a90d9">man</text>
  <circle cx="310" cy="250" r="7" fill="#e74c3c"/>
  <text x="320" y="245" font-family="Arial" font-size="13" fill="#e74c3c">woman</text>
  <!-- Analogy arrows -->
  <line x1="200" y1="150" x2="310" y2="150" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arcwe)"/>
  <line x1="185" y1="250" x2="308" y2="250" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arcwe)"/>
  <line x1="200" y1="150" x2="185" y2="248" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arcwe)"/>
  <line x1="310" y1="150" x2="310" y2="248" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arcwe)"/>
  <text x="255" y="138" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">gender offset</text>
  <text x="155" y="203" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">royalty offset</text>
  <!-- Analogy label -->
  <text x="420" y="200" font-family="Arial" font-size="12" fill="#555">king − man</text>
  <text x="420" y="218" font-family="Arial" font-size="12" fill="#555">+ woman</text>
  <text x="420" y="236" font-family="Arial" font-size="12" fill="#27ae60">≈ queen</text>
  <!-- One-hot vs dense -->
  <rect x="530" y="80" width="240" height="200" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="650" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">One-hot vs. Dense</text>
  <text x="650" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">One-hot: [0,0,1,0,...,0]</text>
  <text x="650" y="152" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">50,000 dims, no similarity</text>
  <line x1="540" y1="165" x2="760" y2="165" stroke="#ddd" stroke-width="1"/>
  <text x="650" y="185" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">Embedding: [0.3, −0.1, 0.8]</text>
  <text x="650" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">300 dims, encodes meaning</text>
  <defs><marker id="arcwe" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/></marker></defs>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Word Embeddings</text>
</svg>
