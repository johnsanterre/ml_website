<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Learning to Rank</text>
  <!-- Query + documents -->
  <rect x="40" y="70" width="140" height="50" rx="8" fill="#f0e6ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Query q</text>
  <!-- Documents -->
  <rect x="230" y="65" width="200" height="40" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="330" y="90" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Doc A — score: 0.92</text>
  <rect x="230" y="115" width="200" height="40" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="330" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Doc B — score: 0.71</text>
  <rect x="230" y="165" width="200" height="40" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="330" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Doc C — score: 0.45</text>
  <line x1="180" y1="95" x2="228" y2="95" stroke="#8e44ad" stroke-width="2" marker-end="url(#ark)"/>
  <text x="204" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="#8e44ad">rank</text>
  <!-- Three approaches -->
  <rect x="460" y="60" width="310" height="280" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="615" y="88" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Ranking Approaches</text>
  <text x="615" y="118" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9" font-weight="bold">Pointwise</text>
  <text x="615" y="138" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Score each doc independently</text>
  <line x1="470" y1="150" x2="760" y2="150" stroke="#ddd" stroke-width="1"/>
  <text x="615" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22" font-weight="bold">Pairwise</text>
  <text x="615" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Is doc A better than doc B?</text>
  <text x="615" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">RankSVM, RankNet</text>
  <line x1="470" y1="225" x2="760" y2="225" stroke="#ddd" stroke-width="1"/>
  <text x="615" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">Listwise</text>
  <text x="615" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Optimize whole ranked list</text>
  <text x="615" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">LambdaMART, NDCG</text>
  <defs><marker id="ark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8e44ad"/></marker></defs>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">NDCG = Normalized Discounted Cumulative Gain — standard ranking evaluation metric</text>
</svg>
