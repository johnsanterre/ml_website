<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Normalization Techniques</text>
  <!-- Batch Norm -->
  <rect x="30" y="70" width="170" height="240" rx="8" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="115" y="98" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#4a90d9">Batch Norm</text>
  <!-- Mini-batch grid: normalize across batch (columns) -->
  <rect x="50" y="110" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.8"/>
  <rect x="85" y="110" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.5"/>
  <rect x="120" y="110" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.3"/>
  <rect x="50" y="145" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.6"/>
  <rect x="85" y="145" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.4"/>
  <rect x="120" y="145" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.7"/>
  <rect x="50" y="180" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.3"/>
  <rect x="85" y="180" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.8"/>
  <rect x="120" y="180" width="30" height="30" rx="2" fill="#4a90d9" opacity="0.5"/>
  <text x="115" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">↕ normalize each</text>
  <text x="115" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">feature across batch</text>
  <text x="115" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Needs large batch</text>
  <!-- Layer Norm -->
  <rect x="215" y="70" width="170" height="240" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="300" y="98" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e67e22">Layer Norm</text>
  <rect x="235" y="110" width="30" height="30" rx="2" fill="#e67e22" opacity="0.8"/>
  <rect x="270" y="110" width="30" height="30" rx="2" fill="#e67e22" opacity="0.5"/>
  <rect x="305" y="110" width="30" height="30" rx="2" fill="#e67e22" opacity="0.3"/>
  <rect x="235" y="145" width="30" height="30" rx="2" fill="#e67e22" opacity="0.6"/>
  <rect x="270" y="145" width="30" height="30" rx="2" fill="#e67e22" opacity="0.4"/>
  <rect x="305" y="145" width="30" height="30" rx="2" fill="#e67e22" opacity="0.7"/>
  <text x="300" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">↔ normalize each</text>
  <text x="300" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">sample across features</text>
  <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Used in Transformers</text>
  <!-- Instance Norm -->
  <rect x="400" y="70" width="170" height="240" rx="8" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="485" y="98" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#27ae60">Instance Norm</text>
  <rect x="420" y="110" width="30" height="30" rx="2" fill="#27ae60" opacity="0.8"/>
  <rect x="455" y="110" width="30" height="30" rx="2" fill="#27ae60" opacity="0.5"/>
  <rect x="420" y="145" width="30" height="30" rx="2" fill="#27ae60" opacity="0.3"/>
  <rect x="455" y="145" width="30" height="30" rx="2" fill="#27ae60" opacity="0.6"/>
  <text x="485" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">normalize each</text>
  <text x="485" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">channel per sample</text>
  <text x="485" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Style transfer / CNNs</text>
  <!-- Formula -->
  <rect x="590" y="100" width="185" height="80" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="682" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">General Form</text>
  <text x="682" y="152" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">x̂ = (x − μ) / σ</text>
  <text x="682" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">then scale &amp; shift</text>
</svg>
