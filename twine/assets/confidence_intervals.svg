<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">Confidence Intervals</text>

  <!-- Panel 1: Many CIs diagram -->
  <rect x="18" y="50" width="240" height="305" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="138" y="72" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">THE FREQUENTIST PICTURE</text>

  <!-- True parameter line -->
  <line x1="138" y1="88" x2="138" y2="340" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="145" y="98" text-anchor="start" font-size="9" fill="#7C2530" font-weight="bold">μ (true value)</text>

  <!-- 20 CIs, most covering, a few not -->
  <!-- Covering intervals (navy) -->
  <line x1="90"  y1="112" x2="185" y2="112" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="137" cy="112" r="3" fill="#2D5A8E"/>
  <line x1="85"  y1="124" x2="188" y2="124" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="140" cy="124" r="3" fill="#2D5A8E"/>
  <line x1="95"  y1="136" x2="183" y2="136" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="136" cy="136" r="3" fill="#2D5A8E"/>
  <line x1="88"  y1="148" x2="190" y2="148" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="139" cy="148" r="3" fill="#2D5A8E"/>
  <line x1="92"  y1="160" x2="186" y2="160" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="138" cy="160" r="3" fill="#2D5A8E"/>
  <!-- Missing interval (red) -->
  <line x1="150" y1="172" x2="220" y2="172" stroke="#7C2530" stroke-width="2.5"/>
  <circle cx="185" cy="172" r="3" fill="#7C2530"/>
  <line x1="89"  y1="184" x2="185" y2="184" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="137" cy="184" r="3" fill="#2D5A8E"/>
  <line x1="93"  y1="196" x2="187" y2="196" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="140" cy="196" r="3" fill="#2D5A8E"/>
  <line x1="87"  y1="208" x2="184" y2="208" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="135" cy="208" r="3" fill="#2D5A8E"/>
  <line x1="91"  y1="220" x2="189" y2="220" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="138" cy="220" r="3" fill="#2D5A8E"/>
  <line x1="94"  y1="232" x2="186" y2="232" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="139" cy="232" r="3" fill="#2D5A8E"/>
  <!-- Another miss -->
  <line x1="38"  y1="244" x2="118" y2="244" stroke="#7C2530" stroke-width="2.5"/>
  <circle cx="78"  cy="244" r="3" fill="#7C2530"/>
  <line x1="90"  y1="256" x2="187" y2="256" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="138" cy="256" r="3" fill="#2D5A8E"/>
  <line x1="88"  y1="268" x2="185" y2="268" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="136" cy="268" r="3" fill="#2D5A8E"/>
  <line x1="86"  y1="280" x2="190" y2="280" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="137" cy="280" r="3" fill="#2D5A8E"/>
  <line x1="93"  y1="292" x2="186" y2="292" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="140" cy="292" r="3" fill="#2D5A8E"/>
  <line x1="89"  y1="304" x2="183" y2="304" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="137" cy="304" r="3" fill="#2D5A8E"/>
  <line x1="91"  y1="316" x2="188" y2="316" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="138" cy="316" r="3" fill="#2D5A8E"/>
  <line x1="90"  y1="328" x2="185" y2="328" stroke="#2D5A8E" stroke-width="2.5"/>
  <circle cx="137" cy="328" r="3" fill="#2D5A8E"/>

  <text x="35"  y="350" text-anchor="start" font-size="8" fill="#2D5A8E">● covers μ (18/20 = 90%)</text>
  <text x="35"  y="363" text-anchor="start" font-size="8" fill="#7C2530">● misses μ (2/20 = 10%)</text>

  <!-- Panel 2: Formula -->
  <rect x="270" y="50" width="250" height="150" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.4" rx="4"/>
  <text x="395" y="72" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">THE FORMULA</text>

  <text x="395" y="98" text-anchor="middle" font-size="11" fill="#5C3D1E">95% CI (z-interval, known σ):</text>
  <text x="395" y="122" text-anchor="middle" font-size="13" fill="#7C2530">x̄ ± z* · σ/√n</text>
  <line x1="280" y1="134" x2="510" y2="134" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="395" y="152" text-anchor="middle" font-size="10" fill="#2D5A8E">t-interval (unknown σ):</text>
  <text x="395" y="172" text-anchor="middle" font-size="13" fill="#7C2530">x̄ ± t* · s/√n</text>
  <text x="395" y="192" text-anchor="middle" font-size="8" fill="#6B5D4F">t* from t-distribution with n−1 df</text>

  <!-- Panel 3: Correct interpretation -->
  <rect x="270" y="212" width="250" height="143" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="395" y="234" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">CORRECT INTERPRETATION</text>

  <text x="285" y="257" text-anchor="start" font-size="9" fill="#7C2530" font-weight="bold">Wrong: </text>
  <text x="340" y="257" text-anchor="start" font-size="9" fill="#5C3D1E">"95% chance μ is</text>
  <text x="285" y="271" text-anchor="start" font-size="9" fill="#5C3D1E">inside this interval"</text>

  <text x="285" y="293" text-anchor="start" font-size="9" fill="#2D5A8E" font-weight="bold">Right: </text>
  <text x="330" y="293" text-anchor="start" font-size="9" fill="#5C3D1E">"95% of intervals</text>
  <text x="285" y="307" text-anchor="start" font-size="9" fill="#5C3D1E">constructed this way will</text>
  <text x="285" y="321" text-anchor="start" font-size="9" fill="#5C3D1E">contain the true μ"</text>

  <text x="395" y="345" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">The parameter is fixed; the interval is random.</text>

  <!-- Panel 4: Bootstrap -->
  <rect x="534" y="50" width="248" height="305" fill="#F0EBE1" stroke="#D4C5A9" stroke-width="1.2" rx="4"/>
  <text x="658" y="72" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">BOOTSTRAP CI</text>

  <!-- Bootstrap diagram -->
  <!-- Original sample -->
  <rect x="549" y="88" width="218" height="30" rx="3" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="0.8"/>
  <text x="658" y="108" text-anchor="middle" font-size="9" fill="#2D5A8E">Original sample  (n = 50)</text>

  <!-- Arrows down to bootstrap samples -->
  <line x1="620" y1="120" x2="590" y2="145" stroke="#C4A87A" stroke-width="1"/>
  <line x1="658" y1="120" x2="658" y2="145" stroke="#C4A87A" stroke-width="1"/>
  <line x1="696" y1="120" x2="726" y2="145" stroke="#C4A87A" stroke-width="1"/>

  <text x="553" y="140" text-anchor="start" font-size="8" fill="#6B5D4F">resample</text>
  <text x="553" y="150" text-anchor="start" font-size="8" fill="#6B5D4F">with replacement</text>

  <!-- Bootstrap samples -->
  <rect x="549" y="152" width="60" height="20" rx="2" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="0.7"/>
  <text x="579" y="165" text-anchor="middle" font-size="8" fill="#7C2530">B₁*</text>
  <rect x="628" y="152" width="60" height="20" rx="2" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="0.7"/>
  <text x="658" y="165" text-anchor="middle" font-size="8" fill="#7C2530">B₂*</text>
  <rect x="707" y="152" width="60" height="20" rx="2" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="0.7"/>
  <text x="737" y="165" text-anchor="middle" font-size="8" fill="#7C2530">B*…</text>

  <!-- Compute statistics -->
  <text x="658" y="195" text-anchor="middle" font-size="9" fill="#5C3D1E">compute θ̂* on each</text>
  <text x="658" y="210" text-anchor="middle" font-size="9" fill="#5C3D1E">→ distribution of θ̂*</text>

  <line x1="544" y1="222" x2="772" y2="222" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="658" y="242" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Percentile CI:</text>
  <text x="658" y="260" text-anchor="middle" font-size="10" fill="#7C2530">[θ̂*(2.5%), θ̂*(97.5%)]</text>

  <line x1="544" y1="275" x2="772" y2="275" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="658" y="295" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">Works without</text>
  <text x="658" y="310" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">distributional</text>
  <text x="658" y="325" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">assumptions</text>
  <text x="658" y="342" text-anchor="middle" font-size="8" fill="#6B5D4F">Typical B = 1000–10000</text>

  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">The interval is random · the true parameter is fixed · 95% confidence = 95% of procedures cover the truth</text>
</svg>
