<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">The Bootstrap: Resampling to Estimate Uncertainty</text>

  <!-- Panel 1: Original Sample -->
  <rect x="15" y="48" width="160" height="310" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="95" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">ORIGINAL SAMPLE</text>

  <!-- Data points -->
  <circle cx="60" cy="100" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="60" y="104" text-anchor="middle" font-size="9" fill="#FDFAF4">3</text>
  <circle cx="100" cy="100" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="100" y="104" text-anchor="middle" font-size="9" fill="#FDFAF4">7</text>
  <circle cx="140" cy="100" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="140" y="104" text-anchor="middle" font-size="9" fill="#FDFAF4">2</text>
  <circle cx="60" cy="135" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="60" y="139" text-anchor="middle" font-size="9" fill="#FDFAF4">9</text>
  <circle cx="100" cy="135" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="100" y="139" text-anchor="middle" font-size="9" fill="#FDFAF4">5</text>
  <circle cx="140" cy="135" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="140" y="139" text-anchor="middle" font-size="9" fill="#FDFAF4">1</text>
  <circle cx="60" cy="170" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="60" y="174" text-anchor="middle" font-size="9" fill="#FDFAF4">8</text>
  <circle cx="100" cy="170" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="100" y="174" text-anchor="middle" font-size="9" fill="#FDFAF4">4</text>
  <circle cx="140" cy="170" r="10" fill="#2D5A8E" opacity="0.8"/>
  <text x="140" y="174" text-anchor="middle" font-size="9" fill="#FDFAF4">6</text>

  <text x="95" y="205" text-anchor="middle" font-size="9" fill="#6B5D4F">n = 9 observations</text>
  <text x="95" y="220" text-anchor="middle" font-size="9" fill="#6B5D4F">x̄ = 5.0</text>

  <line x1="20" y1="232" x2="168" y2="232" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="95" y="252" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">treat this sample</text>
  <text x="95" y="267" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">as if it were the</text>
  <text x="95" y="282" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">population</text>

  <!-- Panel 2: Bootstrap Resamples -->
  <rect x="190" y="48" width="250" height="310" fill="#F0EBE1" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="315" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">BOOTSTRAP RESAMPLES (B = 1000)</text>

  <!-- Bootstrap sample 1 -->
  <rect x="202" y="80" width="226" height="44" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.8" rx="2"/>
  <text x="218" y="97" text-anchor="start" font-size="9" fill="#6B5D4F">Sample 1:</text>
  <circle cx="278" cy="94" r="7" fill="#2D5A8E" opacity="0.7"/><text x="278" y="97" text-anchor="middle" font-size="8" fill="#FDFAF4">3</text>
  <circle cx="292" cy="94" r="7" fill="#2D5A8E" opacity="0.7"/><text x="292" y="97" text-anchor="middle" font-size="8" fill="#FDFAF4">3</text>
  <circle cx="306" cy="94" r="7" fill="#2D5A8E" opacity="0.7"/><text x="306" y="97" text-anchor="middle" font-size="8" fill="#FDFAF4">7</text>
  <circle cx="320" cy="94" r="7" fill="#2D5A8E" opacity="0.7"/><text x="320" y="97" text-anchor="middle" font-size="8" fill="#FDFAF4">9</text>
  <circle cx="334" cy="94" r="7" fill="#2D5A8E" opacity="0.7"/><text x="334" y="97" text-anchor="middle" font-size="8" fill="#FDFAF4">1</text>
  <text x="370" y="97" text-anchor="middle" font-size="9" fill="#7C2530">x̄*=4.7</text>
  <text x="218" y="115" text-anchor="start" font-size="8" fill="#6B5D4F" font-style="italic">with replacement</text>

  <!-- Bootstrap sample 2 -->
  <rect x="202" y="132" width="226" height="44" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.8" rx="2"/>
  <text x="218" y="149" text-anchor="start" font-size="9" fill="#6B5D4F">Sample 2:</text>
  <circle cx="278" cy="146" r="7" fill="#2D5A8E" opacity="0.7"/><text x="278" y="149" text-anchor="middle" font-size="8" fill="#FDFAF4">5</text>
  <circle cx="292" cy="146" r="7" fill="#2D5A8E" opacity="0.7"/><text x="292" y="149" text-anchor="middle" font-size="8" fill="#FDFAF4">5</text>
  <circle cx="306" cy="146" r="7" fill="#2D5A8E" opacity="0.7"/><text x="306" y="149" text-anchor="middle" font-size="8" fill="#FDFAF4">8</text>
  <circle cx="320" cy="146" r="7" fill="#2D5A8E" opacity="0.7"/><text x="320" y="149" text-anchor="middle" font-size="8" fill="#FDFAF4">2</text>
  <circle cx="334" cy="146" r="7" fill="#2D5A8E" opacity="0.7"/><text x="334" y="149" text-anchor="middle" font-size="8" fill="#FDFAF4">6</text>
  <text x="370" y="149" text-anchor="middle" font-size="9" fill="#7C2530">x̄*=5.4</text>
  <text x="218" y="167" text-anchor="start" font-size="8" fill="#6B5D4F" font-style="italic">some obs. repeated</text>

  <text x="315" y="196" text-anchor="middle" font-size="11" fill="#6B5D4F">⋮  (B = 1000 times)  ⋮</text>

  <!-- Bootstrap sample B -->
  <rect x="202" y="210" width="226" height="44" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.8" rx="2"/>
  <text x="218" y="227" text-anchor="start" font-size="9" fill="#6B5D4F">Sample B:</text>
  <circle cx="278" cy="224" r="7" fill="#2D5A8E" opacity="0.7"/><text x="278" y="227" text-anchor="middle" font-size="8" fill="#FDFAF4">9</text>
  <circle cx="292" cy="224" r="7" fill="#2D5A8E" opacity="0.7"/><text x="292" y="227" text-anchor="middle" font-size="8" fill="#FDFAF4">4</text>
  <circle cx="306" cy="224" r="7" fill="#2D5A8E" opacity="0.7"/><text x="306" y="227" text-anchor="middle" font-size="8" fill="#FDFAF4">4</text>
  <circle cx="320" cy="224" r="7" fill="#2D5A8E" opacity="0.7"/><text x="320" y="227" text-anchor="middle" font-size="8" fill="#FDFAF4">7</text>
  <circle cx="334" cy="224" r="7" fill="#2D5A8E" opacity="0.7"/><text x="334" y="227" text-anchor="middle" font-size="8" fill="#FDFAF4">8</text>
  <text x="370" y="227" text-anchor="middle" font-size="9" fill="#7C2530">x̄*=6.1</text>

  <text x="315" y="280" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">compute statistic θ̂* for each</text>

  <!-- Panel 3: Bootstrap Distribution + CI -->
  <rect x="455" y="48" width="328" height="310" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.8" rx="4"/>
  <text x="619" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">BOOTSTRAP DISTRIBUTION → CONFIDENCE INTERVAL</text>

  <!-- Histogram bars -->
  <rect x="475" y="252" width="18" height="15" fill="#2D5A8E" opacity="0.5" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="495" y="237" width="18" height="30" fill="#2D5A8E" opacity="0.5" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="515" y="212" width="18" height="55" fill="#2D5A8E" opacity="0.6" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="535" y="192" width="18" height="75" fill="#2D5A8E" opacity="0.7" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="555" y="172" width="18" height="95" fill="#2D5A8E" opacity="0.75" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="575" y="162" width="18" height="105" fill="#2D5A8E" opacity="0.8" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="595" y="172" width="18" height="95" fill="#2D5A8E" opacity="0.75" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="615" y="192" width="18" height="75" fill="#2D5A8E" opacity="0.7" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="635" y="217" width="18" height="50" fill="#2D5A8E" opacity="0.6" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="655" y="237" width="18" height="30" fill="#2D5A8E" opacity="0.5" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="675" y="252" width="18" height="15" fill="#2D5A8E" opacity="0.5" stroke="#2D5A8E" stroke-width="0.5"/>
  <rect x="695" y="257" width="18" height="10" fill="#2D5A8E" opacity="0.4" stroke="#2D5A8E" stroke-width="0.5"/>

  <!-- Baseline -->
  <line x1="468" y1="268" x2="765" y2="268" stroke="#5C3D1E" stroke-width="1"/>

  <!-- 95% CI markers -->
  <line x1="515" y1="268" x2="515" y2="150" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="695" y1="268" x2="695" y2="150" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="584" y1="268" x2="584" y2="130" stroke="#5C3D1E" stroke-width="2"/>

  <!-- CI bracket -->
  <line x1="515" y1="155" x2="695" y2="155" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="515" y1="150" x2="515" y2="160" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="695" y1="150" x2="695" y2="160" stroke="#7C2530" stroke-width="1.5"/>
  <text x="605" y="148" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">95% CI</text>

  <!-- Labels -->
  <text x="513" y="285" text-anchor="middle" font-size="9" fill="#7C2530">2.5%</text>
  <text x="584" y="285" text-anchor="middle" font-size="9" fill="#5C3D1E">θ̂=5.0</text>
  <text x="697" y="285" text-anchor="middle" font-size="9" fill="#7C2530">97.5%</text>
  <text x="619" y="110" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">percentile CI: use</text>
  <text x="619" y="123" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">empirical quantiles</text>
  <text x="619" y="136" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">of {θ̂*₁ … θ̂*_B}</text>

  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">Resample with replacement B times  ·  Compute statistic each time  ·  Quantiles of distribution = CI</text>
</svg>
