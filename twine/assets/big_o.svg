<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Big-O Notation: Algorithm Complexity</text>
  <!-- Axes -->
  <line x1="80" y1="340" x2="700" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="340" x2="80" y2="40" stroke="#333" stroke-width="2"/>
  <text x="390" y="380" text-anchor="middle" font-size="14" fill="#333">Input size n</text>
  <text x="30" y="190" text-anchor="middle" font-size="14" fill="#333" transform="rotate(-90,30,190)">Operations</text>
  <!-- O(1) -->
  <line x1="80" y1="320" x2="700" y2="320" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="710" y="324" font-size="12" fill="#4CAF50">O(1)</text>
  <!-- O(log n) -->
  <path d="M80,320 C150,290 300,265 700,240" fill="none" stroke="#2196F3" stroke-width="2.5"/>
  <text x="710" y="244" font-size="12" fill="#2196F3">O(log n)</text>
  <!-- O(n) -->
  <line x1="80" y1="340" x2="700" y2="160" stroke="#FF9800" stroke-width="2.5"/>
  <text x="710" y="164" font-size="12" fill="#FF9800">O(n)</text>
  <!-- O(n log n) -->
  <path d="M80,340 C200,300 400,200 700,100" fill="none" stroke="#9C27B0" stroke-width="2.5"/>
  <text x="710" y="104" font-size="12" fill="#9C27B0">O(n log n)</text>
  <!-- O(n²) -->
  <path d="M80,340 C200,330 350,280 500,180 C580,140 640,90 660,55" fill="none" stroke="#E91E63" stroke-width="2.5"/>
  <text x="665" y="52" font-size="12" fill="#E91E63">O(n²)</text>
  <!-- O(2ⁿ) -->
  <path d="M80,340 C120,338 160,335 200,320 C250,280 280,200 300,55" fill="none" stroke="#F44336" stroke-width="2"/>
  <text x="305" y="52" font-size="12" fill="#F44336">O(2ⁿ)</text>
  <!-- ML examples note -->
  <rect x="85" y="55" width="290" height="90" rx="6" fill="#f9f9f9" stroke="#ddd"/>
  <text x="230" y="76" text-anchor="middle" font-size="12" fill="#555" font-weight="bold">ML Examples</text>
  <text x="230" y="96" text-anchor="middle" font-size="11" fill="#2196F3">Binary search: O(log n)</text>
  <text x="230" y="114" text-anchor="middle" font-size="11" fill="#FF9800">Linear regression predict: O(n)</text>
  <text x="230" y="132" text-anchor="middle" font-size="11" fill="#E91E63">Matrix multiply: O(n³)</text>
</svg>
