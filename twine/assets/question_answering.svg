<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Context passage -->
  <rect x="25" y="35" width="240" height="310" rx="6" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="145" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">CONTEXT PASSAGE</text>
  <!-- Text lines -->
  <rect x="42" y="68" width="206" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <rect x="42" y="82" width="185" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <rect x="42" y="96" width="200" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <!-- Highlighted answer span -->
  <rect x="42" y="112" width="206" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <rect x="42" y="126" width="120" height="8" rx="2" fill="#7C2530" opacity="0.55"/>
  <text x="102" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="white">answer span</text>
  <rect x="42" y="140" width="195" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <rect x="42" y="154" width="170" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <rect x="42" y="168" width="206" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <rect x="42" y="182" width="150" height="8" rx="2" fill="#C4A87A" opacity="0.4"/>
  <!-- Arrow bracket on span -->
  <text x="175" y="131" font-family="Georgia, serif" font-size="18" fill="#7C2530">&#8592;</text>
  <text x="145" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Model reads passage</text>
  <text x="145" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">and finds the answer</text>

  <!-- Panel 2: Model architecture (BERT-style) -->
  <rect x="295" y="35" width="230" height="310" rx="6" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="410" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">TRANSFORMER MODEL</text>
  <!-- Input tokens -->
  <text x="410" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">[CLS] Q tokens [SEP] C tokens [SEP]</text>
  <!-- Layers -->
  <rect x="315" y="88" width="180" height="22" rx="3" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1"/>
  <text x="405" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Self-Attention Layer</text>
  <rect x="315" y="116" width="180" height="22" rx="3" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1"/>
  <text x="405" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Self-Attention Layer</text>
  <rect x="315" y="144" width="180" height="22" rx="3" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1"/>
  <text x="405" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Self-Attention Layer</text>
  <text x="405" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B5D4F">... (12 layers)</text>
  <!-- Output heads -->
  <rect x="315" y="195" width="80" height="26" rx="3" fill="#7C2530" opacity="0.25" stroke="#7C2530" stroke-width="1"/>
  <text x="355" y="211" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">Start head</text>
  <rect x="415" y="195" width="80" height="26" rx="3" fill="#7C2530" opacity="0.25" stroke="#7C2530" stroke-width="1"/>
  <text x="455" y="211" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">End head</text>
  <text x="410" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Extractive QA: predict</text>
  <text x="410" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">span start &amp; end tokens</text>

  <!-- Panel 3: Output -->
  <rect x="555" y="35" width="220" height="310" rx="6" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="665" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">QA MODES</text>

  <rect x="572" y="70" width="186" height="52" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="665" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Extractive QA</text>
  <text x="665" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Answer is a text span</text>
  <text x="665" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">copied from context</text>

  <rect x="572" y="134" width="186" height="52" rx="4" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="665" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">Generative QA</text>
  <text x="665" y="167" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Model generates free-text</text>
  <text x="665" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">answer (GPT, T5, etc.)</text>

  <rect x="572" y="198" width="186" height="52" rx="4" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="665" y="216" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Open-Domain QA</text>
  <text x="665" y="231" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">No context given; retriever</text>
  <text x="665" y="244" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">finds relevant passages</text>

  <text x="665" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F" font-style="italic">Benchmark: SQuAD, TriviaQA,</text>
  <text x="665" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F" font-style="italic">Natural Questions</text>

  <!-- Bottom label -->
  <text x="400" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">Question Answering: Reading Comprehension at Scale</text>
</svg>
