<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="lc-arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="lc-arr-v1" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="lc-arr-v2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7C2530"/>
    </marker>
    <marker id="lc-arr-sum" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4A7C3F"/>
    </marker>
    <marker id="lc-arr-scaled-v1" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="lc-arr-scaled-v2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="400" y1="22" x2="400" y2="378" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ══ PANEL 1: BASIS VECTORS ══ -->
  <text x="200" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">STEP 1 — BASIS VECTORS</text>

  <!-- Grid lines (light) -->
  <!-- horizontal grid -->
  <line x1="32" y1="340" x2="380" y2="340" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="32" y1="280" x2="380" y2="280" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="32" y1="220" x2="380" y2="220" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="32" y1="160" x2="380" y2="160" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="32" y1="100" x2="380" y2="100" stroke="#EDE5D0" stroke-width="0.8"/>
  <!-- vertical grid -->
  <line x1="92"  y1="38" x2="92"  y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="152" y1="38" x2="152" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="212" y1="38" x2="212" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="272" y1="38" x2="272" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="332" y1="38" x2="332" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>

  <!-- Axes -->
  <line x1="32" y1="340" x2="382" y2="340" stroke="#C4A87A" stroke-width="1.4" marker-end="url(#lc-arr-axis)"/>
  <line x1="32" y1="340" x2="32"  y2="38"  stroke="#C4A87A" stroke-width="1.4" marker-end="url(#lc-arr-axis)"/>
  <text x="376" y="355" font-size="10" fill="#6B5D4F">x</text>
  <text x="22"  y="34"  font-size="10" fill="#6B5D4F">y</text>

  <!-- Origin dot -->
  <circle cx="32" cy="340" r="3" fill="#6B5D4F"/>

  <!-- v1 = (3, 0) → 3 grid cells right; each cell = 60px -->
  <!-- SVG: from (32,340) to (32+3*60, 340) = (212, 340) but y stays same -->
  <!-- v1 = (2, 1): right 2, up 1 → (32+120, 340-60) = (152, 280) -->
  <line x1="32" y1="340" x2="148" y2="283"
        stroke="#2D5A8E" stroke-width="2.8" stroke-linecap="round"
        marker-end="url(#lc-arr-v1)"/>
  <text x="96" y="296" font-size="13" fill="#2D5A8E" font-style="italic" font-weight="bold">v₁</text>
  <text x="96" y="309" font-size="9.5" fill="#2D5A8E">(2, 1)</text>

  <!-- v2 = (0, 2): right 0, up 2 → (32, 340-120) = (32, 220) -->
  <line x1="32" y1="340" x2="32"  y2="224"
        stroke="#7C2530" stroke-width="2.8" stroke-linecap="round"
        marker-end="url(#lc-arr-v2)"/>
  <text x="40"  y="274" font-size="13" fill="#7C2530" font-style="italic" font-weight="bold">v₂</text>
  <text x="40"  y="287" font-size="9.5" fill="#7C2530">(0, 2)</text>

  <!-- Tick marks on axes for reference -->
  <text x="88"  y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">1</text>
  <text x="148" y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">2</text>
  <text x="208" y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">3</text>
  <text x="22"  y="283" font-size="8.5" fill="#A0907A" text-anchor="end">1</text>
  <text x="22"  y="223" font-size="8.5" fill="#A0907A" text-anchor="end">2</text>
  <text x="22"  y="163" font-size="8.5" fill="#A0907A" text-anchor="end">3</text>

  <!-- Panel caption -->
  <text x="200" y="390" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">two independent basis vectors</text>

  <!-- ══ PANEL 2: WEIGHTED SUM ══ -->
  <text x="600" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">STEP 2 — WEIGHTED SUM  α₁v₁ + α₂v₂</text>

  <!-- Grid lines (light) -->
  <line x1="422" y1="340" x2="790" y2="340" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="422" y1="280" x2="790" y2="280" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="422" y1="220" x2="790" y2="220" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="422" y1="160" x2="790" y2="160" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="422" y1="100" x2="790" y2="100" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="482" y1="38" x2="482" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="542" y1="38" x2="542" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="602" y1="38" x2="602" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="662" y1="38" x2="662" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>
  <line x1="722" y1="38" x2="722" y2="370" stroke="#EDE5D0" stroke-width="0.8"/>

  <!-- Axes -->
  <line x1="422" y1="340" x2="782" y2="340" stroke="#C4A87A" stroke-width="1.4" marker-end="url(#lc-arr-axis)"/>
  <line x1="422" y1="340" x2="422" y2="38"  stroke="#C4A87A" stroke-width="1.4" marker-end="url(#lc-arr-axis)"/>
  <text x="776" y="355" font-size="10" fill="#6B5D4F">x</text>
  <text x="412" y="34"  font-size="10" fill="#6B5D4F">y</text>

  <!-- Origin dot -->
  <circle cx="422" cy="340" r="3" fill="#6B5D4F"/>

  <!-- α₁ = 1.5, α₂ = 2 -->
  <!-- α₁·v₁ = 1.5*(2,1) = (3, 1.5): right 3*60=180, up 1.5*60=90 → (602, 250) -->
  <!-- α₂·v₂ = 2*(0,2) = (0, 4): up 4*60=240 → from origin (422, 100), but added to tip of α₁v₁ -->
  <!-- tip of α₁v₁ = (602, 250) -->
  <!-- tip of sum = (602, 250-240) = (602, 10) — too high, use α₂=1.5 → (0,3): up 180 → (602, 70) — still high -->
  <!-- Use α₁=1.5, α₂=1: α₂·v₂ from tip = (0,2) scaled: up 120 → tip=(602,130) -->
  <!-- Final result: (3, 1.5) + (0, 2) = (3, 3.5) → SVG (422+180, 340-210) = (602, 130) -->

  <!-- α₁·v₁ vector: scaled v1 from origin, tail-to-tip chain -->
  <!-- α₁=1.5 · v₁=(2,1): SVG delta = (1.5*2*60, -1.5*1*60) = (180, -90) → end at (602, 250) -->
  <line x1="422" y1="340" x2="598" y2="253"
        stroke="#2D5A8E" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="none"
        marker-end="url(#lc-arr-scaled-v1)"/>
  <text x="495" y="310" font-size="11" fill="#2D5A8E" font-style="italic">α₁v₁</text>
  <text x="492" y="323" font-size="9" fill="#2D5A8E">α₁ = 1.5</text>

  <!-- α₂·v₂ vector: from tip of α₁v₁ -->
  <!-- α₂=1 · v₂=(0,2): SVG delta = (0, -120) → from (602,250) to (602,130) -->
  <line x1="602" y1="250" x2="602" y2="134"
        stroke="#7C2530" stroke-width="2.4" stroke-linecap="round"
        marker-end="url(#lc-arr-scaled-v2)"/>
  <text x="613" y="198" font-size="11" fill="#7C2530" font-style="italic">α₂v₂</text>
  <text x="613" y="211" font-size="9" fill="#7C2530">α₂ = 1</text>

  <!-- Resultant vector from origin to final tip -->
  <!-- final tip = (602, 130) -->
  <line x1="422" y1="340" x2="597" y2="135"
        stroke="#4A7C3F" stroke-width="3" stroke-linecap="round"
        marker-end="url(#lc-arr-sum)"/>

  <!-- Label the result -->
  <text x="490" y="202" font-size="12" fill="#4A7C3F" font-weight="bold" font-style="italic">u</text>
  <text x="458" y="216" font-size="9" fill="#4A7C3F">= α₁v₁ + α₂v₂</text>
  <text x="458" y="228" font-size="9" fill="#4A7C3F">= (3, 3.5)</text>

  <!-- Dot at tip -->
  <circle cx="602" cy="130" r="5" fill="#4A7C3F" stroke="#FDFAF4" stroke-width="1.5"/>

  <!-- Dashed lines showing tip coordinates -->
  <line x1="602" y1="130" x2="602" y2="340" stroke="#4A7C3F" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="602" y1="130" x2="422" y2="130" stroke="#4A7C3F" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Coordinate tick labels -->
  <text x="482" y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">1</text>
  <text x="542" y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">2</text>
  <text x="602" y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">3</text>
  <text x="662" y="354" font-size="8.5" fill="#A0907A" text-anchor="middle">4</text>
  <text x="412" y="283" font-size="8.5" fill="#A0907A" text-anchor="end">1</text>
  <text x="412" y="223" font-size="8.5" fill="#A0907A" text-anchor="end">2</text>
  <text x="412" y="163" font-size="8.5" fill="#A0907A" text-anchor="end">3</text>

  <!-- Coefficients legend box -->
  <rect x="648" y="72" width="132" height="50" rx="4" fill="#F5F0E4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="714" y="90"  text-anchor="middle" font-size="9"  fill="#6B5D4F" font-weight="bold">coefficients (scalars)</text>
  <text x="714" y="105" text-anchor="middle" font-size="10" fill="#2D5A8E">α₁ = 1.5</text>
  <text x="714" y="118" text-anchor="middle" font-size="10" fill="#7C2530">α₂ = 1.0</text>

  <!-- Panel caption -->
  <text x="600" y="390" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">tail-to-tip addition of scaled vectors reaches any point in the span</text>
</svg>
