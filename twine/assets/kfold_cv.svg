<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">5-FOLD CROSS-VALIDATION</text>

  <!-- Column header: fold labels -->
  <text x="148" y="42" text-anchor="middle" font-size="9" fill="#6B5D4F">Fold 1</text>
  <text x="262" y="42" text-anchor="middle" font-size="9" fill="#6B5D4F">Fold 2</text>
  <text x="376" y="42" text-anchor="middle" font-size="9" fill="#6B5D4F">Fold 3</text>
  <text x="490" y="42" text-anchor="middle" font-size="9" fill="#6B5D4F">Fold 4</text>
  <text x="604" y="42" text-anchor="middle" font-size="9" fill="#6B5D4F">Fold 5</text>
  <text x="724" y="42" text-anchor="middle" font-size="9" fill="#6B5D4F">Score</text>

  <!-- Row labels -->
  <text x="68" y="75" text-anchor="middle" font-size="9" fill="#5C3D1E">Round 1</text>
  <text x="68" y="131" text-anchor="middle" font-size="9" fill="#5C3D1E">Round 2</text>
  <text x="68" y="187" text-anchor="middle" font-size="9" fill="#5C3D1E">Round 3</text>
  <text x="68" y="243" text-anchor="middle" font-size="9" fill="#5C3D1E">Round 4</text>
  <text x="68" y="299" text-anchor="middle" font-size="9" fill="#5C3D1E">Round 5</text>

  <!-- ── ROW 1: fold 1 = validation, folds 2–5 = train ── -->
  <!-- Fold 1: validation (coral) -->
  <rect x="100" y="52" width="96" height="36" fill="#C0392B" fill-opacity="0.75" rx="3"/>
  <text x="148" y="74" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">validation</text>
  <!-- Folds 2–5: train (gray) -->
  <rect x="214" y="52" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="262" y="74" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="328" y="52" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="376" y="74" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="442" y="52" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="490" y="74" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="556" y="52" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="604" y="74" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <!-- Score pill -->
  <rect x="686" y="55" width="76" height="30" fill="#2D5A8E" fill-opacity="0.15" rx="12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="724" y="74" text-anchor="middle" font-size="9" fill="#2D5A8E">score₁</text>

  <!-- ── ROW 2: fold 2 = validation ── -->
  <rect x="100" y="108" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="148" y="130" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="214" y="108" width="96" height="36" fill="#C0392B" fill-opacity="0.75" rx="3"/>
  <text x="262" y="130" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">validation</text>
  <rect x="328" y="108" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="376" y="130" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="442" y="108" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="490" y="130" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="556" y="108" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="604" y="130" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="686" y="111" width="76" height="30" fill="#2D5A8E" fill-opacity="0.15" rx="12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="724" y="130" text-anchor="middle" font-size="9" fill="#2D5A8E">score₂</text>

  <!-- ── ROW 3: fold 3 = validation ── -->
  <rect x="100" y="164" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="148" y="186" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="214" y="164" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="262" y="186" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="328" y="164" width="96" height="36" fill="#C0392B" fill-opacity="0.75" rx="3"/>
  <text x="376" y="186" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">validation</text>
  <rect x="442" y="164" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="490" y="186" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="556" y="164" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="604" y="186" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="686" y="167" width="76" height="30" fill="#2D5A8E" fill-opacity="0.15" rx="12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="724" y="186" text-anchor="middle" font-size="9" fill="#2D5A8E">score₃</text>

  <!-- ── ROW 4: fold 4 = validation ── -->
  <rect x="100" y="220" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="148" y="242" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="214" y="220" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="262" y="242" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="328" y="220" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="376" y="242" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="442" y="220" width="96" height="36" fill="#C0392B" fill-opacity="0.75" rx="3"/>
  <text x="490" y="242" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">validation</text>
  <rect x="556" y="220" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="604" y="242" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="686" y="223" width="76" height="30" fill="#2D5A8E" fill-opacity="0.15" rx="12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="724" y="242" text-anchor="middle" font-size="9" fill="#2D5A8E">score₄</text>

  <!-- ── ROW 5: fold 5 = validation ── -->
  <rect x="100" y="276" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="148" y="298" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="214" y="276" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="262" y="298" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="328" y="276" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="376" y="298" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="442" y="276" width="96" height="36" fill="#9B8877" fill-opacity="0.35" rx="3"/>
  <text x="490" y="298" text-anchor="middle" font-size="8.5" fill="#5C3D1E">train</text>
  <rect x="556" y="276" width="96" height="36" fill="#C0392B" fill-opacity="0.75" rx="3"/>
  <text x="604" y="298" text-anchor="middle" font-size="8.5" fill="#FDFAF4" font-weight="bold">validation</text>
  <rect x="686" y="279" width="76" height="30" fill="#2D5A8E" fill-opacity="0.15" rx="12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="724" y="298" text-anchor="middle" font-size="9" fill="#2D5A8E">score₅</text>

  <!-- Divider before average row -->
  <line x1="90" y1="325" x2="772" y2="325" stroke="#D4C5A9" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Average row label -->
  <text x="68" y="356" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">average</text>

  <!-- Average formula spanning all folds -->
  <rect x="100" y="333" width="552" height="36" fill="#2D5A8E" fill-opacity="0.10" rx="3" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="376" y="356" text-anchor="middle" font-size="9" fill="#2D5A8E">CV score = (score₁ + score₂ + score₃ + score₄ + score₅) / 5</text>

  <!-- Final score pill -->
  <rect x="686" y="335" width="76" height="30" fill="#2D5A8E" fill-opacity="0.50" rx="12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="724" y="354" text-anchor="middle" font-size="9" fill="#FDFAF4" font-weight="bold">CV score</text>

  <!-- Legend -->
  <rect x="100" y="382" width="14" height="10" fill="#C0392B" fill-opacity="0.75" rx="2"/>
  <text x="120" y="392" font-size="8.5" fill="#5C3D1E">validation fold</text>
  <rect x="220" y="382" width="14" height="10" fill="#9B8877" fill-opacity="0.35" rx="2" stroke="#9B8877" stroke-width="0.8"/>
  <text x="240" y="392" font-size="8.5" fill="#5C3D1E">training folds</text>
  <rect x="340" y="382" width="14" height="10" fill="#2D5A8E" fill-opacity="0.50" rx="5"/>
  <text x="360" y="392" font-size="8.5" fill="#5C3D1E">reported score</text>
</svg>
