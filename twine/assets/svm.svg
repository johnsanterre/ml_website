<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-bidir-l" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-bidir-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-tan" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 1: MAX-MARGIN ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">MAX-MARGIN</text>

  <!-- Axes -->
  <line x1="22" y1="268" x2="278" y2="268" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-axis)"/>
  <line x1="22" y1="272" x2="22"  y2="32"  stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-axis)"/>
  <text x="274" y="281" font-size="8.5" fill="#6B5D4F">x₁</text>
  <text x="14"  y="30"  font-size="8.5" fill="#6B5D4F">x₂</text>

  <!-- Margin fill between the two dashed lines -->
  <!-- Decision boundary: from (50,255) to (255,55) -->
  <!-- Margin +1: shift ~28px up-right perp direction (norm of w) -->
  <!-- Margin -1: shift ~28px down-left -->
  <!-- Perp direction (normalized): boundary dir=(205,-200), perp=(200,205)/~287 ≈ (0.70,0.71) -->
  <!-- margin shift ~28: dx=20, dy=20 -->
  <polygon points="70,235 275,35 275,75 70,275" fill="#7C2530" fill-opacity="0.06"/>

  <!-- Margin line +1 (dashed, upper-right side) -->
  <line x1="70" y1="235" x2="275" y2="35" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="268" y="30" font-size="7.5" fill="#7C2530" text-anchor="middle">+1</text>

  <!-- Margin line -1 (dashed, lower-left side) -->
  <line x1="50" y1="275" x2="255" y2="75" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="44" y="285" font-size="7.5" fill="#7C2530">−1</text>

  <!-- Decision boundary (solid, center) -->
  <line x1="60" y1="255" x2="265" y2="55" stroke="#7C2530" stroke-width="2" stroke-linecap="round"/>
  <text x="265" y="52" font-size="7.5" fill="#7C2530">w·x+b=0</text>

  <!-- Bidirectional margin arrow -->
  <line x1="138" y1="170" x2="160" y2="148" stroke="#5C3D1E" stroke-width="1.2"
        marker-start="url(#arr-bidir-l)" marker-end="url(#arr-bidir-r)"/>
  <text x="128" y="162" font-size="7" fill="#5C3D1E" transform="rotate(-45,128,162)">2/‖w‖</text>

  <!-- Red circles: class +1 (upper-right) -->
  <circle cx="210" cy="68"  r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="240" cy="88"  r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="225" cy="50"  r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="260" cy="110" r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="200" cy="90"  r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="248" cy="62"  r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="268" cy="80"  r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>
  <circle cx="218" cy="105" r="5.5" fill="#7C2530" fill-opacity="0.7" stroke="#7C2530" stroke-width="1"/>

  <!-- Blue squares: class -1 (lower-left) -->
  <rect x="35"  y="175" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="55"  y="200" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="72"  y="225" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="40"  y="215" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="70"  y="195" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="90"  y="215" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="48"  y="240" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="82"  y="240" width="10" height="10" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>

  <!-- Support vectors — circled -->
  <!-- Red support vector near margin: approx (218,105) — already on +1 line roughly -->
  <circle cx="218" cy="105" r="9" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Blue support vector near margin: approx (90,215) -->
  <circle cx="95" cy="220" r="9" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Another red sv -->
  <circle cx="200" cy="90" r="9" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Support vector label -->
  <text x="145" y="285" text-anchor="middle" font-size="7.5" fill="#6B5D4F">○ support vectors</text>

  <!-- ══ PANEL 2: KERNEL TRICK ══ -->
  <text x="443" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">KERNEL TRICK</text>

  <!-- Top sub-panel: original 1D space -->
  <rect x="305" y="30" width="280" height="118" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="0.8" rx="3"/>
  <text x="445" y="45" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-weight="bold">original space (not separable)</text>

  <!-- 1D number line -->
  <line x1="320" y1="100" x2="575" y2="100" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <text x="572" y="112" font-size="8" fill="#6B5D4F">x</text>

  <!-- Tick marks on line -->
  <line x1="360" y1="96" x2="360" y2="104" stroke="#C4A87A" stroke-width="1"/>
  <line x1="400" y1="96" x2="400" y2="104" stroke="#C4A87A" stroke-width="1"/>
  <line x1="440" y1="96" x2="440" y2="104" stroke="#C4A87A" stroke-width="1"/>
  <line x1="480" y1="96" x2="480" y2="104" stroke="#C4A87A" stroke-width="1"/>
  <line x1="520" y1="96" x2="520" y2="104" stroke="#C4A87A" stroke-width="1"/>

  <!-- Red points on left and right sides -->
  <circle cx="330" cy="92" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="348" cy="92" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="543" cy="92" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="558" cy="92" r="5" fill="#7C2530" fill-opacity="0.8"/>

  <!-- Blue points in the middle -->
  <rect x="415" y="87" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="432" y="87" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="450" y="87" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="468" y="87" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>

  <!-- Mixed zone — some overlap indicated -->
  <rect x="375" y="87" width="9" height="9" fill="#2D5A8E" fill-opacity="0.6" stroke="#2D5A8E"/>
  <circle cx="394" cy="92" r="5" fill="#7C2530" fill-opacity="0.6"/>
  <circle cx="510" cy="92" r="5" fill="#7C2530" fill-opacity="0.6"/>
  <rect x="495" y="87" width="9" height="9" fill="#2D5A8E" fill-opacity="0.6" stroke="#2D5A8E"/>

  <!-- Curving arrow downward with kernel label -->
  <path d="M 445,148 C 430,168 430,178 445,188" fill="none" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="455" y="170" font-size="8" fill="#5C3D1E" font-style="italic">kernel k(x,x')</text>
  <text x="451" y="180" font-size="7.5" fill="#6B5D4F">φ(x) maps to</text>
  <text x="451" y="190" font-size="7.5" fill="#6B5D4F">feature space</text>

  <!-- Bottom sub-panel: feature space (2D) -->
  <rect x="305" y="198" width="280" height="100" fill="#E9DEC5" stroke="#D4C5A9" stroke-width="0.8" rx="3"/>
  <text x="445" y="213" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-weight="bold">feature space φ(x) — separable!</text>

  <!-- 2D axes in feature space -->
  <line x1="320" y1="285" x2="575" y2="285" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>
  <line x1="320" y1="290" x2="320" y2="215" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>
  <text x="570" y="294" font-size="8" fill="#6B5D4F">φ₁</text>
  <text x="312" y="215" font-size="8" fill="#6B5D4F">φ₂</text>

  <!-- Separating hyperplane (horizontal line in 2D) -->
  <line x1="325" y1="255" x2="570" y2="255" stroke="#7C2530" stroke-width="1.8"/>

  <!-- Red points above the line -->
  <circle cx="340" cy="230" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="370" cy="240" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="530" cy="225" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="555" cy="235" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="350" cy="222" r="5" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="545" cy="243" r="5" fill="#7C2530" fill-opacity="0.8"/>

  <!-- Blue squares below the line -->
  <rect x="420" y="260" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="440" y="268" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="460" y="262" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="478" y="272" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="400" y="265" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>
  <rect x="498" y="260" width="9" height="9" fill="#2D5A8E" fill-opacity="0.8" stroke="#2D5A8E"/>

  <!-- Bottom caption -->
  <text x="300" y="302" text-anchor="middle" font-size="9" fill="#6B5D4F">
    SVMs maximize the margin; kernels implicitly map data to higher-dimensional spaces
  </text>
</svg>
