<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Random Matrix Theory</text>
  <!-- Left: random matrix -->
  <text x="160" y="60" text-anchor="middle" font-size="13" fill="#333">Random Matrix W (n×p)</text>
  <rect x="50" y="75" width="220" height="160" rx="4" fill="#f9f9f9" stroke="#aaa" stroke-width="1.5"/>
  <text x="80" y="105" font-size="12" fill="#888">0.3  -1.2  0.8  0.1</text>
  <text x="80" y="125" font-size="12" fill="#888">-0.5  0.7  1.1 -0.3</text>
  <text x="80" y="145" font-size="12" fill="#888">1.2  0.2 -0.9  0.6</text>
  <text x="80" y="165" font-size="12" fill="#888">0.1 -0.8  0.4  1.3</text>
  <text x="80" y="185" font-size="12" fill="#888">-1.1  0.5  0.0 -0.7</text>
  <text x="80" y="205" font-size="12" fill="#888">0.6  1.0 -0.2  0.9</text>
  <!-- Right: Marchenko-Pastur distribution -->
  <text x="560" y="60" text-anchor="middle" font-size="13" fill="#333">Marchenko-Pastur Law</text>
  <text x="560" y="80" text-anchor="middle" font-size="11" fill="#888">Eigenvalue density of WᵀW/n</text>
  <line x1="380" y1="310" x2="740" y2="310" stroke="#333" stroke-width="1.5"/>
  <line x1="380" y1="310" x2="380" y2="90" stroke="#333" stroke-width="1.5"/>
  <text x="560" y="330" text-anchor="middle" font-size="12" fill="#666">Eigenvalue λ</text>
  <!-- MP density shape -->
  <path d="M420,310 C430,310 440,300 460,240 C480,180 510,130 540,115 C570,100 590,110 610,135 C630,160 640,210 650,260 C660,285 665,308 670,310 Z" fill="#2196F3" fill-opacity="0.3" stroke="#2196F3" stroke-width="2"/>
  <text x="545" y="108" font-size="11" fill="#2196F3">bulk</text>
  <!-- Outlier spike -->
  <line x1="700" y1="310" x2="700" y2="160" stroke="#E91E63" stroke-width="3"/>
  <circle cx="700" cy="155" r="5" fill="#E91E63"/>
  <text x="712" y="155" font-size="11" fill="#E91E63">signal spike</text>
  <text x="712" y="170" font-size="11" fill="#E91E63">(BBP transition)</text>
  <text x="400" y="370" text-anchor="middle" font-size="12" fill="#555">Separates noise eigenvalues from signal — guides PCA component selection</text>
</svg>
