<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Generalization Gap: Training vs. Validation Error</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="700" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="80" y1="60" x2="80" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Axis labels -->
  <text x="720" y="325" fill="#555" font-size="13">Complexity →</text>
  <text x="22" y="195" fill="#555" font-size="13" text-anchor="middle" transform="rotate(-90,22,195)">Error</text>

  <!-- Y-axis ticks / reference lines (faint) -->
  <line x1="76" y1="100" x2="690" y2="100" stroke="#DDD" stroke-width="1"/>
  <line x1="76" y1="160" x2="690" y2="160" stroke="#DDD" stroke-width="1"/>
  <line x1="76" y1="220" x2="690" y2="220" stroke="#DDD" stroke-width="1"/>
  <line x1="76" y1="280" x2="690" y2="280" stroke="#DDD" stroke-width="1"/>

  <!-- Training error curve: monotonically decreasing -->
  <!-- From (100,300) sweeping down to (660,75) -->
  <path d="M 100,300 C 180,270 270,230 370,190 C 470,150 560,110 660,75"
        fill="none" stroke="#4A7C59" stroke-width="3"/>

  <!-- Validation error curve: U-shape, starts same, rises after sweet spot -->
  <!-- From (100,300) down to sweet spot near (360,170) then rising to (660,290) -->
  <path d="M 100,300 C 180,265 270,215 360,170 C 430,145 460,155 520,195 C 575,228 620,265 660,290"
        fill="none" stroke="#C0392B" stroke-width="3"/>

  <!-- Shaded generalization gap region between the two curves (right of sweet spot) -->
  <path d="M 360,170 C 430,145 460,155 520,195 C 575,228 620,265 660,290
           L 660,75 C 560,110 470,150 370,190 Z"
        fill="#C0392B" fill-opacity="0.08"/>

  <!-- Sweet spot vertical dashed line -->
  <line x1="360" y1="60" x2="360" y2="320" stroke="#E07B39" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="360" y="55" text-anchor="middle" fill="#E07B39" font-size="12" font-weight="bold">Optimal complexity</text>

  <!-- Generalization gap annotation bracket -->
  <!-- Vertical bracket at x=620, between train (~100) and validation (~270) -->
  <line x1="625" y1="98" x2="625" y2="268" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="619" y1="98"  x2="631" y2="98"  stroke="#888" stroke-width="1.5"/>
  <line x1="619" y1="268" x2="631" y2="268" stroke="#888" stroke-width="1.5"/>
  <text x="680" y="178" text-anchor="middle" fill="#888" font-size="12">Generalization</text>
  <text x="680" y="194" text-anchor="middle" fill="#888" font-size="12">gap</text>

  <!-- Region labels -->
  <text x="210" y="360" text-anchor="middle" fill="#2C5F8A" font-size="13">Underfitting</text>
  <text x="540" y="360" text-anchor="middle" fill="#C0392B" font-size="13">Overfitting region</text>

  <!-- Legend -->
  <line x1="90"  y1="78" x2="130" y2="78" stroke="#4A7C59" stroke-width="3"/>
  <text x="138" y="83" fill="#4A7C59" font-size="13">Training error</text>
  <line x1="90"  y1="100" x2="130" y2="100" stroke="#C0392B" stroke-width="3"/>
  <text x="138" y="105" fill="#C0392B" font-size="13">Validation error</text>

  <!-- Annotation: gap = 0 at low complexity -->
  <text x="110" y="292" fill="#555" font-size="10" text-anchor="middle">Both high</text>
  <text x="110" y="306" fill="#555" font-size="10" text-anchor="middle">(underfitting)</text>

  <!-- Annotation: gap widens -->
  <text x="560" y="145" fill="#C0392B" font-size="10" text-anchor="middle">Gap widens</text>
  <text x="560" y="158" fill="#4A7C59" font-size="10" text-anchor="middle">as model overfits</text>
</svg>
