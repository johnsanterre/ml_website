<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <!-- Left: L2 constraint ball -->
  <text x="200" y="35" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">L2 Constraint (Ridge)</text>
  <circle cx="200" cy="220" r="100" fill="#2196F3" fill-opacity="0.15" stroke="#2196F3" stroke-width="2"/>
  <!-- Loss contours (ellipses) -->
  <ellipse cx="310" cy="130" rx="60" ry="40" fill="none" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="5,3"/>
  <ellipse cx="310" cy="130" rx="110" ry="75" fill="none" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="5,3"/>
  <ellipse cx="310" cy="130" rx="165" ry="115" fill="none" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- OLS solution -->
  <circle cx="310" cy="130" r="5" fill="#E91E63"/>
  <text x="325" y="125" font-size="12" fill="#E91E63">OLS min</text>
  <!-- Ridge solution (tangent point) -->
  <circle cx="240" cy="135" r="6" fill="#2196F3"/>
  <text x="248" y="128" font-size="12" fill="#2196F3">Ridge solution</text>
  <text x="248" y="142" font-size="11" fill="#2196F3">(corner-free)</text>
  <!-- Right: shrinkage plot -->
  <text x="590" y="35" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">Coefficient Shrinkage</text>
  <line x1="420" y1="320" x2="760" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="320" x2="420" y2="60" stroke="#333" stroke-width="2"/>
  <text x="590" y="345" text-anchor="middle" font-size="12" fill="#666">λ (regularization)</text>
  <text x="400" y="190" text-anchor="middle" font-size="12" fill="#666" transform="rotate(-90,400,190)">|coefficient|</text>
  <path d="M430,80 C500,100 600,180 750,300" fill="none" stroke="#2196F3" stroke-width="2"/>
  <path d="M430,120 C500,150 620,230 750,315" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <path d="M430,160 C510,190 640,270 750,318" fill="none" stroke="#FF9800" stroke-width="2"/>
  <text x="440" y="75" font-size="11" fill="#2196F3">β₁</text>
  <text x="440" y="115" font-size="11" fill="#4CAF50">β₂</text>
  <text x="440" y="155" font-size="11" fill="#FF9800">β₃</text>
  <text x="590" y="20" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Ridge Regression</text>
</svg>
