<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">PageRank: Importance via Random Walk</text>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <!-- Nodes -->
  <circle cx="400" cy="120" r="35" fill="#2196F3" fill-opacity="0.85"/>
  <text x="400" y="115" text-anchor="middle" font-size="13" fill="white" font-weight="bold">A</text>
  <text x="400" y="130" text-anchor="middle" font-size="11" fill="white">PR=0.38</text>
  <circle cx="180" cy="270" r="28" fill="#4CAF50" fill-opacity="0.85"/>
  <text x="180" y="265" text-anchor="middle" font-size="13" fill="white" font-weight="bold">B</text>
  <text x="180" y="280" text-anchor="middle" font-size="11" fill="white">PR=0.12</text>
  <circle cx="400" cy="310" r="28" fill="#FF9800" fill-opacity="0.85"/>
  <text x="400" y="305" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C</text>
  <text x="400" y="320" text-anchor="middle" font-size="11" fill="white">PR=0.26</text>
  <circle cx="620" cy="270" r="28" fill="#E91E63" fill-opacity="0.85"/>
  <text x="620" y="265" text-anchor="middle" font-size="13" fill="white" font-weight="bold">D</text>
  <text x="620" y="280" text-anchor="middle" font-size="11" fill="white">PR=0.24</text>
  <!-- Edges -->
  <line x1="375" y1="148" x2="202" y2="248" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="200" y1="252" x2="378" y2="155" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="425" y1="148" x2="598" y2="248" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="600" y1="270" x2="428" y2="300" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="207" y1="270" x2="372" y2="300" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="400" y1="282" x2="400" y2="155" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <!-- Formula -->
  <rect x="500" y="60" width="270" height="80" rx="6" fill="#f9f9f9" stroke="#ddd"/>
  <text x="635" y="85" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">PR(u) = (1−d)/N +</text>
  <text x="635" y="105" text-anchor="middle" font-size="12" fill="#333">d · Σ PR(v) / out(v)</text>
  <text x="635" y="125" text-anchor="middle" font-size="11" fill="#888">d ≈ 0.85 (damping factor)</text>
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="#555">Dominant eigenvector of the column-stochastic transition matrix</text>
</svg>
