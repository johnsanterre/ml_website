<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <defs>
    <marker id="vi-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="vi-arr-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#7C2530"/>
    </marker>
    <marker id="vi-arr-tan" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#5C3D1E">Variational Inference: Approximating the Intractable</text>

  <!-- True posterior blob (left) -->
  <ellipse cx="185" cy="210" rx="120" ry="90" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="185" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5A8E">True Posterior</text>
  <text x="185" y="195" text-anchor="middle" font-size="12" fill="#2D5A8E">p(z | x)</text>
  <text x="185" y="218" text-anchor="middle" font-size="11" fill="#666">irregular shape,</text>
  <text x="185" y="234" text-anchor="middle" font-size="11" fill="#666">intractable</text>
  <text x="185" y="258" text-anchor="middle" font-size="11" fill="#888">∫ p(x,z) dz = ?</text>

  <!-- Variational family (right) -->
  <ellipse cx="580" cy="210" rx="110" ry="80" fill="#F9F0E8" stroke="#7C2530" stroke-width="2"/>
  <text x="580" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C2530">Variational Family</text>
  <text x="580" y="198" text-anchor="middle" font-size="12" fill="#7C2530">q(z ; φ)</text>
  <text x="580" y="220" text-anchor="middle" font-size="11" fill="#666">tractable family</text>
  <text x="580" y="238" text-anchor="middle" font-size="11" fill="#666">(e.g. Gaussian)</text>

  <!-- Best approximation highlight -->
  <ellipse cx="580" cy="210" rx="55" ry="42" fill="none" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="648" y="188" font-size="11" fill="#C4A87A">q*(z)</text>
  <text x="648" y="203" font-size="11" fill="#C4A87A">best fit</text>

  <!-- KL arrow -->
  <line x1="310" y1="210" x2="462" y2="210" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#vi-arr)"/>
  <text x="386" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D5A8E">minimize</text>
  <text x="386" y="218" text-anchor="middle" font-size="12" fill="#2D5A8E">KL(q ‖ p)</text>

  <!-- ELBO box -->
  <rect x="272" y="305" width="256" height="62" rx="10" fill="#F3EDE3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E">Equivalent: maximize ELBO</text>
  <text x="400" y="345" text-anchor="middle" font-size="12" fill="#5C3D1E">L(φ) = E_q[log p(x,z)] − E_q[log q(z)]</text>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#888">= log p(x) − KL(q ‖ p)</text>

  <!-- Arrow to ELBO -->
  <line x1="386" y1="242" x2="380" y2="303" stroke="#C4A87A" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#vi-arr-tan)"/>
</svg>
