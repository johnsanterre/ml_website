<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title labels -->
  <text x="110" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">SIMPLE BASE</text>
  <text x="400" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">INVERTIBLE TRANSFORMS</text>
  <text x="690" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">COMPLEX TARGET</text>

  <!-- Panel 1: Gaussian blob -->
  <ellipse cx="110" cy="210" rx="70" ry="70" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <ellipse cx="110" cy="210" rx="45" ry="45" fill="#2D5A8E" opacity="0.2"/>
  <ellipse cx="110" cy="210" rx="20" ry="20" fill="#2D5A8E" opacity="0.35"/>
  <text x="110" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E">z ~ N(0,I)</text>
  <text x="110" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B5D4F" font-style="italic">Gaussian</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5C3D1E"/>
    </marker>
  </defs>
  <line x1="195" y1="210" x2="255" y2="210" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="224" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">f₁</text>

  <!-- Panel 2: intermediate shape (stretched) -->
  <ellipse cx="320" cy="210" rx="55" ry="38" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <ellipse cx="320" cy="210" rx="35" ry="22" fill="#C4A87A" opacity="0.3"/>
  <text x="320" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">f₁(z)</text>

  <!-- Arrow 2 -->
  <line x1="393" y1="210" x2="453" y2="210" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="422" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">f₂</text>

  <!-- Panel 3: more distorted -->
  <ellipse cx="530" cy="200" rx="50" ry="28" fill="#7C2530" opacity="0.18" stroke="#7C2530" stroke-width="1.5" transform="rotate(-20,530,200)"/>
  <ellipse cx="530" cy="220" rx="35" ry="20" fill="#7C2530" opacity="0.22" transform="rotate(15,530,220)"/>
  <text x="530" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">f₂∘f₁(z)</text>

  <!-- Arrow 3 -->
  <line x1="598" y1="210" x2="620" y2="210" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="609" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">fₖ</text>

  <!-- Panel 4: complex multimodal target -->
  <ellipse cx="695" cy="185" rx="42" ry="28" fill="#7C2530" opacity="0.3" stroke="#7C2530" stroke-width="1.5" transform="rotate(-10,695,185)"/>
  <ellipse cx="720" cy="240" rx="32" ry="22" fill="#2D5A8E" opacity="0.3" stroke="#2D5A8E" stroke-width="1.5" transform="rotate(20,720,240)"/>
  <text x="700" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B5D4F" font-style="italic">Complex x ~ p(x)</text>

  <!-- Bottom formula -->
  <rect x="180" y="330" width="440" height="50" rx="4" fill="#F7F2E8" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="351" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">log p(x) = log p(z) + Σ log |det(∂fₖ/∂zₖ₋₁)|</text>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B5D4F">Change of variables: track log-density through each invertible map</text>
</svg>
