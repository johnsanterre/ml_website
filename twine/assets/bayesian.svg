<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 1: BELIEF UPDATE ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">BELIEF UPDATE</text>

  <!-- Axes -->
  <line x1="22" y1="240" x2="278" y2="240" stroke="#C4A87A" stroke-width="1.4" marker-end="url(#arr-axis)"/>
  <line x1="22" y1="244" x2="22"  y2="36"  stroke="#C4A87A" stroke-width="1.4" marker-end="url(#arr-axis)"/>
  <text x="272" y="253" font-size="8.5" fill="#6B5D4F">θ</text>
  <text x="12"  y="34"  font-size="8.5" fill="#6B5D4F">density</text>

  <!-- PRIOR: broad bell, peak near x=115 (left-center), light dashed blue -->
  <!-- Gaussian centered at x=115, σ broad (~70px), amplitude ~100 -->
  <!-- Points: 22→240+0, 55→220, 80→195, 115→140, 150→195, 180→220, 220→238 -->
  <path d="M 22,239 C 40,236 60,220 80,200 C 95,184 105,162 115,140 C 125,162 135,184 150,200 C 165,216 185,230 210,237 C 230,239 255,240 278,240"
        fill="#2D5A8E" fill-opacity="0.08"
        stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="6,3"/>

  <!-- LIKELIHOOD: shifted peak near x=175 (right), medium width, solid tan -->
  <!-- Gaussian centered at x=175, σ ~55px, amplitude ~130 -->
  <path d="M 40,239 C 70,238 100,232 125,218 C 145,207 158,185 168,165 C 175,150 178,130 175,110 C 172,130 168,152 162,168 C 152,188 140,208 125,218"
        fill="none" stroke="none"/>
  <path d="M 50,240 C 80,239 108,235 130,222 C 150,210 162,188 170,168 C 175,152 176,130 175,110 C 174,130 172,154 166,172 C 156,194 140,213 118,224 C 96,234 70,239 50,240"
        fill="#C4A87A" fill-opacity="0.2"
        stroke="#C4A87A" stroke-width="1.8"/>

  <!-- POSTERIOR: narrower, peak near x=148 (between prior & likelihood), bold dark red -->
  <!-- Gaussian centered at x=148, σ ~40px, amplitude ~155 -->
  <path d="M 68,240 C 85,238 100,228 112,214 C 122,202 132,182 138,162 C 142,147 145,128 148,85 C 151,128 154,147 158,162 C 164,182 174,202 184,214 C 196,228 210,238 228,240"
        fill="#7C2530" fill-opacity="0.12"
        stroke="#7C2530" stroke-width="2.5"/>

  <!-- MAP estimate vertical dashed line at x=148 -->
  <line x1="148" y1="85" x2="148" y2="240" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="152" y="80" font-size="7.5" fill="#7C2530">MAP</text>
  <text x="152" y="90" font-size="7" fill="#7C2530">estimate</text>

  <!-- Legend labels -->
  <!-- Prior -->
  <line x1="26" y1="58" x2="50" y2="58" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="54" y="62" font-size="8" fill="#2D5A8E">prior P(θ)</text>

  <!-- Likelihood -->
  <line x1="26" y1="74" x2="50" y2="74" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="54" y="78" font-size="8" fill="#7A5230">likelihood P(D|θ)</text>

  <!-- Posterior -->
  <line x1="26" y1="90" x2="50" y2="90" stroke="#7C2530" stroke-width="2.2"/>
  <text x="54" y="94" font-size="8" fill="#7C2530" font-weight="bold">posterior P(θ|D)</text>

  <!-- Axis label -->
  <text x="148" y="255" text-anchor="middle" font-size="8" fill="#6B5D4F">parameter value θ</text>

  <!-- Caption -->
  <text x="148" y="272" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">∝ likelihood × prior</text>

  <!-- ══ PANEL 2: COIN FLIP EXAMPLE ══ -->
  <text x="443" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">COIN FLIP EXAMPLE</text>
  <text x="443" y="29" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">Sequential updating</text>

  <!-- Shared x-axis label -->
  <text x="443" y="290" text-anchor="middle" font-size="8" fill="#6B5D4F">P(heads) — θ ∈ [0, 1]</text>

  <!-- === STEP 1: Beta(1,1) — uniform prior === -->
  <rect x="302" y="34" width="278" height="78" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="0.7" rx="2"/>
  <text x="316" y="46" font-size="8" fill="#5C3D1E" font-weight="bold">prior: no data</text>
  <text x="316" y="56" font-size="7.5" fill="#6B5D4F" font-style="italic">Beta(1, 1) — uniform</text>

  <!-- x-axis for step 1 -->
  <line x1="315" y1="100" x2="572" y2="100" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>
  <text x="318" y="98" font-size="7" fill="#6B5D4F">0</text>
  <text x="568" y="98" font-size="7" fill="#6B5D4F">1</text>

  <!-- Beta(1,1) = flat line at constant height -->
  <line x1="318" y1="72" x2="568" y2="72" stroke="#2D5A8E" stroke-width="1.8"/>
  <polygon points="318,72 568,72 568,100 318,100" fill="#2D5A8E" fill-opacity="0.08"/>

  <!-- === STEP 2: Beta(3,2) — after HHT === -->
  <rect x="302" y="118" width="278" height="82" fill="#E9DEC5" stroke="#D4C5A9" stroke-width="0.7" rx="2"/>
  <text x="316" y="130" font-size="8" fill="#5C3D1E" font-weight="bold">after HHT (3 heads, 1 tail)</text>
  <text x="316" y="140" font-size="7.5" fill="#6B5D4F" font-style="italic">Beta(3, 2) — slight rightward peak</text>

  <!-- x-axis for step 2 -->
  <line x1="315" y1="190" x2="572" y2="190" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>
  <text x="318" y="188" font-size="7" fill="#6B5D4F">0</text>
  <text x="568" y="188" font-size="7" fill="#6B5D4F">1</text>

  <!-- Beta(3,2): peak ~0.67, rises from left, peaks ~x=487, descends -->
  <!-- x=0→318, x=1→568; peak at 0.67→(0.67*250+318)=485 -->
  <!-- Beta(3,2) shape: 0→0, rises, peaks at 2/3, descends -->
  <path d="M 318,190 C 335,188 350,182 370,172 C 390,160 415,148 440,140 C 455,135 468,132 480,131 C 490,131 498,133 510,140 C 525,149 540,163 555,176 C 562,183 566,188 568,190"
        fill="#C4A87A" fill-opacity="0.25"
        stroke="#C4A87A" stroke-width="2"/>
  <!-- Peak indicator at x≈480 -->
  <line x1="480" y1="131" x2="480" y2="190" stroke="#C4A87A" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- === STEP 3: Beta(5,2) — after HHHHT === -->
  <rect x="302" y="206" width="278" height="82" fill="#DCCFA8" stroke="#D4C5A9" stroke-width="0.7" rx="2"/>
  <text x="316" y="218" font-size="8" fill="#5C3D1E" font-weight="bold">after HHHHT (5 heads, 2 tails)</text>
  <text x="316" y="228" font-size="7.5" fill="#6B5D4F" font-style="italic">Beta(5, 2) — stronger rightward peak</text>

  <!-- x-axis for step 3 -->
  <line x1="315" y1="278" x2="572" y2="278" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>
  <text x="318" y="276" font-size="7" fill="#6B5D4F">0</text>
  <text x="568" y="276" font-size="7" fill="#6B5D4F">1</text>

  <!-- Beta(5,2): peak ~0.8 = x=0.8*250+318=518, narrower and taller -->
  <path d="M 318,278 C 335,277 355,274 378,268 C 400,260 425,248 450,236 C 465,228 480,218 500,210 C 510,206 515,204 520,204 C 525,204 530,206 538,210 C 550,218 558,230 562,244 C 565,256 567,268 568,278"
        fill="#7C2530" fill-opacity="0.15"
        stroke="#7C2530" stroke-width="2.2"/>
  <!-- Peak indicator at x≈520 -->
  <line x1="520" y1="204" x2="520" y2="278" stroke="#7C2530" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="522" y="215" font-size="7" fill="#7C2530">peak</text>

  <!-- Narrowing annotation arrow between step 2 peak and step 3 peak -->
  <text x="580" y="150" font-size="7" fill="#5C3D1E" text-anchor="middle" transform="rotate(90,580,150)">more certain →</text>

  <!-- Bottom caption -->
  <text x="300" y="302" text-anchor="middle" font-size="9" fill="#6B5D4F">
    More data shifts and sharpens the posterior — Bayes' theorem combines evidence with prior belief
  </text>
</svg>
