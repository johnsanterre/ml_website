<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Hidden states row -->
  <text x="60" y="145" font-family="Arial" font-size="13" fill="#4a90d9" font-weight="bold">Hidden</text>
  <text x="60" y="162" font-family="Arial" font-size="13" fill="#4a90d9" font-weight="bold">States</text>
  <circle cx="200" cy="150" r="38" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="200" y="146" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">S₁</text>
  <text x="200" y="164" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Rain</text>
  <circle cx="400" cy="150" r="38" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="400" y="146" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">S₂</text>
  <text x="400" y="164" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Sun</text>
  <circle cx="600" cy="150" r="38" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="600" y="146" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">S₃</text>
  <text x="600" y="164" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Cloud</text>
  <!-- Transition arrows -->
  <path d="M238,150 Q300,110 362,150" fill="none" stroke="#4a90d9" stroke-width="2" marker-end="url(#a1)"/>
  <path d="M362,150 Q300,190 238,150" fill="none" stroke="#4a90d9" stroke-width="2" marker-end="url(#a1)"/>
  <path d="M438,150 Q500,110 562,150" fill="none" stroke="#4a90d9" stroke-width="2" marker-end="url(#a1)"/>
  <path d="M562,150 Q500,190 438,150" fill="none" stroke="#4a90d9" stroke-width="2" marker-end="url(#a1)"/>
  <text x="300" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">0.4</text>
  <text x="300" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">0.6</text>
  <!-- Emission arrows (down) -->
  <line x1="200" y1="188" x2="200" y2="250" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a2)"/>
  <line x1="400" y1="188" x2="400" y2="250" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a2)"/>
  <line x1="600" y1="188" x2="600" y2="250" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a2)"/>
  <!-- Observed states row -->
  <text x="60" y="293" font-family="Arial" font-size="13" fill="#e67e22" font-weight="bold">Observed</text>
  <rect x="162" y="258" width="76" height="40" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="200" y="284" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Walk</text>
  <rect x="362" y="258" width="76" height="40" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="284" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Shop</text>
  <rect x="562" y="258" width="76" height="40" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="600" y="284" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Walk</text>
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Hidden Markov Model</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Hidden states emit observable outputs — transitions follow Markov property</text>
</svg>
