<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Clipping diagram -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Proximal Policy Optimization (PPO)</text>
  <!-- Axes for clip diagram -->
  <line x1="60" y1="300" x2="420" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="300" x2="60" y2="80" stroke="#333" stroke-width="1.5"/>
  <text x="240" y="335" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Probability ratio r = π(a|s)/π_old(a|s)</text>
  <text x="20" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" transform="rotate(-90,20,190)">Objective L</text>
  <!-- r=1 vertical line -->
  <line x1="200" y1="90" x2="200" y2="305" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">r=1</text>
  <!-- Clip bounds -->
  <line x1="120" y1="90" x2="120" y2="305" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="90" x2="280" y2="305" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="120" y="315" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">1-ε</text>
  <text x="280" y="315" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">1+ε</text>
  <!-- Unclipped objective (linear) -->
  <line x1="60" y1="260" x2="420" y2="120" stroke="#4a90d9" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="390" y="118" font-family="Arial" font-size="11" fill="#4a90d9">Unclipped</text>
  <!-- Clipped objective -->
  <polyline points="60,260 120,228 280,172 420,172" fill="none" stroke="#27ae60" stroke-width="3"/>
  <text x="350" y="165" font-family="Arial" font-size="11" fill="#27ae60" font-weight="bold">Clipped (PPO)</text>
  <!-- Key formula -->
  <rect x="450" y="100" width="310" height="180" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="605" y="128" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">PPO-Clip Objective</text>
  <text x="605" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">L = min(r·Â, clip(r,1-ε,1+ε)·Â)</text>
  <line x1="460" y1="170" x2="750" y2="170" stroke="#ddd" stroke-width="1"/>
  <text x="605" y="192" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">r = π(a|s) / π_old(a|s)</text>
  <text x="605" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Â = advantage estimate</text>
  <text x="605" y="232" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">ε = clip range (typically 0.2)</text>
  <text x="605" y="258" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Prevents too-large policy updates</text>
</svg>
