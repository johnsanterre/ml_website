<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: 2 points, line can shatter -->
  <rect x="18" y="30" width="175" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="105" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">2 POINTS</text>
  <text x="105" y="65" text-anchor="middle" font-size="9" fill="#5C3D1E">All 4 labelings</text>

  <!-- 4 small sub-panels for 2 point labelings -->
  <!-- sub 1: both + -->
  <circle cx="60" cy="95" r="7" fill="#7C2530"/>
  <circle cx="85" cy="95" r="7" fill="#7C2530"/>
  <line x1="45" y1="110" x2="100" y2="80" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- sub 2: first +, second - -->
  <circle cx="60" cy="145" r="7" fill="#7C2530"/>
  <circle cx="85" cy="145" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <line x1="45" y1="135" x2="100" y2="155" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- sub 3: first -, second + -->
  <circle cx="60" cy="195" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="85" cy="195" r="7" fill="#7C2530"/>
  <line x1="45" y1="185" x2="100" y2="205" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- sub 4: both - -->
  <circle cx="60" cy="245" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="85" cy="245" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <line x1="45" y1="260" x2="100" y2="230" stroke="#2D5A8E" stroke-width="1.5"/>

  <text x="105" y="305" text-anchor="middle" font-size="9" fill="#7C2530">✓ All 4 labeling</text>
  <text x="105" y="318" text-anchor="middle" font-size="9" fill="#7C2530">patterns achievable</text>
  <text x="105" y="338" text-anchor="middle" font-size="11" fill="#5C3D1E">Can shatter</text>
  <text x="105" y="355" text-anchor="middle" font-size="9" fill="#6B5D4F">(2 points)</text>

  <!-- Panel 2: 3 points -->
  <rect x="208" y="30" width="175" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="295" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">3 POINTS</text>
  <text x="295" y="65" text-anchor="middle" font-size="9" fill="#5C3D1E">Can a line shatter?</text>

  <!-- Triangle of 3 points -->
  <circle cx="270" cy="160" r="7" fill="#7C2530"/>
  <circle cx="310" cy="130" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="320" cy="185" r="7" fill="#7C2530"/>

  <!-- Line attempt -->
  <line x1="218" y1="120" x2="338" y2="200" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- XOR layout - the hard case -->
  <text x="295" y="230" text-anchor="middle" font-size="9" fill="#5C3D1E">Some arrangements ok...</text>

  <circle cx="255" cy="275" r="7" fill="#7C2530"/>
  <circle cx="295" cy="275" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="335" cy="275" r="7" fill="#7C2530"/>
  <text x="295" y="300" text-anchor="middle" font-size="9" fill="#7C2530">✓ separable</text>

  <text x="295" y="338" text-anchor="middle" font-size="11" fill="#5C3D1E">VCdim = 3</text>
  <text x="295" y="355" text-anchor="middle" font-size="9" fill="#6B5D4F">for a line in ℝ²</text>

  <!-- Panel 3: 4 points - cannot shatter -->
  <rect x="398" y="30" width="185" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="490" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">4 POINTS</text>
  <text x="490" y="65" text-anchor="middle" font-size="9" fill="#5C3D1E">Always fails XOR</text>

  <!-- XOR pattern - 4 corners -->
  <circle cx="440" cy="130" r="7" fill="#7C2530"/>
  <circle cx="530" cy="130" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="440" cy="190" r="7" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="530" cy="190" r="7" fill="#7C2530"/>

  <!-- X mark showing no line works -->
  <text x="490" y="175" text-anchor="middle" font-size="28" fill="#7C2530" opacity="0.3">✗</text>
  <text x="490" y="225" text-anchor="middle" font-size="9" fill="#7C2530">No straight line can</text>
  <text x="490" y="240" text-anchor="middle" font-size="9" fill="#7C2530">separate XOR pattern</text>

  <text x="490" y="285" text-anchor="middle" font-size="9" fill="#6B5D4F">For ANY 4 points,</text>
  <text x="490" y="300" text-anchor="middle" font-size="9" fill="#6B5D4F">at least one labeling</text>
  <text x="490" y="315" text-anchor="middle" font-size="9" fill="#6B5D4F">is impossible</text>

  <text x="490" y="345" text-anchor="middle" font-size="11" fill="#7C2530">Cannot shatter 4</text>
  <text x="490" y="362" text-anchor="middle" font-size="9" fill="#6B5D4F">∴ VC dim = 3</text>

  <!-- Panel 4: The formula -->
  <rect x="598" y="30" width="185" height="340" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="690" y="50" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">GENERALIZATION</text>

  <text x="690" y="80" text-anchor="middle" font-size="9" fill="#5C3D1E">VC bound:</text>
  <rect x="612" y="90" width="160" height="50" fill="#EDE8DE" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="692" y="110" text-anchor="middle" font-size="10" fill="#2D5A8E">R(h) ≤ R̂(h)</text>
  <text x="692" y="128" text-anchor="middle" font-size="10" fill="#2D5A8E">+ O(√(d/n))</text>

  <text x="690" y="165" text-anchor="middle" font-size="9" fill="#6B5D4F">d = VC dimension</text>
  <text x="690" y="180" text-anchor="middle" font-size="9" fill="#6B5D4F">n = training samples</text>

  <line x1="618" y1="198" x2="772" y2="198" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="690" y="218" text-anchor="middle" font-size="9" fill="#5C3D1E">Higher VC dim =</text>
  <text x="690" y="233" text-anchor="middle" font-size="9" fill="#7C2530">more flexible</text>
  <text x="690" y="248" text-anchor="middle" font-size="9" fill="#7C2530">but needs more data</text>

  <line x1="618" y1="265" x2="772" y2="265" stroke="#C4A87A" stroke-width="0.8"/>

  <text x="690" y="285" text-anchor="middle" font-size="9" fill="#5C3D1E">Linear classifier ℝⁿ:</text>
  <text x="690" y="300" text-anchor="middle" font-size="9" fill="#2D5A8E">VCdim = n+1</text>
  <text x="690" y="320" text-anchor="middle" font-size="9" fill="#5C3D1E">Neural net: often</text>
  <text x="690" y="335" text-anchor="middle" font-size="9" fill="#2D5A8E">O(W log W)</text>
  <text x="690" y="350" text-anchor="middle" font-size="9" fill="#6B5D4F">W = # weights</text>

  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="0.5">VC Dimension — measuring a classifier's capacity to memorize labels</text>
</svg>
