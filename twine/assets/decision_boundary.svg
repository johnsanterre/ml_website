<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Decision Boundaries</text>
  <!-- Linear boundary -->
  <text x="130" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Linear</text>
  <rect x="30" y="75" width="200" height="200" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <circle cx="70" cy="120" r="6" fill="#4a90d9"/><circle cx="90" cy="140" r="6" fill="#4a90d9"/>
  <circle cx="60" cy="180" r="6" fill="#4a90d9"/><circle cx="100" cy="160" r="6" fill="#4a90d9"/>
  <circle cx="170" cy="110" r="6" fill="#e74c3c"/><circle cx="190" cy="130" r="6" fill="#e74c3c"/>
  <circle cx="180" cy="180" r="6" fill="#e74c3c"/><circle cx="200" cy="150" r="6" fill="#e74c3c"/>
  <line x1="130" y1="75" x2="130" y2="275" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Non-linear boundary -->
  <text x="390" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Non-linear (Neural Net / SVM RBF)</text>
  <rect x="290" y="75" width="200" height="200" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <circle cx="390" cy="175" r="6" fill="#4a90d9"/><circle cx="370" cy="165" r="6" fill="#4a90d9"/>
  <circle cx="410" cy="155" r="6" fill="#4a90d9"/><circle cx="390" cy="145" r="6" fill="#4a90d9"/>
  <circle cx="320" cy="110" r="6" fill="#e74c3c"/><circle cx="460" cy="110" r="6" fill="#e74c3c"/>
  <circle cx="310" cy="240" r="6" fill="#e74c3c"/><circle cx="470" cy="235" r="6" fill="#e74c3c"/>
  <ellipse cx="390" cy="165" rx="55" ry="45" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Overfit -->
  <text x="660" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e74c3c">Overfit</text>
  <rect x="560" y="75" width="200" height="200" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <circle cx="600" cy="120" r="6" fill="#4a90d9"/><circle cx="620" cy="140" r="6" fill="#4a90d9"/>
  <circle cx="590" cy="180" r="6" fill="#4a90d9"/>
  <circle cx="720" cy="150" r="6" fill="#e74c3c"/><circle cx="700" cy="170" r="6" fill="#e74c3c"/>
  <circle cx="680" cy="140" r="6" fill="#e74c3c"/>
  <path d="M600,100 Q620,130 610,165 Q605,190 600,230 Q640,200 670,220 Q700,240 730,200 Q720,155 695,140 Q670,125 640,110 Z" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Decision boundary separates classes — complexity determines generalization</text>
</svg>
