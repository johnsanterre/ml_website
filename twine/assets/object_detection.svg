<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="od-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="od-arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="od-arr-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ TITLE ══ -->
  <text x="400" y="26" text-anchor="middle" font-size="13" fill="#5C3D1E" letter-spacing="1.5">OBJECT DETECTION PIPELINE</text>

  <!-- ══ PANEL 1: INPUT IMAGE ══ -->
  <rect x="20" y="40" width="160" height="130" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="100" y="58" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">INPUT IMAGE</text>
  <!-- Scene mockup: simple room -->
  <rect x="35" y="64" width="130" height="96" rx="2" fill="#D8CDB8" stroke="#C4A87A" stroke-width="1"/>
  <!-- "dog" bounding box -->
  <rect x="45" y="80" width="44" height="50" rx="2" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="67" y="78" text-anchor="middle" font-size="7.5" fill="#7C2530">dog?</text>
  <!-- "cat" bounding box -->
  <rect x="106" y="90" width="40" height="44" rx="2" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="126" y="88" text-anchor="middle" font-size="7.5" fill="#2D5A8E">cat?</text>
  <!-- ground label -->
  <text x="100" y="170" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">raw pixels</text>

  <!-- Arrow -->
  <line x1="183" y1="105" x2="218" y2="105" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#od-arr-brown)"/>

  <!-- ══ PANEL 2: BACKBONE CNN ══ -->
  <rect x="220" y="40" width="140" height="130" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="290" y="58" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">BACKBONE</text>
  <!-- Stacked feature map rects -->
  <rect x="240" y="65" width="100" height="22" rx="2" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="290" y="80" text-anchor="middle" font-size="8" fill="#5C3D1E">Conv Block 1</text>
  <rect x="248" y="91" width="84" height="20" rx="2" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1" opacity="0.85"/>
  <text x="290" y="105" text-anchor="middle" font-size="8" fill="#5C3D1E">Conv Block 2</text>
  <rect x="256" y="115" width="68" height="20" rx="2" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1" opacity="0.70"/>
  <text x="290" y="129" text-anchor="middle" font-size="8" fill="#5C3D1E">Conv Block 3</text>
  <text x="290" y="157" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">feature maps</text>

  <!-- Arrow -->
  <line x1="363" y1="105" x2="398" y2="105" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#od-arr-brown)"/>

  <!-- ══ PANEL 3: REGION PROPOSALS / ANCHOR BOXES ══ -->
  <rect x="400" y="40" width="160" height="130" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="480" y="56" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">ANCHOR BOXES</text>
  <!-- Grid of anchors -->
  <line x1="416" y1="64" x2="416" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="448" y1="64" x2="448" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="480" y1="64" x2="480" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="512" y1="64" x2="512" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="544" y1="64" x2="544" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="416" y1="64" x2="544" y2="64" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="416" y1="95" x2="544" y2="95" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="416" y1="126" x2="544" y2="126" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="416" y1="158" x2="544" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <!-- Highlighted anchors -->
  <rect x="416" y="64" width="32" height="31" fill="#7C2530" opacity="0.25" stroke="#7C2530" stroke-width="1"/>
  <rect x="448" y="95" width="64" height="31" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="480" y="64" width="32" height="62" fill="#5C3D1E" opacity="0.20" stroke="#5C3D1E" stroke-width="1"/>
  <!-- NMS label -->
  <rect x="416" y="162" width="128" height="14" rx="3" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1"/>
  <text x="480" y="172" text-anchor="middle" font-size="8" fill="#5C3D1E">NMS → top proposals</text>

  <!-- Arrow -->
  <line x1="563" y1="105" x2="598" y2="105" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#od-arr-brown)"/>

  <!-- ══ PANEL 4: CLASSIFICATION + REGRESSION ══ -->
  <rect x="600" y="40" width="178" height="130" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="689" y="56" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">HEADS</text>
  <!-- cls branch -->
  <rect x="612" y="63" width="70" height="44" rx="3" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="647" y="79" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Class</text>
  <text x="647" y="91" text-anchor="middle" font-size="8" fill="#5C3D1E">head</text>
  <text x="647" y="101" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">dog 0.92</text>
  <!-- box branch -->
  <rect x="694" y="63" width="70" height="44" rx="3" fill="#F5EDE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="729" y="79" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">Box</text>
  <text x="729" y="91" text-anchor="middle" font-size="8" fill="#5C3D1E">regression</text>
  <text x="729" y="101" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">Δx,Δy,Δw,Δh</text>
  <!-- output box -->
  <rect x="630" y="118" width="118" height="34" rx="3" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.8"/>
  <text x="689" y="132" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Final Detection</text>
  <text x="689" y="145" text-anchor="middle" font-size="8" fill="#5C3D1E">label + tight bounding box</text>
  <!-- arrows into output -->
  <line x1="647" y1="107" x2="660" y2="118" stroke="#7C2530" stroke-width="1" marker-end="url(#od-arr)"/>
  <line x1="729" y1="107" x2="718" y2="118" stroke="#2D5A8E" stroke-width="1" marker-end="url(#od-arr-blue)"/>

  <!-- ══ BOTTOM: TWO-STAGE vs ONE-STAGE ══ -->
  <line x1="20" y1="200" x2="778" y2="200" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Two-stage -->
  <rect x="20" y="213" width="370" height="170" rx="4" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="205" y="232" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Two-Stage (Faster R-CNN)</text>
  <!-- Stage 1 box -->
  <rect x="35" y="242" width="160" height="36" rx="3" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.2"/>
  <text x="115" y="256" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Stage 1: RPN</text>
  <text x="115" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">propose ~300 regions</text>
  <line x1="197" y1="260" x2="212" y2="260" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#od-arr-brown)"/>
  <!-- Stage 2 box -->
  <rect x="214" y="242" width="160" height="36" rx="3" fill="#EDE5D0" stroke="#7C2530" stroke-width="1.2"/>
  <text x="294" y="256" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Stage 2: RoI Head</text>
  <text x="294" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">classify each region</text>
  <!-- pros/cons -->
  <text x="35" y="295" font-size="8.5" fill="#2D5A8E">+ Higher accuracy, flexible</text>
  <text x="35" y="309" font-size="8.5" fill="#7C2530">− Slower (~5 fps), two forward passes</text>
  <text x="35" y="323" font-size="8.5" fill="#6B5D4F" font-style="italic">Use when: accuracy is critical</text>
  <text x="35" y="340" font-size="8" fill="#6B5D4F">Examples: Faster R-CNN, Mask R-CNN,</text>
  <text x="35" y="353" font-size="8" fill="#6B5D4F">Cascade R-CNN</text>

  <!-- One-stage -->
  <rect x="408" y="213" width="370" height="170" rx="4" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="593" y="232" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">One-Stage (YOLO / SSD)</text>
  <!-- Single pass box -->
  <rect x="423" y="242" width="340" height="36" rx="3" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="593" y="256" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Single forward pass → all boxes + labels</text>
  <text x="593" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">Dense grid prediction, no separate region step</text>
  <!-- pros/cons -->
  <text x="423" y="295" font-size="8.5" fill="#2D5A8E">+ Real-time (30–200 fps), simple pipeline</text>
  <text x="423" y="309" font-size="8.5" fill="#7C2530">− Historically lower accuracy on small objects</text>
  <text x="423" y="323" font-size="8.5" fill="#6B5D4F" font-style="italic">Use when: speed is critical</text>
  <text x="423" y="340" font-size="8" fill="#6B5D4F">Examples: YOLO v5/v8, SSD, RetinaNet,</text>
  <text x="423" y="353" font-size="8" fill="#6B5D4F">FCOS, DETR</text>
</svg>
