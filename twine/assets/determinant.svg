<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Determinant: Signed Volume Scaling</text>
  <!-- Left: 2x2 parallelogram -->
  <text x="200" y="65" text-anchor="middle" font-size="14" fill="#333">det = signed area</text>
  <!-- Unit square -->
  <polygon points="80,280 180,280 180,180 80,180" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="130" y="300" text-anchor="middle" font-size="11" fill="#2196F3">area = 1</text>
  <!-- Transformed parallelogram -->
  <polygon points="80,280 230,280 270,150 120,150" fill="#FF9800" fill-opacity="0.25" stroke="#FF9800" stroke-width="2.5"/>
  <text x="175" y="320" text-anchor="middle" font-size="12" fill="#FF9800">area = |det(A)|</text>
  <!-- Vectors -->
  <line x1="80" y1="280" x2="230" y2="280" stroke="#E91E63" stroke-width="2.5" marker-end="url(#a3)"/>
  <line x1="80" y1="280" x2="120" y2="150" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="160" y="298" font-size="12" fill="#E91E63">a₁</text>
  <text x="86" y="210" font-size="12" fill="#4CAF50">a₂</text>
  <defs><marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker></defs>
  <!-- Right: det properties -->
  <text x="570" y="65" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Key Properties</text>
  <rect x="380" y="80" width="380" height="250" rx="8" fill="#f9f9f9" stroke="#ddd"/>
  <text x="570" y="112" text-anchor="middle" font-size="13" fill="#2196F3">det(A) = 0  →  singular (no inverse)</text>
  <text x="570" y="142" text-anchor="middle" font-size="13" fill="#333">det(AB) = det(A)·det(B)</text>
  <text x="570" y="172" text-anchor="middle" font-size="13" fill="#333">det(Aᵀ) = det(A)</text>
  <text x="570" y="202" text-anchor="middle" font-size="13" fill="#E91E63">det = product of eigenvalues</text>
  <text x="570" y="232" text-anchor="middle" font-size="12" fill="#555">det(A) &gt; 0: orientation-preserving</text>
  <text x="570" y="255" text-anchor="middle" font-size="12" fill="#555">det(A) &lt; 0: orientation-reversing</text>
  <text x="570" y="295" text-anchor="middle" font-size="12" fill="#888">2×2: ad − bc</text>
</svg>
