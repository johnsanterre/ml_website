<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Pareto Distribution (Power Law / Heavy Tail)</text>
  <!-- Axes -->
  <line x1="80" y1="330" x2="700" y2="330" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="330" x2="80" y2="50" stroke="#333" stroke-width="2"/>
  <text x="390" y="365" text-anchor="middle" font-size="13" fill="#333">x (value, x ≥ x_m)</text>
  <text x="30" y="190" text-anchor="middle" font-size="13" fill="#333" transform="rotate(-90,30,190)">f(x)</text>
  <text x="80" y="348" font-size="12" fill="#666">x_m</text>
  <!-- Pareto PDF: heavy tail -->
  <path d="M80,60 C100,80 130,140 180,210 C230,270 310,310 420,324 C510,330 600,330 700,330" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="3"/>
  <!-- Normal comparison (dashed, thin tail) -->
  <path d="M80,330 C140,270 200,130 260,80 C300,55 340,52 380,60 C440,75 500,180 560,290 C600,330 650,330 700,330" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="52" font-size="11" fill="#aaa">Normal (thin tail)</text>
  <!-- 80-20 annotation -->
  <line x1="200" y1="50" x2="200" y2="330" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="45" text-anchor="middle" font-size="11" fill="#E91E63">top 20%</text>
  <path d="M80,80 L200,80 L200,330 Z" fill="#E91E63" fill-opacity="0.12"/>
  <text x="140" y="200" text-anchor="middle" font-size="12" fill="#E91E63">80% of</text>
  <text x="140" y="216" text-anchor="middle" font-size="12" fill="#E91E63">mass</text>
  <!-- Formula -->
  <rect x="420" y="60" width="260" height="80" rx="6" fill="#f9f9f9" stroke="#ddd"/>
  <text x="550" y="88" text-anchor="middle" font-size="13" fill="#333">f(x) = αx_m^α / x^(α+1)</text>
  <text x="550" y="110" text-anchor="middle" font-size="12" fill="#555">x ≥ x_m,  α &gt; 0 (shape)</text>
  <text x="550" y="130" text-anchor="middle" font-size="11" fill="#888">Mean = αx_m/(α−1) for α &gt; 1</text>
  <text x="390" y="380" text-anchor="middle" font-size="12" fill="#555">Word frequencies, wealth, city sizes, internet traffic — "80-20 rule"</text>
</svg>
