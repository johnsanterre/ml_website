<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Regression to the Mean</text>

  <!-- Axis area: origin at (90, 345), width 620, height 280 -->

  <!-- Grid lines (light) -->
  <line x1="90" y1="65" x2="710" y2="65" stroke="#eee" stroke-width="1"/>
  <line x1="90" y1="127" x2="710" y2="127" stroke="#eee" stroke-width="1"/>
  <line x1="90" y1="189" x2="710" y2="189" stroke="#eee" stroke-width="1"/>
  <line x1="90" y1="251" x2="710" y2="251" stroke="#eee" stroke-width="1"/>
  <line x1="90" y1="313" x2="710" y2="313" stroke="#eee" stroke-width="1"/>
  <line x1="245" y1="65" x2="245" y2="345" stroke="#eee" stroke-width="1"/>
  <line x1="400" y1="65" x2="400" y2="345" stroke="#eee" stroke-width="1"/>
  <line x1="555" y1="65" x2="555" y2="345" stroke="#eee" stroke-width="1"/>

  <!-- Mean lines (dashed) -->
  <!-- Vertical mean: x=400 (horizontal midpoint of plot area) -->
  <line x1="400" y1="65" x2="400" y2="345" stroke="#888" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- Horizontal mean: y=205 (vertical midpoint) -->
  <line x1="90" y1="205" x2="710" y2="205" stroke="#888" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Mean labels -->
  <text x="402" y="62" font-family="Arial" font-size="10" fill="#888">mean</text>
  <text x="712" y="208" font-family="Arial" font-size="10" fill="#888">mean</text>

  <!-- Axes -->
  <line x1="90" y1="345" x2="710" y2="345" stroke="#333" stroke-width="2"/>
  <line x1="90" y1="345" x2="90" y2="55" stroke="#333" stroke-width="2"/>

  <!-- Axis arrowheads -->
  <polygon points="710,340 718,345 710,350" fill="#333"/>
  <polygon points="85,55 90,47 95,55" fill="#333"/>

  <!-- Axis tick marks and labels (x-axis: 1–9 scale, y-axis: 1–9 scale) -->
  <!-- X ticks -->
  <line x1="245" y1="345" x2="245" y2="351" stroke="#333" stroke-width="1.5"/>
  <line x1="400" y1="345" x2="400" y2="351" stroke="#333" stroke-width="1.5"/>
  <line x1="555" y1="345" x2="555" y2="351" stroke="#333" stroke-width="1.5"/>
  <text x="90"  y="362" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">1</text>
  <text x="245" y="362" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">3</text>
  <text x="400" y="362" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">5</text>
  <text x="555" y="362" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">7</text>
  <text x="710" y="362" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">9</text>

  <!-- Y ticks -->
  <line x1="84" y1="313" x2="90" y2="313" stroke="#333" stroke-width="1.5"/>
  <line x1="84" y1="251" x2="90" y2="251" stroke="#333" stroke-width="1.5"/>
  <line x1="84" y1="189" x2="90" y2="189" stroke="#333" stroke-width="1.5"/>
  <line x1="84" y1="127" x2="90" y2="127" stroke="#333" stroke-width="1.5"/>
  <text x="78" y="349" text-anchor="end" font-family="Arial" font-size="11" fill="#555">1</text>
  <text x="78" y="317" text-anchor="end" font-family="Arial" font-size="11" fill="#555">3</text>
  <text x="78" y="255" text-anchor="end" font-family="Arial" font-size="11" fill="#555">5</text>
  <text x="78" y="193" text-anchor="end" font-family="Arial" font-size="11" fill="#555">7</text>
  <text x="78" y="131" text-anchor="end" font-family="Arial" font-size="11" fill="#555">9</text>

  <!-- Axis labels -->
  <text x="400" y="385" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">First Measurement</text>
  <text x="22" y="205" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333" transform="rotate(-90,22,205)">Second Measurement</text>

  <!--
    Coordinate mapping:
      x_px = 90 + (val - 1) / 8 * 620    (val in [1,9])
      y_px = 345 - (val - 1) / 8 * 280   (val in [1,9])

    Points: (x1, y1) pairs chosen to show RTM pattern:
    - High x1 -> y2 pulled toward mean (y2 < x1)
    - Low  x1 -> y2 pulled toward mean (y2 > x1)
    - Moderate x1 -> y2 ~ x1
    Spread: realistic noise around expected regression.

    Blue dots = first measurement high (above mean)
    Orange dots = first measurement low (below mean)
    Gray dots = near mean
  -->

  <!-- High first-measurement points (x1 >= 6.5): blue, second meas pulled toward mean -->
  <!-- (8, 6.2) --> <circle cx="632" cy="165" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (8.5, 6.8) --> <circle cx="671" cy="130" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (7.5, 5.9) --> <circle cx="593" cy="186" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (7, 5.5) --> <circle cx="555" cy="205" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (8, 5.4) --> <circle cx="632" cy="211" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (9, 7.0) --> <circle cx="710" cy="120" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (7.8, 6.5) --> <circle cx="617" cy="149" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (6.5, 5.2) --> <circle cx="516" cy="219" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (8.2, 5.8) --> <circle cx="647" cy="191" r="5" fill="#4a90d9" opacity="0.85"/>
  <!-- (7.2, 6.0) --> <circle cx="571" cy="181" r="5" fill="#4a90d9" opacity="0.85"/>

  <!-- Low first-measurement points (x1 <= 3.5): orange, second meas pulled toward mean -->
  <!-- (2, 3.8) --> <circle cx="168" cy="282" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (1.5, 4.2) --> <circle cx="129" cy="261" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (2.5, 3.5) --> <circle cx="206" cy="296" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (3, 4.0) --> <circle cx="245" cy="275" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (2, 2.8) --> <circle cx="168" cy="317" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (1, 3.2) --> <circle cx="90"  cy="303" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (3.5, 4.5) --> <circle cx="283" cy="240" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (2.8, 3.6) --> <circle cx="229" cy="289" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (1.8, 4.0) --> <circle cx="152" cy="275" r="5" fill="#e67e22" opacity="0.85"/>
  <!-- (3.2, 4.1) --> <circle cx="261" cy="268" r="5" fill="#e67e22" opacity="0.85"/>

  <!-- Mid points (x1 ~4–6): gray, y2 ~ x1 -->
  <!-- (4, 4.8) --> <circle cx="322" cy="226" r="5" fill="#888" opacity="0.75"/>
  <!-- (5, 5.2) --> <circle cx="400" cy="205" r="5" fill="#888" opacity="0.75"/>
  <!-- (5.5, 5.0) --> <circle cx="438" cy="219" r="5" fill="#888" opacity="0.75"/>
  <!-- (4.5, 4.5) --> <circle cx="361" cy="240" r="5" fill="#888" opacity="0.75"/>
  <!-- (6, 5.8) --> <circle cx="477" cy="191" r="5" fill="#888" opacity="0.75"/>
  <!-- (4.8, 5.5) --> <circle cx="384" cy="205" r="5" fill="#888" opacity="0.75"/>
  <!-- (5.2, 4.8) --> <circle cx="415" cy="226" r="5" fill="#888" opacity="0.75"/>
  <!-- (4.2, 4.3) --> <circle cx="338" cy="254" r="5" fill="#888" opacity="0.75"/>

  <!-- Regression line: from (1, 3.0) to (9, 7.0) — slope < 1, pulled toward mean -->
  <!-- x1=1: y_px = 345 - (3.0-1)/8*280 = 345 - 70 = 275; x_px = 90 -->
  <!-- x1=9: y_px = 345 - (7.0-1)/8*280 = 345 - 210 = 135; x_px = 710 -->
  <line x1="90" y1="275" x2="710" y2="135" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- Identity line (dashed): y2 = x1 -->
  <!-- from (1,1) to (9,9): (90,345) to (710,65) -->
  <line x1="90" y1="345" x2="710" y2="65" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Legend -->
  <rect x="530" y="48" width="170" height="80" rx="6" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <circle cx="548" cy="67" r="5" fill="#4a90d9" opacity="0.85"/>
  <text x="558" y="71" font-family="Arial" font-size="11" fill="#333">High 1st meas. (→ mean)</text>
  <circle cx="548" cy="87" r="5" fill="#e67e22" opacity="0.85"/>
  <text x="558" y="91" font-family="Arial" font-size="11" fill="#333">Low 1st meas. (→ mean)</text>
  <circle cx="548" cy="107" r="5" fill="#888" opacity="0.75"/>
  <text x="558" y="111" font-family="Arial" font-size="11" fill="#333">Near mean</text>
  <line x1="538" y1="120" x2="562" y2="120" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="568" y="124" font-family="Arial" font-size="11" fill="#333">Regression line</text>
  <line x1="538" y1="136" x2="562" y2="136" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="568" y="140" font-family="Arial" font-size="11" fill="#555">Identity (y=x)</text>

  <!-- Legend box slightly taller to fit -->
  <rect x="530" y="48" width="170" height="98" rx="6" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <circle cx="548" cy="67" r="5" fill="#4a90d9" opacity="0.85"/>
  <text x="558" y="71" font-family="Arial" font-size="11" fill="#333">High 1st meas. (→ mean)</text>
  <circle cx="548" cy="87" r="5" fill="#e67e22" opacity="0.85"/>
  <text x="558" y="91" font-family="Arial" font-size="11" fill="#333">Low 1st meas. (→ mean)</text>
  <circle cx="548" cy="107" r="5" fill="#888" opacity="0.75"/>
  <text x="558" y="111" font-family="Arial" font-size="11" fill="#333">Near mean</text>
  <line x1="538" y1="122" x2="562" y2="122" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="568" y="126" font-family="Arial" font-size="11" fill="#333">Regression line</text>
  <line x1="538" y1="138" x2="562" y2="138" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="568" y="142" font-family="Arial" font-size="11" fill="#555">Identity (y=x)</text>
</svg>
