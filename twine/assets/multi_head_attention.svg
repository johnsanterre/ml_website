<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Input split -->
  <rect x="18" y="28" width="180" height="344" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="108" y="48" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">Input Projection</text>
  <!-- Input vector -->
  <rect x="64" y="58" width="88" height="28" fill="#EAF2FA" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="108" y="76" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">X  (d_model)</text>
  <!-- Three arrows down -->
  <line x1="82" y1="87" x2="54" y2="108" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="108" y1="87" x2="108" y2="108" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="134" y1="87" x2="162" y2="108" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- W_Q W_K W_V boxes -->
  <rect x="28" y="108" width="46" height="26" fill="#FFF3E0" stroke="#C4A87A" stroke-width="1.2" rx="2"/>
  <text x="51" y="125" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">W_Q</text>
  <rect x="85" y="108" width="46" height="26" fill="#FFF3E0" stroke="#C4A87A" stroke-width="1.2" rx="2"/>
  <text x="108" y="125" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">W_K</text>
  <rect x="142" y="108" width="46" height="26" fill="#FFF3E0" stroke="#C4A87A" stroke-width="1.2" rx="2"/>
  <text x="165" y="125" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">W_V</text>
  <!-- Q K V labels -->
  <line x1="51" y1="134" x2="51" y2="152" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="108" y1="134" x2="108" y2="152" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="165" y1="134" x2="165" y2="152" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="28" y="152" width="46" height="22" fill="#BECDDF" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="51" y="167" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Q</text>
  <rect x="85" y="152" width="46" height="22" fill="#BECDDF" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="108" y="167" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">K</text>
  <rect x="142" y="152" width="46" height="22" fill="#BECDDF" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="165" y="167" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">V</text>
  <!-- Split into h heads note -->
  <text x="108" y="198" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Split into h heads</text>
  <text x="108" y="211" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">each dim = d_model/h</text>
  <text x="108" y="228" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">e.g. d=512, h=8</text>
  <text x="108" y="242" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">→ 64 dims/head</text>
  <text x="108" y="268" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Same total compute</text>
  <text x="108" y="281" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">as one full head.</text>

  <!-- Panel 2: Multiple heads running in parallel -->
  <rect x="210" y="28" width="250" height="344" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="335" y="48" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">Parallel Attention Heads</text>
  <!-- Head 1 -->
  <rect x="220" y="58" width="68" height="110" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="254" y="74" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Head 1</text>
  <text x="254" y="90" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">Syntax</text>
  <!-- Mini attention grid head1 -->
  <rect x="228" y="96" width="12" height="12" fill="#2D5A8E" opacity="0.8"/><rect x="241" y="96" width="12" height="12" fill="#7C8FAE" opacity="0.5"/><rect x="254" y="96" width="12" height="12" fill="#BECDDF" opacity="0.3"/>
  <rect x="228" y="109" width="12" height="12" fill="#BECDDF" opacity="0.3"/><rect x="241" y="109" width="12" height="12" fill="#2D5A8E" opacity="0.8"/><rect x="254" y="109" width="12" height="12" fill="#7C8FAE" opacity="0.5"/>
  <rect x="228" y="122" width="12" height="12" fill="#7C8FAE" opacity="0.5"/><rect x="241" y="122" width="12" height="12" fill="#BECDDF" opacity="0.3"/><rect x="254" y="122" width="12" height="12" fill="#2D5A8E" opacity="0.8"/>
  <text x="254" y="155" font-family="Georgia, serif" font-size="7.5" fill="#5C3D1E" text-anchor="middle">subject-verb</text>
  <!-- Head 2 -->
  <rect x="301" y="58" width="68" height="110" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <text x="335" y="74" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">Head 2</text>
  <text x="335" y="90" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">Coreference</text>
  <rect x="309" y="96" width="12" height="12" fill="#7C2530" opacity="0.8"/><rect x="322" y="96" width="12" height="12" fill="#FAEAEA" opacity="0.5"/><rect x="335" y="96" width="12" height="12" fill="#7C2530" opacity="0.6"/>
  <rect x="309" y="109" width="12" height="12" fill="#FAEAEA" opacity="0.3"/><rect x="322" y="109" width="12" height="12" fill="#7C2530" opacity="0.9"/><rect x="335" y="109" width="12" height="12" fill="#FAEAEA" opacity="0.2"/>
  <rect x="309" y="122" width="12" height="12" fill="#7C2530" opacity="0.6"/><rect x="322" y="122" width="12" height="12" fill="#FAEAEA" opacity="0.3"/><rect x="335" y="122" width="12" height="12" fill="#7C2530" opacity="0.9"/>
  <text x="335" y="155" font-family="Georgia, serif" font-size="7.5" fill="#5C3D1E" text-anchor="middle">pronoun-ref</text>
  <!-- Head 3 -->
  <rect x="382" y="58" width="68" height="110" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5" rx="3"/>
  <text x="416" y="74" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Head 3</text>
  <text x="416" y="90" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">Semantics</text>
  <rect x="390" y="96" width="12" height="12" fill="#C4A87A" opacity="0.5"/><rect x="403" y="96" width="12" height="12" fill="#9E7B4A" opacity="0.8"/><rect x="416" y="96" width="12" height="12" fill="#C4A87A" opacity="0.4"/>
  <rect x="390" y="109" width="12" height="12" fill="#9E7B4A" opacity="0.8"/><rect x="403" y="109" width="12" height="12" fill="#C4A87A" opacity="0.5"/><rect x="416" y="109" width="12" height="12" fill="#9E7B4A" opacity="0.7"/>
  <rect x="390" y="122" width="12" height="12" fill="#C4A87A" opacity="0.4"/><rect x="403" y="122" width="12" height="12" fill="#9E7B4A" opacity="0.7"/><rect x="416" y="122" width="12" height="12" fill="#C4A87A" opacity="0.5"/>
  <text x="416" y="155" font-family="Georgia, serif" font-size="7.5" fill="#5C3D1E" text-anchor="middle">topic words</text>
  <!-- h heads note -->
  <text x="335" y="182" font-family="Georgia, serif" font-size="8.5" fill="#6B5D4F" text-anchor="middle" font-style="italic">... h heads total ...</text>
  <!-- Concatenate -->
  <line x1="254" y1="192" x2="290" y2="212" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="335" y1="192" x2="335" y2="212" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="416" y1="192" x2="380" y2="212" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="240" y="212" width="190" height="28" fill="#EAF2FA" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="335" y="230" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Concatenate  [h₁‖h₂‖…‖hₙ]</text>
  <!-- W_O projection -->
  <line x1="335" y1="241" x2="335" y2="258" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="275" y="258" width="120" height="26" fill="#FFF3E0" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="335" y="275" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">× W_O  (output proj.)</text>
  <!-- Output -->
  <line x1="335" y1="285" x2="335" y2="302" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="262" y="302" width="146" height="26" fill="#EAF2FA" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="335" y="319" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">Output  (d_model)</text>
  <text x="335" y="352" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Same shape as input.</text>

  <!-- Panel 3: Cost and formula -->
  <rect x="474" y="28" width="307" height="344" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="627" y="48" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">Mechanics &amp; Cost</text>
  <!-- Attention formula -->
  <rect x="484" y="58" width="287" height="54" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="627" y="76" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">Attention(Q,K,V) =</text>
  <text x="627" y="93" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">softmax( QKᵀ / √d_k ) · V</text>
  <!-- Complexity breakdown -->
  <text x="484" y="128" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-weight="bold">Complexity per layer:</text>
  <text x="484" y="146" font-family="Georgia, serif" font-size="9" fill="#7C2530">Time:  O(n² · d)</text>
  <text x="484" y="162" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" font-style="italic">n = sequence length, d = d_model</text>
  <text x="484" y="178" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">n² term is why long contexts are expensive.</text>
  <text x="484" y="196" font-family="Georgia, serif" font-size="9" fill="#7C2530">Memory: O(n² · h)</text>
  <text x="484" y="212" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Must store attention matrix per head.</text>
  <!-- Key properties -->
  <line x1="484" y1="224" x2="752" y2="224" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="484" y="240" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-weight="bold">Why multiple heads help:</text>
  <text x="484" y="258" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Each head learns a different subspace</text>
  <text x="484" y="274" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Captures syntax, semantics, coreference</text>
  <text x="484" y="290" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Ensemble effect without extra parameters</text>
  <text x="484" y="306" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Parallel computation (no added wall time)</text>
  <!-- Typical values -->
  <line x1="484" y1="318" x2="752" y2="318" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="484" y="334" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-weight="bold">Typical values:</text>
  <text x="484" y="350" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">GPT-2: d=768, h=12  |  GPT-3: d=12288, h=96</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6B5D4F"/>
    </marker>
  </defs>
</svg>
