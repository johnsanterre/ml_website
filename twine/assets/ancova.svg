<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="anc-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="anc-arr-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D6A4F"/>
    </marker>
    <marker id="anc-arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="anc-arr-blu" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ŌĢÉŌĢÉ PANEL LABEL ŌĢÉŌĢÉ -->
  <text x="400" y="20" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">ANCOVA: TWO GROUPS WITH A CONTINUOUS COVARIATE</text>

  <!-- ŌĢÉŌĢÉ AXES ŌĢÉŌĢÉ -->
  <!-- X axis -->
  <line x1="70" y1="340" x2="560" y2="340" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#anc-axis)"/>
  <!-- Y axis -->
  <line x1="70" y1="340" x2="70" y2="40" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#anc-axis)"/>

  <!-- Axis labels -->
  <text x="315" y="368" text-anchor="middle" font-size="12" fill="#6B5D4F" font-style="italic">Covariate  (e.g., pre-test score)</text>
  <text x="22" y="192" font-size="12" fill="#6B5D4F" text-anchor="middle" transform="rotate(-90,22,192)" font-style="italic">Outcome  (e.g., post-test score)</text>

  <!-- Tick marks on x axis -->
  <line x1="140" y1="336" x2="140" y2="344" stroke="#C4A87A" stroke-width="1"/>
  <line x1="230" y1="336" x2="230" y2="344" stroke="#C4A87A" stroke-width="1"/>
  <line x1="320" y1="336" x2="320" y2="344" stroke="#C4A87A" stroke-width="1"/>
  <line x1="410" y1="336" x2="410" y2="344" stroke="#C4A87A" stroke-width="1"/>
  <line x1="500" y1="336" x2="500" y2="344" stroke="#C4A87A" stroke-width="1"/>

  <!-- ŌĢÉŌĢÉ GROUP A REGRESSION LINE (Treatment, red) ŌĢÉŌĢÉ -->
  <!-- Slope: same as B. Line A is shifted upward by the treatment effect -->
  <!-- Line A: from (90, 280) to (530, 80) -->
  <line x1="90" y1="280" x2="530" y2="80" stroke="#7C2530" stroke-width="2.5"/>
  <text x="534" y="78" font-size="11" fill="#7C2530" font-weight="bold">Group A</text>
  <text x="534" y="91" font-size="9.5" fill="#7C2530">(Treatment)</text>

  <!-- ŌĢÉŌĢÉ GROUP B REGRESSION LINE (Control, blue) ŌĢÉŌĢÉ -->
  <!-- Line B: from (90, 328) to (530, 128) ŌĆö same slope, shifted down by ~48px = treatment effect -->
  <line x1="90" y1="328" x2="530" y2="128" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="534" y="130" font-size="11" fill="#2D5A8E" font-weight="bold">Group B</text>
  <text x="534" y="143" font-size="9.5" fill="#2D5A8E">(Control)</text>

  <!-- ŌĢÉŌĢÉ GROUP A DATA POINTS (red circles) ŌĢÉŌĢÉ -->
  <!-- Scattered around the Group A line. Line A: y = 280 - (280-80)/(530-90)*(x-90) = 280 - 0.4545*(x-90) -->
  <!-- x=110, y_lineŌēł271, dotŌēł268 -->
  <circle cx="110" cy="268" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=145, y_lineŌēł255, dotŌēł260 -->
  <circle cx="145" cy="260" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=175, y_lineŌēł241, dotŌēł236 -->
  <circle cx="175" cy="236" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=200, y_lineŌēł230, dotŌēł238 -->
  <circle cx="200" cy="238" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=240, y_lineŌēł212, dotŌēł206 -->
  <circle cx="240" cy="206" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=270, y_lineŌēł198, dotŌēł202 -->
  <circle cx="270" cy="202" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=310, y_lineŌēł180, dotŌēł174 -->
  <circle cx="310" cy="174" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=350, y_lineŌēł162, dotŌēł168 -->
  <circle cx="350" cy="168" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=390, y_lineŌēł144, dotŌēł138 -->
  <circle cx="390" cy="138" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=430, y_lineŌēł126, dotŌēł132 -->
  <circle cx="430" cy="132" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=470, y_lineŌēł108, dotŌēł104 -->
  <circle cx="470" cy="104" r="5" fill="#7C2530" opacity="0.75"/>
  <!-- x=510, y_lineŌēł90, dotŌēł94 -->
  <circle cx="510" cy="94"  r="5" fill="#7C2530" opacity="0.75"/>

  <!-- ŌĢÉŌĢÉ GROUP B DATA POINTS (blue circles) ŌĢÉŌĢÉ -->
  <!-- Line B: y = 328 - 0.4545*(x-90) -->
  <!-- x=100, y_lineŌēł324, dotŌēł318 -->
  <circle cx="100" cy="318" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=130, y_lineŌēł310, dotŌēł316 -->
  <circle cx="130" cy="316" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=160, y_lineŌēł296, dotŌēł290 -->
  <circle cx="160" cy="290" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=195, y_lineŌēł280, dotŌēł284 -->
  <circle cx="195" cy="284" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=225, y_lineŌēł266, dotŌēł258 -->
  <circle cx="225" cy="258" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=265, y_lineŌēł248, dotŌēł254 -->
  <circle cx="265" cy="254" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=300, y_lineŌēł232, dotŌēł228 -->
  <circle cx="300" cy="228" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=340, y_lineŌēł214, dotŌēł220 -->
  <circle cx="340" cy="220" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=380, y_lineŌēł196, dotŌēł190 -->
  <circle cx="380" cy="190" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=420, y_lineŌēł178, dotŌēł182 -->
  <circle cx="420" cy="182" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=460, y_lineŌēł160, dotŌēł156 -->
  <circle cx="460" cy="156" r="5" fill="#2D5A8E" opacity="0.75"/>
  <!-- x=500, y_lineŌēł142, dotŌēł146 -->
  <circle cx="500" cy="146" r="5" fill="#2D5A8E" opacity="0.75"/>

  <!-- ŌĢÉŌĢÉ TREATMENT EFFECT BRACKET (vertical arrow at x=320) ŌĢÉŌĢÉ -->
  <!-- At x=320: Line A y = 280 - 0.4545*(320-90) = 280-104.5 = 175.5 Ōēł 176 -->
  <!-- At x=320: Line B y = 328 - 0.4545*(320-90) = 328-104.5 = 223.5 Ōēł 224 -->
  <line x1="320" y1="176" x2="320" y2="224" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="none" marker-end="url(#anc-arr-grn)" marker-start="url(#anc-arr-grn)"/>
  <!-- Label -->
  <rect x="326" y="187" width="110" height="22" fill="#FDFAF4" rx="3" opacity="0.9"/>
  <text x="381" y="202" text-anchor="middle" font-size="11" fill="#2D6A4F" font-weight="bold">treatment effect</text>

  <!-- ŌĢÉŌĢÉ ADJUSTED MEANS MARKERS ŌĢÉŌĢÉ -->
  <!-- Grand mean covariate x_bar Ōēł 300, shown as vertical dashed line -->
  <line x1="300" y1="50" x2="300" y2="340" stroke="#9B8877" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Adjusted mean A at x=300: y_A = 280 - 0.4545*(300-90) = 280-95.45 Ōēł 185 -->
  <circle cx="300" cy="185" r="7" fill="none" stroke="#7C2530" stroke-width="2.2"/>
  <circle cx="300" cy="185" r="2.5" fill="#7C2530"/>
  <!-- Adjusted mean B at x=300: y_B = 328 - 0.4545*(300-90) = 328-95.45 Ōēł 233 -->
  <circle cx="300" cy="233" r="7" fill="none" stroke="#2D5A8E" stroke-width="2.2"/>
  <circle cx="300" cy="233" r="2.5" fill="#2D5A8E"/>

  <!-- Adjusted means label -->
  <rect x="212" y="44" width="100" height="18" fill="#FDFAF4" rx="3" opacity="0.9"/>
  <text x="262" y="57" text-anchor="middle" font-size="10" fill="#9B8877" font-style="italic">adjusted means</text>
  <!-- Bracket line from label to dashed line -->
  <line x1="300" y1="62" x2="300" y2="50" stroke="#9B8877" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- x-bar label -->
  <text x="300" y="357" text-anchor="middle" font-size="10" fill="#9B8877" font-style="italic">x╠ä (grand mean of covariate)</text>

  <!-- ŌĢÉŌĢÉ COVARIATE LABEL ŌĢÉŌĢÉ -->
  <!-- Arrow pointing along x-axis to label the covariate direction -->
  <text x="490" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">covariate ŌåÆ</text>

  <!-- ŌĢÉŌĢÉ PARALLEL SLOPE ANNOTATION ŌĢÉŌĢÉ -->
  <rect x="598" y="195" width="145" height="42" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="671" y="212" text-anchor="middle" font-size="9.5" fill="#6B5D4F">Parallel slopes =</text>
  <text x="671" y="228" text-anchor="middle" font-size="9.5" fill="#6B5D4F">homogeneity of regression</text>

  <!-- ŌĢÉŌĢÉ BOTTOM CAPTION ŌĢÉŌĢÉ -->
  <text x="320" y="388" text-anchor="middle" font-size="9" fill="#6B5D4F">
    ANCOVA partials out the covariate, revealing the group difference at a common covariate level
  </text>
</svg>
