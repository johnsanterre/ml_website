<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Sparsity in Machine Learning</text>
  <!-- Dense vs sparse vectors -->
  <text x="160" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Dense Vector</text>
  <rect x="40" y="85" width="240" height="50" rx="6" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="160" y="116" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">[ 0.3, −0.7, 0.1, 0.9, −0.2, 0.5, ... ]</text>
  <text x="160" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">all values non-zero</text>
  <text x="430" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Sparse Vector</text>
  <rect x="310" y="85" width="240" height="50" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="430" y="116" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">[ 0, 0, 0.9, 0, 0, 0, 0.4, 0, ... ]</text>
  <text x="430" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">mostly zeros — interpretable</text>
  <!-- Weight magnitude plot -->
  <text x="180" y="200" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">L1 Regularization → Sparsity</text>
  <line x1="40" y1="300" x2="330" y2="300" stroke="#ccc" stroke-width="1.5"/>
  <line x1="40" y1="300" x2="40" y2="210" stroke="#ccc" stroke-width="1.5"/>
  <rect x="55" y="250" width="20" height="50" fill="#e74c3c"/>
  <rect x="80" y="215" width="20" height="85" fill="#e74c3c"/>
  <rect x="105" y="295" width="20" height="5" fill="#ccc"/>
  <rect x="130" y="288" width="20" height="12" fill="#e74c3c"/>
  <rect x="155" y="295" width="20" height="5" fill="#ccc"/>
  <rect x="180" y="295" width="20" height="5" fill="#ccc"/>
  <rect x="205" y="270" width="20" height="30" fill="#e74c3c"/>
  <rect x="230" y="295" width="20" height="5" fill="#ccc"/>
  <rect x="255" y="295" width="20" height="5" fill="#ccc"/>
  <rect x="280" y="295" width="20" height="5" fill="#ccc"/>
  <text x="185" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">L1 drives small weights to exactly zero</text>
  <!-- Benefits -->
  <rect x="570" y="180" width="200" height="150" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="670" y="208" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Benefits</text>
  <text x="670" y="235" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Interpretability</text>
  <text x="670" y="258" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Feature selection</text>
  <text x="670" y="281" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Faster inference</text>
  <text x="670" y="304" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Less memory</text>
</svg>
