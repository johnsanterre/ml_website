<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Three constraint regions -->
  <!-- L1 diamond -->
  <polygon points="160,200 200,160 240,200 200,240" fill="#fde8e8" stroke="#e74c3c" stroke-width="2"/>
  <text x="200" y="290" text-anchor="middle" font-family="Arial" font-size="13" fill="#e74c3c">L1 (Lasso)</text>
  <text x="200" y="308" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Sparse solutions</text>
  <!-- L2 circle -->
  <circle cx="400" cy="200" r="45" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="263" text-anchor="middle" font-family="Arial" font-size="13" fill="#4a90d9">L2 (Ridge)</text>
  <text x="400" y="281" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Shrinks all weights</text>
  <!-- Elastic Net (rounded diamond) -->
  <path d="M560,160 Q600,155 640,200 Q645,240 600,240 Q560,245 520,200 Q515,160 560,160 Z" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="582" y="263" text-anchor="middle" font-family="Arial" font-size="13" fill="#27ae60">Elastic Net</text>
  <text x="582" y="281" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Sparse + grouped</text>
  <!-- Formula -->
  <rect x="240" y="330" width="320" height="45" rx="6" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="400" y="349" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Penalty: α·λ‖w‖₁ + (1−α)·λ‖w‖₂²</text>
  <text x="400" y="366" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">α=1 → Lasso   α=0 → Ridge   0&lt;α&lt;1 → Elastic Net</text>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Elastic Net Regularization</text>
  <!-- Axes hint on each -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">●</text>
  <text x="400" y="204" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90d9">●</text>
  <text x="582" y="204" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">●</text>
  <text x="400" y="90" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Constraint regions in weight space</text>
</svg>
