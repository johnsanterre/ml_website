<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Expectation-Maximization (EM) Algorithm</text>
  <defs>
    <marker id="arrem" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- E-step box -->
  <rect x="80" y="120" width="240" height="120" rx="12" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="2.5"/>
  <text x="200" y="155" text-anchor="middle" fill="#2C5F8A" font-size="17" font-weight="bold">E-Step</text>
  <text x="200" y="180" text-anchor="middle" fill="#333" font-size="13">Compute soft assignments</text>
  <text x="200" y="200" text-anchor="middle" fill="#555" font-size="12">r_ik = p(z=k | xᵢ, θ)</text>
  <text x="200" y="222" text-anchor="middle" fill="#888" font-size="12">"Which cluster does each</text>
  <text x="200" y="237" text-anchor="middle" fill="#888" font-size="12"> point belong to?"</text>
  <!-- M-step box -->
  <rect x="480" y="120" width="240" height="120" rx="12" fill="#F0F8F0" stroke="#4A7C59" stroke-width="2.5"/>
  <text x="600" y="155" text-anchor="middle" fill="#4A7C59" font-size="17" font-weight="bold">M-Step</text>
  <text x="600" y="180" text-anchor="middle" fill="#333" font-size="13">Update parameters</text>
  <text x="600" y="200" text-anchor="middle" fill="#555" font-size="12">θ = arg max Q(θ, θ_old)</text>
  <text x="600" y="222" text-anchor="middle" fill="#888" font-size="12">"Given assignments,</text>
  <text x="600" y="237" text-anchor="middle" fill="#888" font-size="12"> update cluster centers"</text>
  <!-- Arrows between E and M -->
  <path d="M 320,155 Q 400,120 480,155" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrem)"/>
  <text x="400" y="110" text-anchor="middle" fill="#555" font-size="13">iterate</text>
  <path d="M 480,215 Q 400,260 320,215" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrem)"/>
  <!-- Convergence label -->
  <text x="400" y="295" text-anchor="middle" fill="#E07B39" font-size="14" font-weight="bold">Log-likelihood L(θ) increases monotonically each iteration</text>
  <!-- Initialize -->
  <text x="200" y="95" text-anchor="middle" fill="#888" font-size="13">Initialize θ randomly</text>
  <line x1="200" y1="100" x2="200" y2="118" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrem)"/>
  <!-- Converged -->
  <text x="600" y="95" text-anchor="middle" fill="#888" font-size="13">Converged when ΔL &lt; ε</text>
  <text x="400" y="335" text-anchor="middle" fill="#555" font-size="12">Used in: Gaussian Mixture Models, Hidden Markov Models, probabilistic PCA</text>
</svg>