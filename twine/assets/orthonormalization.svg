<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Gram-Schmidt Orthonormalization: v₁, v₂, v₃ → e₁, e₂, e₃</text>

  <!-- ======== PANEL 1: Original vectors ======== -->
  <text x="110" y="58" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">Step 0: Original Vectors</text>

  <defs>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9E9E9E"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2196F3"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E91E63"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4CAF50"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Origin panel 1 -->
  <circle cx="90" cy="270" r="3" fill="#333"/>

  <!-- v1: pointing right and up -->
  <line x1="90" y1="270" x2="168" y2="185" stroke="#9E9E9E" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <text x="173" y="181" font-size="13" fill="#9E9E9E" font-weight="bold">v₁</text>

  <!-- v2: pointing right more steeply -->
  <line x1="90" y1="270" x2="175" y2="230" stroke="#9E9E9E" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <text x="179" y="234" font-size="13" fill="#9E9E9E" font-weight="bold">v₂</text>

  <!-- v3: pointing mostly right, slight up -->
  <line x1="90" y1="270" x2="155" y2="310" stroke="#9E9E9E" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <text x="158" y="318" font-size="13" fill="#9E9E9E" font-weight="bold">v₃</text>

  <!-- ======== PANEL 2: Step 1 — e1 = v1/|v1| ======== -->
  <text x="320" y="58" text-anchor="middle" font-size="13" fill="#2196F3" font-weight="bold">Step 1: e₁ = v₁ / ‖v₁‖</text>

  <!-- Origin panel 2 -->
  <circle cx="270" cy="270" r="3" fill="#333"/>

  <!-- v1 ghost -->
  <line x1="270" y1="270" x2="340" y2="195" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="344" y="192" font-size="12" fill="#9E9E9E">v₁</text>

  <!-- e1: unit vector along v1 direction (shorter to indicate unit length) -->
  <line x1="270" y1="270" x2="320" y2="217" stroke="#2196F3" stroke-width="3" marker-end="url(#arr-blue)"/>
  <text x="324" y="213" font-size="13" fill="#2196F3" font-weight="bold">e₁</text>

  <!-- unit length annotation -->
  <text x="270" y="308" text-anchor="middle" font-size="11" fill="#2196F3">‖e₁‖ = 1</text>

  <!-- ======== PANEL 3: Step 2 — e2 ======== -->
  <text x="530" y="58" text-anchor="middle" font-size="13" fill="#E91E63" font-weight="bold">Step 2: e₂ = (v₂ − proj) / ‖…‖</text>

  <!-- Origin panel 3 -->
  <circle cx="460" cy="270" r="3" fill="#333"/>

  <!-- e1 ghost for reference -->
  <line x1="460" y1="270" x2="510" y2="217" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="514" y="213" font-size="12" fill="#2196F3">e₁</text>

  <!-- v2 ghost -->
  <line x1="460" y1="270" x2="548" y2="230" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="552" y="228" font-size="12" fill="#9E9E9E">v₂</text>

  <!-- projection of v2 onto e1 (orange dashed) -->
  <line x1="460" y1="270" x2="510" y2="217" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="476" y="238" font-size="11" fill="#FF9800">proj</text>

  <!-- perpendicular component (from tip of proj to tip of v2) -->
  <line x1="510" y1="217" x2="548" y2="230" stroke="#E91E63" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- e2: perpendicular unit vector -->
  <line x1="460" y1="270" x2="462" y2="190" stroke="#E91E63" stroke-width="3" marker-end="url(#arr-pink)"/>
  <text x="442" y="187" font-size="13" fill="#E91E63" font-weight="bold">e₂</text>

  <!-- Right-angle mark at origin of e2/e1 region -->
  <rect x="462" y="248" width="11" height="11" fill="none" stroke="#E91E63" stroke-width="1.5"/>

  <!-- ======== PANEL 4: Result ======== -->
  <rect x="620" y="65" width="162" height="225" rx="8" fill="#f7f9ff" stroke="#c5d8f5"/>
  <text x="701" y="90" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Result: ONB</text>

  <!-- e1 result -->
  <line x1="648" y1="145" x2="700" y2="115" stroke="#2196F3" stroke-width="3" marker-end="url(#arr-blue)"/>
  <text x="704" y="113" font-size="12" fill="#2196F3" font-weight="bold">e₁</text>

  <!-- e2 result (perpendicular to e1) -->
  <line x1="648" y1="145" x2="620" y2="100" stroke="#E91E63" stroke-width="3" marker-end="url(#arr-pink)"/>
  <text x="607" y="97" font-size="12" fill="#E91E63" font-weight="bold">e₂</text>

  <!-- e3 result (going into plane symbol — dot in circle) -->
  <circle cx="648" cy="145" r="7" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <circle cx="648" cy="145" r="2.5" fill="#4CAF50"/>
  <text x="660" y="165" font-size="12" fill="#4CAF50" font-weight="bold">e₃ (⊙)</text>

  <!-- right angle between e1 and e2 -->
  <rect x="649" y="130" width="9" height="9" fill="none" stroke="#888" stroke-width="1.2"/>

  <line x1="634" y1="180" x2="768" y2="180" stroke="#ddd"/>

  <text x="701" y="200" text-anchor="middle" font-size="11" fill="#2196F3">eᵢ · eⱼ = 0</text>
  <text x="701" y="218" text-anchor="middle" font-size="11" fill="#555">‖eᵢ‖ = 1</text>
  <text x="701" y="236" text-anchor="middle" font-size="11" fill="#555">span preserved</text>
  <text x="701" y="254" text-anchor="middle" font-size="11" fill="#888">QR: A = QR</text>

  <!-- Bottom label -->
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="#555">Each new basis vector is made perpendicular to all previous ones, then scaled to length 1.</text>
</svg>
