<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Q-table -->
  <rect x="40" y="80" width="220" height="220" rx="8" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="150" y="65" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Q-Table</text>
  <text x="150" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Q(s, a)</text>
  <!-- Table grid -->
  <line x1="40" y1="130" x2="260" y2="130" stroke="#4a90d9" stroke-width="1"/>
  <line x1="40" y1="165" x2="260" y2="165" stroke="#4a90d9" stroke-width="1"/>
  <line x1="40" y1="200" x2="260" y2="200" stroke="#4a90d9" stroke-width="1"/>
  <line x1="40" y1="235" x2="260" y2="235" stroke="#4a90d9" stroke-width="1"/>
  <line x1="130" y1="80" x2="130" y2="300" stroke="#4a90d9" stroke-width="1"/>
  <line x1="195" y1="80" x2="195" y2="300" stroke="#4a90d9" stroke-width="1"/>
  <text x="85" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">State</text>
  <text x="162" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Left</text>
  <text x="228" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Right</text>
  <text x="85" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">s₁</text>
  <text x="162" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">0.8</text>
  <text x="228" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">0.3</text>
  <text x="85" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">s₂</text>
  <text x="162" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">0.2</text>
  <text x="228" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">0.9</text>
  <text x="85" y="222" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">s₃</text>
  <text x="162" y="222" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">0.6</text>
  <text x="228" y="222" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">0.1</text>
  <!-- Bellman update -->
  <rect x="310" y="130" width="440" height="80" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="530" y="155" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Bellman Update</text>
  <text x="530" y="180" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Q(s,a) ← Q(s,a) + α[r + γ·max Q(s',a') − Q(s,a)]</text>
  <!-- Arrows and labels -->
  <text x="350" y="265" font-family="Arial" font-size="12" fill="#555">α = learning rate</text>
  <text x="350" y="285" font-family="Arial" font-size="12" fill="#555">γ = discount factor</text>
  <text x="350" y="305" font-family="Arial" font-size="12" fill="#555">r = immediate reward</text>
  <text x="560" y="265" font-family="Arial" font-size="12" fill="#555">s = current state</text>
  <text x="560" y="285" font-family="Arial" font-size="12" fill="#555">a = action taken</text>
  <text x="560" y="305" font-family="Arial" font-size="12" fill="#555">s' = next state</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Q-Learning</text>
  <text x="150" y="350" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Best action = highest Q value</text>
</svg>
