  <text x="757" y="322" font-size="8" fill="#2D5A8E" font-style="italic">result</text>

  <!-- "approximate vs exact" annotation -->
  <text x="597" y="375" text-anchor="middle" font-size="8" fill="#5C3D1E">greedy layer traversal — fast but //approximate//; recall@k trades speed for accuracy</text>

  <!-- Legend -->
  <circle cx="410" cy="392" r="4" fill="#7C2530"/>
  <text x="418" y="395" font-size="8" fill="#5C3D1E">query</text>
  <circle cx="448" cy="392" r="4" fill="#2D5A8E" fill-opacity="0.75"/>
  <text x="456" y="395" font-size="8" fill="#5C3D1E">k=3 neighbors / ANN result</text>
  <circle cx="570" cy="392" r="4" fill="#B0A090"/>
  <text x="578" y="395" font-size="8" fill="#5C3D1E">dataset points</text>
  <line x1="625" y1="392" x2="645" y2="392" stroke="#B0956A" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="648" y="395" font-size="8" fill="#5C3D1E">partition / graph edges</text>
</svg>
