  <text x="597" y="17" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">APPROXIMATE SEARCH — HNSW LAYERS</text>

  <!-- HNSW layer 0 (bottom — dense) -->
  <rect x="408" y="280" width="370" height="88" rx="4" fill="#EDE5D0" fill-opacity="0.5" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="415" y="295" font-size="8" fill="#7A5230" font-style="italic">layer 0 — dense graph (all nodes)</text>

  <!-- Layer 0 nodes (small, many) -->
  <circle cx="435" cy="320" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="460" cy="310" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="490" cy="330" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="520" cy="305" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="550" cy="325" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="575" cy="310" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="605" cy="330" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
