<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="arr-query" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="390" y1="20" x2="390" y2="385" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ PANEL 1: EXACT KNN — SCATTER WITH KD-TREE PARTITION ══ -->
  <text x="195" y="17" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">EXACT SEARCH — KD-TREE PARTITION</text>

  <!-- Axes -->
  <line x1="30" y1="340" x2="368" y2="340" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>
  <line x1="30" y1="344" x2="30"  y2="30"  stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arr-axis)"/>

  <!-- KD-tree partition lines (light, dashed) -->
  <!-- Vertical split at x=200 (panel-local) -->
  <line x1="200" y1="32" x2="200" y2="340" stroke="#B0956A" stroke-width="0.9" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Horizontal split left half at y=186 -->
  <line x1="30" y1="186" x2="200" y2="186" stroke="#B0956A" stroke-width="0.9" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Horizontal split right half at y=240 -->
  <line x1="200" y1="240" x2="368" y2="240" stroke="#B0956A" stroke-width="0.9" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Vertical split lower-right quad at x=292 -->
  <line x1="292" y1="240" x2="292" y2="340" stroke="#B0956A" stroke-width="0.9" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- KD-tree label -->
  <text x="348" y="44" text-anchor="end" font-size="8" fill="#B0956A" font-style="italic">KD-tree cells</text>

  <!-- Background data points (gray, non-neighbors) -->
  <circle cx="55"  cy="70"  r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="80"  cy="110" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="48"  cy="155" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="100" cy="80"  r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="130" cy="55"  r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="62"  cy="220" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="95"  cy="255" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="135" cy="290" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="50"  cy="305" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="165" cy="130" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="240" cy="60"  r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="280" cy="90"  r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="320" cy="55"  r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="350" cy="100" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="310" cy="145" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="260" cy="165" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="230" cy="260" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="270" cy="295" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="340" cy="270" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="355" cy="310" r="4" fill="#B0A090" fill-opacity="0.5" stroke="#9A8878" stroke-width="0.7"/>

  <!-- k=3 nearest neighbor points (highlighted, blue) -->
  <!-- neighbor 1 at (158, 200) -->
  <circle cx="158" cy="200" r="5.5" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <!-- neighbor 2 at (190, 165) -->
  <circle cx="190" cy="165" r="5.5" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <!-- neighbor 3 at (215, 215) -->
  <circle cx="215" cy="215" r="5.5" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>

  <!-- Search radius circle (dashed, around query) -->
  <circle cx="183" cy="193" r="48" fill="none" stroke="#7C2530" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- Lines from query to k neighbors -->
  <line x1="183" y1="193" x2="158" y2="200" stroke="#7C2530" stroke-width="1.2" opacity="0.7"/>
  <line x1="183" y1="193" x2="190" y2="165" stroke="#7C2530" stroke-width="1.2" opacity="0.7"/>
  <line x1="183" y1="193" x2="215" y2="215" stroke="#7C2530" stroke-width="1.2" opacity="0.7"/>

  <!-- Query point (red star / large circle) -->
  <circle cx="183" cy="193" r="7" fill="#7C2530" stroke="#5C1520" stroke-width="1.5"/>

  <!-- Query label -->
  <text x="183" y="183" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">query q</text>

  <!-- k=3 label -->
  <text x="228" y="210" font-size="8.5" fill="#2D5A8E" font-style="italic">k=3 nearest</text>
