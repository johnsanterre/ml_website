  <circle cx="660" cy="325" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="690" cy="312" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="720" cy="330" r="3.5" fill="#B0A090" stroke="#9A8878" stroke-width="0.6"/>
  <circle cx="748" cy="315" r="3.5" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1"/> <!-- ANN result -->
  <!-- Layer 0 edges (light) -->
  <line x1="435" y1="320" x2="460" y2="310" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="460" y1="310" x2="490" y2="330" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="490" y1="330" x2="520" y2="305" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="520" y1="305" x2="550" y2="325" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="550" y1="325" x2="575" y2="310" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="575" y1="310" x2="605" y2="330" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="605" y1="330" x2="635" y2="308" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="635" y1="308" x2="660" y2="325" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="660" y1="325" x2="690" y2="312" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="690" y1="312" x2="720" y2="330" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>
  <line x1="720" y1="330" x2="748" y2="315" stroke="#C4A87A" stroke-width="0.7" opacity="0.5"/>

  <!-- HNSW layer 1 (middle — sparser) -->
  <rect x="408" y="185" width="370" height="82" rx="4" fill="#EDE5D0" fill-opacity="0.35" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="415" y="200" font-size="8" fill="#7A5230" font-style="italic">layer 1 — sparse graph (subset)</text>

  <circle cx="460" cy="230" r="4" fill="#B0A090" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="520" cy="218" r="4" fill="#B0A090" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="575" cy="235" r="4" fill="#B0A090" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="635" cy="220" r="4" fill="#B0A090" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="690" cy="238" r="4" fill="#B0A090" stroke="#9A8878" stroke-width="0.7"/>
  <circle cx="748" cy="222" r="4" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1"/>
  <line x1="460" y1="230" x2="520" y2="218" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <line x1="520" y1="218" x2="575" y2="235" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <line x1="575" y1="235" x2="635" y2="220" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <line x1="635" y1="220" x2="690" y2="238" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <line x1="690" y1="238" x2="748" y2="222" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>

  <!-- HNSW layer 2 (top — very sparse entry) -->
  <rect x="408" y="100" width="370" height="72" rx="4" fill="#EDE5D0" fill-opacity="0.2" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="415" y="115" font-size="8" fill="#7A5230" font-style="italic">layer 2 — entry point (coarsest)</text>

  <circle cx="520" cy="140" r="5" fill="#A07840" stroke="#7A5230" stroke-width="1"/>
  <circle cx="690" cy="136" r="5" fill="#A07840" stroke="#7A5230" stroke-width="1"/>
  <line x1="520" y1="140" x2="690" y2="136" stroke="#C4A87A" stroke-width="1.2" opacity="0.7"/>

