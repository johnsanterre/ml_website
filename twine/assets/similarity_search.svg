  <circle cx="597" cy="55" r="7" fill="#7C2530" stroke="#5C1520" stroke-width="1.5"/>
  <text x="597" y="45" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">query q</text>
  <line x1="597" y1="62" x2="597" y2="98" stroke="#7C2530" stroke-width="1.4" stroke-dasharray="3,2" marker-end="url(#arr-query)"/>

  <!-- Traversal arrows (red, showing greedy descent through layers) -->
  <line x1="597" y1="100" x2="523" y2="138" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-query)" opacity="0.8"/>
  <line x1="523" y1="140" x2="523" y2="183" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-query)" opacity="0.8"/>
  <line x1="523" y1="185" x2="523" y2="215" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-query)" opacity="0.8"/>
  <line x1="523" y1="218" x2="637" y2="218" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-query)" opacity="0.8"/>
  <line x1="637" y1="220" x2="637" y2="278" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-query)" opacity="0.8"/>
  <line x1="637" y1="280" x2="750" y2="313" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-query)" opacity="0.8"/>

  <!-- ANN result label -->
