  <text x="84" y="175" text-anchor="middle" font-size="8" fill="#5C3D1E" font-weight="bold">VAL</text>
  <rect x="143" y="158" width="6"  height="26" rx="1" fill="#7C2530"/>
  <rect x="149" y="158" width="18" height="26" rx="1" fill="#4A7C59"/>
  <rect x="176" y="158" width="6"  height="26" rx="1" fill="#7C2530"/>
  <rect x="182" y="158" width="18" height="26" rx="1" fill="#4A7C59"/>
  <rect x="209" y="158" width="6"  height="26" rx="1" fill="#7C2530"/>
  <rect x="215" y="158" width="18" height="26" rx="1" fill="#4A7C59"/>
  <rect x="242" y="158" width="6"  height="26" rx="1" fill="#7C2530"/>
  <rect x="248" y="158" width="18" height="26" rx="1" fill="#4A7C59"/>
