  <text x="75" y="99" text-anchor="middle" font-size="8" fill="#FDFAF4" font-weight="bold">VAL</text>
  <!-- TRAIN blocks 2-4: balanced -->
  <rect x="124" y="82" width="6"  height="26" rx="1" fill="#7C2530"/>
