  <rect x="118" y="315" width="240" height="14" fill="#4A7C59" rx="2"/>
  <text x="78"  y="325" text-anchor="middle" font-size="8" fill="#FDFAF4">25% A</text>
  <text x="238" y="325" text-anchor="middle" font-size="8" fill="#FDFAF4">75% B</text>

  <!-- ═══ RIGHT PANEL: Stratified K-Fold ═══ -->
  <rect x="415" y="10" width="375" height="380" fill="#FAF7F0" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="602" y="32" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold" letter-spacing="0.5">STRATIFIED 4-FOLD</text>
  <text x="602" y="46" text-anchor="middle" font-size="9" fill="#4A7C59" font-style="italic">class ratios preserved in every fold</text>

  <!-- Class legend right -->
  <rect x="433" y="56" width="10" height="10" fill="#7C2530" rx="2"/>
  <text x="447" y="65" font-size="8.5" fill="#5C3D1E">Class A (minority, 25%)</text>
  <rect x="560" y="56" width="10" height="10" fill="#4A7C59" rx="2"/>
  <text x="574" y="65" font-size="8.5" fill="#5C3D1E">Class B (majority, 75%)</text>

  <!-- Row labels (right) -->
  <text x="425" y="110" font-size="9" fill="#6B5D4F" text-anchor="middle" transform="rotate(-90,425,160)">fold</text>

  <!-- helper macro: each stratified fold has 1 A + 3 B in val, 3 A + 9 B in train -->

  <!-- ── Stratified Fold 1 ── -->
  <!-- VAL: 1 A + 3 B (25/75 ratio) -->
  <rect x="443" y="82" width="14" height="26" rx="2" fill="#7C2530"/>
  <rect x="457" y="82" width="42" height="26" rx="2" fill="#4A7C59"/>
  <rect x="440" y="79" width="62" height="32" fill="none" stroke="#4A7C59" stroke-width="1.5" stroke-dasharray="3,2" rx="3"/>
  <text x="471" y="99" text-anchor="middle" font-size="8" fill="#FDFAF4" font-weight="bold">VAL</text>
  <!-- TRAIN: 3 A + 9 B across 3 groups -->
  <rect x="512" y="82" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="526" y="82" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="574" y="82" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="588" y="82" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="636" y="82" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="650" y="82" width="38" height="26" rx="1" fill="#4A7C59"/>
  <text x="598" y="97" text-anchor="middle" font-size="8" fill="#5C3D1E">TRAIN</text>
  <text x="700" y="92" font-size="8.5" fill="#4A7C59" font-weight="bold">VAL: 25% A</text>
  <text x="700" y="103" font-size="7.5" fill="#9B8B77">✓ preserved</text>

  <!-- ── Stratified Fold 2 ── -->
  <rect x="443" y="120" width="14" height="26" rx="2" fill="#7C2530"/>
  <rect x="457" y="120" width="42" height="26" rx="2" fill="#4A7C59"/>
  <rect x="440" y="117" width="62" height="32" fill="none" stroke="#4A7C59" stroke-width="1.5" stroke-dasharray="3,2" rx="3"/>
  <text x="471" y="137" text-anchor="middle" font-size="8" fill="#FDFAF4" font-weight="bold">VAL</text>
  <rect x="512" y="120" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="526" y="120" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="574" y="120" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="588" y="120" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="636" y="120" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="650" y="120" width="38" height="26" rx="1" fill="#4A7C59"/>
  <text x="598" y="135" text-anchor="middle" font-size="8" fill="#5C3D1E">TRAIN</text>
  <text x="700" y="130" font-size="8.5" fill="#4A7C59" font-weight="bold">VAL: 25% A</text>
  <text x="700" y="141" font-size="7.5" fill="#9B8B77">✓ preserved</text>

  <!-- ── Stratified Fold 3 ── -->
  <rect x="443" y="158" width="14" height="26" rx="2" fill="#7C2530"/>
  <rect x="457" y="158" width="42" height="26" rx="2" fill="#4A7C59"/>
  <rect x="440" y="155" width="62" height="32" fill="none" stroke="#4A7C59" stroke-width="1.5" stroke-dasharray="3,2" rx="3"/>
  <text x="471" y="175" text-anchor="middle" font-size="8" fill="#FDFAF4" font-weight="bold">VAL</text>
  <rect x="512" y="158" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="526" y="158" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="574" y="158" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="588" y="158" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="636" y="158" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="650" y="158" width="38" height="26" rx="1" fill="#4A7C59"/>
  <text x="598" y="173" text-anchor="middle" font-size="8" fill="#5C3D1E">TRAIN</text>
  <text x="700" y="168" font-size="8.5" fill="#4A7C59" font-weight="bold">VAL: 25% A</text>
  <text x="700" y="179" font-size="7.5" fill="#9B8B77">✓ preserved</text>

  <!-- ── Stratified Fold 4 ── -->
  <rect x="443" y="196" width="14" height="26" rx="2" fill="#7C2530"/>
  <rect x="457" y="196" width="42" height="26" rx="2" fill="#4A7C59"/>
  <rect x="440" y="193" width="62" height="32" fill="none" stroke="#4A7C59" stroke-width="1.5" stroke-dasharray="3,2" rx="3"/>
