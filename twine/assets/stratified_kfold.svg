  <rect x="136" y="196" width="18" height="26" rx="1" fill="#4A7C59"/>
  <rect x="163" y="196" width="6"  height="26" rx="1" fill="#7C2530"/>
  <rect x="169" y="196" width="18" height="26" rx="1" fill="#4A7C59"/>
