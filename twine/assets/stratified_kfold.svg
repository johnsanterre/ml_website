  <text x="36" y="276" font-size="8" fill="#5C3D1E">Class proportions vary wildly between folds — fold scores are not</text>
  <text x="36" y="287" font-size="8" fill="#5C3D1E">comparable, and rare-class performance is unreliably estimated.</text>

