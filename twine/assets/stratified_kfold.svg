  <rect x="512" y="196" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="526" y="196" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="574" y="196" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="588" y="196" width="38" height="26" rx="1" fill="#4A7C59"/>
  <rect x="636" y="196" width="14" height="26" rx="1" fill="#7C2530"/>
  <rect x="650" y="196" width="38" height="26" rx="1" fill="#4A7C59"/>
  <text x="598" y="211" text-anchor="middle" font-size="8" fill="#5C3D1E">TRAIN</text>
  <text x="700" y="206" font-size="8.5" fill="#4A7C59" font-weight="bold">VAL: 25% A</text>
  <text x="700" y="217" font-size="7.5" fill="#9B8B77">✓ preserved</text>

  <!-- Row labels -->
  <text x="427" y="99"  font-size="8" fill="#6B5D4F">F1</text>
  <text x="427" y="137" font-size="8" fill="#6B5D4F">F2</text>
  <text x="427" y="175" font-size="8" fill="#6B5D4F">F3</text>
  <text x="427" y="213" font-size="8" fill="#6B5D4F">F4</text>

  <!-- Annotation arrow (right) -->
  <line x1="471" y1="79" x2="471" y2="68" stroke="#4A7C59" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="471" y="66" text-anchor="middle" font-size="8" fill="#4A7C59">held-out val fold</text>

  <!-- Success box -->
  <rect x="433" y="248" width="355" height="40" fill="#EFF6F1" stroke="#4A7C59" stroke-width="1" rx="3"/>
  <text x="441" y="263" font-size="8.5" fill="#4A7C59" font-weight="bold">Solution:</text>
  <text x="441" y="276" font-size="8" fill="#5C3D1E">Every fold mirrors the original class balance — each val score measures</text>
  <text x="441" y="287" font-size="8" fill="#5C3D1E">the same problem, so averaging them is meaningful and fair.</text>

  <!-- Dataset bar (right) -->
  <text x="602" y="310" text-anchor="middle" font-size="8.5" fill="#5C3D1E">Full dataset class ratio</text>
  <rect x="443" y="315" width="80" height="14" fill="#7C2530" rx="2"/>
  <rect x="523" y="315" width="240" height="14" fill="#4A7C59" rx="2"/>
  <text x="483" y="325" text-anchor="middle" font-size="8" fill="#FDFAF4">25% A</text>
  <text x="643" y="325" text-anchor="middle" font-size="8" fill="#FDFAF4">75% B</text>

  <!-- Divider line -->
  <line x1="400" y1="20" x2="400" y2="380" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Bottom caption -->
  <text x="400" y="360" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">
    Stratification sorts examples by class label, then interleaves them into folds — guaranteeing each fold is a miniature copy of the full dataset.
  </text>
  <text x="400" y="375" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-weight="bold">
    Especially critical when any class represents fewer than 10–20% of the data.
  </text>
</svg>
