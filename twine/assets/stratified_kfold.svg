  <text x="340" y="168" font-size="8.5" fill="#5C3D1E">VAL: ~25% A</text>
  <text x="340" y="179" font-size="7.5" fill="#9B8B77">ok by chance</text>

  <!-- ── Regular Fold 4 ── (all A) -->
  <rect x="38" y="196" width="22" height="26" rx="2" fill="#7C2530"/>
