  <!-- Row labels -->
  <text x="22" y="99"  font-size="8" fill="#6B5D4F">F1</text>
  <text x="22" y="137" font-size="8" fill="#6B5D4F">F2</text>
  <text x="22" y="175" font-size="8" fill="#6B5D4F">F3</text>
