<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Residual Block: Learning the Correction F(x)</text>
  <defs>
    <marker id="arrr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="arrrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4A7C59"/>
    </marker>
  </defs>
  <!-- Input -->
  <rect x="60" y="160" width="80" height="50" rx="8" fill="#2C5F8A"/>
  <text x="100" y="190" text-anchor="middle" fill="white" font-size="14" font-weight="bold">x</text>
  <!-- Layer 1 -->
  <rect x="220" y="140" width="120" height="40" rx="6" fill="#4A7C59"/>
  <text x="280" y="165" text-anchor="middle" fill="white" font-size="12">Conv + BN + ReLU</text>
  <!-- Layer 2 -->
  <rect x="220" y="210" width="120" height="40" rx="6" fill="#4A7C59"/>
  <text x="280" y="235" text-anchor="middle" fill="white" font-size="12">Conv + BN</text>
  <!-- F(x) label -->
  <text x="280" y="280" text-anchor="middle" fill="#4A7C59" font-size="14">F(x) = residual</text>
  <!-- Addition -->
  <circle cx="500" cy="190" r="25" fill="white" stroke="#E07B39" stroke-width="2.5"/>
  <text x="500" y="197" text-anchor="middle" fill="#E07B39" font-size="22" font-weight="bold">+</text>
  <!-- Output -->
  <rect x="590" y="160" width="120" height="50" rx="8" fill="#C0392B"/>
  <text x="650" y="183" text-anchor="middle" fill="white" font-size="13">F(x) + x</text>
  <text x="650" y="203" text-anchor="middle" fill="white" font-size="11">→ ReLU →</text>
  <!-- Main path arrows -->
  <line x1="140" y1="175" x2="178" y2="165" stroke="#555" stroke-width="2" marker-end="url(#arrr)"/>
  <line x1="140" y1="190" x2="178" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrr)"/>
  <line x1="340" y1="160" x2="278" y2="215" stroke="#555" stroke-width="2" marker-end="url(#arrr)"/>
  <line x1="340" y1="230" x2="472" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrr)"/>
  <line x1="525" y1="190" x2="588" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrr)"/>
  <!-- Skip connection -->
  <path d="M 100,160 Q 100,90 500,90 Q 500,90 500,164" fill="none" stroke="#4A7C59" stroke-width="2.5" stroke-dasharray="0" marker-end="url(#arrrg)"/>
  <text x="300" y="75" text-anchor="middle" fill="#4A7C59" font-size="14" font-weight="bold">Skip connection (identity shortcut)</text>
  <!-- Key insight -->
  <text x="400" y="325" text-anchor="middle" fill="#555" font-size="13">Learn correction F(x) = H(x) − x  rather than full mapping H(x)</text>
  <text x="400" y="348" text-anchor="middle" fill="#888" font-size="12">Gradient flows directly through skip →  enables 100+ layer networks</text>
</svg>