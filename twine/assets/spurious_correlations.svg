<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Spurious Correlation</text>

  <!-- Confounder: Summer / Heat -->
  <ellipse cx="400" cy="110" rx="105" ry="42" fill="#fff3cd" stroke="#e6a817" stroke-width="2.5"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#b07800">Confounder</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="13" fill="#7a5200">Summer Heat</text>

  <!-- Ice Cream Sales box -->
  <rect x="60" y="230" width="190" height="64" rx="10" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="155" y="257" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#4a90d9">Ice Cream Sales</text>
  <text x="155" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">↑ in summer</text>

  <!-- Drowning Rates box -->
  <rect x="550" y="230" width="190" height="64" rx="10" fill="#fdecea" stroke="#e05252" stroke-width="2"/>
  <text x="645" y="257" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c0392b">Drowning Rates</text>
  <text x="645" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">↑ in summer</text>

  <!-- Causal arrows: Confounder → Ice Cream -->
  <defs>
    <marker id="arr-solid" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e6a817"/>
    </marker>
    <marker id="arr-dash" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Confounder to Ice Cream -->
  <line x1="310" y1="140" x2="215" y2="228" stroke="#e6a817" stroke-width="2.5" marker-end="url(#arr-solid)"/>
  <text x="228" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#b07800" transform="rotate(-33,228,190)">causes</text>

  <!-- Confounder to Drowning -->
  <line x1="490" y1="140" x2="586" y2="228" stroke="#e6a817" stroke-width="2.5" marker-end="url(#arr-solid)"/>
  <text x="568" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#b07800" transform="rotate(33,568,190)">causes</text>

  <!-- Spurious dashed arrow: Ice Cream ↔ Drowning -->
  <line x1="252" y1="263" x2="548" y2="263" stroke="#aaa" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arr-dash)"/>
  <rect x="305" y="237" width="190" height="22" rx="5" fill="white" opacity="0.92"/>
  <text x="400" y="253" text-anchor="middle" font-family="Arial" font-size="12" font-style="italic" fill="#888">spurious correlation (r ≈ 0.9)</text>

  <!-- No direct causal arrow label -->
  <text x="400" y="312" text-anchor="middle" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">no causal link</text>

  <!-- Legend -->
  <line x1="60" y1="368" x2="100" y2="368" stroke="#e6a817" stroke-width="2.5"/>
  <text x="108" y="372" font-family="Arial" font-size="12" fill="#555">causal effect</text>
  <line x1="220" y1="368" x2="260" y2="368" stroke="#aaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="268" y="372" font-family="Arial" font-size="12" fill="#555">spurious correlation</text>
</svg>
