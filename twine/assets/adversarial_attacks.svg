<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Adversarial Attacks: Imperceptible Perturbations</text>
  <defs>
    <marker id="arra" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#C0392B"/>
    </marker>
  </defs>
  <!-- Clean image -->
  <rect x="40" y="90" width="160" height="160" rx="8" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="2"/>
  <text x="120" y="160" text-anchor="middle" fill="#2C5F8A" font-size="40">🐱</text>
  <text x="120" y="200" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">Clean Image</text>
  <text x="120" y="268" text-anchor="middle" fill="#4A7C59" font-size="14">Model: "cat" ✓</text>
  <!-- Plus sign -->
  <text x="225" y="178" text-anchor="middle" fill="#333" font-size="36" font-weight="bold">+</text>
  <!-- Perturbation -->
  <rect x="260" y="90" width="160" height="160" rx="8" fill="#FFF8F0" stroke="#E07B39" stroke-width="2"/>
  <text x="340" y="145" text-anchor="middle" fill="#E07B39" font-size="13">ε · sign(∇ₓ L)</text>
  <text x="340" y="170" text-anchor="middle" fill="#E07B39" font-size="11">(FGSM perturbation)</text>
  <!-- Grid of small noise squares -->
  <rect x="285" y="185" width="14" height="14" fill="#E07B39" fill-opacity="0.3"/>
  <rect x="305" y="185" width="14" height="14" fill="#E07B39" fill-opacity="0.6"/>
  <rect x="325" y="185" width="14" height="14" fill="#E07B39" fill-opacity="0.2"/>
  <rect x="345" y="185" width="14" height="14" fill="#E07B39" fill-opacity="0.5"/>
  <rect x="365" y="185" width="14" height="14" fill="#E07B39" fill-opacity="0.4"/>
  <rect x="385" y="185" width="14" height="14" fill="#E07B39" fill-opacity="0.7"/>
  <text x="340" y="268" text-anchor="middle" fill="#E07B39" font-size="14">Imperceptible noise</text>
  <!-- Equals sign -->
  <text x="445" y="178" text-anchor="middle" fill="#333" font-size="36" font-weight="bold">=</text>
  <!-- Adversarial image -->
  <rect x="460" y="90" width="160" height="160" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2"/>
  <text x="540" y="160" text-anchor="middle" fill="#2C5F8A" font-size="40">🐱</text>
  <text x="540" y="200" text-anchor="middle" fill="#C0392B" font-size="14" font-weight="bold">Adversarial Image</text>
  <text x="540" y="268" text-anchor="middle" fill="#C0392B" font-size="14">Model: "ostrich" ✗</text>
  <!-- Looks same to human -->
  <line x1="120" y1="260" x2="540" y2="260" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="330" y="320" text-anchor="middle" fill="#888" font-size="13">Looks identical to humans — fools the model</text>
  <!-- FGSM formula -->
  <text x="680" y="160" text-anchor="middle" fill="#555" font-size="13">x_adv = x + ε·sign(∇ₓL)</text>
  <text x="680" y="185" text-anchor="middle" fill="#888" font-size="12">ε = perturbation budget</text>
  <text x="680" y="210" text-anchor="middle" fill="#888" font-size="12">L = loss function</text>
</svg>