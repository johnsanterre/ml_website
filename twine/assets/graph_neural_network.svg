<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Graph structure -->
  <text x="155" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">INPUT GRAPH</text>

  <!-- Edges -->
  <line x1="80" y1="120" x2="150" y2="200" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="80" y1="120" x2="60" y2="240" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="150" y1="200" x2="220" y2="130" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="150" y1="200" x2="60" y2="240" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="150" y1="200" x2="190" y2="295" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="220" y1="130" x2="270" y2="225" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="270" y1="225" x2="190" y2="295" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Nodes -->
  <circle cx="80" cy="120" r="18" fill="#FDF0F0" stroke="#7C2530" stroke-width="2"/>
  <text x="80" y="125" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">A</text>

  <circle cx="150" cy="200" r="18" fill="#FDF0F0" stroke="#7C2530" stroke-width="2.5"/>
  <text x="150" y="205" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">B</text>

  <circle cx="60" cy="240" r="18" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="2"/>
  <text x="60" y="245" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">C</text>

  <circle cx="220" cy="130" r="18" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="2"/>
  <text x="220" y="135" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">D</text>

  <circle cx="270" cy="225" r="18" fill="#FEF9EE" stroke="#C4A87A" stroke-width="2"/>
  <text x="270" y="230" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">E</text>

  <circle cx="190" cy="295" r="18" fill="#FEF9EE" stroke="#C4A87A" stroke-width="2"/>
  <text x="190" y="300" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">F</text>

  <text x="155" y="370" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" text-anchor="middle">nodes carry feature vectors</text>

  <!-- Divider -->
  <line x1="310" y1="30" x2="310" y2="380" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 2: Message Passing -->
  <text x="490" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">MESSAGE PASSING (1 LAYER)</text>

  <!-- Central node -->
  <circle cx="490" cy="195" r="22" fill="#FDF0F0" stroke="#7C2530" stroke-width="2.5"/>
  <text x="490" y="200" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">v</text>

  <!-- Neighbor nodes with arrows -->
  <circle cx="390" cy="130" r="16" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="390" y="134" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">u₁</text>

  <circle cx="390" cy="260" r="16" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="390" y="264" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">u₂</text>

  <circle cx="590" cy="130" r="16" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="590" y="134" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">u₃</text>

  <circle cx="590" cy="260" r="16" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="590" y="264" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">u₄</text>

  <!-- Message arrows -->
  <line x1="406" y1="140" x2="468" y2="178" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="465,176 471,184 473,175" fill="#2D5A8E"/>

  <line x1="406" y1="250" x2="468" y2="212" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="465,214 471,206 473,215" fill="#2D5A8E"/>

  <line x1="574" y1="140" x2="512" y2="178" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="515,176 509,184 507,175" fill="#2D5A8E"/>

  <line x1="574" y1="250" x2="512" y2="212" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="515,214 509,206 507,215" fill="#2D5A8E"/>

  <!-- Message labels -->
  <text x="428" y="155" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">msg</text>
  <text x="428" y="240" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">msg</text>
  <text x="552" y="155" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">msg</text>
  <text x="552" y="240" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">msg</text>

  <!-- Aggregate + update box -->
  <rect x="430" y="235" width="120" height="40" fill="#F8F4EE" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="490" y="252" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">AGG → UPDATE</text>
  <text x="490" y="267" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">h'ᵥ = σ(W·[hᵥ, Σhᵤ])</text>

  <!-- Divider -->
  <line x1="650" y1="30" x2="650" y2="380" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Panel 3: Stacked layers -->
  <text x="725" y="28" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">LAYERS → RECEPTIVE FIELD</text>

  <!-- Layer 0 -->
  <rect x="662" y="55" width="126" height="36" fill="#FDF0F0" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="725" y="78" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Layer 0: 1-hop neighbors</text>

  <line x1="725" y1="91" x2="725" y2="106" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="721,103 725,110 729,103" fill="#5C3D1E"/>

  <!-- Layer 1 -->
  <rect x="662" y="110" width="126" height="36" fill="#F0F4FA" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="725" y="133" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Layer 1: 2-hop neighbors</text>

  <line x1="725" y1="146" x2="725" y2="161" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="721,158 725,165 729,158" fill="#5C3D1E"/>

  <!-- Layer 2 -->
  <rect x="662" y="165" width="126" height="36" fill="#FEF9EE" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="725" y="188" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Layer 2: 3-hop neighbors</text>

  <line x1="725" y1="201" x2="725" y2="216" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="721,213 725,220 729,213" fill="#5C3D1E"/>

  <!-- Readout -->
  <rect x="662" y="220" width="126" height="36" fill="#F5F0E8" stroke="#5C3D1E" stroke-width="1.5" rx="3"/>
  <text x="725" y="243" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Readout / Pooling</text>

  <line x1="725" y1="256" x2="725" y2="271" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="721,268 725,275 729,268" fill="#5C3D1E"/>

  <rect x="672" y="275" width="106" height="36" fill="#5C3D1E" stroke="#5C3D1E" stroke-width="1" rx="3"/>
  <text x="725" y="298" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Prediction</text>

  <text x="725" y="345" font-family="Georgia, serif" font-size="9" fill="#6B5D4F" text-anchor="middle">More layers = wider view</text>
  <text x="725" y="362" font-family="Georgia, serif" font-size="9" fill="#6B5D4F" text-anchor="middle">of the graph structure</text>
</svg>
