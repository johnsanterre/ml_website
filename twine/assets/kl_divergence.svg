<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">KL Divergence: D_KL(P ‖ Q)</text>
  <!-- Axes -->
  <line x1="80" y1="280" x2="700" y2="280" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="70" x2="80" y2="280" stroke="#555" stroke-width="2"/>
  <text x="710" y="285" fill="#555" font-size="13">x</text>
  <!-- P curve -->
  <path d="M 100,278 C 180,270 240,230 320,160 C 360,120 380,100 410,95 C 440,92 460,105 490,140 C 530,190 570,250 650,278" fill="none" stroke="#2C5F8A" stroke-width="3"/>
  <!-- Q curve (shifted right, wider) -->
  <path d="M 100,278 C 200,275 300,265 400,240 C 450,225 490,200 530,175 C 570,152 600,145 650,150 C 670,152 690,165 700,180" fill="none" stroke="#C0392B" stroke-width="3"/>
  <!-- Shaded KL area -->
  <path d="M 200,278 C 240,270 300,240 360,185 C 390,155 410,135 430,125 L 430,278 Z" fill="#E07B39" fill-opacity="0.2"/>
  <!-- Labels -->
  <text x="390" y="75" fill="#2C5F8A" font-size="15" font-weight="bold">P (true distribution)</text>
  <text x="560" y="130" fill="#C0392B" font-size="15" font-weight="bold">Q (approx.)</text>
  <!-- KL label -->
  <text x="320" y="230" fill="#E07B39" font-size="14">D_KL(P‖Q)</text>
  <!-- Formula -->
  <text x="400" y="320" text-anchor="middle" fill="#555" font-size="13">D_KL(P‖Q) = Σ P(x) log[P(x)/Q(x)]  ≥ 0</text>
  <!-- Legend -->
  <line x1="90" y1="310" x2="120" y2="310" stroke="#2C5F8A" stroke-width="3"/>
  <text x="130" y="315" fill="#2C5F8A" font-size="12">P</text>
  <line x1="160" y1="310" x2="190" y2="310" stroke="#C0392B" stroke-width="3"/>
  <text x="200" y="315" fill="#C0392B" font-size="12">Q</text>
</svg>