<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#3A3028" letter-spacing="0.5">Convex vs. Concave Functions</text>

  <!-- ══ DIVIDER ══ -->
  <line x1="400" y1="48" x2="400" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- LEFT PANEL: CONVEX (bowl) -->
  <!-- ══════════════════════════════════════════════════ -->
  <text x="200" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2D5A8E" letter-spacing="1">CONVEX</text>

  <!-- Axes -->
  <defs>
    <marker id="arr-axis-l" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#B8A880"/>
    </marker>
    <marker id="arr-axis-r" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#B8A880"/>
    </marker>
    <marker id="arr-chord-l" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C05020"/>
    </marker>
    <marker id="arr-min" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#27A060"/>
    </marker>
  </defs>

  <line x1="40" y1="310" x2="370" y2="310" stroke="#B8A880" stroke-width="1.5" marker-end="url(#arr-axis-l)"/>
  <line x1="55" y1="320" x2="55"  y2="68"  stroke="#B8A880" stroke-width="1.5" marker-end="url(#arr-axis-l)"/>
  <text x="205" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8A7A6A">x</text>
  <text x="40"  y="192" font-family="Arial,sans-serif" font-size="10" fill="#8A7A6A" text-anchor="middle" transform="rotate(-90,40,192)">f(x)</text>

  <!-- Convex curve: bowl / parabola — f(x) = (x-190)^2 / 700 + 85, scaled to SVG coords -->
  <!-- Points: x=75→f≈303, x=120→f≈237, x=190→f≈88, x=260→f≈237, x=345→f≈303 -->
  <path d="M 75,303 Q 130,80 190,88 Q 250,80 345,303"
        fill="none" stroke="#2D5A8E" stroke-width="3" stroke-linejoin="round"/>

  <!-- Chord from (75,303) to (345,303) — lies ABOVE the curve minimum, below the endpoints -->
  <!-- Actually the chord connects two points on the curve: (90,240) to (310,240) -->
  <!-- Chord for convex: connect x=90 and x=310 on curve. y≈(90-190)^2/580+88=105, (310-190)^2/580+88=112 -->
  <!-- Let's use cleaner anchor points: (80,286) and (330,286) on the curve -->
  <line x1="80" y1="286" x2="330" y2="286" stroke="#C05020" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Dots on curve at chord endpoints -->
  <circle cx="80"  cy="286" r="5" fill="#C05020"/>
  <circle cx="330" cy="286" r="5" fill="#C05020"/>

  <!-- Chord label: "chord lies ABOVE curve" -->
  <text x="205" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#C05020">chord lies above curve</text>

  <!-- Global minimum marker -->
  <circle cx="190" cy="88" r="7" fill="#27A060"/>
  <line x1="190" y1="96" x2="190" y2="115" stroke="#27A060" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="190" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#27A060" font-weight="bold">global min</text>

  <!-- Ball rolling down into bowl -->
  <circle cx="110" cy="244" r="10" fill="#2D5A8E" opacity="0.7"/>
  <!-- Arrow pointing right-downward along curve -->
  <path d="M 120,242 Q 148,170 168,122" fill="none" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="4,2" marker-end="url(#arr-min)"/>

  <!-- Implication label -->
  <rect x="55" y="338" width="290" height="22" fill="#E8F0F8" rx="4" stroke="#2D5A8E" stroke-width="1"/>
  <text x="200" y="353" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2D5A8E" font-weight="bold">Any local min = global min → easy to minimize</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: CONCAVE (hill) -->
  <!-- ══════════════════════════════════════════════════ -->
  <text x="600" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#7C2530" letter-spacing="1">CONCAVE</text>

  <!-- Axes -->
  <line x1="430" y1="310" x2="760" y2="310" stroke="#B8A880" stroke-width="1.5" marker-end="url(#arr-axis-r)"/>
  <line x1="445" y1="320" x2="445" y2="68"  stroke="#B8A880" stroke-width="1.5" marker-end="url(#arr-axis-r)"/>
  <text x="597" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8A7A6A">x</text>
  <text x="428" y="192" font-family="Arial,sans-serif" font-size="10" fill="#8A7A6A" text-anchor="middle" transform="rotate(-90,428,192)">f(x)</text>

  <!-- Concave curve: hill / inverted parabola — mirror of convex -->
  <path d="M 465,303 Q 525,78 580,72 Q 635,78 735,303"
        fill="none" stroke="#7C2530" stroke-width="3" stroke-linejoin="round"/>

  <!-- Chord for concave: lies BELOW the curve -->
  <line x1="470" y1="286" x2="720" y2="286" stroke="#C05020" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="470" cy="286" r="5" fill="#C05020"/>
  <circle cx="720" cy="286" r="5" fill="#C05020"/>

  <!-- Chord label -->
  <text x="595" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#C05020">chord lies below curve</text>

  <!-- Global maximum marker -->
  <circle cx="580" cy="72" r="7" fill="#27A060"/>
  <line x1="580" y1="80" x2="580" y2="100" stroke="#27A060" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="580" y="113" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#27A060" font-weight="bold">global max</text>

  <!-- Ball rolling up and then perching at peak -->
  <circle cx="670" cy="218" r="10" fill="#7C2530" opacity="0.7"/>
  <path d="M 660,216 Q 632,152 604,104" fill="none" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="4,2" marker-end="url(#arr-min)"/>

  <!-- Implication label -->
  <rect x="435" y="338" width="310" height="22" fill="#F8ECEA" rx="4" stroke="#7C2530" stroke-width="1"/>
  <text x="590" y="353" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7C2530" font-weight="bold">Any local max = global max → easy to maximize</text>

  <!-- ══ BOTTOM FORMULA STRIP ══ -->
  <text x="200" y="388" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" fill="#6B5D4F">
    Convex: f(λx+(1−λ)y) ≤ λf(x)+(1−λ)f(y)
  </text>
  <text x="600" y="388" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" fill="#6B5D4F">
    Concave: f(λx+(1−λ)y) ≥ λf(x)+(1−λ)f(y)
  </text>
</svg>
