<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL LEFT: Data Split ══ -->
  <text x="195" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">DATASET SPLITS</text>

  <!-- Full dataset bar -->
  <text x="32" y="44" font-size="9" fill="#6B5D4F">Full Dataset</text>
  <rect x="32" y="50" width="326" height="28" rx="3" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="195" y="69" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">n samples</text>

  <!-- Split arrow -->
  <line x1="195" y1="79" x2="195" y2="96" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-brown)"/>

  <!-- Training bar: ~70% = 228px -->
  <rect x="32" y="103" width="228" height="30" rx="3" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="146" y="119" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Train</text>
  <text x="146" y="130" text-anchor="middle" font-size="8" fill="#6B5D4F">~70%</text>

  <!-- Validation bar: ~15% = 49px -->
  <rect x="264" y="103" width="49" height="30" rx="3" fill="#C4A87A" stroke="#9B7040" stroke-width="1.5"/>
  <text x="288" y="119" text-anchor="middle" font-size="9" fill="#FDFAF4" font-weight="bold">Val</text>
  <text x="288" y="130" text-anchor="middle" font-size="8" fill="#FDFAF4">15%</text>

  <!-- Test bar: ~15% = 49px -->
  <rect x="317" y="103" width="41" height="30" rx="3" fill="#7C2530" stroke="#5A1A20" stroke-width="1.5"/>
  <text x="337" y="119" text-anchor="middle" font-size="9" fill="#FDFAF4" font-weight="bold">Test</text>
  <text x="337" y="130" text-anchor="middle" font-size="8" fill="#FDFAF4">15%</text>

  <!-- Lock annotation -->
  <text x="337" y="145" text-anchor="middle" font-size="7.5" fill="#7C2530">sealed</text>

  <!-- ══ PANEL LEFT BOTTOM: Optimism Gap Diagram ══ -->
  <text x="195" y="174" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">THE OPTIMISM GAP</text>

  <!-- Axes -->
  <line x1="42" y1="330" x2="350" y2="330" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <line x1="42" y1="330" x2="42"  y2="185" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <text x="196" y="345" text-anchor="middle" font-size="9" fill="#6B5D4F">model complexity</text>
  <text x="22" y="260" font-size="9" fill="#6B5D4F" text-anchor="middle" transform="rotate(-90,22,260)">error</text>

  <!-- Training error — dashed, falling -->
  <polyline points="48,295 90,265 135,232 180,200 225,178 270,162 315,148"
            fill="none" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="318" y="145" font-size="8" fill="#5C3D1E">train</text>

  <!-- Test/generalization error — solid red, U-shaped -->
  <polyline points="48,310 90,275 135,238 180,218 225,228 270,260 315,302"
            fill="none" stroke="#7C2530" stroke-width="2.2"/>
  <text x="318" y="300" font-size="8" fill="#7C2530">test</text>

  <!-- Optimism gap shaded area at high complexity -->
  <polygon points="225,228 270,260 315,302 315,148 270,162 225,178"
           fill="#7C2530" fill-opacity="0.08"/>

  <!-- Brace / annotation for gap -->
  <line x1="270" y1="162" x2="270" y2="260" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="275" y="207" font-size="8" fill="#7C2530">optimism</text>
  <text x="275" y="217" font-size="8" fill="#7C2530">gap</text>

  <!-- Sweet-spot line -->
  <line x1="180" y1="190" x2="180" y2="330" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="180" y="187" text-anchor="middle" font-size="7.5" fill="#2D5A8E">sweet spot</text>

  <!-- Panel divider -->
  <line x1="390" y1="14" x2="390" y2="386" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ PANEL RIGHT: Error Sources ══ -->
  <text x="594" y="22" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">WHERE ERRORS COME FROM</text>

  <!-- Row 1: In-sample / optimistic -->
  <rect x="410" y="38" width="360" height="52" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="590" y="58" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">In-Sample Error</text>
  <text x="590" y="73" text-anchor="middle" font-size="8.5" fill="#6B5D4F">Measured on training data the model has already seen</text>
  <text x="590" y="84" text-anchor="middle" font-size="8" fill="#9B7040">— always optimistic —</text>

  <!-- Arrow down -->
  <line x1="590" y1="91" x2="590" y2="110" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-brown)"/>
  <text x="610" y="104" font-size="8" fill="#9B7040">add optimism</text>

  <!-- Row 2: Validation / honest -->
  <rect x="410" y="117" width="360" height="52" rx="4" fill="#C4A87A" stroke="#9B7040" stroke-width="1.5"/>
  <text x="590" y="137" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">Validation Error</text>
  <text x="590" y="152" text-anchor="middle" font-size="8.5" fill="#FDFAF4">Held-out data — guides hyperparameter choice</text>
  <text x="590" y="163" text-anchor="middle" font-size="8" fill="#FDFAF4">— can leak if tuned too long —</text>

  <!-- Arrow down -->
  <line x1="590" y1="170" x2="590" y2="188" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 3: Test / true -->
  <rect x="410" y="195" width="360" height="52" rx="4" fill="#7C2530" stroke="#5A1A20" stroke-width="1.5"/>
  <text x="590" y="215" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">Test Error (Generalization)</text>
  <text x="590" y="230" text-anchor="middle" font-size="8.5" fill="#FDFAF4">Truly held-out — honest estimate of real-world error</text>
  <text x="590" y="241" text-anchor="middle" font-size="8" fill="#FDFAF4">— use exactly once —</text>

  <!-- ══ RIGHT BOTTOM: Error decomposition ══ -->
  <text x="594" y="275" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">TOTAL PREDICTION ERROR</text>

  <!-- Stacked bar -->
  <!-- Bias² -->
  <rect x="410" y="285" width="130" height="26" rx="2" fill="#5C3D1E" stroke="#3A2510" stroke-width="1"/>
  <text x="475" y="302" text-anchor="middle" font-size="9" fill="#FDFAF4">Bias²</text>

  <!-- Variance -->
  <rect x="542" y="285" width="115" height="26" rx="2" fill="#C4A87A" stroke="#9B7040" stroke-width="1"/>
  <text x="599" y="302" text-anchor="middle" font-size="9" fill="#FDFAF4">Variance</text>

  <!-- Irreducible -->
  <rect x="659" y="285" width="111" height="26" rx="2" fill="#D4C5A9" stroke="#B0A090" stroke-width="1"/>
  <text x="714" y="302" text-anchor="middle" font-size="9" fill="#5C3D1E">Irreducible</text>

  <!-- Labels below -->
  <text x="475" y="325" text-anchor="middle" font-size="8" fill="#5C3D1E">systematic</text>
  <text x="475" y="334" text-anchor="middle" font-size="8" fill="#5C3D1E">error</text>
  <text x="599" y="325" text-anchor="middle" font-size="8" fill="#9B7040">sensitivity to</text>
  <text x="599" y="334" text-anchor="middle" font-size="8" fill="#9B7040">training set</text>
  <text x="714" y="325" text-anchor="middle" font-size="8" fill="#6B5D4F">noise floor</text>
  <text x="714" y="334" text-anchor="middle" font-size="8" fill="#6B5D4F">can't reduce</text>

  <!-- Bottom caption -->
  <text x="400" y="375" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    In-sample error is always optimistic — only a held-out test set reveals true generalization error
  </text>

  <!-- Legend bottom left -->
  <line x1="42" y1="360" x2="65" y2="360" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="70" y="364" font-size="8" fill="#5C3D1E">train error</text>
  <line x1="130" y1="360" x2="153" y2="360" stroke="#7C2530" stroke-width="2.2"/>
  <text x="158" y="364" font-size="8" fill="#7C2530">test error</text>
  <rect x="220" y="354" width="10" height="10" rx="1" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="0.8"/>
  <text x="234" y="364" font-size="8" fill="#7C2530">optimism gap</text>
</svg>
