<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="cla-arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="cla-arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="cla-arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a9d8f"/>
    </marker>
    <marker id="cla-arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
    <marker id="cla-arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#222">Core Linear Algebra: Vectors, Transformations, and Inner Products</text>

  <!-- ================================================================ -->
  <!-- PANEL 1: VECTORS — origin at (120, 240) -->
  <!-- ================================================================ -->
  <text x="120" y="56" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Vectors</text>
  <text x="120" y="72" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">magnitude &amp; direction</text>

  <!-- Axes -->
  <line x1="40" y1="240" x2="205" y2="240" stroke="#ccc" stroke-width="1.2" marker-end="url(#cla-arr-gray)"/>
  <line x1="120" y1="320" x2="120" y2="88" stroke="#ccc" stroke-width="1.2" marker-end="url(#cla-arr-gray)"/>
  <text x="208" y="244" font-family="Arial" font-size="10" fill="#aaa">x</text>
  <text x="122" y="84" font-family="Arial" font-size="10" fill="#aaa">y</text>

  <!-- Grid lines (faint) -->
  <line x1="160" y1="240" x2="160" y2="88" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="40" y1="200" x2="205" y2="200" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="40" y1="160" x2="205" y2="160" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="80" y1="240" x2="80" y2="88" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- Vector a = (3, 2) → pixel (+120, -80) from origin -->
  <line x1="120" y1="240" x2="240" y2="160" stroke="#4a90d9" stroke-width="2.2" marker-end="url(#cla-arr-blue)"/>
  <text x="248" y="157" font-family="Arial" font-size="11" font-weight="bold" fill="#4a90d9">a</text>
  <text x="248" y="170" font-family="Arial" font-size="10" fill="#4a90d9">(3,2)</text>

  <!-- Vector b = (1, 3) → pixel (+40, -120) -->
  <line x1="120" y1="240" x2="160" y2="120" stroke="#7C2530" stroke-width="2.2" marker-end="url(#cla-arr-red)"/>
  <text x="165" y="115" font-family="Arial" font-size="11" font-weight="bold" fill="#7C2530">b</text>
  <text x="165" y="128" font-family="Arial" font-size="10" fill="#7C2530">(1,3)</text>

  <!-- Sum a+b = (4,5) → (+160, -200) clipped; show dashed parallelogram edges -->
  <!-- parallelogram: origin, tip of a, tip of a+b, tip of b -->
  <line x1="240" y1="160" x2="280" y2="40" stroke="#2a9d8f" stroke-width="1.4" stroke-dasharray="5,3"/>
  <line x1="160" y1="120" x2="280" y2="40" stroke="#2a9d8f" stroke-width="1.4" stroke-dasharray="5,3"/>
  <line x1="120" y1="240" x2="280" y2="40" stroke="#2a9d8f" stroke-width="2" marker-end="url(#cla-arr-teal)"/>
  <text x="284" y="38" font-family="Arial" font-size="11" font-weight="bold" fill="#2a9d8f">a+b</text>

  <!-- Panel label box -->
  <rect x="40" y="332" width="160" height="28" rx="3" fill="#eaf3fc" stroke="#4a90d9" stroke-width="1"/>
  <text x="120" y="347" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">‖a‖ = √(aₓ²+aᵧ²)</text>
  <text x="120" y="356" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">norm = length of arrow</text>

  <!-- ================================================================ -->
  <!-- PANEL 2: MATRIX TRANSFORMATION — origin at (415, 240) -->
  <!-- unit = 65px -->
  <!-- ================================================================ -->
  <text x="415" y="56" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Matrix Transformation</text>
  <text x="415" y="72" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">space before → after</text>

  <!-- Axes -->
  <line x1="325" y1="240" x2="510" y2="240" stroke="#ccc" stroke-width="1.2" marker-end="url(#cla-arr-gray)"/>
  <line x1="415" y1="320" x2="415" y2="88" stroke="#ccc" stroke-width="1.2" marker-end="url(#cla-arr-gray)"/>

  <!-- Original unit square (dashed blue): corners (415,240),(480,240),(480,175),(415,175) -->
  <polygon points="415,240 480,240 480,175 415,175"
           fill="#4a90d9" fill-opacity="0.12" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="453" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a90d9">before</text>

  <!-- Transformation M = [[1.4, 0.6],[0.2, 1.2]] applied to unit square, unit=65px -->
  <!-- (0,0)→(415,240) -->
  <!-- (1,0)→(415+1.4*65, 240-0.2*65)=(415+91, 240-13)=(506,227) -->
  <!-- (0,1)→(415+0.6*65, 240-1.2*65)=(415+39, 240-78)=(454,162) -->
  <!-- (1,1)→(415+2.0*65, 240-1.4*65)=(415+130,240-91)=(545,149) — clip -->
  <!-- use slightly smaller unit=58 for fit: -->
  <!-- (1,0)→(415+81.2, 240-11.6)=(496.2,228.4) -->
  <!-- (0,1)→(415+34.8, 240-69.6)=(449.8,170.4) -->
  <!-- (1,1)→(415+116,  240-81.2)=(531,158.8) -->
  <polygon points="415,240 496,229 530,159 450,170"
           fill="#7C2530" fill-opacity="0.18" stroke="#7C2530" stroke-width="2"/>
  <text x="500" y="190" font-family="Arial" font-size="9" fill="#7C2530">after</text>

  <!-- e1 original (blue dashed) -->
  <line x1="415" y1="240" x2="480" y2="240" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#cla-arr-blue)"/>
  <!-- e1 transformed (red) -->
  <line x1="415" y1="240" x2="496" y2="229" stroke="#7C2530" stroke-width="2" marker-end="url(#cla-arr-red)"/>
  <text x="499" y="226" font-family="Arial" font-size="10" fill="#7C2530">Me₁</text>

  <!-- e2 original (blue dashed) -->
  <line x1="415" y1="240" x2="415" y2="175" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#cla-arr-blue)"/>
  <!-- e2 transformed (red) -->
  <line x1="415" y1="240" x2="450" y2="170" stroke="#7C2530" stroke-width="2" marker-end="url(#cla-arr-red)"/>
  <text x="452" y="165" font-family="Arial" font-size="10" fill="#7C2530">Me₂</text>

  <!-- Panel label box -->
  <rect x="330" y="332" width="170" height="28" rx="3" fill="#fceaea" stroke="#7C2530" stroke-width="1"/>
  <text x="415" y="347" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">M maps basis vectors</text>
  <text x="415" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">columns of M = images of eᵢ</text>

  <!-- ================================================================ -->
  <!-- PANEL 3: INNER PRODUCT (DOT PRODUCT / PROJECTION) -->
  <!-- origin at (685, 240) -->
  <!-- ================================================================ -->
  <text x="670" y="56" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Inner Product</text>
  <text x="670" y="72" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">similarity &amp; projection</text>

  <!-- Axes -->
  <line x1="600" y1="240" x2="760" y2="240" stroke="#ccc" stroke-width="1.2" marker-end="url(#cla-arr-gray)"/>
  <line x1="685" y1="320" x2="685" y2="120" stroke="#ccc" stroke-width="1.2" marker-end="url(#cla-arr-gray)"/>

  <!-- Vector u = (2.2, 1.8) → (+88, -72) px -->
  <line x1="685" y1="240" x2="773" y2="168" stroke="#4a90d9" stroke-width="2.2" marker-end="url(#cla-arr-blue)"/>
  <text x="776" y="165" font-family="Arial" font-size="11" font-weight="bold" fill="#4a90d9">u</text>

  <!-- Vector v = (3, 0) → (+90, 0) scaled to unit hat -->
  <!-- v direction: horizontal; v_hat = (1,0) drawn as (90px, 0) from origin -->
  <line x1="685" y1="240" x2="760" y2="240" stroke="#e67e22" stroke-width="2.2" marker-end="url(#cla-arr-orange)"/>
  <text x="762" y="255" font-family="Arial" font-size="11" font-weight="bold" fill="#e67e22">v̂</text>

  <!-- Projection of u onto v_hat: proj = (u·v_hat) * v_hat -->
  <!-- u·v_hat = 2.2; projection endpoint: (685+88, 240) = (773,240) -->
  <!-- but clipped to panel; use 80px for viz: (685+80, 240)=(765,240) -->
  <line x1="685" y1="240" x2="765" y2="240" stroke="#2a9d8f" stroke-width="3" marker-end="url(#cla-arr-teal)"/>
  <text x="725" y="257" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2a9d8f">projᵥu</text>

  <!-- Dashed perpendicular drop from tip of u to v axis -->
  <line x1="773" y1="168" x2="773" y2="240" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Right-angle mark -->
  <rect x="765" y="232" width="8" height="8" fill="none" stroke="#4a90d9" stroke-width="1"/>

  <!-- Angle arc between u and v_hat -->
  <path d="M 720 240 A 35 35 0 0 0 706 215" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="715" y="222" font-family="Arial" font-size="10" fill="#555">θ</text>

  <!-- dot product formula -->
  <rect x="598" y="332" width="154" height="28" rx="3" fill="#e0f5f3" stroke="#2a9d8f" stroke-width="1"/>
  <text x="675" y="347" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">u·v = ‖u‖‖v‖cos θ</text>
  <text x="675" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">= ‖projᵥu‖ · ‖v‖</text>

  <!-- ================================================================ -->
  <!-- Panel dividers -->
  <!-- ================================================================ -->
  <line x1="300" y1="44" x2="300" y2="385" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="44" x2="580" y2="385" stroke="#ddd" stroke-width="1"/>

  <!-- Footer caption -->
  <text x="400" y="394" text-anchor="middle" font-family="Arial" font-size="10" fill="#999">Left: vector addition via parallelogram law · Center: matrix M reshapes the unit square · Right: dot product as scaled projection</text>
</svg>
