<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="lrref-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="lrref-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- Panel divider -->
  <line x1="400" y1="18" x2="400" y2="382" stroke="#D4C5A9" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════════
       LEFT PANEL — SCATTER + FITTED LINE
       ════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="200" y="30" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1.5">SCATTER PLOT &amp; FITTED LINE</text>

  <!-- Axes -->
  <line x1="40" y1="340" x2="370" y2="340" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#lrref-axis)"/>
  <line x1="40" y1="340" x2="40"  y2="44"  stroke="#C4A87A" stroke-width="1.5" marker-end="url(#lrref-axis)"/>
  <text x="375" y="344" font-size="11" fill="#6B5D4F">x</text>
  <text x="30"  y="40"  font-size="11" fill="#6B5D4F">y</text>

  <!-- Best-fit line: from (40,316) to (360,68) -->
  <!-- slope = (68-316)/(360-40) = -248/320 = -0.775 per px -->
  <line x1="40" y1="316" x2="360" y2="68" stroke="#7C2530" stroke-width="2.2"/>

  <!-- Line annotation -->
  <text x="295" y="100" font-size="11" fill="#7C2530" font-style="italic" transform="rotate(-37.8,295,100)">ŷ = wᵀx + b</text>

  <!-- Helper: line y at svg x: y = 316 - 0.775*(x-40) -->
  <!-- 12 data points scattered around line -->
  <!-- x=55: line=304.4, point=297 -->
  <circle cx="55"  cy="297" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=75: line=288.9, point=295 -->
  <circle cx="75"  cy="295" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=100: line=269.6, point=261 -->
  <circle cx="100" cy="261" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=120: line=254, point=263 -->
  <circle cx="120" cy="263" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=145: line=234.6, point=226 -->
  <circle cx="145" cy="226" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=165: line=219, point=208 -->
  <circle cx="165" cy="208" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=190: line=199.6, point=204 -->
  <circle cx="190" cy="204" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=215: line=180.1, point=170 -->
  <circle cx="215" cy="170" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=240: line=160.6, point=154 -->
  <circle cx="240" cy="154" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=270: line=137.3, point=142 -->
  <circle cx="270" cy="142" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=300: line=114, point=106 -->
  <circle cx="300" cy="106" r="4.5" fill="#8B6B4A" opacity="0.85"/>
  <!-- x=335: line=87, point=94 -->
  <circle cx="335" cy="94"  r="4.5" fill="#8B6B4A" opacity="0.85"/>

  <!-- Residual lines for 5 representative points (blue vertical segments) -->
  <!-- P at x=75: point y=295, line y=289 → line is above point, residual negative -->
  <line x1="75"  y1="295" x2="75"  y2="289" stroke="#2D5A8E" stroke-width="1.6" stroke-dasharray="3,2"/>
  <!-- P at x=120: point y=263, line y=254 → point below line -->
  <line x1="120" y1="263" x2="120" y2="254" stroke="#2D5A8E" stroke-width="1.6" stroke-dasharray="3,2"/>
  <!-- P at x=190: point y=204, line y=200 → point below line -->
  <line x1="190" y1="204" x2="190" y2="200" stroke="#2D5A8E" stroke-width="1.6" stroke-dasharray="3,2"/>
  <!-- P at x=270: point y=142, line y=137 → point below line -->
  <line x1="270" y1="142" x2="270" y2="137" stroke="#2D5A8E" stroke-width="1.6" stroke-dasharray="3,2"/>
  <!-- P at x=165: point y=208, line y=219 → point above line -->
  <line x1="165" y1="208" x2="165" y2="219" stroke="#2D5A8E" stroke-width="1.6" stroke-dasharray="3,2"/>

  <!-- Residual label with brace annotation on one residual -->
  <!-- annotate the x=120 residual -->
  <line x1="125" y1="254" x2="140" y2="244" stroke="#2D5A8E" stroke-width="1"/>
  <text x="142" y="243" font-size="10" fill="#2D5A8E" font-style="italic">residual = y − ŷ</text>

  <!-- Formula at bottom left -->
  <text x="200" y="367" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">minimize  Σ residual²</text>

  <!-- Legend -->
  <circle cx="50" cy="355" r="4" fill="#8B6B4A" opacity="0.85"/>
  <text x="58" y="358" font-size="9.5" fill="#6B5D4F">data point</text>
  <line x1="110" y1="355" x2="130" y2="355" stroke="#7C2530" stroke-width="2.2"/>
  <text x="133" y="358" font-size="9.5" fill="#7C2530">fitted line</text>
  <line x1="190" y1="355" x2="210" y2="355" stroke="#2D5A8E" stroke-width="1.6" stroke-dasharray="3,2"/>
  <text x="213" y="358" font-size="9.5" fill="#2D5A8E">residual</text>

  <!-- ════════════════════════════════════
       RIGHT PANEL — LOSS LANDSCAPE (BOWL)
       ════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="600" y="30" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1.5">LOSS LANDSCAPE (OLS)</text>

  <!-- Axes for loss landscape -->
  <line x1="420" y1="340" x2="775" y2="340" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#lrref-axis)"/>
  <line x1="420" y1="340" x2="420" y2="44"  stroke="#C4A87A" stroke-width="1.5" marker-end="url(#lrref-axis)"/>
  <text x="778" y="344" font-size="11" fill="#6B5D4F">w</text>
  <text x="410" y="40"  font-size="11" fill="#6B5D4F">L</text>

  <!-- Parabola (bowl shape) — MSE as function of w -->
  <!-- Center at w_svg=600, L_svg=90 (the minimum) -->
  <!-- Parabola: L_svg = 90 + 0.0028*(x-600)^2 -->
  <path d="
    M 435,340
    Q 520,320 600,90
    Q 680,320 760,340
  " fill="none" stroke="#7C2530" stroke-width="2.2"/>

  <!-- Fill under bowl with light tan gradient effect via polygon -->
  <polygon
    points="435,340 445,334 460,322 475,310 495,295 515,276 535,258 555,236 575,175 590,120 600,90 610,120 625,175 645,236 665,258 685,276 705,295 725,310 745,322 760,334 765,340"
    fill="#F2EAD8" opacity="0.6" stroke="none"/>
  <!-- Redraw the curve on top -->
  <path d="
    M 435,340
    Q 520,320 600,90
    Q 680,320 760,340
  " fill="none" stroke="#7C2530" stroke-width="2.2"/>

  <!-- Minimum marker -->
  <circle cx="600" cy="90" r="6" fill="#7C2530"/>
  <line x1="600" y1="90" x2="600" y2="340" stroke="#7C2530" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="605" y="82" font-size="10.5" fill="#7C2530" font-weight="bold">w* (OLS minimum)</text>

  <!-- Gradient descent arrows approaching minimum -->
  <!-- Start high on left side -->
  <circle cx="470" cy="320" r="4" fill="#2D5A8E" opacity="0.9"/>
  <line x1="470" y1="320" x2="510" y2="298" stroke="#2D5A8E" stroke-width="1.4" marker-end="url(#lrref-arr)" opacity="0.8"/>
  <circle cx="510" cy="298" r="3.5" fill="#2D5A8E" opacity="0.75"/>
  <line x1="510" y1="298" x2="548" y2="248" stroke="#2D5A8E" stroke-width="1.4" marker-end="url(#lrref-arr)" opacity="0.7"/>
  <circle cx="548" cy="248" r="3" fill="#2D5A8E" opacity="0.6"/>
  <line x1="548" y1="248" x2="578" y2="160" stroke="#2D5A8E" stroke-width="1.4" marker-end="url(#lrref-arr)" opacity="0.6"/>
  <circle cx="578" cy="160" r="2.5" fill="#2D5A8E" opacity="0.5"/>
  <line x1="578" y1="160" x2="597" y2="100" stroke="#2D5A8E" stroke-width="1.4" marker-end="url(#lrref-arr)" opacity="0.5"/>

  <!-- Tangent at a point — showing gradient direction -->
  <!-- at x=510 (not minimum), draw tangent slope -->
  <line x1="490" y1="314" x2="535" y2="275" stroke="#6B5D4F" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="540" y="304" font-size="9" fill="#6B5D4F" font-style="italic">∂L/∂w &lt; 0</text>

  <!-- Labels -->
  <text x="455" y="290" font-size="9.5" fill="#6B5D4F" font-style="italic">high loss</text>
  <text x="620" y="200" font-size="9.5" fill="#7C2530" font-style="italic">converging</text>
  <text x="620" y="213" font-size="9.5" fill="#7C2530" font-style="italic">to minimum</text>

  <!-- Closed-form annotation -->
  <text x="600" y="370" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">w* = (XᵀX)⁻¹ Xᵀy  (normal equations)</text>

  <!-- Arrow pointing to minimum from annotation -->
  <line x1="600" y1="362" x2="600" y2="104" stroke="#7C2530" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.4" marker-end="url(#lrref-arr)"/>
</svg>
