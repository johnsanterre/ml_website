<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title row labels -->
  <text x="120" y="26" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">ROUND 1: UNIFORM WEIGHTS</text>
  <text x="400" y="26" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">ROUND 2: REWEIGHTED</text>
  <text x="660" y="26" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">FINAL ENSEMBLE</text>

  <!-- Round 1: scatter of + and - with decision stump -->
  <!-- Points: circles = +1 (blue), squares = -1 (red) -->
  <!-- Correct classifications small, wrong ones larger (upweighted next round) -->
  <circle cx="60" cy="120" r="7" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="90" cy="90" r="7" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="75" cy="150" r="7" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="55" cy="75" r="7" fill="#2D5A8E" opacity="0.7"/>
  <!-- negatives -->
  <rect x="135" y="83" width="12" height="12" fill="#7C2530" opacity="0.7"/>
  <rect x="155" y="115" width="12" height="12" fill="#7C2530" opacity="0.7"/>
  <rect x="145" y="145" width="12" height="12" fill="#7C2530" opacity="0.7"/>
  <rect x="160" y="70" width="12" height="12" fill="#7C2530" opacity="0.7"/>
  <!-- stump line -->
  <line x1="118" y1="55" x2="118" y2="175" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="118" y="190" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">stump</text>
  <!-- error label -->
  <text x="120" y="210" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">ε₁ = 0.30</text>
  <text x="120" y="226" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">α₁ = 0.42</text>

  <!-- Arrow between round 1 and 2 -->
  <line x1="200" y1="120" x2="250" y2="120" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="225" y="112" font-family="Georgia,serif" font-size="9" fill="#6B5D4F" text-anchor="middle">reweight</text>

  <!-- Round 2: misclassified points now bigger -->
  <circle cx="290" cy="120" r="7" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="320" cy="90" r="7" fill="#2D5A8E" opacity="0.7"/>
  <!-- was misclassified, now bigger -->
  <circle cx="305" cy="150" r="13" fill="#2D5A8E" opacity="0.85" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="285" cy="75" r="13" fill="#2D5A8E" opacity="0.85" stroke="#2D5A8E" stroke-width="2"/>
  <!-- negatives -->
  <rect x="360" y="83" width="12" height="12" fill="#7C2530" opacity="0.7"/>
  <rect x="375" y="115" width="12" height="12" fill="#7C2530" opacity="0.7"/>
  <!-- was misclassified, now bigger -->
  <rect x="355" y="140" width="18" height="18" fill="#7C2530" opacity="0.9" stroke="#7C2530" stroke-width="2"/>
  <rect x="365" y="62" width="18" height="18" fill="#7C2530" opacity="0.9" stroke="#7C2530" stroke-width="2"/>
  <!-- new stump (different cut) -->
  <line x1="340" y1="55" x2="340" y2="175" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="345" y="190" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">stump</text>
  <text x="350" y="210" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">ε₂ = 0.18</text>
  <text x="350" y="226" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">α₂ = 0.76</text>

  <!-- Arrow to final -->
  <line x1="420" y1="120" x2="470" y2="120" stroke="#6B5D4F" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="445" y="112" font-family="Georgia,serif" font-size="9" fill="#6B5D4F" text-anchor="middle">combine</text>

  <!-- Final ensemble panel -->
  <rect x="490" y="44" width="290" height="190" rx="6" fill="#2D5A8E" opacity="0.06" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="635" y="70" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">H(x) = sign(∑ αₜ hₜ(x))</text>
  <!-- bar chart of alphas -->
  <text x="520" y="100" font-family="Georgia,serif" font-size="10" fill="#6B5D4F">Round</text>
  <text x="600" y="100" font-family="Georgia,serif" font-size="10" fill="#6B5D4F">α weight</text>
  <rect x="510" y="108" width="42" height="16" rx="2" fill="#2D5A8E" opacity="0.7"/>
  <text x="556" y="120" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">h₁  α=0.42</text>
  <rect x="510" y="130" width="76" height="16" rx="2" fill="#2D5A8E" opacity="0.7"/>
  <text x="590" y="142" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">h₂  α=0.76</text>
  <rect x="510" y="152" width="58" height="16" rx="2" fill="#2D5A8E" opacity="0.7"/>
  <text x="572" y="164" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">h₃  α=0.58</text>
  <rect x="510" y="174" width="26" height="16" rx="2" fill="#2D5A8E" opacity="0.5"/>
  <text x="540" y="186" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">h₄  α=0.26</text>
  <text x="700" y="138" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">Better learners</text>
  <text x="700" y="153" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">vote louder</text>

  <!-- Bottom: weight update formula -->
  <rect x="20" y="258" width="370" height="120" rx="5" fill="#7C2530" opacity="0.06" stroke="#7C2530" stroke-width="1.5"/>
  <text x="205" y="278" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">WEIGHT UPDATE RULE</text>
  <text x="205" y="298" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle">Misclassified:  wᵢ ← wᵢ · eᵅ</text>
  <text x="205" y="320" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle">Correct:          wᵢ ← wᵢ · e⁻ᵅ</text>
  <text x="205" y="344" font-family="Georgia,serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">Then renormalize so ∑wᵢ = 1</text>
  <text x="205" y="366" font-family="Georgia,serif" font-size="10" fill="#6B5D4F" text-anchor="middle" font-style="italic">α = ½ ln((1−ε)/ε)</text>

  <!-- Bottom: exponential loss -->
  <rect x="420" y="258" width="360" height="120" rx="5" fill="#5C3D1E" opacity="0.06" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="600" y="278" font-family="Georgia,serif" font-size="10" letter-spacing="1" fill="#6B5D4F" text-anchor="middle" font-variant="small-caps">EXPONENTIAL LOSS</text>
  <text x="600" y="300" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">L = ∑ exp(−yᵢ F(xᵢ))</text>
  <text x="600" y="320" font-family="Georgia,serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">F(x) = ∑ αₜ hₜ(x)  (strong learner)</text>
  <text x="600" y="342" font-family="Georgia,serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">AdaBoost greedily minimizes</text>
  <text x="600" y="358" font-family="Georgia,serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">this loss at each round</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B5D4F"/>
    </marker>
  </defs>
</svg>
