<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Convex vs Non-Convex Functions</text>

  <!-- ─── LEFT PANEL: Convex ─── -->
  <text x="190" y="64" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2980b9">Convex (bowl shape)</text>

  <!-- axes -->
  <line x1="40" y1="310" x2="350" y2="310" stroke="#bbb" stroke-width="1.5"/>
  <line x1="40" y1="80"  x2="40"  y2="310" stroke="#bbb" stroke-width="1.5"/>

  <!-- bowl curve: parabola approximated with cubic bezier -->
  <path d="M55,270 C100,330 280,330 335,270" fill="none" stroke="#2980b9" stroke-width="3.5"/>

  <!-- chord from left to right point — lies ABOVE the curve -->
  <line x1="55" y1="270" x2="335" y2="270" stroke="#e67e22" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="192" y="252" text-anchor="middle" font-family="Arial" font-size="11" fill="#e67e22">chord lies above curve</text>

  <!-- global minimum dot -->
  <circle cx="195" cy="310" r="7" fill="#2980b9"/>
  <text x="195" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#2980b9">global minimum</text>

  <!-- gradient descent arrows pointing to minimum -->
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arrowO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
  </defs>
  <line x1="90"  y1="282" x2="162" y2="305" stroke="#2980b9" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowB)"/>
  <line x1="305" y1="278" x2="228" y2="305" stroke="#2980b9" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowB)"/>

  <!-- annotation -->
  <text x="192" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Any local min</text>
  <text x="192" y="127" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">= global min</text>
  <text x="192" y="144" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Gradient descent</text>
  <text x="192" y="161" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">always finds it</text>

  <!-- divider -->
  <line x1="390" y1="55" x2="390" y2="345" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ─── RIGHT PANEL: Non-Convex ─── -->
  <text x="600" y="64" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c0392b">Non-Convex (mountain range)</text>

  <!-- axes -->
  <line x1="415" y1="310" x2="770" y2="310" stroke="#bbb" stroke-width="1.5"/>
  <line x1="415" y1="80"  x2="415" y2="310" stroke="#bbb" stroke-width="1.5"/>

  <!-- bumpy non-convex curve -->
  <path d="M425,210
           C440,170 455,240 470,230
           C485,220 495,280 515,270
           C535,260 545,190 565,200
           C580,207 590,280 610,270
           C625,262 635,150 655,155
           C672,160 685,240 705,235
           C720,230 740,260 760,250"
        fill="none" stroke="#c0392b" stroke-width="3.5"/>

  <!-- local minima dots -->
  <circle cx="515" cy="271" r="6" fill="#e67e22"/>
  <text x="515" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#e67e22">local min</text>

  <circle cx="610" cy="271" r="6" fill="#e67e22"/>
  <text x="610" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#e67e22">local min</text>

  <!-- global minimum dot -->
  <circle cx="655" cy="155" r="7" fill="#2980b9"/>
  <text x="655" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="#2980b9">global min</text>

  <!-- gradient descent arrow getting stuck at local min -->
  <line x1="475" y1="232" x2="510" y2="268" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <text x="468" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#c0392b">descent</text>
  <text x="468" y="234" text-anchor="middle" font-family="Arial" font-size="10" fill="#c0392b">gets stuck</text>

  <!-- annotation -->
  <text x="595" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Local minima ≠</text>
  <text x="595" y="127" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">global minimum</text>
  <text x="595" y="144" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Gradient descent</text>
  <text x="595" y="161" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">may get trapped</text>

  <!-- ─── Footer formula ─── -->
  <text x="400" y="372" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Convex: f(λx + (1−λ)y) ≤ λf(x) + (1−λ)f(y) for all x, y and λ ∈ [0,1]</text>
  <text x="400" y="389" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Second derivative test: f″(x) ≥ 0 everywhere ⟹ convex</text>
</svg>
