<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="ah-pc1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="ah-pc2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="ah-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- ══ PANEL 1: Original 2D data ══ -->
  <text x="150" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">ORIGINAL DATA (2D)</text>

  <!-- Faint crosshairs -->
  <line x1="150" y1="36" x2="150" y2="285" stroke="#F0E8D8" stroke-width="1"/>
  <line x1="30"  y1="175" x2="268" y2="175" stroke="#F0E8D8" stroke-width="1"/>

  <!-- 1σ data ellipse -->
  <ellipse cx="150" cy="175" rx="105" ry="37"
           fill="rgba(92,61,30,0.05)" stroke="#D4C5A9" stroke-width="1.5"
           stroke-dasharray="5,4" transform="rotate(-35,150,175)"/>

  <!-- Data points (20) — warm brown -->
  <circle cx="214" cy="140" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="199" cy="126" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="205" cy="156" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="181" cy="143" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="204" cy="162" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="175" cy="162" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="171" cy="185" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="156" cy="190" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="133" cy="172" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="143" cy="200" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="118" cy="192" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="121" cy="210" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="98"  cy="192" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="102" cy="218" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="89"  cy="213" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="168" cy="138" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="139" cy="208" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="212" cy="124" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="93"  cy="227" r="4" fill="#5C3D1E" opacity="0.60"/>
  <!-- Highlighted point (orange) -->
  <circle cx="157" cy="150" r="5" fill="#C47B35" opacity="0.90"/>

  <!-- PC2 axis (behind PC1) -->
  <line x1="132" y1="149" x2="180" y2="218"
        stroke="#2D5A8E" stroke-width="2" marker-end="url(#ah-pc2)" opacity="0.85"/>

  <!-- PC1 axis -->
  <line x1="76" y1="227" x2="254" y2="101"
        stroke="#7C2530" stroke-width="2.5" marker-end="url(#ah-pc1)"/>

  <!-- Centre -->
  <circle cx="150" cy="175" r="3.5" fill="#1C1713"/>

  <!-- Projection of highlighted point onto PC1 -->
  <line x1="157" y1="150" x2="166" y2="164"
        stroke="#C47B35" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="166" cy="164" r="3" fill="#C47B35"/>

  <!-- PC labels -->
  <text x="258" y="97"  font-size="12" fill="#7C2530" font-weight="bold">PC₁</text>
  <text x="182" y="225" font-size="12" fill="#2D5A8E" font-weight="bold">PC₂</text>

  <!-- Eigenvalue hints -->
  <text x="200" y="130" font-size="9" fill="#7C2530" font-style="italic">λ₁ (large)</text>
  <text x="184" y="236" font-size="9" fill="#2D5A8E" font-style="italic">λ₂ (small)</text>

  <!-- Projection label -->
  <text x="170" y="147" font-size="8.5" fill="#C47B35">proj</text>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="295" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 2: 1D projection ══ -->
  <text x="446" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">PROJECTED ONTO PC₁ (1D)</text>

  <!-- Axis line -->
  <line x1="316" y1="175" x2="578" y2="175"
        stroke="#C4A87A" stroke-width="1.5" marker-end="url(#ah-axis)"/>

  <!-- Zero tick -->
  <line x1="446" y1="170" x2="446" y2="180" stroke="#C4A87A" stroke-width="1"/>
  <text x="446" y="192" text-anchor="middle" font-size="8.5" fill="#6B5D4F">0</text>

  <!-- Projected points (20) — same y-jitter as panel 1 PC2 is gone -->
  <circle cx="557" cy="178" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="551" cy="171" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="533" cy="177" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="514" cy="172" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="527" cy="180" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="489" cy="173" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="464" cy="172" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="439" cy="177" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="426" cy="171" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="414" cy="178" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="389" cy="173" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="376" cy="179" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="364" cy="170" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="345" cy="177" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="333" cy="172" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="501" cy="180" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="401" cy="171" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="569" cy="176" r="4" fill="#5C3D1E" opacity="0.60"/>
  <circle cx="327" cy="178" r="4" fill="#5C3D1E" opacity="0.60"/>
  <!-- Highlighted point (orange) -->
  <circle cx="477" cy="179" r="5" fill="#C47B35" opacity="0.90"/>

  <!-- Annotation for highlighted point -->
  <line x1="477" y1="169" x2="477" y2="157" stroke="#C47B35" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="477" y="152" text-anchor="middle" font-size="8.5" fill="#C47B35">same point</text>

  <!-- Axis label -->
  <text x="446" y="210" text-anchor="middle" font-size="11" fill="#7C2530">PC₁ score</text>

  <!-- Lost info note -->
  <text x="446" y="233" text-anchor="middle" font-size="9" fill="#9B8877" font-style="italic">PC₂ dimension discarded</text>

  <!-- EVR formula -->
  <text x="446" y="258" text-anchor="middle" font-size="9.5" fill="#1C1713">EVR = λ₁ / (λ₁ + λ₂)</text>

  <!-- Bottom caption -->
  <text x="300" y="298" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    Dimensionality reduction: 2D → 1D by retaining only the PC₁ scores
  </text>
</svg>
