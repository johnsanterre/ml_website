<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-main" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-ml" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2017" letter-spacing="0.5">DRUG DISCOVERY PIPELINE</text>

  <!-- ══ PIPELINE STAGES ══ -->

  <!-- Stage 1: Target ID — HIGHLIGHTED -->
  <rect x="22" y="50" width="130" height="68" rx="6" fill="#7C2530" stroke="#5A1A22" stroke-width="2"/>
  <text x="87" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#FDFAF4">TARGET</text>
  <text x="87" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#FDFAF4">IDENTIFICATION</text>
  <text x="87" y="108" text-anchor="middle" font-size="8" fill="#F5DCDC" font-style="italic">← ML focus</text>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="84" x2="183" y2="84" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 2: Hit Discovery -->
  <rect x="183" y="55" width="118" height="58" rx="6" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="242" y="79" text-anchor="middle" font-size="10" fill="#3A2A1A">HIT</text>
  <text x="242" y="93" text-anchor="middle" font-size="10" fill="#3A2A1A">DISCOVERY</text>
  <text x="242" y="106" text-anchor="middle" font-size="8" fill="#6B5D4F">high-throughput screens</text>

  <!-- Arrow 2→3 -->
  <line x1="301" y1="84" x2="332" y2="84" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 3: Lead Optimization -->
  <rect x="332" y="55" width="118" height="58" rx="6" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="391" y="79" text-anchor="middle" font-size="10" fill="#3A2A1A">LEAD</text>
  <text x="391" y="93" text-anchor="middle" font-size="10" fill="#3A2A1A">OPTIMIZATION</text>
  <text x="391" y="106" text-anchor="middle" font-size="8" fill="#6B5D4F">ADMET, potency</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="84" x2="481" y2="84" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 4: Clinical Trials -->
  <rect x="481" y="55" width="118" height="58" rx="6" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="540" y="79" text-anchor="middle" font-size="10" fill="#3A2A1A">CLINICAL</text>
  <text x="540" y="93" text-anchor="middle" font-size="10" fill="#3A2A1A">TRIALS</text>
  <text x="540" y="106" text-anchor="middle" font-size="8" fill="#6B5D4F">Phase I / II / III</text>

  <!-- Arrow 4→5 -->
  <line x1="599" y1="84" x2="630" y2="84" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 5: Drug -->
  <rect x="630" y="50" width="142" height="68" rx="6" fill="#4A6741" stroke="#364E31" stroke-width="2"/>
  <text x="701" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#FDFAF4">DRUG</text>
  <text x="701" y="97" text-anchor="middle" font-size="8" fill="#C8E6C0" font-style="italic">FDA approval</text>
  <text x="701" y="110" text-anchor="middle" font-size="8" fill="#C8E6C0" font-style="italic">~10–15 years</text>

  <!-- ══ ML TOOLS PANEL — below Target ID ══ -->
  <text x="87" y="148" text-anchor="middle" font-size="9.5" fill="#7C2530" font-weight="bold" letter-spacing="0.5">ML TOOLS FOR TARGET ID</text>

  <!-- Tool 1: Sequence Analysis -->
  <rect x="22" y="158" width="166" height="44" rx="5" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.2"/>
  <text x="105" y="174" text-anchor="middle" font-size="9.5" fill="#3A2A1A" font-weight="bold">Sequence Analysis</text>
  <text x="105" y="188" text-anchor="middle" font-size="8.5" fill="#5C3D1E">attention over amino acid tokens</text>
  <text x="105" y="199" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">ESM-2, ProtTrans</text>

  <!-- Arrow tool 1 to pipeline -->
  <line x1="87" y1="155" x2="87" y2="120" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr-ml)"/>

  <!-- Tool 2: AlphaFold -->
  <rect x="200" y="158" width="182" height="44" rx="5" fill="#E8EEF6" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="291" y="174" text-anchor="middle" font-size="9.5" fill="#1A3A6A" font-weight="bold">AlphaFold</text>
  <text x="291" y="188" text-anchor="middle" font-size="8.5" fill="#2D5A8E">protein structure prediction</text>
  <text x="291" y="199" text-anchor="middle" font-size="8" fill="#4A6080" font-style="italic">3D binding-pocket geometry</text>

  <!-- Arrow tool 2 to pipeline -->
  <line x1="242" y1="155" x2="242" y2="113" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr-ml)"/>

  <!-- Tool 3: PPI Network -->
  <rect x="394" y="158" width="182" height="44" rx="5" fill="#E8EEF6" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="485" y="174" text-anchor="middle" font-size="9.5" fill="#1A3A6A" font-weight="bold">Protein-Protein Interaction</text>
  <text x="485" y="188" text-anchor="middle" font-size="8.5" fill="#2D5A8E">network biology / graph neural nets</text>
  <text x="485" y="199" text-anchor="middle" font-size="8" fill="#4A6080" font-style="italic">STRING, BioGRID databases</text>

  <!-- Arrow tool 3 to pipeline -->
  <line x1="391" y1="155" x2="391" y2="113" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr-ml)"/>

  <!-- Tool 4: GWAS -->
  <rect x="588" y="158" width="182" height="44" rx="5" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.2"/>
  <text x="679" y="174" text-anchor="middle" font-size="9.5" fill="#3A2A1A" font-weight="bold">GWAS / Multi-omics</text>
  <text x="679" y="188" text-anchor="middle" font-size="8.5" fill="#5C3D1E">genome-wide association studies</text>
  <text x="679" y="199" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">Mendelian randomization</text>

  <!-- Arrow tool 4 to pipeline -->
  <line x1="679" y1="155" x2="679" y2="113" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr-ml)"/>

  <!-- ══ PPI NETWORK DIAGRAM ══ -->
  <text x="400" y="240" text-anchor="middle" font-size="9.5" fill="#6B5D4F" letter-spacing="0.5">PROTEIN-PROTEIN INTERACTION NETWORK</text>

  <!-- Network nodes -->
  <!-- Central target node -->
  <circle cx="400" cy="305" r="22" fill="#7C2530" stroke="#5A1A22" stroke-width="1.8"/>
  <text x="400" y="302" text-anchor="middle" font-size="8" fill="#FDFAF4" font-weight="bold">target</text>
  <text x="400" y="313" text-anchor="middle" font-size="7" fill="#F5DCDC">protein</text>

  <!-- Neighbor nodes -->
  <circle cx="310" cy="270" r="16" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="310" y="274" text-anchor="middle" font-size="7.5" fill="#3A2A1A">kinase A</text>

  <circle cx="340" cy="345" r="16" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="340" y="349" text-anchor="middle" font-size="7.5" fill="#3A2A1A">receptor</text>

  <circle cx="460" cy="270" r="16" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="460" y="274" text-anchor="middle" font-size="7.5" fill="#3A2A1A">kinase B</text>

  <circle cx="460" cy="345" r="16" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="460" y="349" text-anchor="middle" font-size="7.5" fill="#3A2A1A">enzyme C</text>

  <circle cx="258" cy="305" r="13" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1"/>
  <text x="258" y="309" text-anchor="middle" font-size="7" fill="#5C3D1E">TF-1</text>

  <circle cx="542" cy="305" r="13" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1"/>
  <text x="542" y="309" text-anchor="middle" font-size="7" fill="#5C3D1E">ligand</text>

  <!-- Edges -->
  <line x1="325" y1="277" x2="379" y2="295" stroke="#9A7A5A" stroke-width="1.5"/>
  <line x1="355" y1="335" x2="382" y2="320" stroke="#9A7A5A" stroke-width="1.5"/>
  <line x1="444" y1="277" x2="420" y2="295" stroke="#9A7A5A" stroke-width="1.5"/>
  <line x1="446" y1="336" x2="418" y2="319" stroke="#9A7A5A" stroke-width="1.5"/>
  <line x1="271" y1="305" x2="378" y2="305" stroke="#9A7A5A" stroke-width="1"/>
  <line x1="422" y1="305" x2="529" y2="305" stroke="#9A7A5A" stroke-width="1"/>
  <!-- Cross-edges between neighbors -->
  <line x1="326" y1="271" x2="444" y2="271" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="354" y1="341" x2="444" y2="341" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Annotation: AlphaFold -->
  <rect x="22" y="250" width="130" height="30" rx="4" fill="#E8EEF6" stroke="#2D5A8E" stroke-width="1"/>
  <text x="87" y="263" text-anchor="middle" font-size="9" fill="#1A3A6A" font-weight="bold">AlphaFold</text>
  <text x="87" y="275" text-anchor="middle" font-size="8" fill="#2D5A8E">3D structure → pocket</text>

  <!-- Annotation: GWAS -->
  <rect x="648" y="250" width="130" height="30" rx="4" fill="#F5EDE0" stroke="#7C2530" stroke-width="1"/>
  <text x="713" y="263" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">GWAS</text>
  <text x="713" y="275" text-anchor="middle" font-size="8" fill="#5C3D1E">SNPs → disease genes</text>

  <!-- Bottom caption -->
  <text x="400" y="388" text-anchor="middle" font-size="9" fill="#6B5D4F">
    ML identifies which proteins to target before any compound is designed
  </text>
</svg>
