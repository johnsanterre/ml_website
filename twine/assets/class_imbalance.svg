<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: The Accuracy Paradox -->
  <rect x="20" y="30" width="175" height="340" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="107" y="52" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Accuracy Paradox</text>
  <!-- Big majority block -->
  <rect x="35" y="62" width="145" height="240" fill="#2D5A8E" opacity="0.15" rx="3"/>
  <text x="107" y="122" text-anchor="middle" font-size="28" font-weight="bold" fill="#2D5A8E">990</text>
  <text x="107" y="148" text-anchor="middle" font-size="11" fill="#2D5A8E">Legitimate</text>
  <text x="107" y="164" text-anchor="middle" font-size="10" fill="#2D5A8E">(99%)</text>
  <!-- Small minority block -->
  <rect x="55" y="215" width="105" height="42" fill="#7C2530" opacity="0.2" rx="3"/>
  <text x="107" y="236" text-anchor="middle" font-size="18" font-weight="bold" fill="#7C2530">10</text>
  <text x="107" y="252" text-anchor="middle" font-size="10" fill="#7C2530">Fraud (1%)</text>
  <!-- Arrow down with label -->
  <line x1="107" y1="314" x2="107" y2="344" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="107" y="308" text-anchor="middle" font-size="10" fill="#7C2530">Predict all</text>
  <text x="107" y="320" text-anchor="middle" font-size="10" fill="#7C2530">majority →</text>
  <text x="107" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C2530">99% "accurate"</text>

  <!-- Panel 2: Strategies -->
  <rect x="210" y="30" width="185" height="340" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="302" y="52" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Resampling Strategies</text>

  <!-- Oversampling -->
  <rect x="225" y="62" width="155" height="80" fill="#2D5A8E" opacity="0.08" rx="3" stroke="#2D5A8E" stroke-width="0.8"/>
  <text x="302" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#2D5A8E">Oversampling (SMOTE)</text>
  <text x="302" y="96" text-anchor="middle" font-size="9.5" fill="#444">Synthesize new minority</text>
  <text x="302" y="110" text-anchor="middle" font-size="9.5" fill="#444">samples by interpolating</text>
  <text x="302" y="124" text-anchor="middle" font-size="9.5" fill="#444">between neighbors</text>
  <!-- dots -->
  <circle cx="250" cy="135" r="5" fill="#7C2530" opacity="0.7"/>
  <circle cx="268" cy="130" r="5" fill="#7C2530" opacity="0.7"/>
  <circle cx="259" cy="138" r="4" fill="#7C2530" opacity="0.4" stroke="#7C2530" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Undersampling -->
  <rect x="225" y="162" width="155" height="80" fill="#5C3D1E" opacity="0.07" rx="3" stroke="#5C3D1E" stroke-width="0.8"/>
  <text x="302" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#5C3D1E">Undersampling</text>
  <text x="302" y="196" text-anchor="middle" font-size="9.5" fill="#444">Remove majority samples</text>
  <text x="302" y="210" text-anchor="middle" font-size="9.5" fill="#444">randomly or via cluster</text>
  <text x="302" y="224" text-anchor="middle" font-size="9.5" fill="#444">centroids (Tomek Links)</text>

  <!-- Class Weights -->
  <rect x="225" y="258" width="155" height="80" fill="#C4A87A" opacity="0.2" rx="3" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="302" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#5C3D1E">Class Weights</text>
  <text x="302" y="292" text-anchor="middle" font-size="9.5" fill="#444">Penalize misclassifying</text>
  <text x="302" y="306" text-anchor="middle" font-size="9.5" fill="#444">minority more heavily</text>
  <text x="302" y="320" text-anchor="middle" font-size="9.5" fill="#7C2530">w = N / (k · nᵢ)</text>
  <text x="302" y="334" text-anchor="middle" font-size="9" fill="#6B5D4F">in loss function</text>

  <!-- Panel 3: Metrics -->
  <rect x="410" y="30" width="185" height="165" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="502" y="52" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Better Metrics</text>

  <text x="430" y="74" font-size="10" fill="#7C2530" font-weight="bold">ROC-AUC</text>
  <text x="430" y="89" font-size="9.5" fill="#444">Often misleading under</text>
  <text x="430" y="102" font-size="9.5" fill="#444">imbalance. High AUC can</text>
  <text x="430" y="115" font-size="9.5" fill="#444">still mean 0 fraud caught.</text>

  <line x1="420" y1="123" x2="584" y2="123" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="430" y="138" font-size="10" fill="#2D5A8E" font-weight="bold">PR-AUC &amp; F1 Score</text>
  <text x="430" y="153" font-size="9.5" fill="#444">Focus on the minority class.</text>
  <text x="430" y="167" font-size="9.5" fill="#444">PR-AUC collapses when</text>
  <text x="430" y="181" font-size="9.5" fill="#444">positives are rare.</text>

  <!-- Panel 4: Threshold Moving -->
  <rect x="410" y="210" width="185" height="160" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="502" y="232" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">Threshold Moving</text>
  <text x="430" y="254" font-size="9.5" fill="#444">Default threshold: 0.5</text>
  <text x="430" y="268" font-size="9.5" fill="#444">Lower it (e.g. 0.2) to catch</text>
  <text x="430" y="282" font-size="9.5" fill="#444">more positives at cost of</text>
  <text x="430" y="296" font-size="9.5" fill="#444">more false positives.</text>
  <!-- threshold diagram -->
  <line x1="425" y1="330" x2="585" y2="330" stroke="#888" stroke-width="1"/>
  <rect x="425" y="316" width="96" height="14" fill="#2D5A8E" opacity="0.25" rx="2"/>
  <rect x="521" y="316" width="64" height="14" fill="#7C2530" opacity="0.25" rx="2"/>
  <line x1="521" y1="310" x2="521" y2="345" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="521" y="356" text-anchor="middle" font-size="9" fill="#5C3D1E">0.2</text>
  <text x="460" y="326" text-anchor="middle" font-size="8.5" fill="#2D5A8E">predict positive</text>
  <text x="555" y="326" text-anchor="middle" font-size="8.5" fill="#7C2530">negative</text>

  <!-- Panel 5: Right side summary -->
  <rect x="610" y="30" width="170" height="340" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="695" y="52" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">When It Matters</text>

  <!-- Meter graphic -->
  <rect x="630" y="65" width="130" height="14" fill="#eee" rx="7"/>
  <rect x="630" y="65" width="20" height="14" fill="#7C2530" rx="7"/>
  <text x="695" y="76" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="bold">1%</text>
  <text x="695" y="94" text-anchor="middle" font-size="9" fill="#7C2530">Fraud / Disease</text>
  <text x="695" y="106" text-anchor="middle" font-size="8.5" fill="#444">Imbalance critical</text>

  <rect x="630" y="120" width="130" height="14" fill="#eee" rx="7"/>
  <rect x="630" y="120" width="65" height="14" fill="#C4A87A" rx="7"/>
  <text x="695" y="131" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-weight="bold">50%</text>
  <text x="695" y="149" text-anchor="middle" font-size="9" fill="#5C3D1E">Customer Churn</text>
  <text x="695" y="161" text-anchor="middle" font-size="8.5" fill="#444">Moderate concern</text>

  <rect x="630" y="175" width="130" height="14" fill="#eee" rx="7"/>
  <rect x="630" y="175" width="110" height="14" fill="#2D5A8E" rx="7"/>
  <text x="695" y="186" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="bold">85%</text>
  <text x="695" y="204" text-anchor="middle" font-size="9" fill="#2D5A8E">Spam Detection</text>
  <text x="695" y="216" text-anchor="middle" font-size="8.5" fill="#444">Often fine as-is</text>

  <line x1="625" y1="232" x2="775" y2="232" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="695" y="252" text-anchor="middle" font-size="10" font-weight="bold" fill="#5C3D1E">Key Rule</text>
  <text x="695" y="270" text-anchor="middle" font-size="9.5" fill="#444">Imbalance only hurts</text>
  <text x="695" y="284" text-anchor="middle" font-size="9.5" fill="#444">when you care about</text>
  <text x="695" y="298" text-anchor="middle" font-size="9.5" fill="#444">the minority class.</text>
  <text x="695" y="316" text-anchor="middle" font-size="9.5" fill="#444">Fix your metric first,</text>
  <text x="695" y="330" text-anchor="middle" font-size="9.5" fill="#444">then resample if</text>
  <text x="695" y="344" text-anchor="middle" font-size="9.5" fill="#444">still needed.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>
