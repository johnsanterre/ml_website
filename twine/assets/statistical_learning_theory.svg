<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Statistical Learning Theory</text>
  <!-- Generalization bound diagram -->
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#555">Risk Decomposition</text>
  <!-- Three error boxes -->
  <rect x="50" y="80" width="200" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-size="13" fill="#2196F3" font-weight="bold">Training Error</text>
  <text x="150" y="133" text-anchor="middle" font-size="12" fill="#555">R̂(h) empirical</text>
  <text x="150" y="150" text-anchor="middle" font-size="12" fill="#555">risk on sample</text>
  <line x1="252" y1="120" x2="290" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a9)"/>
  <defs><marker id="a9" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker></defs>
  <text x="270" y="113" text-anchor="middle" font-size="10" fill="#555">+gap</text>
  <rect x="290" y="80" width="200" height="80" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="390" y="110" text-anchor="middle" font-size="13" fill="#E91E63" font-weight="bold">True Risk</text>
  <text x="390" y="133" text-anchor="middle" font-size="12" fill="#555">R(h) population</text>
  <text x="390" y="150" text-anchor="middle" font-size="12" fill="#555">risk (unknown)</text>
  <line x1="492" y1="120" x2="530" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a9)"/>
  <text x="511" y="113" text-anchor="middle" font-size="10" fill="#555">+gap</text>
  <rect x="530" y="80" width="220" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="640" y="110" text-anchor="middle" font-size="13" fill="#4CAF50" font-weight="bold">Bayes Error</text>
  <text x="640" y="133" text-anchor="middle" font-size="12" fill="#555">R* irreducible</text>
  <text x="640" y="150" text-anchor="middle" font-size="12" fill="#555">(noise floor)</text>
  <!-- Generalization bound -->
  <rect x="80" y="195" width="640" height="75" rx="8" fill="#FFF8E1" stroke="#FF9800" stroke-width="2"/>
  <text x="400" y="222" text-anchor="middle" font-size="13" fill="#FF9800" font-weight="bold">PAC Generalization Bound</text>
  <text x="400" y="248" text-anchor="middle" font-size="13" fill="#333">R(h) ≤ R̂(h) + O(√( (log|H| + log(1/δ)) / n ))</text>
  <text x="400" y="264" text-anchor="middle" font-size="11" fill="#888">with prob 1−δ, for hypothesis class H and n samples</text>
  <!-- VC dimension note -->
  <rect x="80" y="295" width="640" height="75" rx="8" fill="#f9f9f9" stroke="#ddd"/>
  <text x="400" y="320" text-anchor="middle" font-size="12" fill="#333">VC dimension d_VC → R(h) ≤ R̂(h) + O(√(d_VC/n))</text>
  <text x="400" y="345" text-anchor="middle" font-size="12" fill="#555">Richer class ⟹ higher d_VC ⟹ more data needed to generalize</text>
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#888">Connects to bias-variance tradeoff and regularization</text>
</svg>
