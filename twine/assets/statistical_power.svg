<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">Statistical Power: Probability of Detecting a True Effect</text>

  <!-- Panel 1: Two-distribution diagram -->
  <rect x="15" y="48" width="430" height="230" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="230" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">THE FOUR-OUTCOME PICTURE</text>

  <!-- H0 distribution (null) -->
  <text x="140" y="88" text-anchor="middle" font-size="9" fill="#2D5A8E">H₀ true distribution</text>
  <polyline fill="none" stroke="#2D5A8E" stroke-width="2" opacity="0.8"
    points="30,220 45,218 60,210 75,195 90,170 105,138 120,105 135,82 150,74 165,82 180,105 195,138 210,170 225,195 240,210 255,218 270,220"/>
  <!-- Alpha region fill -->
  <polygon points="218,173 225,195 232,208 239,216 245,219 250,220 255,219 260,218 265,217 270,220 270,225 218,225"
    fill="#7C2530" opacity="0.35"/>

  <!-- H1 distribution (alternative) -->
  <text x="320" y="88" text-anchor="middle" font-size="9" fill="#7C2530">H₁ true distribution</text>
  <polyline fill="none" stroke="#7C2530" stroke-width="2" opacity="0.8"
    points="200,220 215,218 230,210 245,195 260,170 275,138 290,105 305,82 320,74 335,82 350,105 365,138 380,170 395,195 410,210 425,218 435,220"/>
  <!-- Power region fill -->
  <polygon points="218,225 218,173 225,195 232,208 239,216 245,219 250,220 255,219 260,218 265,217 268,220 280,218 295,210 310,195 325,170 340,138 355,105 365,90 375,82 385,90 395,105 400,118 410,140 420,165 430,190 435,215 435,225"
    fill="#7C2530" opacity="0.22"/>

  <!-- Critical value line -->
  <line x1="235" y1="72" x2="235" y2="225" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="235" y="240" text-anchor="middle" font-size="9" fill="#5C3D1E">critical value</text>

  <!-- Labels -->
  <text x="155" y="208" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">β</text>
  <text x="155" y="220" text-anchor="middle" font-size="8" fill="#2D5A8E">(Type II)</text>
  <text x="258" y="208" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">α</text>
  <text x="258" y="220" text-anchor="middle" font-size="8" fill="#7C2530">(Type I)</text>
  <text x="370" y="180" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Power</text>
  <text x="370" y="193" text-anchor="middle" font-size="9" fill="#7C2530">= 1 − β</text>

  <!-- Arrows -->
  <line x1="370" y1="196" x2="355" y2="210" stroke="#7C2530" stroke-width="1"/>
  <polygon points="352,213 358,208 360,215" fill="#7C2530"/>

  <!-- Panel 2: Four factors -->
  <rect x="460" y="48" width="322" height="230" fill="#F0EBE1" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="621" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">FOUR FACTORS CONTROLLING POWER</text>

  <!-- Factor boxes -->
  <rect x="470" y="80" width="140" height="60" fill="#FFF8EE" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="540" y="99" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Effect Size d</text>
  <text x="540" y="115" text-anchor="middle" font-size="9" fill="#5C3D1E">larger d → higher power</text>
  <text x="540" y="130" text-anchor="middle" font-size="9" fill="#6B5D4F">distributions further apart</text>

  <rect x="625" y="80" width="140" height="60" fill="#FFF8EE" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="695" y="99" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Sample Size n</text>
  <text x="695" y="115" text-anchor="middle" font-size="9" fill="#5C3D1E">larger n → higher power</text>
  <text x="695" y="130" text-anchor="middle" font-size="9" fill="#6B5D4F">SE = σ/√n shrinks</text>

  <rect x="470" y="152" width="140" height="60" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="540" y="171" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Sig. Level α</text>
  <text x="540" y="187" text-anchor="middle" font-size="9" fill="#5C3D1E">larger α → higher power</text>
  <text x="540" y="202" text-anchor="middle" font-size="9" fill="#6B5D4F">critical value moves left</text>

  <rect x="625" y="152" width="140" height="60" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="695" y="171" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Variance σ²</text>
  <text x="695" y="187" text-anchor="middle" font-size="9" fill="#5C3D1E">larger σ² → lower power</text>
  <text x="695" y="202" text-anchor="middle" font-size="9" fill="#6B5D4F">distributions spread wider</text>

  <!-- Bottom row: two panels -->
  <rect x="15" y="290" width="335" height="90" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="182" y="308" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">POWER ANALYSIS FORMULA</text>
  <text x="182" y="330" text-anchor="middle" font-size="11" fill="#5C3D1E">n ≈ (z_α + z_β)² · 2σ² / δ²</text>
  <text x="182" y="350" text-anchor="middle" font-size="9" fill="#6B5D4F">δ = minimum detectable effect size</text>
  <text x="182" y="367" text-anchor="middle" font-size="9" fill="#6B5D4F">Run before collecting data — not after!</text>

  <rect x="365" y="290" width="418" height="90" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="574" y="308" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">WINNER'S CURSE  /  TYPE S &amp; M ERRORS</text>
  <text x="574" y="328" text-anchor="middle" font-size="9" fill="#7C2530">Underpowered study: only extreme results reach significance</text>
  <text x="574" y="345" text-anchor="middle" font-size="9" fill="#6B5D4F">Type S error: sign wrong  ·  Type M: magnitude exaggerated</text>
  <text x="574" y="362" text-anchor="middle" font-size="9" fill="#6B5D4F">Replication crisis root cause: too many low-power studies</text>

  <!-- Bottom label -->
  <text x="400" y="391" text-anchor="middle" font-size="9" fill="#6B5D4F">Power = 1 − β  ·  Conventionally target 80%  ·  Plan sample size before data collection</text>
</svg>
