<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">Self-supervised Learning: Labels from the Data Itself</text>

  <!-- Panel 1: Pretext Task – Masked LM -->
  <rect x="15" y="48" width="235" height="310" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="127" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">MASKED LANGUAGE MODEL (BERT)</text>

  <!-- Token row -->
  <rect x="28" y="84" width="44" height="32" fill="#2D5A8E" opacity="0.7" rx="3"/>
  <text x="50" y="105" text-anchor="middle" font-size="10" fill="#FDFAF4">The</text>

  <rect x="78" y="84" width="44" height="32" fill="#2D5A8E" opacity="0.7" rx="3"/>
  <text x="100" y="105" text-anchor="middle" font-size="10" fill="#FDFAF4">cat</text>

  <rect x="128" y="84" width="44" height="32" fill="#7C2530" opacity="0.85" rx="3"/>
  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#FDFAF4">[MASK]</text>

  <rect x="178" y="84" width="58" height="32" fill="#2D5A8E" opacity="0.7" rx="3"/>
  <text x="207" y="105" text-anchor="middle" font-size="10" fill="#FDFAF4">on the</text>

  <!-- Arrow down -->
  <line x1="127" y1="118" x2="127" y2="148" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="123,148 127,158 131,148" fill="#C4A87A"/>

  <!-- Encoder block -->
  <rect x="28" y="160" width="210" height="44" fill="#2D5A8E" opacity="0.65" rx="3"/>
  <text x="133" y="183" text-anchor="middle" font-size="11" fill="#FDFAF4">Transformer Encoder</text>
  <text x="133" y="198" text-anchor="middle" font-size="9" fill="#D4C5A9">contextual representations</text>

  <!-- Arrow down -->
  <line x1="127" y1="206" x2="127" y2="232" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="123,232 127,242 131,232" fill="#C4A87A"/>

  <!-- Prediction box -->
  <rect x="78" y="244" width="100" height="32" fill="#C4A87A" opacity="0.5" rx="3"/>
  <text x="128" y="265" text-anchor="middle" font-size="11" fill="#5C3D1E">sat? mat? hat?</text>

  <text x="128" y="308" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">15% tokens masked</text>
  <text x="128" y="322" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">model predicts originals</text>
  <text x="128" y="336" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">no human labels needed</text>

  <!-- Panel 2: Next Token Prediction -->
  <rect x="265" y="48" width="220" height="310" fill="#F0EBE1" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="375" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">NEXT-TOKEN PREDICTION (GPT)</text>

  <!-- Causal sequence -->
  <rect x="280" y="84" width="36" height="28" fill="#2D5A8E" opacity="0.7" rx="2"/>
  <text x="298" y="103" text-anchor="middle" font-size="10" fill="#FDFAF4">The</text>

  <rect x="322" y="84" width="36" height="28" fill="#2D5A8E" opacity="0.7" rx="2"/>
  <text x="340" y="103" text-anchor="middle" font-size="10" fill="#FDFAF4">cat</text>

  <rect x="364" y="84" width="36" height="28" fill="#2D5A8E" opacity="0.7" rx="2"/>
  <text x="382" y="103" text-anchor="middle" font-size="10" fill="#FDFAF4">sat</text>

  <rect x="406" y="84" width="60" height="28" fill="#7C2530" opacity="0.75" rx="2"/>
  <text x="436" y="103" text-anchor="middle" font-size="10" fill="#FDFAF4">→ on?</text>

  <!-- Causal mask diagram -->
  <rect x="280" y="128" width="180" height="90" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.8" rx="2"/>
  <text x="370" y="148" text-anchor="middle" font-size="9" fill="#6B5D4F">causal attention mask</text>

  <!-- Triangle fill -->
  <polygon points="295,158 295,208 345,208" fill="#2D5A8E" opacity="0.2"/>
  <polygon points="295,158 345,158 345,208" fill="#2D5A8E" opacity="0.07"/>
  <text x="320" y="190" text-anchor="middle" font-size="8" fill="#2D5A8E">attend</text>
  <text x="380" y="185" text-anchor="middle" font-size="8" fill="#7C2530">masked</text>
  <line x1="295" y1="158" x2="455" y2="208" stroke="#7C2530" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Arrow + prediction -->
  <line x1="375" y1="222" x2="375" y2="248" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="371,248 375,258 379,248" fill="#C4A87A"/>
  <text x="375" y="275" text-anchor="middle" font-size="10" fill="#5C3D1E">Predict next token</text>
  <text x="375" y="295" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">every position is a</text>
  <text x="375" y="308" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">labeled training example</text>

  <!-- Panel 3: MAE / Image SSL -->
  <rect x="500" y="48" width="180" height="310" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.8" rx="4"/>
  <text x="590" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">MASKED AUTOENCODER</text>

  <!-- Grid of patches -->
  <rect x="522" y="82" width="136" height="136" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="0.8" rx="2"/>
  <!-- 4x4 patch grid -->
  <line x1="556" y1="82" x2="556" y2="218" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="590" y1="82" x2="590" y2="218" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="624" y1="82" x2="624" y2="218" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="522" y1="116" x2="658" y2="116" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="522" y1="150" x2="658" y2="150" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="522" y1="184" x2="658" y2="184" stroke="#D4C5A9" stroke-width="0.5"/>

  <!-- Masked patches (dark) -->
  <rect x="557" y="83" width="32" height="32" fill="#7C2530" opacity="0.7"/>
  <rect x="591" y="117" width="32" height="32" fill="#7C2530" opacity="0.7"/>
  <rect x="523" y="151" width="32" height="32" fill="#7C2530" opacity="0.7"/>
  <rect x="625" y="83" width="32" height="32" fill="#7C2530" opacity="0.7"/>
  <rect x="557" y="185" width="32" height="32" fill="#7C2530" opacity="0.7"/>

  <text x="590" y="238" text-anchor="middle" font-size="9" fill="#7C2530">75% patches masked</text>

  <!-- Arrow + reconstruct -->
  <line x1="590" y1="248" x2="590" y2="268" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="586,268 590,278 594,268" fill="#C4A87A"/>
  <text x="590" y="294" text-anchor="middle" font-size="10" fill="#5C3D1E">Reconstruct pixels</text>
  <text x="590" y="314" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">encoder sees only</text>
  <text x="590" y="327" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">visible patches</text>
  <text x="590" y="340" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">(efficient!)</text>

  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">Pretext task creates free labels  ·  Representations transfer to downstream tasks with little fine-tuning data</text>
</svg>
