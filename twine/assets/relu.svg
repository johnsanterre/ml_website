<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Activation Functions</text>
  <!-- ReLU -->
  <line x1="60" y1="320" x2="260" y2="320" stroke="#ccc" stroke-width="1"/>
  <line x1="160" y1="360" x2="160" y2="100" stroke="#ccc" stroke-width="1"/>
  <polyline points="60,320 160,320 260,100" fill="none" stroke="#4a90d9" stroke-width="3"/>
  <text x="160" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#4a90d9">ReLU</text>
  <text x="160" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">max(0, x)</text>
  <!-- Sigmoid -->
  <line x1="310" y1="320" x2="510" y2="320" stroke="#ccc" stroke-width="1"/>
  <line x1="410" y1="360" x2="410" y2="100" stroke="#ccc" stroke-width="1"/>
  <path d="M310,315 Q340,314 380,290 Q410,250 440,210 Q460,170 480,145 Q500,130 510,125" fill="none" stroke="#e67e22" stroke-width="3"/>
  <text x="410" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e67e22">Sigmoid</text>
  <text x="410" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">1/(1+e⁻ˣ)</text>
  <!-- Tanh -->
  <line x1="560" y1="230" x2="760" y2="230" stroke="#ccc" stroke-width="1"/>
  <line x1="660" y1="360" x2="660" y2="100" stroke="#ccc" stroke-width="1"/>
  <path d="M560,320 Q590,318 620,290 Q650,240 660,230 Q670,220 700,170 Q730,140 760,135" fill="none" stroke="#27ae60" stroke-width="3"/>
  <text x="660" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#27ae60">Tanh</text>
  <text x="660" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">(e^x-e^-x)/(e^x+e^-x)</text>
  <!-- Labels -->
  <text x="210" y="110" font-family="Arial" font-size="11" fill="#4a90d9">no vanishing</text>
  <text x="210" y="125" font-family="Arial" font-size="11" fill="#4a90d9">gradient (x&gt;0)</text>
  <text x="460" y="290" font-family="Arial" font-size="11" fill="#e67e22">squashes to</text>
  <text x="460" y="305" font-family="Arial" font-size="11" fill="#e67e22">(0,1)</text>
</svg>
