  <rect x="198" y="120" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="242" y="146" text-anchor="middle" fill="#C05A20" font-size="12">u₂·v₁</text>

  <rect x="294" y="120" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.18" stroke="#E07B39" stroke-width="1.5"/>
  <text x="338" y="146" text-anchor="middle" fill="#C05A20" font-size="12">u₂·v₂</text>

  <rect x="390" y="120" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="434" y="146" text-anchor="middle" fill="#C05A20" font-size="12">u₂·v₃</text>

  <rect x="486" y="120" width="100" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="536" y="146" text-anchor="middle" fill="#C05A20" font-size="12">u₂·v₄</text>

