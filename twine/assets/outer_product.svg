  <rect x="198" y="172" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="242" y="198" text-anchor="middle" fill="#C05A20" font-size="12">u₃·v₁</text>

  <rect x="294" y="172" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="338" y="198" text-anchor="middle" fill="#C05A20" font-size="12">u₃·v₂</text>

  <rect x="390" y="172" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.18" stroke="#E07B39" stroke-width="1.5"/>
  <text x="434" y="198" text-anchor="middle" fill="#C05A20" font-size="12">u₃·v₃</text>

  <rect x="486" y="172" width="100" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="536" y="198" text-anchor="middle" fill="#C05A20" font-size="12">u₃·v₄</text>

  <!-- Row 4 -->
  <rect x="198" y="224" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="242" y="250" text-anchor="middle" fill="#C05A20" font-size="12">u₄·v₁</text>

  <rect x="294" y="224" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="338" y="250" text-anchor="middle" fill="#C05A20" font-size="12">u₄·v₂</text>

  <rect x="390" y="224" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="434" y="250" text-anchor="middle" fill="#C05A20" font-size="12">u₄·v₃</text>

  <rect x="486" y="224" width="100" height="48" rx="4" fill="#E07B39" fill-opacity="0.18" stroke="#E07B39" stroke-width="1.5"/>
  <text x="536" y="250" text-anchor="middle" fill="#C05A20" font-size="12">u₄·v₄</text>

  <!-- Matrix label -->
