  <!-- Key note -->
  <text x="680" y="185" text-anchor="middle" fill="#888" font-size="11">Each entry</text>
  <text x="680" y="200" text-anchor="middle" fill="#888" font-size="11">= uᵢ × vⱼ</text>
  <text x="680" y="230" text-anchor="middle" fill="#888" font-size="11">All rows are</text>
  <text x="680" y="245" text-anchor="middle" fill="#888" font-size="11">multiples of vᵀ</text>
  <text x="680" y="275" text-anchor="middle" fill="#888" font-size="11">→ rank 1</text>
