  <line x1="52" y1="272" x2="58" y2="272" stroke="#2C5F8A" stroke-width="2"/>
  <line x1="118" y1="68" x2="124" y2="68" stroke="#2C5F8A" stroke-width="2"/>
  <line x1="124" y1="68" x2="124" y2="272" stroke="#2C5F8A" stroke-width="2"/>
  <line x1="124" y1="272" x2="118" y2="272" stroke="#2C5F8A" stroke-width="2"/>

  <!-- u cells -->
  <rect x="58" y="68" width="60" height="48" rx="4" fill="#2C5F8A" fill-opacity="0.12" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="88" y="99" text-anchor="middle" fill="#2C5F8A" font-size="15">u₁</text>

  <rect x="58" y="120" width="60" height="48" rx="4" fill="#2C5F8A" fill-opacity="0.12" stroke="#2C5F8A" stroke-width="1.5"/>
