  <rect x="390" y="68" width="88" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="434" y="94" text-anchor="middle" fill="#C05A20" font-size="12">u₁·v₃</text>

  <rect x="486" y="68" width="100" height="48" rx="4" fill="#E07B39" fill-opacity="0.10" stroke="#E07B39" stroke-width="1.2"/>
  <text x="536" y="94" text-anchor="middle" fill="#C05A20" font-size="12">u₁·v₄</text>

