  <rect x="198" y="52" width="88" height="16" rx="3" fill="#4A7C59" fill-opacity="0.12" stroke="#4A7C59" stroke-width="1.5"/>
  <text x="242" y="64" text-anchor="middle" fill="#4A7C59" font-size="12">v₁</text>

