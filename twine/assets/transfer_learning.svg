<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" style="font-family:Georgia,serif;">
  <defs>
    <marker id="tl-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="tl-arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="598" height="308" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel divider -->
  <line x1="292" y1="26" x2="292" y2="293" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ LEFT PANEL: PRE-TRAINING ══ -->
  <text x="145" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">PRE-TRAINING</text>

  <!-- Dataset label -->
  <text x="145" y="36" text-anchor="middle" font-size="9" fill="#5C3D1E">Large dataset (ImageNet)</text>

  <!-- Neural network: input layer (left), hidden1, hidden2, output -->
  <!-- Input layer: 5 nodes at x=42 -->
  <rect x="28" y="50" width="22" height="178" fill="#DCCFA8" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="39" y="145" text-anchor="middle" font-size="8" fill="#5C3D1E" transform="rotate(-90,39,145)">input</text>
  <!-- Input nodes -->
  <circle cx="39" cy="70"  r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>
  <circle cx="39" cy="92"  r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>
  <circle cx="39" cy="114" r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>
  <circle cx="39" cy="136" r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>
  <circle cx="39" cy="158" r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>
  <circle cx="39" cy="180" r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>
  <circle cx="39" cy="202" r="5" fill="#C4A87A" stroke="#8A7038" stroke-width="1"/>

  <!-- Connection lines (input to hidden1) -->
  <line x1="50" y1="70"  x2="80" y2="78"  stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="92"  x2="80" y2="78"  stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="114" x2="80" y2="100" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="136" x2="80" y2="122" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="158" x2="80" y2="144" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="180" x2="80" y2="166" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="202" x2="80" y2="188" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="136" x2="80" y2="166" stroke="#D4C5A9" stroke-width="0.7" opacity="0.5"/>
  <line x1="50" y1="92"  x2="80" y2="122" stroke="#D4C5A9" stroke-width="0.7" opacity="0.5"/>

  <!-- Hidden layer 1: x=80, nodes -->
  <rect x="74" y="60" width="22" height="150" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <circle cx="85" cy="78"  r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="85" cy="100" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="85" cy="122" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="85" cy="144" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="85" cy="166" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="85" cy="188" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <text x="85" y="218" text-anchor="middle" font-size="7" fill="#6B5D4F">hidden 1</text>

  <!-- Connection lines (hidden1 to hidden2) -->
  <line x1="96" y1="78"  x2="126" y2="90"  stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="96" y1="100" x2="126" y2="90"  stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="96" y1="122" x2="126" y2="112" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="96" y1="144" x2="126" y2="134" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="96" y1="166" x2="126" y2="156" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="96" y1="188" x2="126" y2="178" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="96" y1="122" x2="126" y2="156" stroke="#D4C5A9" stroke-width="0.7" opacity="0.5"/>
  <line x1="96" y1="144" x2="126" y2="112" stroke="#D4C5A9" stroke-width="0.7" opacity="0.5"/>

  <!-- Hidden layer 2: x=120 -->
  <rect x="120" y="70" width="22" height="130" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <circle cx="131" cy="90"  r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="131" cy="112" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="131" cy="134" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="131" cy="156" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <circle cx="131" cy="178" r="5" fill="#DCCFA8" stroke="#A89058" stroke-width="1"/>
  <text x="131" y="212" text-anchor="middle" font-size="7" fill="#6B5D4F">hidden 2</text>

  <!-- Connection lines (hidden2 to output) -->
  <line x1="142" y1="90"  x2="172" y2="112" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="142" y1="112" x2="172" y2="112" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="142" y1="134" x2="172" y2="134" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="142" y1="156" x2="172" y2="134" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="142" y1="178" x2="172" y2="156" stroke="#D4C5A9" stroke-width="0.7" opacity="0.7"/>
  <line x1="142" y1="112" x2="172" y2="156" stroke="#D4C5A9" stroke-width="0.7" opacity="0.5"/>

  <!-- Output layer: x=172 -->
  <rect x="166" y="94" width="22" height="78" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.2" rx="3"/>
