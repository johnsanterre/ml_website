  <text x="177" y="194" text-anchor="middle" font-size="7" fill="#6B5D4F">1000 cls</text>

  <!-- Arrow and label: learns general features -->
  <line x1="200" y1="134" x2="255" y2="134" stroke="#5C3D1E" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#tl-arr)"/>
  <text x="227" y="128" text-anchor="middle" font-size="7.5" fill="#5C3D1E">learns general</text>
  <text x="227" y="140" text-anchor="middle" font-size="7.5" fill="#5C3D1E">features</text>

  <!-- Feature thumbnail boxes below network -->
  <rect x="28"  y="232" width="52" height="22" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="54"  y="247" text-anchor="middle" font-size="8" fill="#5C3D1E">edges</text>
  <rect x="93"  y="232" width="52" height="22" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="119" y="247" text-anchor="middle" font-size="8" fill="#5C3D1E">textures</text>
  <rect x="158" y="232" width="52" height="22" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1" rx="2"/>
  <text x="184" y="247" text-anchor="middle" font-size="8" fill="#5C3D1E">shapes</text>

  <!-- ══ RIGHT PANEL: FINE-TUNING ══ -->
  <text x="443" y="18" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">FINE-TUNING</text>

  <!-- Dataset label -->
  <text x="443" y="36" text-anchor="middle" font-size="9" fill="#5C3D1E">Small dataset (medical images)</text>

  <!-- Small dataset icon: 4 labeled points -->
  <circle cx="388" cy="50" r="4" fill="#7C2530"/>
  <circle cx="400" cy="56" r="4" fill="#7C2530"/>
  <circle cx="394" cy="44" r="4" fill="#2D5A8E"/>
  <circle cx="406" cy="48" r="4" fill="#2D5A8E"/>
  <text x="420" y="55" font-size="7.5" fill="#6B5D4F">few samples</text>

  <!-- Frozen layers: input and hidden1 (grey) -->
  <!-- Input layer frozen -->
  <rect x="318" y="70" width="22" height="150" fill="#CCCCCC" stroke="#AAAAAA" stroke-width="1.2" rx="3"/>
  <circle cx="329" cy="85"  r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="329" cy="107" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="329" cy="129" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="329" cy="151" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="329" cy="173" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="329" cy="195" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>

  <!-- Frozen hidden1 -->
  <line x1="340" y1="85"  x2="370" y2="95"  stroke="#CCCCCC" stroke-width="0.7"/>
  <line x1="340" y1="107" x2="370" y2="95"  stroke="#CCCCCC" stroke-width="0.7"/>
  <line x1="340" y1="129" x2="370" y2="118" stroke="#CCCCCC" stroke-width="0.7"/>
  <line x1="340" y1="151" x2="370" y2="140" stroke="#CCCCCC" stroke-width="0.7"/>
  <line x1="340" y1="173" x2="370" y2="162" stroke="#CCCCCC" stroke-width="0.7"/>
  <line x1="340" y1="195" x2="370" y2="185" stroke="#CCCCCC" stroke-width="0.7"/>
  <rect x="364" y="78" width="22" height="118" fill="#CCCCCC" stroke="#AAAAAA" stroke-width="1.2" rx="3"/>
  <circle cx="375" cy="95"  r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="375" cy="118" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="375" cy="140" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="375" cy="162" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>
  <circle cx="375" cy="185" r="5" fill="#BBBBBB" stroke="#888" stroke-width="1"/>

  <!-- Frozen label + lock icon -->
  <text x="344" y="230" text-anchor="middle" font-size="8" fill="#888888">frozen</text>
  <!-- Lock icon: small rectangle with circle arc -->
  <rect x="336" y="216" width="10" height="8" fill="none" stroke="#888" stroke-width="1.2" rx="1"/>
  <path d="M338,216 Q338,211 341,211 Q344,211 344,216" fill="none" stroke="#888" stroke-width="1.2"/>

  <!-- Active (fine-tuned) layers: hidden2 and output in warm red -->
  <line x1="386" y1="95"  x2="416" y2="106" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="386" y1="118" x2="416" y2="106" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="386" y1="140" x2="416" y2="128" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="386" y1="162" x2="416" y2="150" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="386" y1="185" x2="416" y2="172" stroke="#D4C5A9" stroke-width="0.7"/>
  <rect x="410" y="88" width="22" height="100" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <circle cx="421" cy="106" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>
  <circle cx="421" cy="128" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>
  <circle cx="421" cy="150" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>
  <circle cx="421" cy="172" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>
  <text x="421" y="200" text-anchor="middle" font-size="7" fill="#7C2530">active</text>

  <!-- Output layer active -->
  <line x1="432" y1="106" x2="460" y2="120" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="432" y1="128" x2="460" y2="140" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="432" y1="150" x2="460" y2="140" stroke="#D4C5A9" stroke-width="0.7"/>
  <line x1="432" y1="172" x2="460" y2="160" stroke="#D4C5A9" stroke-width="0.7"/>
  <rect x="454" y="108" width="22" height="60" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <circle cx="465" cy="120" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>
  <circle cx="465" cy="140" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>
  <circle cx="465" cy="160" r="5" fill="#E9A0A8" stroke="#7C2530" stroke-width="1"/>

  <!-- Output class change annotation -->
  <text x="480" y="120" font-size="8" fill="#888" text-decoration="line-through">1000 cls</text>
  <text x="480" y="135" font-size="8" fill="#7C2530">2 classes</text>
  <text x="480" y="147" font-size="7.5" fill="#7C2530">(disease/</text>
  <text x="480" y="158" font-size="7.5" fill="#7C2530">healthy)</text>

  <!-- Fine-tune label -->
  <text x="443" y="248" text-anchor="middle" font-size="8.5" fill="#5C3D1E">fine-tune only top layers</text>
  <text x="443" y="262" text-anchor="middle" font-size="8" fill="#6B5D4F">frozen layers: reused weights</text>
</svg>
