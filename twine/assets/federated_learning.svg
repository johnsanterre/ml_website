<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#7C2530" text-anchor="middle">Federated Learning: Train Without Sharing Data</text>

  <!-- Central server -->
  <ellipse cx="400" cy="195" rx="80" ry="46" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="190" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Central</text>
  <text x="400" y="207" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Server</text>

  <!-- Device 1 - top left -->
  <rect x="50" y="60" width="130" height="72" rx="8" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="115" y="88" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Device 1</text>
  <text x="115" y="106" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Hospital A</text>
  <text x="115" y="122" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">local data stays here</text>

  <!-- Device 2 - bottom left -->
  <rect x="50" y="268" width="130" height="72" rx="8" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="115" y="296" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Device 2</text>
  <text x="115" y="314" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Hospital B</text>
  <text x="115" y="330" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">local data stays here</text>

  <!-- Device 3 - top right -->
  <rect x="620" y="60" width="130" height="72" rx="8" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="685" y="88" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Device 3</text>
  <text x="685" y="106" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Hospital C</text>
  <text x="685" y="122" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">local data stays here</text>

  <!-- Device 4 - bottom right -->
  <rect x="620" y="268" width="130" height="72" rx="8" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="685" y="296" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Device 4</text>
  <text x="685" y="314" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Hospital D</text>
  <text x="685" y="330" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">local data stays here</text>

  <!-- Arrows: server -> devices (send global model) -->
  <line x1="325" y1="164" x2="182" y2="118" stroke="#C4A87A" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowtan2)"/>
  <line x1="325" y1="222" x2="182" y2="282" stroke="#C4A87A" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowtan2)"/>
  <line x1="475" y1="164" x2="618" y2="118" stroke="#C4A87A" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowtan2)"/>
  <line x1="475" y1="222" x2="618" y2="282" stroke="#C4A87A" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowtan2)"/>

  <!-- Arrows: devices -> server (send gradients only) -->
  <line x1="180" y1="112" x2="323" y2="160" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowred2)"/>
  <line x1="180" y1="288" x2="323" y2="228" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowred2)"/>
  <line x1="620" y1="112" x2="477" y2="160" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowred2)"/>
  <line x1="620" y1="288" x2="477" y2="228" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowred2)"/>

  <!-- Legend -->
  <line x1="200" y1="372" x2="240" y2="372" stroke="#C4A87A" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="248" y="376" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Global model broadcast</text>
  <line x1="430" y1="372" x2="470" y2="372" stroke="#7C2530" stroke-width="1.8"/>
  <text x="478" y="376" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Gradient updates only (no raw data)</text>

  <defs>
    <marker id="arrowtan2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
    <marker id="arrowred2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
