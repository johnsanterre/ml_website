<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Dynamic Programming</text>
  <!-- Grid for shortest path -->
  <text x="180" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Subproblem Grid (Shortest Path)</text>
  <rect x="40" y="85" width="290" height="250" rx="4" fill="#f8f8f8" stroke="#999" stroke-width="1.5"/>
  <!-- Grid cells with values -->
  <line x1="40" y1="135" x2="330" y2="135" stroke="#ddd" stroke-width="1"/>
  <line x1="40" y1="185" x2="330" y2="185" stroke="#ddd" stroke-width="1"/>
  <line x1="40" y1="235" x2="330" y2="235" stroke="#ddd" stroke-width="1"/>
  <line x1="40" y1="285" x2="330" y2="285" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="85" x2="100" y2="335" stroke="#ddd" stroke-width="1"/>
  <line x1="160" y1="85" x2="160" y2="335" stroke="#ddd" stroke-width="1"/>
  <line x1="220" y1="85" x2="220" y2="335" stroke="#ddd" stroke-width="1"/>
  <line x1="280" y1="85" x2="280" y2="335" stroke="#ddd" stroke-width="1"/>
  <!-- Values -->
  <text x="70" y="117" text-anchor="middle" font-family="Arial" font-size="13" fill="#27ae60" font-weight="bold">0</text>
  <text x="130" y="117" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">1</text>
  <text x="190" y="117" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">2</text>
  <text x="250" y="117" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">3</text>
  <text x="305" y="117" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">4</text>
  <text x="70" y="167" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">1</text>
  <text x="130" y="167" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">2</text>
  <text x="190" y="167" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">3</text>
  <text x="250" y="167" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">4</text>
  <text x="305" y="167" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">5</text>
  <text x="70" y="217" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">2</text>
  <text x="130" y="217" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">3</text>
  <text x="190" y="217" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">4</text>
  <text x="250" y="217" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">5</text>
  <text x="305" y="217" text-anchor="middle" font-family="Arial" font-size="13" fill="#4a90d9" font-weight="bold">6</text>
  <!-- Optimal path -->
  <polyline points="70,110 130,110 190,110 250,110 305,110 305,160 305,210" fill="none" stroke="#e74c3c" stroke-width="3" stroke-dasharray="6,3"/>
  <!-- Two pillars -->
  <rect x="380" y="100" width="380" height="200" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="570" y="128" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Two Key Properties</text>
  <text x="570" y="158" text-anchor="middle" font-family="Arial" font-size="13" fill="#4a90d9" font-weight="bold">Optimal Substructure</text>
  <text x="570" y="178" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Optimal solution contains</text>
  <text x="570" y="196" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">optimal sub-solutions</text>
  <line x1="390" y1="210" x2="750" y2="210" stroke="#ddd" stroke-width="1"/>
  <text x="570" y="232" text-anchor="middle" font-family="Arial" font-size="13" fill="#e67e22" font-weight="bold">Overlapping Subproblems</text>
  <text x="570" y="252" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Same sub-problems solved</text>
  <text x="570" y="270" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">multiple times → memoize</text>
</svg>
