<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- V matrix -->
  <rect x="40" y="100" width="80" height="200" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="80" y="88" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4a90d9">V</text>
  <text x="80" y="195" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">n × m</text>
  <text x="80" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Data</text>
  <!-- ≈ sign -->
  <text x="150" y="208" text-anchor="middle" font-family="Arial" font-size="28" fill="#333">≈</text>
  <!-- W matrix -->
  <rect x="190" y="100" width="60" height="200" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="220" y="88" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e67e22">W</text>
  <text x="220" y="195" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">n × k</text>
  <text x="220" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Basis</text>
  <!-- × sign -->
  <text x="270" y="208" text-anchor="middle" font-family="Arial" font-size="22" fill="#333">×</text>
  <!-- H matrix -->
  <rect x="300" y="155" width="200" height="60" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="143" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#27ae60">H</text>
  <text x="400" y="188" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">k × m</text>
  <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Coefficients</text>
  <!-- Non-negativity constraint -->
  <rect x="560" y="120" width="200" height="80" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="660" y="148" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e67e22">Non-negativity</text>
  <text x="660" y="168" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">W ≥ 0,  H ≥ 0</text>
  <text x="660" y="186" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">All values ≥ 0</text>
  <!-- Parts-based example -->
  <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Face = eyes component + nose component + mouth component</text>
  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">(Parts-based, additive representation)</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Non-negative Matrix Factorization (NMF)</text>
</svg>
