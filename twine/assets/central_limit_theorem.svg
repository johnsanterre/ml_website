<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">Central Limit Theorem</text>

  <!-- Panel 1: Original distribution (uniform/skewed) -->
  <rect x="18" y="50" width="175" height="305" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="105" y="72" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">POPULATION</text>

  <!-- Uniform distribution bars -->
  <text x="105" y="92" text-anchor="middle" font-size="9" fill="#5C3D1E">Uniform distribution</text>
  <!-- Bar chart uniform -->
  <rect x="35"  y="145" width="18" height="80" fill="#2D5A8E" opacity="0.7"/>
  <rect x="57"  y="145" width="18" height="80" fill="#2D5A8E" opacity="0.7"/>
  <rect x="79"  y="145" width="18" height="80" fill="#2D5A8E" opacity="0.7"/>
  <rect x="101" y="145" width="18" height="80" fill="#2D5A8E" opacity="0.7"/>
  <rect x="123" y="145" width="18" height="80" fill="#2D5A8E" opacity="0.7"/>
  <rect x="145" y="145" width="18" height="80" fill="#2D5A8E" opacity="0.7"/>
  <line x1="30" y1="226" x2="172" y2="226" stroke="#5C3D1E" stroke-width="1"/>
  <text x="105" y="243" text-anchor="middle" font-size="8" fill="#6B5D4F">flat — not Gaussian</text>

  <line x1="28" y1="260" x2="182" y2="260" stroke="#D4C5A9" stroke-width="0.8"/>

  <!-- Skewed distribution bars -->
  <text x="105" y="278" text-anchor="middle" font-size="9" fill="#5C3D1E">Skewed distribution</text>
  <rect x="35"  y="320" width="18" height="18" fill="#7C2530" opacity="0.7"/>
  <rect x="57"  y="310" width="18" height="28" fill="#7C2530" opacity="0.7"/>
  <rect x="79"  y="295" width="18" height="43" fill="#7C2530" opacity="0.7"/>
  <rect x="101" y="308" width="18" height="30" fill="#7C2530" opacity="0.7"/>
  <rect x="123" y="322" width="18" height="16" fill="#7C2530" opacity="0.7"/>
  <rect x="145" y="330" width="18" height="8"  fill="#7C2530" opacity="0.7"/>
  <line x1="30" y1="339" x2="172" y2="339" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Arrow -> -->
  <text x="200" y="195" font-size="22" fill="#C4A87A">→</text>

  <!-- Panel 2: Sample means distribution -->
  <rect x="207" y="50" width="230" height="305" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.5" rx="4"/>
  <text x="322" y="72" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">SAMPLING DISTRIBUTION  x̄</text>

  <!-- n=2 -->
  <text x="245" y="100" text-anchor="middle" font-size="9" fill="#5C3D1E">n = 2</text>
  <rect x="217" y="103" width="14" height="28" fill="#C4A87A" opacity="0.8"/>
  <rect x="233" y="103" width="14" height="42" fill="#C4A87A" opacity="0.8"/>
  <rect x="249" y="100" width="14" height="45" fill="#C4A87A" opacity="0.8"/>
  <rect x="265" y="103" width="14" height="38" fill="#C4A87A" opacity="0.8"/>
  <rect x="281" y="109" width="14" height="22" fill="#C4A87A" opacity="0.8"/>
  <line x1="215" y1="148" x2="297" y2="148" stroke="#5C3D1E" stroke-width="0.8"/>

  <!-- n=10 -->
  <text x="245" y="175" text-anchor="middle" font-size="9" fill="#5C3D1E">n = 10</text>
  <rect x="217" y="178" width="14" height="12" fill="#7C2530" opacity="0.7"/>
  <rect x="233" y="170" width="14" height="20" fill="#7C2530" opacity="0.7"/>
  <rect x="249" y="160" width="14" height="30" fill="#7C2530" opacity="0.7"/>
  <rect x="265" y="170" width="14" height="20" fill="#7C2530" opacity="0.7"/>
  <rect x="281" y="178" width="14" height="12" fill="#7C2530" opacity="0.7"/>
  <line x1="215" y1="190" x2="297" y2="190" stroke="#5C3D1E" stroke-width="0.8"/>
  <text x="245" y="205" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">bell-shaped</text>

  <!-- n=30 — nice bell -->
  <text x="350" y="100" text-anchor="middle" font-size="9" fill="#5C3D1E">n = 30</text>
  <!-- Bell curve approximation with bars -->
  <rect x="313" y="132" width="14" height="8"  fill="#2D5A8E" opacity="0.8"/>
  <rect x="329" y="120" width="14" height="20" fill="#2D5A8E" opacity="0.8"/>
  <rect x="345" y="103" width="14" height="37" fill="#2D5A8E" opacity="0.8"/>
  <rect x="361" y="95"  width="14" height="45" fill="#2D5A8E" opacity="0.8"/>
  <rect x="377" y="103" width="14" height="37" fill="#2D5A8E" opacity="0.8"/>
  <rect x="393" y="120" width="14" height="20" fill="#2D5A8E" opacity="0.8"/>
  <rect x="409" y="132" width="14" height="8"  fill="#2D5A8E" opacity="0.8"/>
  <line x1="311" y1="140" x2="425" y2="140" stroke="#5C3D1E" stroke-width="0.8"/>
  <text x="368" y="158" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">approximately Gaussian!</text>

  <!-- Gaussian bell curve overlay (n=100) -->
  <text x="350" y="185" text-anchor="middle" font-size="9" fill="#5C3D1E">n = 100  (almost perfect)</text>
  <!-- Smooth bell path approximation -->
  <path d="M 313 268 Q 340 250 368 218 Q 396 250 423 268" fill="none" stroke="#2D5A8E" stroke-width="2.5"/>
  <path d="M 313 268 L 313 268 Q 313 268 310 268" fill="none" stroke="#2D5A8E" stroke-width="1"/>
  <line x1="311" y1="268" x2="425" y2="268" stroke="#5C3D1E" stroke-width="0.8"/>
  <!-- fill under bell -->
  <path d="M 313 268 Q 340 250 368 218 Q 396 250 423 268 Z" fill="#2D5A8E" opacity="0.12"/>
  <text x="368" y="290" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">N(μ, σ²/n)</text>
  <text x="368" y="304" text-anchor="middle" font-size="8" fill="#6B5D4F">σ/√n = standard error</text>

  <!-- Panel 3: CLT statement -->
  <rect x="449" y="50" width="335" height="305" fill="#F0EBE1" stroke="#D4C5A9" stroke-width="1.2" rx="4"/>
  <text x="616" y="72" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">THE THEOREM</text>

  <text x="462" y="97"  text-anchor="start" font-size="10" fill="#5C3D1E">Let X₁, X₂, … Xₙ be i.i.d. with</text>
  <text x="462" y="113" text-anchor="start" font-size="10" fill="#5C3D1E">mean μ and variance σ² &lt; ∞.</text>

  <text x="616" y="145" text-anchor="middle" font-size="12" fill="#7C2530">√n (x̄ₙ − μ) / σ  →  N(0,1)</text>
  <text x="616" y="163" text-anchor="middle" font-size="9" fill="#6B5D4F">as n → ∞</text>

  <line x1="459" y1="175" x2="774" y2="175" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="462" y="196" text-anchor="start" font-size="9" fill="#5C3D1E" font-weight="bold">Equivalently:</text>
  <text x="616" y="218" text-anchor="middle" font-size="11" fill="#2D5A8E">x̄ₙ ≈ N(μ, σ²/n)</text>
  <text x="616" y="236" text-anchor="middle" font-size="8" fill="#6B5D4F">for large n (rule of thumb: n ≥ 30)</text>

  <line x1="459" y1="250" x2="774" y2="250" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="462" y="270" text-anchor="start" font-size="9" fill="#5C3D1E" font-weight="bold">Berry-Esseen bound:</text>
  <text x="462" y="288" text-anchor="start" font-size="9" fill="#5C3D1E">Rate of convergence ≤ C · ρ / (σ³ √n)</text>
  <text x="462" y="304" text-anchor="start" font-size="8" fill="#6B5D4F">ρ = E[|X−μ|³]  (third absolute moment)</text>
  <text x="462" y="320" text-anchor="start" font-size="8" fill="#6B5D4F">Higher skewness → slower convergence</text>

  <line x1="459" y1="330" x2="774" y2="330" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="616" y="347" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">Underlies z-tests, t-tests, confidence intervals, &amp; regression inference</text>

  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">The sampling distribution of x̄ is approximately Gaussian regardless of the shape of the population</text>
</svg>
