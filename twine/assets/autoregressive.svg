<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Autoregressive Models</text>
  <!-- Token generation sequence -->
  <rect x="40" y="80" width="80" height="50" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="80" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">The</text>
  <rect x="140" y="80" width="80" height="50" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">cat</text>
  <rect x="240" y="80" width="80" height="50" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="280" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">sat</text>
  <rect x="340" y="80" width="80" height="50" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="380" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">on</text>
  <rect x="440" y="80" width="80" height="50" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="480" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#e67e22">the</text>
  <text x="480" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#e67e22">predicted</text>
  <rect x="540" y="80" width="80" height="50" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="580" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#e67e22">mat</text>
  <!-- Arrows showing conditioning -->
  <path d="M80,130 Q80,180 430,180 L430,130" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#aar)"/>
  <!-- Formula -->
  <rect x="60" y="210" width="500" height="80" rx="8" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="310" y="240" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Factorization</text>
  <text x="310" y="270" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">P(x₁,...,xₙ) = P(x₁)·P(x₂|x₁)·P(x₃|x₁,x₂)···P(xₙ|x₁,...,xₙ₋₁)</text>
  <!-- Examples -->
  <rect x="600" y="210" width="170" height="100" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="685" y="238" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Examples</text>
  <text x="685" y="262" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">GPT, LLaMA</text>
  <text x="685" y="282" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">PixelCNN</text>
  <text x="685" y="302" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">WaveNet, ARIMA</text>
  <defs><marker id="aar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker></defs>
  <text x="400" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Each token predicted from all previous tokens — no future cheating (causal mask)</text>
</svg>
