  <line x1="60" y1="340" x2="340" y2="340" stroke="#888" stroke-width="1.5"/>
  <line x1="60" y1="340" x2="60" y2="80" stroke="#888" stroke-width="1.5"/>
  <text x="342" y="344" fill="#888" font-size="12">x₁</text>
