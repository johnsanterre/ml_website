  <text x="200" y="206" fill="#C0392B" font-size="12" font-weight="bold">x+δ (adv.)</text>

  <!-- Arrow from x to x+delta -->
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E07B39"/>
    </marker>
