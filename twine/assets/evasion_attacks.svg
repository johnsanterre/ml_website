  <!-- Decision boundary (curved line) -->
  <path d="M 70 270 Q 150 200 220 160 Q 280 130 340 100" stroke="#2C5F8A" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="262" y="118" fill="#2C5F8A" font-size="12" font-style="italic">decision boundary</text>

