  <!-- FGSM formula box -->
  <rect x="415" y="255" width="345" height="54" rx="6" fill="#FFF8F0" stroke="#E07B39" stroke-width="1.2"/>
  <text x="588" y="276" text-anchor="middle" fill="#E07B39" font-size="13" font-weight="bold">x_adv = x + ε · sign(∇ₓ L(f(x), y))</text>
  <text x="588" y="296" text-anchor="middle" fill="#888" font-size="11">ε = perturbation budget    L = classification loss    ∇ₓ = gradient w.r.t. input</text>

  <!-- Humans perception note -->
  <text x="588" y="332" text-anchor="middle" fill="#888" font-size="11" font-style="italic">‖x_adv − x‖∞ ≤ ε  (imperceptible)   →   model flips class with high confidence</text>

