  <line x1="161" y1="239" x2="190" y2="214" stroke="#E07B39" stroke-width="1.8" marker-end="url(#arr1)"/>
  <text x="162" y="218" fill="#E07B39" font-size="11" font-style="italic">δ = ε·sign(∇ₓL)</text>

