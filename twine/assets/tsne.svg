<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: High-dimensional space -->
  <rect x="25" y="35" width="230" height="310" rx="6" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="140" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">HIGH-DIM INPUT</text>
  <!-- Scattered points in 3D-ish projection -->
  <line x1="60" y1="80" x2="220" y2="80" stroke="#C4A87A" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="80" x2="60" y2="300" stroke="#C4A87A" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="80" x2="100" y2="55" stroke="#C4A87A" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
  <text x="225" y="84" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">x₁</text>
  <text x="53" y="300" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">x₂</text>
  <text x="103" y="52" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">x₃…xₙ</text>
  <!-- Scattered cluster points -->
  <circle cx="90" cy="120" r="5" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="105" cy="135" r="5" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="80" cy="148" r="5" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="175" cy="110" r="5" fill="#7C2530" opacity="0.8"/>
  <circle cx="190" cy="125" r="5" fill="#7C2530" opacity="0.8"/>
  <circle cx="165" cy="140" r="5" fill="#7C2530" opacity="0.8"/>
  <circle cx="130" cy="210" r="5" fill="#C4A87A" opacity="0.9"/>
  <circle cx="145" cy="230" r="5" fill="#C4A87A" opacity="0.9"/>
  <circle cx="115" cy="240" r="5" fill="#C4A87A" opacity="0.9"/>
  <text x="140" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Pairwise distances:</text>
  <text x="140" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">p_ij via Gaussian</text>

  <!-- Arrow -->
  <text x="278" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#C4A87A">&#8594;</text>
  <text x="278" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="0.5" fill="#6B5D4F">t-SNE</text>

  <!-- Panel 2: 2D embedding -->
  <rect x="310" y="35" width="250" height="310" rx="6" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="435" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">2D EMBEDDING</text>
  <!-- Cluster 1 (blue) -->
  <circle cx="360" cy="130" r="6" fill="#2D5A8E" opacity="0.85"/>
  <circle cx="375" cy="148" r="6" fill="#2D5A8E" opacity="0.85"/>
  <circle cx="350" cy="152" r="6" fill="#2D5A8E" opacity="0.85"/>
  <circle cx="385" cy="135" r="6" fill="#2D5A8E" opacity="0.85"/>
  <circle cx="362" cy="165" r="6" fill="#2D5A8E" opacity="0.85"/>
  <!-- Cluster 2 (red) -->
  <circle cx="490" cy="115" r="6" fill="#7C2530" opacity="0.85"/>
  <circle cx="508" cy="130" r="6" fill="#7C2530" opacity="0.85"/>
  <circle cx="478" cy="138" r="6" fill="#7C2530" opacity="0.85"/>
  <circle cx="500" cy="148" r="6" fill="#7C2530" opacity="0.85"/>
  <circle cx="518" cy="118" r="6" fill="#7C2530" opacity="0.85"/>
  <!-- Cluster 3 (tan) -->
  <circle cx="415" cy="235" r="6" fill="#C4A87A" opacity="0.9"/>
  <circle cx="432" cy="250" r="6" fill="#C4A87A" opacity="0.9"/>
  <circle cx="400" cy="255" r="6" fill="#C4A87A" opacity="0.9"/>
  <circle cx="445" cy="240" r="6" fill="#C4A87A" opacity="0.9"/>
  <circle cx="420" cy="265" r="6" fill="#C4A87A" opacity="0.9"/>
  <!-- Axis -->
  <line x1="325" y1="300" x2="545" y2="300" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="325" y1="300" x2="325" y2="75" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <text x="435" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Clusters visible, distances</text>
  <text x="435" y="336" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">between clusters not meaningful</text>

  <!-- Panel 3: The trick — t vs Gaussian -->
  <rect x="585" y="35" width="190" height="310" rx="6" fill="#EDE8DE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="680" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">THE t-TRICK</text>

  <!-- t-distribution curve (wider tails) -->
  <polyline points="605,230 620,220 635,195 650,155 665,110 680,90 695,110 710,155 725,195 740,220 755,230" fill="none" stroke="#7C2530" stroke-width="2"/>
  <!-- Gaussian curve (thinner) -->
  <polyline points="605,228 620,225 635,210 650,170 665,115 680,95 695,115 710,170 725,210 740,225 755,228" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="600" y1="232" x2="760" y2="232" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>

  <text x="680" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">t-dist (heavier tails)</text>
  <text x="680" y="274" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">Gaussian (low-dim)</text>
  <text x="680" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-style="italic">t-dist prevents</text>
  <text x="680" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-style="italic">crowding problem</text>

  <!-- Legend -->
  <text x="680" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Low-dim q_ij</text>
  <text x="680" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">uses Student-t</text>
  <text x="680" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">(df = 1)</text>

  <!-- Bottom label -->
  <text x="400" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">t-SNE: Preserving Local Neighborhood Structure</text>
</svg>
