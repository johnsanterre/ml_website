<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="nas-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="nas-arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="nas-arr-tan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">NEURAL ARCHITECTURE SEARCH (NAS)</text>

  <!-- ── SEARCH SPACE (left) ── -->
  <rect x="30" y="40" width="190" height="300" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="125" y="60" text-anchor="middle" font-size="10.5" fill="#5C3D1E" font-weight="bold">Search Space</text>
  <text x="125" y="75" text-anchor="middle" font-size="8.5" fill="#6B5D4F">(all candidate architectures)</text>

  <!-- Candidate arch blobs -->
  <!-- arch A -->
  <rect x="50" y="90" width="70" height="50" rx="5" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="85" y="108" text-anchor="middle" font-size="8" fill="#5C3D1E">Arch A</text>
  <rect x="58" y="114" width="18" height="10" rx="2" fill="#C4A87A"/>
  <rect x="80" y="114" width="18" height="10" rx="2" fill="#C4A87A"/>
  <rect x="102" y="114" width="8" height="10" rx="2" fill="#C4A87A"/>

  <!-- arch B -->
  <rect x="130" y="90" width="70" height="50" rx="5" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="165" y="108" text-anchor="middle" font-size="8" fill="#5C3D1E">Arch B</text>
  <rect x="138" y="114" width="12" height="10" rx="2" fill="#7C2530" opacity="0.6"/>
  <rect x="154" y="114" width="30" height="10" rx="2" fill="#7C2530" opacity="0.6"/>
  <rect x="188" y="114" width="6" height="10" rx="2" fill="#7C2530" opacity="0.6"/>

  <!-- arch C -->
  <rect x="50" y="155" width="70" height="50" rx="5" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="85" y="173" text-anchor="middle" font-size="8" fill="#5C3D1E">Arch C</text>
  <rect x="58" y="179" width="25" height="10" rx="2" fill="#2D5A8E" opacity="0.6"/>
  <rect x="87" y="179" width="10" height="10" rx="2" fill="#2D5A8E" opacity="0.6"/>
  <rect x="101" y="179" width="18" height="10" rx="2" fill="#2D5A8E" opacity="0.6"/>

  <!-- arch D -->
  <rect x="130" y="155" width="70" height="50" rx="5" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="165" y="173" text-anchor="middle" font-size="8" fill="#5C3D1E">Arch D</text>
  <rect x="138" y="179" width="55" height="10" rx="2" fill="#5C3D1E" opacity="0.5"/>

  <!-- many more indicator -->
  <text x="125" y="230" text-anchor="middle" font-size="22" fill="#C4A87A" opacity="0.5">⋮</text>
  <text x="125" y="260" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">10¹⁸+ possible architectures</text>

  <!-- Op types legend -->
  <text x="50" y="285" font-size="8" fill="#5C3D1E">Op types: Conv3×3, Conv5×5,</text>
  <text x="50" y="298" font-size="8" fill="#5C3D1E">MaxPool, Skip, DilatedConv…</text>
  <text x="50" y="311" font-size="8" fill="#5C3D1E">Connections: dense, residual, DAG</text>

  <!-- ── SEARCH STRATEGY (middle) ── -->
  <rect x="255" y="40" width="180" height="300" rx="6" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="345" y="60" text-anchor="middle" font-size="10.5" fill="#2D5A8E" font-weight="bold">Search Strategy</text>

  <!-- RL box -->
  <rect x="275" y="80" width="140" height="38" rx="4" fill="#D8E6F5" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="345" y="96" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">Reinforcement Learning</text>
  <text x="345" y="110" text-anchor="middle" font-size="8" fill="#5C3D1E">Controller RNN samples arch</text>

  <!-- EA box -->
  <rect x="275" y="130" width="140" height="38" rx="4" fill="#D8E6F5" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="345" y="146" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">Evolutionary / EA</text>
  <text x="345" y="160" text-anchor="middle" font-size="8" fill="#5C3D1E">Mutate &amp; select best offspring</text>

  <!-- DARTS box (highlighted) -->
  <rect x="275" y="180" width="140" height="46" rx="4" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="345" y="197" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">DARTS (gradient-based)</text>
  <text x="345" y="211" text-anchor="middle" font-size="8" fill="#5C3D1E">Continuous relaxation;</text>
  <text x="345" y="222" text-anchor="middle" font-size="8" fill="#5C3D1E">differentiable α weights</text>

  <!-- Bayesian opt box -->
  <rect x="275" y="238" width="140" height="38" rx="4" fill="#D8E6F5" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="345" y="254" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">Bayesian Optimization</text>
  <text x="345" y="268" text-anchor="middle" font-size="8" fill="#5C3D1E">Surrogate model over archs</text>

  <!-- ── PERFORMANCE ESTIMATOR (right mid) ── -->
  <rect x="468" y="40" width="170" height="300" rx="6" fill="#F5EFE4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="553" y="60" text-anchor="middle" font-size="10.5" fill="#5C3D1E" font-weight="bold">Performance Est.</text>

  <!-- full training -->
  <rect x="485" y="80" width="135" height="38" rx="4" fill="#EDE5D0" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="552" y="95" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Full Training (slow)</text>
  <text x="552" y="109" text-anchor="middle" font-size="8" fill="#5C3D1E">GPU-days per candidate</text>

  <!-- early stop -->
  <rect x="485" y="130" width="135" height="38" rx="4" fill="#EDE5D0" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="552" y="146" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Early Stopping Proxy</text>
  <text x="552" y="160" text-anchor="middle" font-size="8" fill="#5C3D1E">Train briefly; extrapolate</text>

  <!-- weight sharing -->
  <rect x="485" y="180" width="135" height="46" rx="4" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="552" y="197" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Weight Sharing</text>
  <text x="552" y="211" text-anchor="middle" font-size="8" fill="#5C3D1E">Supernet: all candidates</text>
  <text x="552" y="222" text-anchor="middle" font-size="8" fill="#5C3D1E">share trained weights</text>

  <!-- pred network -->
  <rect x="485" y="238" width="135" height="38" rx="4" fill="#EDE5D0" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="552" y="254" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Predictor Network</text>
  <text x="552" y="268" text-anchor="middle" font-size="8" fill="#5C3D1E">ML model predicts acc(arch)</text>

  <!-- ── FOUND ARCH (far right) ── -->
  <rect x="670" y="120" width="110" height="100" rx="6" fill="#F0E8D8" stroke="#7C2530" stroke-width="2"/>
  <text x="725" y="140" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Best Arch</text>
  <rect x="685" y="150" width="80" height="12" rx="3" fill="#7C2530" opacity="0.7"/>
  <rect x="695" y="168" width="60" height="12" rx="3" fill="#7C2530" opacity="0.5"/>
  <rect x="705" y="186" width="40" height="12" rx="3" fill="#7C2530" opacity="0.3"/>
  <text x="725" y="215" text-anchor="middle" font-size="8.5" fill="#5C3D1E">retrain from scratch</text>

  <!-- arrows between panels -->
  <line x1="220" y1="190" x2="255" y2="190" stroke="#7C2530" stroke-width="1.5" marker-end="url(#nas-arr)"/>
  <text x="237" y="183" text-anchor="middle" font-size="8" fill="#7C2530">sample</text>

  <line x1="435" y1="190" x2="468" y2="190" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#nas-arr-blue)"/>
  <text x="452" y="183" text-anchor="middle" font-size="8" fill="#2D5A8E">train</text>

  <line x1="638" y1="190" x2="670" y2="190" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#nas-arr-tan)"/>
  <text x="655" y="183" text-anchor="middle" font-size="8" fill="#5C3D1E">best</text>

  <!-- feedback arrow -->
  <path d="M 553 340 Q 345 380 345 340" stroke="#C4A87A" stroke-width="1.2" fill="none" stroke-dasharray="4,2" marker-end="url(#nas-arr)"/>
  <text x="449" y="373" text-anchor="middle" font-size="8.5" fill="#6B5D4F" font-style="italic">reward / validation accuracy feeds back to strategy</text>

  <!-- Bottom caption -->
  <text x="400" y="393" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    NAS automates the design loop: sample → train → evaluate → update search policy
  </text>
</svg>
