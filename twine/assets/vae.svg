<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel 1: Input -->
  <rect x="20" y="60" width="90" height="280" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="65" y="80" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">INPUT</text>
  <!-- image pixels grid -->
  <rect x="30" y="90" width="70" height="70" fill="#EDE8DE" stroke="#C4A87A" stroke-width="0.8"/>
  <!-- simple face sketch -->
  <circle cx="65" cy="125" r="25" fill="none" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="57" cy="120" r="3" fill="#5C3D1E"/>
  <circle cx="73" cy="120" r="3" fill="#5C3D1E"/>
  <path d="M57,133 Q65,140 73,133" stroke="#5C3D1E" stroke-width="1.5" fill="none"/>
  <text x="65" y="175" text-anchor="middle" font-size="9" fill="#6B5D4F">x</text>
  <text x="65" y="300" text-anchor="middle" font-size="9" fill="#6B5D4F">image</text>

  <!-- Encoder -->
  <rect x="125" y="60" width="130" height="280" fill="#EDE8DE" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <text x="190" y="80" text-anchor="middle" font-size="10" letter-spacing="1" fill="#7C2530" font-variant="small-caps">ENCODER</text>

  <!-- neural net layers converging -->
  <ellipse cx="145" cy="200" rx="8" ry="55" fill="#C4A87A" opacity="0.5"/>
  <ellipse cx="175" cy="200" rx="8" ry="40" fill="#C4A87A" opacity="0.6"/>
  <ellipse cx="205" cy="200" rx="8" ry="25" fill="#C4A87A" opacity="0.7"/>
  <ellipse cx="235" cy="200" rx="8" ry="15" fill="#C4A87A" opacity="0.8"/>

  <text x="190" y="280" text-anchor="middle" font-size="9" fill="#7C2530">q_φ(z|x)</text>
  <text x="190" y="295" text-anchor="middle" font-size="9" fill="#6B5D4F">compresses x</text>
  <text x="190" y="308" text-anchor="middle" font-size="9" fill="#6B5D4F">to distribution</text>

  <!-- Latent Space -->
  <rect x="270" y="60" width="160" height="280" fill="#F5F0E8" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="350" y="80" text-anchor="middle" font-size="10" letter-spacing="1" fill="#2D5A8E" font-variant="small-caps">LATENT SPACE</text>

  <!-- mu and sigma outputs -->
  <rect x="283" y="95" width="60" height="35" fill="#EDE8DE" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="313" y="112" text-anchor="middle" font-size="11" fill="#2D5A8E">μ</text>
  <text x="313" y="124" text-anchor="middle" font-size="8" fill="#6B5D4F">mean</text>

  <rect x="283" y="140" width="60" height="35" fill="#EDE8DE" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="313" y="157" text-anchor="middle" font-size="11" fill="#2D5A8E">σ</text>
  <text x="313" y="169" text-anchor="middle" font-size="8" fill="#6B5D4F">std dev</text>

  <!-- reparameterization -->
  <rect x="355" y="110" width="65" height="55" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.2" rx="2"/>
  <text x="387" y="128" text-anchor="middle" font-size="9" fill="#7C2530">z = μ</text>
  <text x="387" y="143" text-anchor="middle" font-size="9" fill="#7C2530">+ σ·ε</text>
  <text x="387" y="158" text-anchor="middle" font-size="8" fill="#6B5D4F">ε~N(0,1)</text>

  <!-- arrows -->
  <line x1="343" y1="112" x2="355" y2="130" stroke="#2D5A8E" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="343" y1="157" x2="355" y2="148" stroke="#2D5A8E" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Gaussian bell -->
  <path d="M285,230 Q295,195 313,190 Q331,185 345,230" stroke="#2D5A8E" stroke-width="1.5" fill="#EDE8DE" opacity="0.7"/>
  <text x="315" y="250" text-anchor="middle" font-size="9" fill="#2D5A8E">z ~ N(μ,σ²)</text>
  <text x="350" y="285" text-anchor="middle" font-size="9" fill="#6B5D4F">sample a</text>
  <text x="350" y="298" text-anchor="middle" font-size="9" fill="#6B5D4F">latent point</text>

  <!-- Decoder -->
  <rect x="445" y="60" width="130" height="280" fill="#EDE8DE" stroke="#5C3D1E" stroke-width="1.5" rx="3"/>
  <text x="510" y="80" text-anchor="middle" font-size="10" letter-spacing="1" fill="#5C3D1E" font-variant="small-caps">DECODER</text>

  <!-- expanding layers -->
  <ellipse cx="465" cy="200" rx="8" ry="15" fill="#C4A87A" opacity="0.8"/>
  <ellipse cx="495" cy="200" rx="8" ry="25" fill="#C4A87A" opacity="0.7"/>
  <ellipse cx="525" cy="200" rx="8" ry="40" fill="#C4A87A" opacity="0.6"/>
  <ellipse cx="555" cy="200" rx="8" ry="55" fill="#C4A87A" opacity="0.5"/>

  <text x="510" y="280" text-anchor="middle" font-size="9" fill="#5C3D1E">p_θ(x|z)</text>
  <text x="510" y="295" text-anchor="middle" font-size="9" fill="#6B5D4F">reconstructs</text>
  <text x="510" y="308" text-anchor="middle" font-size="9" fill="#6B5D4F">from z</text>

  <!-- Output -->
  <rect x="590" y="60" width="90" height="280" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="635" y="80" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">OUTPUT</text>
  <rect x="600" y="90" width="70" height="70" fill="#EDE8DE" stroke="#C4A87A" stroke-width="0.8"/>
  <!-- slightly blurry reconstructed face -->
  <circle cx="635" cy="125" r="25" fill="none" stroke="#7C2530" stroke-width="1.5" opacity="0.7"/>
  <circle cx="627" cy="120" r="3" fill="#7C2530" opacity="0.7"/>
  <circle cx="643" cy="120" r="3" fill="#7C2530" opacity="0.7"/>
  <path d="M627,133 Q635,140 643,133" stroke="#7C2530" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="635" y="175" text-anchor="middle" font-size="9" fill="#6B5D4F">x̂</text>
  <text x="635" y="300" text-anchor="middle" font-size="9" fill="#6B5D4F">reconstructed</text>

  <!-- Loss annotation -->
  <text x="400" y="365" text-anchor="middle" font-size="9.5" fill="#5C3D1E">Loss = Reconstruction loss + KL divergence (regularizes latent space toward N(0,1))</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2D5A8E"/>
    </marker>
  </defs>

  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="0.5">Variational Autoencoder — learn a structured generative latent space</text>
</svg>
