<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="gpt-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="gpt-arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">GPT TRANSFORMER DECODER STACK</text>

  <!-- ── INPUT COLUMN ── -->
  <!-- Token Embeddings box -->
  <rect x="30" y="48" width="110" height="34" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="85" y="63" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Token</text>
  <text x="85" y="75" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Embeddings</text>

  <!-- Positional Encoding box -->
  <rect x="30" y="100" width="110" height="34" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="85" y="115" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Positional</text>
  <text x="85" y="127" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Encoding</text>

  <!-- + circle -->
  <circle cx="85" cy="162" r="12" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5"/>
  <text x="85" y="167" text-anchor="middle" font-size="14" fill="#7C2530">+</text>

  <!-- arrows into + -->
  <line x1="85" y1="82" x2="85" y2="100" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#gpt-arr)"/>
  <line x1="85" y1="134" x2="85" y2="150" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#gpt-arr)"/>

  <!-- arrow out of + -->
  <line x1="85" y1="174" x2="85" y2="195" stroke="#7C2530" stroke-width="1.5" marker-end="url(#gpt-arr)"/>
  <text x="95" y="188" font-size="8" fill="#6B5D4F" font-style="italic">x</text>

  <!-- ── DECODER BLOCK (repeated N×) ── -->
  <!-- Block outline -->
  <rect x="165" y="38" width="420" height="320" rx="6" fill="none" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="375" y="372" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">× N decoder blocks (GPT-3: N = 96)</text>

  <!-- Masked Self-Attention -->
  <rect x="185" y="55" width="180" height="40" rx="4" fill="#F0E8D8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="275" y="72" text-anchor="middle" font-size="9.5" fill="#7C2530" font-weight="bold">Masked Self-Attention</text>
  <text x="275" y="86" text-anchor="middle" font-size="8.5" fill="#5C3D1E">(causal — no future tokens)</text>

  <!-- Q K V labels -->
  <rect x="188" y="105" width="30" height="18" rx="3" fill="#EDE5D0" stroke="#7C2530" stroke-width="1"/>
  <text x="203" y="118" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Q</text>
  <rect x="228" y="105" width="30" height="18" rx="3" fill="#EDE5D0" stroke="#7C2530" stroke-width="1"/>
  <text x="243" y="118" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">K</text>
  <rect x="268" y="105" width="30" height="18" rx="3" fill="#EDE5D0" stroke="#7C2530" stroke-width="1"/>
  <text x="283" y="118" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">V</text>
  <line x1="203" y1="95" x2="203" y2="105" stroke="#7C2530" stroke-width="1"/>
  <line x1="243" y1="95" x2="243" y2="105" stroke="#7C2530" stroke-width="1"/>
  <line x1="283" y1="95" x2="283" y2="105" stroke="#7C2530" stroke-width="1"/>

  <!-- Add & Norm 1 -->
  <rect x="185" y="135" width="180" height="28" rx="4" fill="#E8F0F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="275" y="154" text-anchor="middle" font-size="9.5" fill="#2D5A8E" font-weight="bold">Add &amp; LayerNorm</text>
  <line x1="275" y1="123" x2="275" y2="135" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#gpt-arr-blue)"/>

  <!-- Residual skip for layer 1 -->
  <line x1="185" y1="75" x2="165" y2="75" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="165" y1="75" x2="165" y2="149" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="165" y1="149" x2="185" y2="149" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#gpt-arr)"/>
  <text x="155" y="118" text-anchor="middle" font-size="8" fill="#C4A87A" font-style="italic">skip</text>

  <!-- Feed-Forward Network -->
  <rect x="185" y="180" width="180" height="40" rx="4" fill="#F0E8D8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="275" y="196" text-anchor="middle" font-size="9.5" fill="#7C2530" font-weight="bold">Feed-Forward Network</text>
  <text x="275" y="210" text-anchor="middle" font-size="8.5" fill="#5C3D1E">Linear → GELU → Linear</text>
  <line x1="275" y1="163" x2="275" y2="180" stroke="#7C2530" stroke-width="1.2" marker-end="url(#gpt-arr)"/>

  <!-- Add & Norm 2 -->
  <rect x="185" y="235" width="180" height="28" rx="4" fill="#E8F0F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="275" y="254" text-anchor="middle" font-size="9.5" fill="#2D5A8E" font-weight="bold">Add &amp; LayerNorm</text>
  <line x1="275" y1="220" x2="275" y2="235" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#gpt-arr-blue)"/>

  <!-- Residual skip for layer 2 -->
  <line x1="185" y1="199" x2="163" y2="199" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="163" y1="199" x2="163" y2="249" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="163" y1="249" x2="185" y2="249" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#gpt-arr)"/>

  <!-- Arrow from input to block -->
  <line x1="140" y1="200" x2="185" y2="200" stroke="#7C2530" stroke-width="1.5" marker-end="url(#gpt-arr)"/>
  <!-- connect + output to block input -->
  <line x1="85" y1="195" x2="85" y2="340" stroke="#7C2530" stroke-width="1.2"/>
  <line x1="85" y1="340" x2="185" y2="340" stroke="#7C2530" stroke-width="1.2"/>
  <line x1="185" y1="340" x2="185" y2="200" stroke="#7C2530" stroke-width="1.2" marker-end="url(#gpt-arr)"/>

  <!-- ── OUTPUT COLUMN ── -->
  <!-- Linear (unembedding) -->
  <rect x="620" y="195" width="120" height="34" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="680" y="210" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Linear</text>
  <text x="680" y="222" text-anchor="middle" font-size="9" fill="#5C3D1E">(unembed to vocab)</text>

  <!-- Softmax -->
  <rect x="620" y="248" width="120" height="28" rx="4" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="680" y="267" text-anchor="middle" font-size="9.5" fill="#2D5A8E" font-weight="bold">Softmax</text>

  <!-- Next Token -->
  <rect x="620" y="295" width="120" height="28" rx="4" fill="#F0E8D8" stroke="#7C2530" stroke-width="2"/>
  <text x="680" y="314" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Next Token ▶</text>

  <!-- connect block output to linear -->
  <line x1="365" y1="249" x2="620" y2="249" stroke="#7C2530" stroke-width="1.5" marker-end="url(#gpt-arr)"/>
  <line x1="680" y1="229" x2="680" y2="248" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#gpt-arr-blue)"/>
  <line x1="680" y1="276" x2="680" y2="295" stroke="#7C2530" stroke-width="1.2" marker-end="url(#gpt-arr)"/>

  <!-- Causal mask annotation -->
  <text x="275" y="310" text-anchor="middle" font-size="8.5" fill="#6B5D4F" font-style="italic">Causal mask: token i sees only tokens 1 … i</text>

  <!-- Attention formula note -->
  <text x="490" y="340" text-anchor="middle" font-size="8.5" fill="#6B5D4F" font-style="italic">Attention(Q,K,V) = softmax(QKᵀ / √d_k) · V</text>

  <!-- Bottom caption -->
  <text x="400" y="390" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    GPT stacks N identical decoder blocks; each predicts the next token autoregressively
  </text>
</svg>
