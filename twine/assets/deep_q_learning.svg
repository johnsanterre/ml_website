<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Deep Q-Network (DQN)</text>
  <defs>
    <marker id="arrdq" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- State input -->
  <rect x="40" y="120" width="110" height="120" rx="8" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="2"/>
  <text x="95" y="155" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">State sₜ</text>
  <text x="95" y="178" text-anchor="middle" fill="#555" font-size="12">Game screen</text>
  <text x="95" y="198" text-anchor="middle" fill="#555" font-size="12">84×84 pixels</text>
  <text x="95" y="218" text-anchor="middle" fill="#555" font-size="12">4 frames</text>
  <!-- Neural network -->
  <rect x="220" y="100" width="200" height="160" rx="10" fill="#F0F8F0" stroke="#4A7C59" stroke-width="2"/>
  <text x="320" y="130" text-anchor="middle" fill="#4A7C59" font-size="14" font-weight="bold">Q-Network θ</text>
  <rect x="240" y="145" width="160" height="30" rx="5" fill="#4A7C59" fill-opacity="0.4"/>
  <text x="320" y="165" text-anchor="middle" fill="#333" font-size="12">Conv layers</text>
  <rect x="240" y="185" width="160" height="30" rx="5" fill="#4A7C59" fill-opacity="0.4"/>
  <text x="320" y="205" text-anchor="middle" fill="#333" font-size="12">Fully connected</text>
  <rect x="240" y="225" width="160" height="25" rx="5" fill="#4A7C59" fill-opacity="0.6"/>
  <text x="320" y="242" text-anchor="middle" fill="white" font-size="12">Q-values output</text>
  <!-- Q-values -->
  <rect x="490" y="80" width="160" height="200" rx="10" fill="#FEF3EC" stroke="#E07B39" stroke-width="2"/>
  <text x="570" y="108" text-anchor="middle" fill="#E07B39" font-size="13" font-weight="bold">Q(s, a)</text>
  <text x="570" y="135" text-anchor="middle" fill="#555" font-size="13">Left:   2.3</text>
  <text x="570" y="158" text-anchor="middle" fill="#555" font-size="13">Right:  4.1</text>
  <text x="570" y="181" text-anchor="middle" fill="#4A7C59" font-size="13" font-weight="bold">Up:     6.7 ←</text>
  <text x="570" y="204" text-anchor="middle" fill="#555" font-size="13">Down:  1.8</text>
  <text x="570" y="227" text-anchor="middle" fill="#555" font-size="13">Fire:   3.2</text>
  <text x="570" y="260" text-anchor="middle" fill="#E07B39" font-size="12">Select max-Q action</text>
  <!-- Arrows -->
  <line x1="152" y1="180" x2="218" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arrdq)"/>
  <line x1="420" y1="180" x2="488" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arrdq)"/>
  <!-- Replay buffer note -->
  <text x="400" y="320" text-anchor="middle" fill="#888" font-size="13">Experience replay + target network = stable training</text>
  <text x="400" y="345" text-anchor="middle" fill="#555" font-size="12">Loss: (r + γ max_a' Q_target(s',a') − Q(s,a))²</text>
</svg>