<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">F1 Score &amp; Classification Metrics</text>
  <!-- Confusion matrix -->
  <text x="170" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Confusion Matrix</text>
  <rect x="40" y="85" width="260" height="220" rx="4" fill="#f8f8f8" stroke="#999" stroke-width="1.5"/>
  <line x1="40" y1="140" x2="300" y2="140" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="250" x2="300" y2="250" stroke="#ccc" stroke-width="1"/>
  <line x1="170" y1="85" x2="170" y2="305" stroke="#ccc" stroke-width="1"/>
  <text x="105" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Pred Pos</text>
  <text x="235" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Pred Neg</text>
  <text x="105" y="205" text-anchor="middle" font-family="Arial" font-size="22" fill="#27ae60" font-weight="bold">TP</text>
  <text x="235" y="205" text-anchor="middle" font-family="Arial" font-size="22" fill="#e74c3c" font-weight="bold">FN</text>
  <text x="105" y="285" text-anchor="middle" font-family="Arial" font-size="22" fill="#e74c3c" font-weight="bold">FP</text>
  <text x="235" y="285" text-anchor="middle" font-family="Arial" font-size="22" fill="#4a90d9" font-weight="bold">TN</text>
  <text x="20" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#555" transform="rotate(-90,20,205)">Act Pos</text>
  <text x="20" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#555" transform="rotate(-90,20,278)">Act Neg</text>
  <!-- Formulas -->
  <rect x="330" y="80" width="430" height="240" rx="10" fill="#f0f4ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="545" y="110" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Metrics</text>
  <text x="545" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#27ae60">Precision = TP / (TP + FP)</text>
  <text x="545" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">of predicted positives, how many correct?</text>
  <text x="545" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22">Recall = TP / (TP + FN)</text>
  <text x="545" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">of actual positives, how many found?</text>
  <text x="545" y="240" text-anchor="middle" font-family="Arial" font-size="13" fill="#4a90d9" font-weight="bold">F1 = 2 · P · R / (P + R)</text>
  <text x="545" y="262" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">harmonic mean — punishes imbalance</text>
  <text x="545" y="295" text-anchor="middle" font-family="Arial" font-size="12" fill="#8e44ad">F_β = (1+β²)·P·R / (β²·P + R)</text>
</svg>
