<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Eigenvalues &amp; Eigenvectors</text>
  <!-- Before transformation -->
  <text x="170" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Before A</text>
  <line x1="80" y1="220" x2="260" y2="220" stroke="#ccc" stroke-width="1.5"/>
  <line x1="170" y1="310" x2="170" y2="100" stroke="#ccc" stroke-width="1.5"/>
  <!-- Eigenvectors before -->
  <line x1="170" y1="220" x2="240" y2="150" stroke="#4a90d9" stroke-width="3" marker-end="url(#aev)"/>
  <line x1="170" y1="220" x2="100" y2="290" stroke="#e67e22" stroke-width="3" marker-end="url(#aev2)"/>
  <text x="248" y="145" font-family="Arial" font-size="12" fill="#4a90d9">v₁</text>
  <text x="90" y="300" font-family="Arial" font-size="12" fill="#e67e22">v₂</text>
  <!-- Arrow showing transformation -->
  <text x="340" y="225" text-anchor="middle" font-family="Arial" font-size="22" fill="#888">→</text>
  <text x="340" y="248" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">A·v = λ·v</text>
  <!-- After transformation -->
  <text x="540" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">After A (stretched)</text>
  <line x1="420" y1="220" x2="660" y2="220" stroke="#ccc" stroke-width="1.5"/>
  <line x1="540" y1="310" x2="540" y2="100" stroke="#ccc" stroke-width="1.5"/>
  <!-- Eigenvectors after: same direction, scaled -->
  <line x1="540" y1="220" x2="660" y2="100" stroke="#4a90d9" stroke-width="3" marker-end="url(#aev)"/>
  <line x1="540" y1="220" x2="430" y2="330" stroke="#e67e22" stroke-width="3" marker-end="url(#aev2)"/>
  <text x="668" y="95" font-family="Arial" font-size="12" fill="#4a90d9">λ₁·v₁</text>
  <text x="415" y="340" font-family="Arial" font-size="12" fill="#e67e22">λ₂·v₂</text>
  <text x="610" y="148" font-family="Arial" font-size="11" fill="#4a90d9">λ₁=2 (stretched)</text>
  <defs>
    <marker id="aev" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="aev2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
  </defs>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Eigenvectors keep their direction — eigenvalues tell you how much they stretch</text>
</svg>
