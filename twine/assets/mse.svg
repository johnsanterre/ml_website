<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="white"/>
  <!-- Axes -->
  <line x1="80" y1="320" x2="680" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="320" x2="80" y2="40" stroke="#333" stroke-width="2"/>
  <text x="380" y="370" text-anchor="middle" font-size="14" fill="#333">x</text>
  <text x="35" y="185" text-anchor="middle" font-size="14" fill="#333" transform="rotate(-90,35,185)">y</text>
  <!-- Regression line -->
  <line x1="100" y1="280" x2="660" y2="80" stroke="#2196F3" stroke-width="2.5"/>
  <!-- Data points and residuals -->
  <circle cx="150" cy="250" r="6" fill="#E91E63"/>
  <line x1="150" y1="250" x2="150" y2="263" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="250" cy="200" r="6" fill="#E91E63"/>
  <line x1="250" y1="200" x2="250" y2="227" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="350" cy="120" r="6" fill="#E91E63"/>
  <line x1="350" y1="120" x2="350" y2="191" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="450" cy="170" r="6" fill="#E91E63"/>
  <line x1="450" y1="155" x2="450" y2="170" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="550" cy="110" r="6" fill="#E91E63"/>
  <line x1="550" y1="110" x2="550" y2="119" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="620" cy="90" r="6" fill="#E91E63"/>
  <line x1="620" y1="90" x2="620" y2="96" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Residual annotation -->
  <text x="360" y="160" font-size="12" fill="#E91E63">residual eᵢ = yᵢ - ŷᵢ</text>
  <!-- Formula -->
  <rect x="180" y="50" width="420" height="55" rx="8" fill="#f5f5f5" stroke="#ddd"/>
  <text x="390" y="73" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Mean Squared Error</text>
  <text x="390" y="95" text-anchor="middle" font-size="15" fill="#2196F3">MSE = (1/n) Σ (yᵢ - ŷᵢ)²</text>
  <text x="400" y="20" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">MSE: Penalizing Squared Errors</text>
</svg>
