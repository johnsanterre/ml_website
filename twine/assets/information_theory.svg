<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Information Theory</text>
  <!-- Entropy bar chart -->
  <text x="160" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Entropy H(X)</text>
  <rect x="60" y="100" width="60" height="180" rx="4" fill="#4a90d9" opacity="0.3"/>
  <rect x="140" y="145" width="60" height="135" rx="4" fill="#4a90d9" opacity="0.6"/>
  <rect x="220" y="100" width="60" height="180" rx="4" fill="#4a90d9"/>
  <text x="90" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Certain</text>
  <text x="90" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">H=0</text>
  <text x="170" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Skewed</text>
  <text x="170" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">H=0.72</text>
  <text x="250" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Uniform</text>
  <text x="250" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">H=1 (max)</text>
  <!-- Concepts -->
  <rect x="360" y="70" width="400" height="270" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="560" y="100" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Key Quantities</text>
  <line x1="370" y1="112" x2="750" y2="112" stroke="#ddd" stroke-width="1"/>
  <text x="560" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9" font-weight="bold">Entropy: H(X) = −Σ p log p</text>
  <text x="560" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">bits of surprise / uncertainty</text>
  <text x="560" y="183" text-anchor="middle" font-family="Arial" font-size="12" fill="#e67e22" font-weight="bold">Cross-Entropy: H(p,q) = −Σ p log q</text>
  <text x="560" y="203" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">bits needed using model q for distribution p</text>
  <text x="560" y="231" text-anchor="middle" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">KL Divergence: D_KL(p‖q) = H(p,q)−H(p)</text>
  <text x="560" y="251" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">extra bits from using q instead of p</text>
  <text x="560" y="279" text-anchor="middle" font-family="Arial" font-size="12" fill="#8e44ad" font-weight="bold">Mutual Information: I(X;Y) = H(X)−H(X|Y)</text>
  <text x="560" y="299" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">shared information between X and Y</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">H(X) = 1 bit for fair coin — one yes/no question to resolve uncertainty</text>
</svg>
