<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Policy Gradient</text>
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">State s</text>
  <rect x="310" y="80" width="180" height="60" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Policy π(a|s;θ)</text>
  <text x="400" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">neural network</text>
  <rect x="570" y="80" width="160" height="60" rx="8" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="650" y="115" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Action a</text>
  <line x1="220" y1="110" x2="308" y2="110" stroke="#4a90d9" stroke-width="2" marker-end="url(#apg)"/>
  <line x1="490" y1="110" x2="568" y2="110" stroke="#e67e22" stroke-width="2" marker-end="url(#apg2)"/>
  <rect x="200" y="220" width="400" height="80" rx="10" fill="#f0e6ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="400" y="248" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#8e44ad">REINFORCE Update</text>
  <text x="400" y="273" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">θ ← θ + α · G_t · ∇log π(a_t|s_t;θ)</text>
  <text x="400" y="293" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">G_t = discounted return, ∇log π = score function</text>
  <line x1="650" y1="140" x2="650" y2="200" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="650" y1="200" x2="400" y2="220" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#apg3)"/>
  <text x="590" y="195" font-family="Arial" font-size="11" fill="#27ae60">reward G_t</text>
  <defs>
    <marker id="apg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="apg2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
    <marker id="apg3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/></marker>
  </defs>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Maximize expected return by following the gradient of log-probability weighted by reward</text>
</svg>
