<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="340" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Diffusion Models: Forward and Reverse Process</text>
  <defs>
    <marker id="arrd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2C5F8A"/>
    </marker>
    <marker id="arrdr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#C0392B"/>
    </marker>
  </defs>
  <!-- Stages: clean → noisy -->
  <rect x="40" y="100" width="90" height="90" rx="8" fill="#4A7C59"/>
  <text x="85" y="145" text-anchor="middle" fill="white" font-size="26">🖼</text>
  <text x="85" y="215" text-anchor="middle" fill="#4A7C59" font-size="12">x₀ clean</text>
  <rect x="175" y="100" width="90" height="90" rx="8" fill="#4A7C59" fill-opacity="0.7"/>
  <text x="220" y="145" text-anchor="middle" fill="white" font-size="24" opacity="0.8">🖼</text>
  <text x="220" y="215" text-anchor="middle" fill="#555" font-size="12">x_t/4</text>
  <rect x="310" y="100" width="90" height="90" rx="8" fill="#888" fill-opacity="0.5"/>
  <text x="355" y="150" text-anchor="middle" fill="white" font-size="20" opacity="0.5">🖼</text>
  <text x="355" y="215" text-anchor="middle" fill="#555" font-size="12">x_t/2</text>
  <rect x="445" y="100" width="90" height="90" rx="8" fill="#aaa" fill-opacity="0.4"/>
  <text x="490" y="215" text-anchor="middle" fill="#555" font-size="12">x_3t/4</text>
  <rect x="580" y="100" width="90" height="90" rx="8" fill="#ccc"/>
  <!-- Noise texture for last box -->
  <rect x="588" y="108" width="15" height="10" fill="#aaa" opacity="0.6"/>
  <rect x="608" y="122" width="12" height="12" fill="#999" opacity="0.5"/>
  <rect x="625" y="108" width="18" height="8" fill="#bbb" opacity="0.7"/>
  <rect x="590" y="128" width="20" height="15" fill="#aaa" opacity="0.4"/>
  <rect x="615" y="140" width="15" height="15" fill="#999" opacity="0.6"/>
  <rect x="640" y="125" width="20" height="20" fill="#bbb" opacity="0.5"/>
  <text x="625" y="215" text-anchor="middle" fill="#555" font-size="12">x_T noise</text>
  <!-- Forward arrows -->
  <line x1="132" y1="145" x2="173" y2="145" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arrd)"/>
  <line x1="267" y1="145" x2="308" y2="145" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arrd)"/>
  <line x1="402" y1="145" x2="443" y2="145" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arrd)"/>
  <line x1="537" y1="145" x2="578" y2="145" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arrd)"/>
  <!-- Forward label -->
  <text x="400" y="75" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">Forward process: q(xₜ|xₜ₋₁) adds Gaussian noise</text>
  <!-- Reverse arrows below -->
  <line x1="578" y1="235" x2="537" y2="235" stroke="#C0392B" stroke-width="2.5" marker-end="url(#arrdr)"/>
  <line x1="443" y1="235" x2="402" y2="235" stroke="#C0392B" stroke-width="2.5" marker-end="url(#arrdr)"/>
  <line x1="308" y1="235" x2="267" y2="235" stroke="#C0392B" stroke-width="2.5" marker-end="url(#arrdr)"/>
  <line x1="173" y1="235" x2="132" y2="235" stroke="#C0392B" stroke-width="2.5" marker-end="url(#arrdr)"/>
  <!-- Reverse label -->
  <text x="400" y="275" text-anchor="middle" fill="#C0392B" font-size="13" font-weight="bold">Reverse process: neural net pθ(xₜ₋₁|xₜ) learns to denoise</text>
  <text x="400" y="310" text-anchor="middle" fill="#555" font-size="12">Training: predict noise ε added at each step → generate by iterative denoising</text>
</svg>