<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Axes -->
  <line x1="80" y1="320" x2="480" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="320" x2="80" y2="60" stroke="#333" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="280" y="360" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">False Positive Rate</text>
  <text x="30" y="190" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90,30,190)">True Positive Rate</text>
  <!-- Diagonal (random) -->
  <line x1="80" y1="320" x2="480" y2="60" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="430" y="80" font-family="Arial" font-size="11" fill="#999">Random</text>
  <!-- Good model curve -->
  <path d="M80,320 Q120,180 180,120 Q260,70 480,60" fill="none" stroke="#4a90d9" stroke-width="3"/>
  <text x="200" y="105" font-family="Arial" font-size="12" fill="#4a90d9">Good model</text>
  <text x="200" y="120" font-family="Arial" font-size="11" fill="#4a90d9">AUC ≈ 0.92</text>
  <!-- Perfect model -->
  <path d="M80,320 L80,60 L480,60" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="120" y="75" font-family="Arial" font-size="11" fill="#27ae60">Perfect (AUC=1.0)</text>
  <!-- AUC shading -->
  <path d="M80,320 Q120,180 180,120 Q260,70 480,60 L480,320 Z" fill="#4a90d9" fill-opacity="0.08"/>
  <!-- Tick marks -->
  <text x="80" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">0</text>
  <text x="280" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">0.5</text>
  <text x="480" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">1.0</text>
  <text x="70" y="323" text-anchor="end" font-family="Arial" font-size="11" fill="#555">0</text>
  <text x="70" y="193" text-anchor="end" font-family="Arial" font-size="11" fill="#555">0.5</text>
  <text x="70" y="63" text-anchor="end" font-family="Arial" font-size="11" fill="#555">1.0</text>
  <!-- Threshold table -->
  <rect x="540" y="100" width="220" height="160" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="650" y="125" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Operating Points</text>
  <text x="650" y="150" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Low threshold → high TPR</text>
  <text x="650" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">High threshold → low FPR</text>
  <text x="650" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">AUC = area under curve</text>
  <text x="650" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">threshold-independent metric</text>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">ROC Curve &amp; AUC</text>
</svg>
