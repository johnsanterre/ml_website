<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Statistical Inference Pipeline</text>

  <!-- POPULATION bubble -->
  <ellipse cx="100" cy="190" rx="75" ry="95" fill="#E3F2FD" stroke="#2C5F8A" stroke-width="2"/>
  <text x="100" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C5F8A">Population</text>
  <!-- Dots representing population -->
  <circle cx="80"  cy="165" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="95"  cy="158" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="112" cy="163" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="75"  cy="177" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="92"  cy="173" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="108" cy="178" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="122" cy="170" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="83"  cy="192" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="100" cy="188" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="116" cy="195" r="3.5" fill="#2C5F8A" opacity="0.55"/>
  <circle cx="72"  cy="205" r="3.5" fill="#2C5F8A" opacity="0.45"/>
  <circle cx="88"  cy="210" r="3.5" fill="#2C5F8A" opacity="0.45"/>
  <circle cx="104" cy="207" r="3.5" fill="#2C5F8A" opacity="0.45"/>
  <circle cx="120" cy="212" r="3.5" fill="#2C5F8A" opacity="0.35"/>
  <circle cx="79"  cy="223" r="3.5" fill="#2C5F8A" opacity="0.30"/>
  <text x="100" y="267" text-anchor="middle" font-size="11" fill="#555">μ, σ unknown</text>

  <!-- Arrow: population → sample -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="178" y1="185" x2="248" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="213" y="175" text-anchor="middle" font-size="11" fill="#555">random</text>
  <text x="213" y="200" text-anchor="middle" font-size="11" fill="#555">sample</text>

  <!-- SAMPLE box -->
  <rect x="252" y="140" width="145" height="95" rx="8" fill="#FFF9E6" stroke="#E09B2D" stroke-width="2"/>
  <text x="325" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#B07A10">Sample</text>
  <text x="325" y="183" text-anchor="middle" font-size="12" fill="#555">x₁, x₂, …, xₙ</text>
  <text x="325" y="200" text-anchor="middle" font-size="11" fill="#777">n observations</text>
  <text x="325" y="220" text-anchor="middle" font-size="11" fill="#777">i.i.d. draws</text>

  <!-- Arrow: sample → estimate -->
  <line x1="400" y1="185" x2="468" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="434" y="175" text-anchor="middle" font-size="11" fill="#555">compute</text>
  <text x="434" y="200" text-anchor="middle" font-size="11" fill="#555">statistic</text>

  <!-- ESTIMATE box -->
  <rect x="472" y="120" width="160" height="130" rx="8" fill="#E8F5E9" stroke="#2E7D52" stroke-width="2"/>
  <text x="552" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D52">Estimate</text>
  <text x="552" y="168" text-anchor="middle" font-size="12" fill="#333">x̄ → point est.</text>
  <text x="552" y="188" text-anchor="middle" font-size="11" fill="#555">[x̄ ± 1.96 σ/√n]</text>
  <text x="552" y="204" text-anchor="middle" font-size="10.5" fill="#777">95% CI</text>
  <text x="552" y="222" text-anchor="middle" font-size="11" fill="#555">p-value → H-test</text>

  <!-- Arrow: estimate → inference -->
  <line x1="635" y1="185" x2="700" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="668" y="175" text-anchor="middle" font-size="11" fill="#555">reason</text>
  <text x="668" y="200" text-anchor="middle" font-size="11" fill="#555">about μ</text>

  <!-- INFERENCE box -->
  <rect x="703" y="140" width="80" height="95" rx="8" fill="#FCE4EC" stroke="#C0392B" stroke-width="2"/>
  <text x="743" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#C0392B">Inference</text>
  <text x="743" y="183" text-anchor="middle" font-size="10.5" fill="#555">reject H₀?</text>
  <text x="743" y="200" text-anchor="middle" font-size="10.5" fill="#555">estimate μ</text>
  <text x="743" y="217" text-anchor="middle" font-size="10.5" fill="#555">with CI</text>

  <!-- Bottom: Sampling Distribution panel -->
  <rect x="50" y="310" width="700" height="72" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="400" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Sampling Distribution of x̄</text>

  <!-- Normal curve sketch in the panel -->
  <path d="M 110,372 C 140,372 160,342 200,335 C 230,330 260,328 300,328 C 340,328 370,330 400,335 C 430,340 460,352 490,362 C 520,370 560,372 600,372 C 640,372 660,372 690,372"
        fill="none" stroke="#2C5F8A" stroke-width="2"/>
  <!-- center tick -->
  <line x1="390" y1="328" x2="390" y2="372" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="390" y="383" text-anchor="middle" font-size="10" fill="#C0392B">μ</text>
  <text x="250" y="383" text-anchor="middle" font-size="10" fill="#555">SE = σ/√n → 0 as n → ∞</text>
  <text x="560" y="383" text-anchor="middle" font-size="10" fill="#555">CLT: x̄ → N(μ, σ²/n)</text>
</svg>
