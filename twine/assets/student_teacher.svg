<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Knowledge Distillation (Student-Teacher)</text>
  <!-- Teacher -->
  <rect x="50" y="80" width="220" height="200" rx="10" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="160" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4a90d9">Teacher Model</text>
  <text x="160" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Large, accurate</text>
  <text x="160" y="160" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">ResNet-152, GPT-4</text>
  <text x="160" y="195" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Outputs soft labels:</text>
  <text x="160" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">cat: 0.85, dog: 0.12</text>
  <text x="160" y="235" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">bird: 0.03</text>
  <!-- Arrow with soft labels -->
  <line x1="270" y1="180" x2="380" y2="180" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#ast)"/>
  <text x="325" y="167" text-anchor="middle" font-family="Arial" font-size="11" fill="#8e44ad">soft labels</text>
  <text x="325" y="183" text-anchor="middle" font-family="Arial" font-size="11" fill="#8e44ad">(dark knowledge)</text>
  <!-- Student -->
  <rect x="390" y="80" width="220" height="200" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2.5"/>
  <text x="500" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e67e22">Student Model</text>
  <text x="500" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Small, fast</text>
  <text x="500" y="160" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">MobileNet, DistilBERT</text>
  <text x="500" y="195" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Learns from teacher</text>
  <text x="500" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">+ true labels</text>
  <!-- Loss -->
  <rect x="640" y="120" width="140" height="120" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="710" y="148" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Student Loss</text>
  <text x="710" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">α·CE(y, ŷ)</text>
  <text x="710" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">+ (1−α)·KL</text>
  <text x="710" y="208" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">(teacher, student)</text>
  <line x1="610" y1="180" x2="638" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#ast2)"/>
  <defs>
    <marker id="ast" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8e44ad"/></marker>
    <marker id="ast2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker>
  </defs>
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Student trained to mimic teacher's soft predictions — transfers rich similarity structure</text>
</svg>
