<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="360" fill="#FDFAF4"/>
  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Unrolled Recurrent Neural Network</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- Three time steps -->
  <!-- t-1 -->
  <rect x="80" y="140" width="120" height="80" rx="10" fill="#4A7C59" stroke="#2d5a3d" stroke-width="2"/>
  <text x="140" y="178" text-anchor="middle" fill="white" font-size="15" font-weight="bold">hₜ₋₁</text>
  <text x="140" y="200" text-anchor="middle" fill="#d4edda" font-size="12">RNN cell</text>
  <!-- t -->
  <rect x="300" y="140" width="120" height="80" rx="10" fill="#4A7C59" stroke="#2d5a3d" stroke-width="2"/>
  <text x="360" y="178" text-anchor="middle" fill="white" font-size="15" font-weight="bold">hₜ</text>
  <text x="360" y="200" text-anchor="middle" fill="#d4edda" font-size="12">RNN cell</text>
  <!-- t+1 -->
  <rect x="520" y="140" width="120" height="80" rx="10" fill="#4A7C59" stroke="#2d5a3d" stroke-width="2"/>
  <text x="580" y="178" text-anchor="middle" fill="white" font-size="15" font-weight="bold">hₜ₊₁</text>
  <text x="580" y="200" text-anchor="middle" fill="#d4edda" font-size="12">RNN cell</text>
  <!-- Hidden state arrows -->
  <line x1="200" y1="180" x2="298" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="420" y1="180" x2="518" y2="180" stroke="#555" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="640" y1="180" x2="700" y2="180" stroke="#555" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="30" y="185" fill="#555" font-size="13">h₀ →</text>
  <!-- Input arrows -->
  <line x1="140" y1="280" x2="140" y2="222" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="360" y1="280" x2="360" y2="222" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="580" y1="280" x2="580" y2="222" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="140" y="305" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">xₜ₋₁</text>
  <text x="360" y="305" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">xₜ</text>
  <text x="580" y="305" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">xₜ₊₁</text>
  <!-- Output arrows -->
  <line x1="140" y1="138" x2="140" y2="80" stroke="#E07B39" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="360" y1="138" x2="360" y2="80" stroke="#E07B39" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="580" y1="138" x2="580" y2="80" stroke="#E07B39" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="140" y="68" text-anchor="middle" fill="#E07B39" font-size="14" font-weight="bold">yₜ₋₁</text>
  <text x="360" y="68" text-anchor="middle" fill="#E07B39" font-size="14" font-weight="bold">yₜ</text>
  <text x="580" y="68" text-anchor="middle" fill="#E07B39" font-size="14" font-weight="bold">yₜ₊₁</text>
  <!-- Time axis -->
  <text x="400" y="345" text-anchor="middle" fill="#888" font-size="13">time →</text>
</svg>