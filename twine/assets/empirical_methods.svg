<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <!-- Arrow marker: warm brown -->
    <marker id="em-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#9B6B3A"/>
    </marker>
    <!-- Arrow marker: green (for "new hypothesis" feedback arc) -->
    <marker id="em-arr-grn" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2D6A4F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4"/>
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel label -->
  <text x="400" y="22" text-anchor="middle" font-size="10.5" fill="#6B5D4F" letter-spacing="1.2">THE EMPIRICAL ML RESEARCH CYCLE</text>

  <!-- ══ NODE DEFINITIONS ══ -->
  <!-- Laid out in a horizontal pipeline with a feedback arc back to top -->

  <!-- 1: Hypothesis (left) -->
  <rect x="20" y="155" width="110" height="52" rx="10" fill="#E8EDF7" stroke="#2D5A8E" stroke-width="2"/>
  <text x="75" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D5A8E">Hypothesis</text>
  <text x="75" y="193" text-anchor="middle" font-size="10" fill="#4A6FA5" font-style="italic">RQ + prediction</text>

  <!-- 2: Experiment Design -->
  <rect x="163" y="155" width="118" height="52" rx="10" fill="#F2EAD8" stroke="#9B6B3A" stroke-width="2"/>
  <text x="222" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="#9B6B3A">Experiment</text>
  <text x="222" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#9B6B3A">Design</text>
  <text x="222" y="200" text-anchor="middle" font-size="9.5" fill="#9B6B3A" font-style="italic">baselines · seeds · splits</text>

  <!-- 3: Data Collection / Training -->
  <rect x="315" y="155" width="118" height="52" rx="10" fill="#F2EAD8" stroke="#9B6B3A" stroke-width="2"/>
  <text x="374" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="#9B6B3A">Data &amp;</text>
  <text x="374" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#9B6B3A">Training</text>
  <text x="374" y="200" text-anchor="middle" font-size="9.5" fill="#9B6B3A" font-style="italic">controlled conditions</text>

  <!-- 4: Measurement -->
  <rect x="467" y="155" width="118" height="52" rx="10" fill="#F2EAD8" stroke="#9B6B3A" stroke-width="2"/>
  <text x="526" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#9B6B3A">Measurement</text>
  <text x="526" y="193" text-anchor="middle" font-size="9.5" fill="#9B6B3A" font-style="italic">metrics · ablations</text>

  <!-- 5: Analysis -->
  <rect x="619" y="155" width="110" height="52" rx="10" fill="#E8F0EC" stroke="#2D6A4F" stroke-width="2"/>
  <text x="674" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D6A4F">Analysis</text>
  <text x="674" y="193" text-anchor="middle" font-size="9.5" fill="#2D6A4F" font-style="italic">p-value · effect size</text>

  <!-- 6: Conclusion (bottom, centered) -->
  <rect x="295" y="295" width="118" height="52" rx="10" fill="#E8F0EC" stroke="#2D6A4F" stroke-width="2"/>
  <text x="354" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D6A4F">Conclusion</text>
  <text x="354" y="334" text-anchor="middle" font-size="9.5" fill="#2D6A4F" font-style="italic">accept / reject H₀</text>

  <!-- ══ ARROWS (pipeline, left→right) ══ -->
  <!-- 1 → 2 -->
  <line x1="131" y1="181" x2="160" y2="181" stroke="#9B6B3A" stroke-width="2" marker-end="url(#em-arr)"/>
  <!-- 2 → 3 -->
  <line x1="282" y1="181" x2="312" y2="181" stroke="#9B6B3A" stroke-width="2" marker-end="url(#em-arr)"/>
  <!-- 3 → 4 -->
  <line x1="434" y1="181" x2="464" y2="181" stroke="#9B6B3A" stroke-width="2" marker-end="url(#em-arr)"/>
  <!-- 4 → 5 -->
  <line x1="586" y1="181" x2="616" y2="181" stroke="#9B6B3A" stroke-width="2" marker-end="url(#em-arr)"/>

  <!-- 5 → Conclusion (down from analysis) -->
  <line x1="674" y1="208" x2="674" y2="260" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="674" y1="260" x2="414" y2="260" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="414" y1="260" x2="414" y2="292" stroke="#2D6A4F" stroke-width="2" marker-end="url(#em-arr-grn)"/>

  <!-- Conclusion → new Hypothesis (feedback arc, below) -->
  <!-- Down from conclusion, loop left, up to hypothesis -->
  <line x1="354" y1="348" x2="354" y2="375" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="354" y1="375" x2="75" y2="375" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="75" y1="375" x2="75" y2="210" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#em-arr-grn)"/>
  <!-- Label on feedback arc -->
  <rect x="155" y="365" width="140" height="18" fill="#FDFAF4" rx="3" opacity="0.9"/>
  <text x="225" y="378" text-anchor="middle" font-size="10" fill="#2D6A4F" font-style="italic">new hypothesis</text>

  <!-- ══ ANNOTATION CALLOUTS ══ -->

  <!-- Ablation studies — below Measurement node -->
  <rect x="448" y="224" width="120" height="30" fill="#FDF6E3" stroke="#C4A87A" stroke-width="1" rx="4"/>
  <text x="508" y="237" text-anchor="middle" font-size="9.5" fill="#6B5D4F" font-weight="bold">Ablation studies</text>
  <text x="508" y="249" text-anchor="middle" font-size="9" fill="#6B5D4F">isolate each component</text>
  <line x1="508" y1="224" x2="508" y2="209" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Significance testing + effect size — below Analysis node -->
  <rect x="596" y="224" width="148" height="40" fill="#FDF6E3" stroke="#C4A87A" stroke-width="1" rx="4"/>
  <text x="670" y="237" text-anchor="middle" font-size="9.5" fill="#6B5D4F" font-weight="bold">Significance testing</text>
  <text x="670" y="249" text-anchor="middle" font-size="9" fill="#6B5D4F">p-value, paired t-test,</text>
  <text x="670" y="260" text-anchor="middle" font-size="9" fill="#6B5D4F">Wilcoxon, bootstrap CI</text>
  <line x1="670" y1="224" x2="670" y2="209" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Effect size — small badge on analysis box -->
  <rect x="620" y="138" width="82" height="16" fill="#E8F0EC" stroke="#2D6A4F" stroke-width="1" rx="3"/>
  <text x="661" y="150" text-anchor="middle" font-size="9" fill="#2D6A4F">Cohen's d · η²</text>

  <!-- Reproducibility annotation — above Experiment Design -->
  <rect x="148" y="110" width="130" height="30" fill="#FDF6E3" stroke="#C4A87A" stroke-width="1" rx="4"/>
  <text x="213" y="123" text-anchor="middle" font-size="9.5" fill="#6B5D4F" font-weight="bold">Reproducibility</text>
  <text x="213" y="135" text-anchor="middle" font-size="9" fill="#6B5D4F">seeds · code · datasheets</text>
  <line x1="213" y1="140" x2="213" y2="154" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Multiple comparisons annotation — above Analysis -->
  <rect x="600" y="72" width="158" height="30" fill="#FDF6E3" stroke="#C4A87A" stroke-width="1" rx="4"/>
  <text x="679" y="85" text-anchor="middle" font-size="9.5" fill="#6B5D4F" font-weight="bold">Multiple comparisons</text>
  <text x="679" y="97" text-anchor="middle" font-size="9" fill="#6B5D4F">Bonferroni · Holm · FDR</text>
  <line x1="679" y1="102" x2="679" y2="120" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- connect to analysis top -->
  <line x1="679" y1="120" x2="674" y2="153" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom caption -->
  <text x="400" y="394" text-anchor="middle" font-size="9" fill="#6B5D4F">
    Rigorous empirical ML: every step from research question to peer-reviewed conclusion
  </text>
</svg>
