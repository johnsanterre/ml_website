<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-path" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-edge" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9A8F82"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4"/>

  <!-- ── Grid lines ── -->
  <!-- Vertical -->
  <line x1="80"  y1="40"  x2="80"  y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="160" y1="40"  x2="160" y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="240" y1="40"  x2="240" y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="320" y1="40"  x2="320" y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="400" y1="40"  x2="400" y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="480" y1="40"  x2="480" y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="560" y1="40"  x2="560" y2="340" stroke="#E2DAD0" stroke-width="1"/>
  <!-- Horizontal -->
  <line x1="40"  y1="80"  x2="600" y2="80"  stroke="#E2DAD0" stroke-width="1"/>
  <line x1="40"  y1="160" x2="600" y2="160" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="40"  y1="240" x2="600" y2="240" stroke="#E2DAD0" stroke-width="1"/>
  <line x1="40"  y1="320" x2="600" y2="320" stroke="#E2DAD0" stroke-width="1"/>

  <!-- ── Explored nodes (shaded fill) ── -->
  <!-- Node A (2,1) explored -->
  <circle cx="160" cy="80"  r="22" fill="#C4A87A" fill-opacity="0.35" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- Node B (3,2) explored -->
  <circle cx="240" cy="160" r="22" fill="#C4A87A" fill-opacity="0.35" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- Node C (2,3) explored dead end -->
  <circle cx="160" cy="240" r="22" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Node D (4,2) explored -->
  <circle cx="320" cy="160" r="22" fill="#C4A87A" fill-opacity="0.35" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- Node E (5,3) on optimal path -->
  <circle cx="400" cy="240" r="22" fill="#2D5A8E" fill-opacity="0.18" stroke="#2D5A8E" stroke-width="2"/>
  <!-- Node F (4,4) explored -->
  <circle cx="320" cy="320" r="22" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ── Edges (non-optimal, grey) ── -->
  <!-- S → A -->
  <line x1="80"  y1="80"  x2="138" y2="80"  stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- S → C -->
  <line x1="80"  y1="98"  x2="138" y2="222" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- A → B -->
  <line x1="178" y1="97"  x2="222" y2="143" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- A → D -->
  <line x1="182" y1="80"  x2="298" y2="160" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- B → D -->
  <line x1="262" y1="160" x2="298" y2="160" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- C → F -->
  <line x1="172" y1="258" x2="298" y2="308" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- D → E -->
  <line x1="340" y1="173" x2="382" y2="228" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>
  <!-- F → G -->
  <line x1="342" y1="320" x2="460" y2="320" stroke="#9A8F82" stroke-width="1.5" marker-end="url(#arr-edge)"/>

  <!-- ── Optimal path edges (blue, bold) ── -->
  <!-- S → A -->
  <line x1="80"  y1="76"  x2="136" y2="76"  stroke="#2D5A8E" stroke-width="3" marker-end="url(#arr-path)"/>
  <!-- A → D -->
  <line x1="178" y1="76"  x2="295" y2="152" stroke="#2D5A8E" stroke-width="3" marker-end="url(#arr-path)"/>
  <!-- D → E -->
  <line x1="338" y1="170" x2="380" y2="225" stroke="#2D5A8E" stroke-width="3" marker-end="url(#arr-path)"/>
  <!-- E → G -->
  <line x1="422" cy="240" x2="458" y2="240" stroke="#2D5A8E" stroke-width="3" marker-end="url(#arr-path)"/>
  <!-- fix E→G properly -->
  <line x1="422" y1="240" x2="458" y2="240" stroke="#2D5A8E" stroke-width="3" marker-end="url(#arr-path)"/>

  <!-- ── Start node S (1,1) ── -->
  <circle cx="80" cy="80" r="26" fill="#2D5A8E" fill-opacity="0.9" stroke="#1A3A5E" stroke-width="2"/>
  <text x="80" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#FDFAF4">S</text>

  <!-- ── Goal node G (6,3) ── -->
  <circle cx="480" cy="240" r="26" fill="#7C2530" fill-opacity="0.9" stroke="#5A1A22" stroke-width="2"/>
  <text x="480" y="245" text-anchor="middle" font-size="16" font-weight="bold" fill="#FDFAF4">G</text>

  <!-- ── Node labels ── -->
  <text x="160" y="85"  text-anchor="middle" font-size="12" fill="#5A4A38">A</text>
  <text x="240" y="165" text-anchor="middle" font-size="12" fill="#5A4A38">B</text>
  <text x="160" y="245" text-anchor="middle" font-size="12" fill="#5A4A38">C</text>
  <text x="320" y="165" text-anchor="middle" font-size="12" fill="#2D5A8E" font-weight="bold">D</text>
  <text x="400" y="245" text-anchor="middle" font-size="12" fill="#2D5A8E" font-weight="bold">E</text>
  <text x="320" y="325" text-anchor="middle" font-size="12" fill="#5A4A38">F</text>

  <!-- ── f-score labels on optimal path nodes ── -->
  <text x="160" y="62"  text-anchor="middle" font-size="9" fill="#2D5A8E">f=5</text>
  <text x="320" y="142" text-anchor="middle" font-size="9" fill="#2D5A8E">f=7</text>
  <text x="400" y="222" text-anchor="middle" font-size="9" fill="#2D5A8E">f=9</text>

  <!-- ── Legend: explored vs optimal ── -->
  <rect x="40" y="358" width="16" height="16" fill="#C4A87A" fill-opacity="0.35" stroke="#C4A87A" stroke-width="1.5" rx="2"/>
  <text x="62" y="371" font-size="11" fill="#5A4A38">Explored (not on optimal path)</text>
  <circle cx="232" cy="366" r="8" fill="#2D5A8E" fill-opacity="0.18" stroke="#2D5A8E" stroke-width="2"/>
  <text x="246" y="371" font-size="11" fill="#2D5A8E">On optimal path</text>
  <line x1="350" y1="366" x2="380" y2="366" stroke="#2D5A8E" stroke-width="3" marker-end="url(#arr-path)"/>
  <text x="386" y="371" font-size="11" fill="#2D5A8E">Optimal path</text>

  <!-- ── Right panel: formula ── -->
  <rect x="630" y="60" width="150" height="280" fill="#F4EFE6" stroke="#C4A87A" stroke-width="1.5" rx="6"/>

  <text x="705" y="90"  text-anchor="middle" font-size="12" font-weight="bold" fill="#2D5A8E">A* Formula</text>
  <line x1="645" y1="97" x2="765" y2="97" stroke="#C4A87A" stroke-width="1"/>

  <text x="705" y="125" text-anchor="middle" font-size="18" fill="#1A3A5E" font-style="italic">f(n)</text>
  <text x="705" y="148" text-anchor="middle" font-size="14" fill="#5A4A38">=</text>
  <text x="705" y="172" text-anchor="middle" font-size="16" fill="#2D5A8E" font-style="italic">g(n)</text>
  <text x="705" y="195" text-anchor="middle" font-size="14" fill="#5A4A38">+</text>
  <text x="705" y="218" text-anchor="middle" font-size="16" fill="#7C2530" font-style="italic">h(n)</text>

  <line x1="645" y1="232" x2="765" y2="232" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="705" y="254" text-anchor="middle" font-size="9.5" fill="#5A4A38" font-style="italic">g(n)</text>
  <text x="705" y="268" text-anchor="middle" font-size="9" fill="#5A4A38">cost from start</text>

  <line x1="645" y1="278" x2="765" y2="278" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="705" y="296" text-anchor="middle" font-size="9.5" fill="#7C2530" font-style="italic">h(n)</text>
  <text x="705" y="310" text-anchor="middle" font-size="9" fill="#5A4A38">heuristic to goal</text>

  <line x1="645" y1="320" x2="765" y2="320" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="705" y="330" text-anchor="middle" font-size="9" fill="#1A3A5E" font-style="italic">f(n)</text>
  <text x="705" y="343" text-anchor="middle" font-size="9" fill="#5A4A38">estimated total cost</text>
</svg>
