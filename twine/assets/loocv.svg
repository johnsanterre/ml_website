  <text x="68" y="172" text-anchor="end" font-size="12" fill="#444">Fold 2</text>
  <rect x="80" y="156" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="156" width="52" height="28" rx="4" fill="#C0392B"/>
