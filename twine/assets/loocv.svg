  <rect x="248" y="156" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="156" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="360" y="156" width="52" height="28" rx="4" fill="#4A7FA5"/>
