  <rect x="416" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="472" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <text x="568" y="319" text-anchor="middle" font-size="12" fill="#444">7</text>
  <text x="626" y="319" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="319" text-anchor="middle" font-size="12" fill="#555">ε₆</text>

  <!-- FOLD 7 -->
  <text x="68" y="352" text-anchor="end" font-size="12" fill="#444">Fold 7</text>
  <rect x="80" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="248" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="360" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="416" y="336" width="52" height="28" rx="4" fill="#C0392B"/>
  <text x="442" y="355" text-anchor="middle" font-size="11" fill="white" font-weight="bold">VAL</text>
  <rect x="472" y="336" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <text x="568" y="355" text-anchor="middle" font-size="12" fill="#444">7</text>
  <text x="626" y="355" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="355" text-anchor="middle" font-size="12" fill="#555">ε₇</text>

  <!-- FOLD 8 -->
  <text x="68" y="388" text-anchor="end" font-size="12" fill="#444">Fold 8</text>
  <rect x="80" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="248" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="360" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="416" y="372" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="472" y="372" width="52" height="28" rx="4" fill="#C0392B"/>
  <text x="498" y="391" text-anchor="middle" font-size="11" fill="white" font-weight="bold">VAL</text>
  <text x="568" y="391" text-anchor="middle" font-size="12" fill="#444">7</text>
  <text x="626" y="391" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="391" text-anchor="middle" font-size="12" fill="#555">ε₈</text>

  <!-- Final average annotation -->
  <text x="748" y="260" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="bold">LOOCV</text>
  <text x="748" y="278" text-anchor="middle" font-size="12" fill="#555">= mean(ε₁…ε₈)</text>

  <!-- Bracket on right side -->
  <line x1="736" y1="120" x2="742" y2="120" stroke="#888" stroke-width="1.5"/>
  <line x1="742" y1="120" x2="742" y2="399" stroke="#888" stroke-width="1.5"/>
  <line x1="736" y1="399" x2="742" y2="399" stroke="#888" stroke-width="1.5"/>

</svg>
