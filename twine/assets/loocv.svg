<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2D2D2D">Leave-One-Out Cross-Validation (LOOCV)</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#666">n = 8 data points — each fold holds out exactly one point</text>

  <!-- Color legend -->
  <rect x="148" y="74" width="16" height="14" rx="3" fill="#4A7FA5"/>
  <text x="170" y="86" font-size="12" fill="#444">Training point</text>
  <rect x="290" y="74" width="16" height="14" rx="3" fill="#C0392B"/>
  <text x="312" y="86" font-size="12" fill="#444">Validation point (left out)</text>
  <rect x="490" y="74" width="16" height="14" rx="3" fill="#E8E0D0" stroke="#AAA" stroke-width="1"/>
  <text x="512" y="86" font-size="12" fill="#444">Unused slot (visual guide)</text>

  <!-- Layout: 8 folds, each as a row of 8 cells -->
  <!-- Cell size: 56w x 32h, start x=80, spacing between rows -->

  <!-- Row labels: "Fold i" -->
  <!-- We show folds 1–8 vertically -->

  <!-- Define cell positions: x offsets for columns 1–8 -->
  <!-- col centers: 108, 164, 220, 276, 332, 388, 444, 500 -->
  <!-- row centers: 128, 164, 200, 236, 272, 308, 344, 380 (top of row + 16) -->

  <!-- Column headers (point indices) -->
  <text x="108" y="112" text-anchor="middle" font-size="11" fill="#777">x₁</text>
  <text x="164" y="112" text-anchor="middle" font-size="11" fill="#777">x₂</text>
  <text x="220" y="112" text-anchor="middle" font-size="11" fill="#777">x₃</text>
  <text x="276" y="112" text-anchor="middle" font-size="11" fill="#777">x₄</text>
  <text x="332" y="112" text-anchor="middle" font-size="11" fill="#777">x₅</text>
  <text x="388" y="112" text-anchor="middle" font-size="11" fill="#777">x₆</text>
  <text x="444" y="112" text-anchor="middle" font-size="11" fill="#777">x₇</text>
  <text x="500" y="112" text-anchor="middle" font-size="11" fill="#777">x₈</text>

  <!-- Right-side labels: Train size and Val size -->
  <text x="560" y="112" font-size="11" fill="#777">Train</text>
  <text x="618" y="112" font-size="11" fill="#777">Val</text>
  <text x="680" y="112" font-size="11" fill="#777">Error</text>

  <!-- FOLD 1: x1 is validation, rest train -->
  <text x="68" y="136" text-anchor="end" font-size="12" fill="#444">Fold 1</text>
  <rect x="80" y="120" width="52" height="28" rx="4" fill="#C0392B"/>
  <text x="106" y="139" text-anchor="middle" font-size="11" fill="white" font-weight="bold">VAL</text>
  <rect x="136" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="248" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="360" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="416" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="472" y="120" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <text x="568" y="139" text-anchor="middle" font-size="12" fill="#444">7</text>
  <text x="626" y="139" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="139" text-anchor="middle" font-size="12" fill="#555">ε₁</text>

