  <rect x="80" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="192" width="52" height="28" rx="4" fill="#C0392B"/>
  <text x="218" y="211" text-anchor="middle" font-size="11" fill="white" font-weight="bold">VAL</text>
  <rect x="248" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="360" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="416" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="472" y="192" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <text x="568" y="211" text-anchor="middle" font-size="12" fill="#444">7</text>
  <text x="626" y="211" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="211" text-anchor="middle" font-size="12" fill="#555">ε₃</text>

  <!-- FOLD 4 -->
  <text x="68" y="244" text-anchor="end" font-size="12" fill="#444">Fold 4</text>
  <rect x="80" y="228" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="228" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="228" width="52" height="28" rx="4" fill="#4A7FA5"/>
