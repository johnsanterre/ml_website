  <text x="626" y="247" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="247" text-anchor="middle" font-size="12" fill="#555">ε₄</text>

  <!-- FOLD 5 -->
  <text x="68" y="280" text-anchor="end" font-size="12" fill="#444">Fold 5</text>
  <rect x="80" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="248" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="264" width="52" height="28" rx="4" fill="#C0392B"/>
  <text x="330" y="283" text-anchor="middle" font-size="11" fill="white" font-weight="bold">VAL</text>
  <rect x="360" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="416" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="472" y="264" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <text x="568" y="283" text-anchor="middle" font-size="12" fill="#444">7</text>
  <text x="626" y="283" text-anchor="middle" font-size="12" fill="#444">1</text>
  <text x="688" y="283" text-anchor="middle" font-size="12" fill="#555">ε₅</text>

  <!-- FOLD 6 -->
  <text x="68" y="316" text-anchor="end" font-size="12" fill="#444">Fold 6</text>
  <rect x="80" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="136" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="192" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="248" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
  <rect x="304" y="300" width="52" height="28" rx="4" fill="#4A7FA5"/>
