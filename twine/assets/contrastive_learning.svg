<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#5C3D1E">Contrastive Learning: Pull Together, Push Apart</text>

  <!-- Panel 1: Anchor + Augmentations -->
  <rect x="15" y="48" width="190" height="310" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="110" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">DATA AUGMENTATION</text>

  <!-- Anchor image box -->
  <rect x="40" y="80" width="70" height="60" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="75" y="108" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Anchor</text>
  <text x="75" y="123" text-anchor="middle" font-size="9" fill="#2D5A8E">image x</text>

  <!-- Positive pair -->
  <rect x="40" y="160" width="70" height="60" fill="#2D5A8E" opacity="0.55" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="75" y="187" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">Positive</text>
  <text x="75" y="202" text-anchor="middle" font-size="9" fill="#FDFAF4">augment(x)</text>

  <!-- Negative -->
  <rect x="40" y="240" width="70" height="60" fill="#7C2530" opacity="0.55" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="75" y="267" text-anchor="middle" font-size="10" fill="#FDFAF4" font-weight="bold">Negative</text>
  <text x="75" y="282" text-anchor="middle" font-size="9" fill="#FDFAF4">other image</text>

  <!-- Arrows from anchor -->
  <line x1="110" y1="110" x2="155" y2="110" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="110" y1="190" x2="155" y2="190" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="135" y="330" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">crop, flip,</text>
  <text x="135" y="343" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">color jitter</text>

  <!-- Panel 2: Encoder -->
  <rect x="220" y="48" width="150" height="310" fill="#F0EBE1" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="295" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">ENCODER  f(·)</text>

  <!-- Network stack positive -->
  <rect x="240" y="88" width="110" height="36" fill="#2D5A8E" opacity="0.7" rx="3"/>
  <text x="295" y="111" text-anchor="middle" font-size="10" fill="#FDFAF4">ResNet / ViT</text>

  <rect x="240" y="138" width="110" height="36" fill="#2D5A8E" opacity="0.7" rx="3"/>
  <text x="295" y="161" text-anchor="middle" font-size="10" fill="#FDFAF4">Projection g(·)</text>

  <!-- Divider -->
  <line x1="240" y1="188" x2="350" y2="188" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Network stack negative -->
  <rect x="240" y="198" width="110" height="36" fill="#7C2530" opacity="0.7" rx="3"/>
  <text x="295" y="221" text-anchor="middle" font-size="10" fill="#FDFAF4">Same encoder</text>

  <rect x="240" y="248" width="110" height="36" fill="#7C2530" opacity="0.7" rx="3"/>
  <text x="295" y="271" text-anchor="middle" font-size="10" fill="#FDFAF4">Same g(·)</text>

  <text x="295" y="322" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">shared weights</text>
  <text x="295" y="336" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">(SimCLR)</text>

  <!-- Panel 3: Embedding Space -->
  <rect x="386" y="48" width="220" height="310" fill="#FFF8EE" stroke="#7C2530" stroke-width="1.8" rx="4"/>
  <text x="496" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">EMBEDDING SPACE</text>

  <!-- Unit sphere circle -->
  <circle cx="496" cy="195" r="110" fill="none" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="496" y="88" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">unit hypersphere</text>

  <!-- Positive cluster -->
  <circle cx="460" cy="155" r="8" fill="#2D5A8E" opacity="0.85"/>
  <circle cx="490" cy="145" r="8" fill="#2D5A8E" opacity="0.85"/>
  <circle cx="470" cy="175" r="8" fill="#2D5A8E" opacity="0.85"/>
  <line x1="460" y1="155" x2="490" y2="145" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="460" y1="155" x2="470" y2="175" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="490" y1="145" x2="470" y2="175" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="472" y="200" text-anchor="middle" font-size="9" fill="#2D5A8E">pulled together</text>

  <!-- Negative cluster -->
  <circle cx="540" cy="250" r="8" fill="#7C2530" opacity="0.85"/>
  <circle cx="565" cy="235" r="8" fill="#7C2530" opacity="0.85"/>

  <!-- Push arrow -->
  <line x1="490" y1="180" x2="540" y2="235" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="536,238 545,242 538,231" fill="#C4A87A"/>
  <text x="525" y="218" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">pushed apart</text>

  <!-- Panel 4: NT-Xent Loss -->
  <rect x="622" y="48" width="163" height="310" fill="#F5EFE6" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="703" y="68" text-anchor="middle" font-size="10" letter-spacing="1" fill="#6B5D4F">NT-XENT LOSS</text>

  <text x="703" y="95" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">for each positive pair</text>
  <text x="703" y="112" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">(i, j) in batch:</text>

  <text x="703" y="138" text-anchor="middle" font-size="12" fill="#7C2530">−log</text>
  <rect x="638" y="148" width="130" height="1" fill="#5C3D1E"/>
  <text x="703" y="168" text-anchor="middle" font-size="9" fill="#5C3D1E">exp(sim(zᵢ,zⱼ)/τ)</text>
  <text x="703" y="188" text-anchor="middle" font-size="9" fill="#5C3D1E">Σₖ exp(sim(zᵢ,zₖ)/τ)</text>

  <line x1="638" y1="202" x2="766" y2="202" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="703" y="222" text-anchor="middle" font-size="9" fill="#2D5A8E">τ = temperature</text>
  <text x="703" y="238" text-anchor="middle" font-size="9" fill="#6B5D4F">controls sharpness</text>

  <line x1="638" y1="252" x2="766" y2="252" stroke="#D4C5A9" stroke-width="0.8"/>

  <text x="703" y="272" text-anchor="middle" font-size="9" fill="#6B5D4F">Hard negatives:</text>
  <text x="703" y="287" text-anchor="middle" font-size="9" fill="#6B5D4F">similar-looking</text>
  <text x="703" y="302" text-anchor="middle" font-size="9" fill="#6B5D4F">negatives give</text>
  <text x="703" y="317" text-anchor="middle" font-size="9" fill="#6B5D4F">stronger signal</text>

  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F">SimCLR: augment → encode → project → NT-Xent loss  ·  CLIP: image-text pairs as positives</text>
</svg>
