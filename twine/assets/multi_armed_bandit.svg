<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Three slot machines / arms -->
  <rect x="60" y="120" width="120" height="160" rx="10" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="120" y="108" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#4a90d9">Arm A</text>
  <text x="120" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">μ = 0.3</text>
  <text x="120" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Low reward</text>
  <rect x="340" y="120" width="120" height="160" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e67e22">Arm B</text>
  <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">μ = 0.7</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">High reward</text>
  <rect x="620" y="120" width="120" height="160" rx="10" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="680" y="108" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#27ae60">Arm C</text>
  <text x="680" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">μ = ?</text>
  <text x="680" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Unknown</text>
  <!-- Agent -->
  <rect x="310" y="320" width="180" height="50" rx="8" fill="#f0e6ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="400" y="341" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#8e44ad">Agent</text>
  <text x="400" y="358" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Explore vs. Exploit</text>
  <!-- Lines from agent to arms -->
  <line x1="360" y1="320" x2="200" y2="280" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="400" y1="320" x2="400" y2="280" stroke="#e67e22" stroke-width="2.5"/>
  <line x1="440" y1="320" x2="600" y2="280" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Regret label -->
  <text x="120" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">Regret: pulls wasted</text>
  <text x="120" y="336" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">on suboptimal arms</text>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Multi-Armed Bandit</text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Unknown reward distributions — balance exploration and exploitation</text>
</svg>
