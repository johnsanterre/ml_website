<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <defs>
    <marker id="arr-elmo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="arr-fwd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2C5F8A"/>
    </marker>
    <marker id="arr-bwd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#C0392B"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4A7C59"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">ELMo: Context-Sensitive Embeddings via biLSTM</text>

  <!-- ── Input tokens ── -->
  <text x="400" y="58" text-anchor="middle" fill="#555" font-size="11">Input tokens</text>

  <!-- Token boxes: "She", "bank", "the", "river" -->
  <rect x="90"  y="65" width="80" height="34" rx="6" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="130" y="87" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">She</text>

  <rect x="210" y="65" width="80" height="34" rx="6" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="250" y="87" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">bank</text>

  <rect x="330" y="65" width="80" height="34" rx="6" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="370" y="87" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">the</text>

  <rect x="450" y="65" width="80" height="34" rx="6" fill="#EAF4FB" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="490" y="87" text-anchor="middle" fill="#2C5F8A" font-size="13" font-weight="bold">river</text>

  <!-- char CNN labels below -->
  <text x="130" y="116" text-anchor="middle" fill="#888" font-size="10">char CNN</text>
  <text x="250" y="116" text-anchor="middle" fill="#888" font-size="10">char CNN</text>
  <text x="370" y="116" text-anchor="middle" fill="#888" font-size="10">char CNN</text>
  <text x="490" y="116" text-anchor="middle" fill="#888" font-size="10">char CNN</text>

  <!-- char CNN connector lines -->
  <line x1="130" y1="99"  x2="130" y2="107" stroke="#888" stroke-width="1.2"/>
  <line x1="250" y1="99"  x2="250" y2="107" stroke="#888" stroke-width="1.2"/>
  <line x1="370" y1="99"  x2="370" y2="107" stroke="#888" stroke-width="1.2"/>
  <line x1="490" y1="99"  x2="490" y2="107" stroke="#888" stroke-width="1.2"/>

  <!-- char CNN to biLSTM layer 1 arrows -->
  <line x1="130" y1="120" x2="130" y2="136" stroke="#555" stroke-width="1.5" marker-end="url(#arr-elmo)"/>
  <line x1="250" y1="120" x2="250" y2="136" stroke="#555" stroke-width="1.5" marker-end="url(#arr-elmo)"/>
  <line x1="370" y1="120" x2="370" y2="136" stroke="#555" stroke-width="1.5" marker-end="url(#arr-elmo)"/>
  <line x1="490" y1="120" x2="490" y2="136" stroke="#555" stroke-width="1.5" marker-end="url(#arr-elmo)"/>

  <!-- ── biLSTM Layer 1 ── -->
  <!-- forward pass cells (blue) -->
  <rect x="90"  y="138" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="130" y="158" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="210" y="138" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="250" y="158" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="330" y="138" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="370" y="158" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="450" y="138" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="490" y="158" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <!-- backward pass cells (red) -->
  <rect x="90"  y="172" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="130" y="192" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <rect x="210" y="172" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="250" y="192" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <rect x="330" y="172" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="370" y="192" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <rect x="450" y="172" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="490" y="192" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <!-- Layer 1 label -->
  <text x="30" y="165" text-anchor="middle" fill="#555" font-size="10">biLSTM</text>
  <text x="30" y="178" text-anchor="middle" fill="#555" font-size="10">Layer 1</text>

  <!-- forward arrows between layer-1 cells -->
  <line x1="170" y1="153" x2="208" y2="153" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arr-fwd)"/>
  <line x1="290" y1="153" x2="328" y2="153" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arr-fwd)"/>
  <line x1="410" y1="153" x2="448" y2="153" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arr-fwd)"/>

  <!-- backward arrows between layer-1 cells (right to left) -->
  <line x1="450" y1="187" x2="412" y2="187" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-bwd)"/>
  <line x1="330" y1="187" x2="292" y2="187" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-bwd)"/>
  <line x1="210" y1="187" x2="172" y2="187" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-bwd)"/>

  <!-- Layer 1 to Layer 2 arrows (for "bank" column only, others implied) -->
  <line x1="130" y1="202" x2="130" y2="218" stroke="#555" stroke-width="1.2" marker-end="url(#arr-elmo)"/>
  <line x1="250" y1="202" x2="250" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arr-elmo)"/>
  <line x1="370" y1="202" x2="370" y2="218" stroke="#555" stroke-width="1.2" marker-end="url(#arr-elmo)"/>
  <line x1="490" y1="202" x2="490" y2="218" stroke="#555" stroke-width="1.2" marker-end="url(#arr-elmo)"/>

  <!-- ── biLSTM Layer 2 ── -->
  <rect x="90"  y="220" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="130" y="240" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="210" y="220" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="250" y="240" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="330" y="220" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="370" y="240" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="450" y="220" width="80" height="30" rx="5" fill="#DDEEF8" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="490" y="240" text-anchor="middle" fill="#2C5F8A" font-size="11">→ fwd</text>

  <rect x="90"  y="254" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="130" y="274" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <rect x="210" y="254" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="250" y="274" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <rect x="330" y="254" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="370" y="274" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <rect x="450" y="254" width="80" height="30" rx="5" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="490" y="274" text-anchor="middle" fill="#C0392B" font-size="11">← bwd</text>

  <!-- Layer 2 label -->
  <text x="30" y="247" text-anchor="middle" fill="#555" font-size="10">biLSTM</text>
  <text x="30" y="260" text-anchor="middle" fill="#555" font-size="10">Layer 2</text>

  <!-- forward arrows between layer-2 cells -->
  <line x1="170" y1="235" x2="208" y2="235" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arr-fwd)"/>
  <line x1="290" y1="235" x2="328" y2="235" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arr-fwd)"/>
  <line x1="410" y1="235" x2="448" y2="235" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arr-fwd)"/>

  <!-- backward arrows layer-2 -->
  <line x1="450" y1="269" x2="412" y2="269" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-bwd)"/>
  <line x1="330" y1="269" x2="292" y2="269" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-bwd)"/>
  <line x1="210" y1="269" x2="172" y2="269" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-bwd)"/>

  <!-- Highlight "bank" column with weighted sum box -->
  <line x1="250" y1="284" x2="250" y2="303" stroke="#4A7C59" stroke-width="2" marker-end="url(#arr-grn)"/>

  <!-- Weighted sum box for "bank" -->
  <rect x="188" y="305" width="124" height="34" rx="7" fill="#E8F5EE" stroke="#4A7C59" stroke-width="2"/>
  <text x="250" y="320" text-anchor="middle" fill="#4A7C59" font-size="11" font-weight="bold">weighted sum</text>
  <text x="250" y="333" text-anchor="middle" fill="#4A7C59" font-size="10">s₀·h₀ + s₁·h₁ + s₂·h₂</text>

  <!-- Arrow to final embedding -->
  <line x1="250" y1="339" x2="250" y2="358" stroke="#4A7C59" stroke-width="2" marker-end="url(#arr-grn)"/>

  <!-- Context-sensitive embedding output box -->
  <rect x="155" y="360" width="190" height="32" rx="7" fill="#4A7C59"/>
  <text x="250" y="380" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ELMo("bank") = finance</text>

  <!-- Right side: same word, different context -->
  <text x="630" y="58" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="bold">Same word, different context</text>

  <rect x="555" y="65" width="150" height="34" rx="6" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="630" y="87" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="bold">"He bank…river"</text>

  <line x1="630" y1="99" x2="630" y2="136" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-bwd)"/>

  <rect x="555" y="138" width="150" height="64" rx="6" fill="#FAE5E3" stroke="#C0392B" stroke-width="1.5"/>
  <text x="630" y="162" text-anchor="middle" fill="#C0392B" font-size="11">biLSTM layers</text>
  <text x="630" y="178" text-anchor="middle" fill="#C0392B" font-size="10">different activations</text>
  <text x="630" y="193" text-anchor="middle" fill="#C0392B" font-size="10">for same token</text>

  <line x1="630" y1="205" x2="630" y2="358" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-bwd)"/>

  <rect x="555" y="360" width="150" height="32" rx="7" fill="#C0392B"/>
  <text x="630" y="380" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ELMo("bank") = river</text>

  <!-- Divider line between main diagram and right panel -->
  <line x1="545" y1="50" x2="545" y2="395" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom caption -->
  <text x="275" y="397" text-anchor="middle" fill="#888" font-size="10">ELMo combines character CNN + biLSTM layers via learned weighted sum per downstream task</text>
</svg>
