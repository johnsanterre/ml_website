<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Loss surface -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Optimization Landscape</text>
  <!-- Axes -->
  <line x1="60" y1="330" x2="500" y2="330" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="330" x2="60" y2="70" stroke="#333" stroke-width="2"/>
  <text x="280" y="365" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Parameter θ</text>
  <text x="25" y="200" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90,25,200)">Loss L(θ)</text>
  <!-- Loss curve with features -->
  <path d="M60,180 Q100,90 150,140 Q200,180 230,260 Q270,300 310,200 Q340,130 380,100 Q420,80 460,95 Q490,105 500,110" fill="none" stroke="#4a90d9" stroke-width="3"/>
  <!-- Local min marker -->
  <circle cx="230" cy="260" r="7" fill="#e74c3c"/>
  <text x="225" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">Local min</text>
  <!-- Saddle point -->
  <circle cx="310" cy="200" r="7" fill="#e67e22"/>
  <text x="310" y="225" text-anchor="middle" font-family="Arial" font-size="11" fill="#e67e22">Saddle pt</text>
  <!-- Global min -->
  <circle cx="415" cy="77" r="8" fill="#27ae60"/>
  <text x="415" y="70" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">Global min</text>
  <!-- Gradient descent path -->
  <path d="M150,140 Q180,180 225,258" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arco)"/>
  <!-- Optimizer comparison -->
  <rect x="540" y="70" width="230" height="230" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="655" y="98" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Common Optimizers</text>
  <text x="655" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">SGD — simple, noisy</text>
  <text x="655" y="148" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Momentum — smoothed</text>
  <text x="655" y="171" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">AdaGrad — per-param lr</text>
  <text x="655" y="194" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">RMSProp — adaptive</text>
  <text x="655" y="217" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a90d9" font-weight="bold">Adam — most popular</text>
  <text x="655" y="243" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">θ ← θ − α·∇L(θ)</text>
  <text x="655" y="263" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">gradient descent step</text>
  <defs><marker id="arco" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/></marker></defs>
</svg>
