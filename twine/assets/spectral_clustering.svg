<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="white"/>
  <!-- Step 1: Original data (two rings) -->
  <text x="130" y="45" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">1. Original Data</text>
  <!-- Inner ring -->
  <circle cx="130" cy="180" r="20" fill="none" stroke="#e74c3c" stroke-width="12" stroke-opacity="0.4"/>
  <!-- Outer ring -->
  <circle cx="130" cy="180" r="55" fill="none" stroke="#4a90d9" stroke-width="12" stroke-opacity="0.4"/>
  <text x="130" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Not linearly separable</text>
  <!-- Arrow -->
  <text x="240" y="185" text-anchor="middle" font-family="Arial" font-size="20" fill="#888">→</text>
  <!-- Step 2: Similarity graph -->
  <text x="380" y="45" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">2. Similarity Graph</text>
  <circle cx="340" cy="150" r="8" fill="#e74c3c"/>
  <circle cx="370" cy="170" r="8" fill="#e74c3c"/>
  <circle cx="350" cy="195" r="8" fill="#e74c3c"/>
  <circle cx="415" cy="155" r="8" fill="#4a90d9"/>
  <circle cx="440" cy="175" r="8" fill="#4a90d9"/>
  <circle cx="420" cy="200" r="8" fill="#4a90d9"/>
  <line x1="340" y1="150" x2="370" y2="170" stroke="#ccc" stroke-width="2"/>
  <line x1="370" y1="170" x2="350" y2="195" stroke="#ccc" stroke-width="2"/>
  <line x1="340" y1="150" x2="350" y2="195" stroke="#ccc" stroke-width="2"/>
  <line x1="415" y1="155" x2="440" y2="175" stroke="#ccc" stroke-width="2"/>
  <line x1="440" y1="175" x2="420" y2="200" stroke="#ccc" stroke-width="2"/>
  <line x1="415" y1="155" x2="420" y2="200" stroke="#ccc" stroke-width="2"/>
  <text x="380" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Laplacian eigenvectors</text>
  <!-- Arrow -->
  <text x="490" y="185" text-anchor="middle" font-family="Arial" font-size="20" fill="#888">→</text>
  <!-- Step 3: Embedded + clustered -->
  <text x="640" y="45" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">3. Eigenspace Clustering</text>
  <circle cx="570" cy="150" r="8" fill="#e74c3c"/>
  <circle cx="590" cy="165" r="8" fill="#e74c3c"/>
  <circle cx="580" cy="185" r="8" fill="#e74c3c"/>
  <circle cx="680" cy="148" r="8" fill="#4a90d9"/>
  <circle cx="700" cy="168" r="8" fill="#4a90d9"/>
  <circle cx="690" cy="190" r="8" fill="#4a90d9"/>
  <!-- Dashed separation line -->
  <line x1="635" y1="120" x2="635" y2="220" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="640" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Linearly separable now</text>
  <text x="400" y="330" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Graph Laplacian L = D − W   |   Cluster using k-means on top eigenvectors</text>
</svg>
